<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | Kolthoff Consulting</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 12 C72 16 84 22 84 22 V54 C84 72 70 85 50 90 C30 85 16 72 16 54 V22 C16 22 28 16 50 12 Z' fill='%2314B8A6' fill-opacity='0.08' stroke='%2314B8A6' stroke-width='4.5' stroke-linejoin='round' /><path d='M36 50 L46 60 L66 36' stroke='%2314B8A6' stroke-width='7.5' stroke-linecap='round' stroke-linejoin='round' /></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght=0,100..900;1,100..900&family=Playfair+Display:ital,wght=0,400..900;1,400..900&display=swap" rel="stylesheet">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDtWOj19Pw0n7NGo4JQZ7sbLcazu_XZzNI",
          authDomain: "kolthoff-portal.firebaseapp.com",
          databaseURL: "https://kolthoff-portal-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "kolthoff-portal",
          storageBucket: "kolthoff-portal.firebasestorage.app",
          messagingSenderId: "413958125034",
          appId: "1:413958125034:web:7d9d6d5f0b11a2c73b2e93"
        };
        
        const appId = 'kolthoff-admin-app'; 

        const app = initializeApp(firebaseConfig);
        window.firebaseAuth = getAuth(app);
        window.firebaseDb = getFirestore(app);
        
        window.appId = appId;
        window.signInAnonymously = signInAnonymously;
        window.doc = doc;
        window.getDoc = getDoc;
        window.onSnapshot = onSnapshot;
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandNavy: { 955: '#02050e', 950: '#020613', 900: '#09111F', 850: '#0C1626', 800: '#0F1A2C', 750: '#15233A', 700: '#1B2C46', 600: '#2E4567' },
                        brandTeal: { 50: '#F0FDFA', 100: '#CCFBF1', 200: '#99F6E4', 300: '#5EEAD4', 400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488', 700: '#0F766E', 855: '#115E59', 950: '#042F2E' },
                        brandAmber: { 400: '#FBBF24', 500: '#F59E0B', 600: '#D97706' }
                    },
                    fontFamily: { sans: ['"Montserrat"', 'sans-serif'], serif: ['"Playfair Display"', 'serif'] }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020613; }
        ::-webkit-scrollbar-thumb { background: #0F1A2C; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #14B8A6; }
        body { background-color: #02050e; background-image: radial-gradient(circle at 15% 50%, rgba(20, 184, 166, 0.04) 0%, transparent 50%), radial-gradient(circle at 85% 30%, rgba(46, 69, 103, 0.1) 0%, transparent 50%); background-attachment: fixed; }
        .glass-panel { background: rgba(9, 17, 31, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(46, 69, 103, 0.4); }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-200 antialiased min-h-screen font-sans selection:bg-brandTeal-600 selection:text-white">

    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect } = React;

        const Icons = {
            Dashboard: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>,
            MapMap: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>,
            Vault: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            CheckCircle: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            AlertCircle: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            Upload: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
            Download: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            ExternalLink: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>,
            FileText: () => <svg className="w-4 h-4 text-brandTeal-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
            TrendingUp: () => <svg className="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
            Lock: () => <svg className="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        };

        const formatCurrency = (val) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 0 }).format(val || 0);

        function App() {
            // App State
            const [accessCode, setAccessCode] = useState('');
            const [clientData, setClientData] = useState(null);
            
            // UI State
            const [activeTab, setActiveTab] = useState('dashboard');
            const [loading, setLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [sysError, setSysError] = useState('');
            const [uploadSimulating, setUploadSimulating] = useState(false);

            // Connect to Firebase Auth on Mount
            useEffect(() => {
                window.signInAnonymously(window.firebaseAuth).catch(err => {
                    console.error(err);
                    setSysError("Connection Blocked: Please ensure you have added your domain to Firebase 'Authorized Domains'.");
                });
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                if (!accessCode.trim()) return;
                
                setLoading(true);
                setErrorMsg('');
                
                try {
                    const formattedCode = accessCode.trim().toUpperCase();
                    const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'clients', formattedCode);
                    const docSnap = await window.getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        setClientData(docSnap.data());
                        
                        // Set up real-time listener
                        window.onSnapshot(docRef, (snap) => {
                            if(snap.exists()) {
                                setClientData(snap.data());
                            } else {
                                // Admin deleted the portal
                                setClientData(null);
                                setErrorMsg("This portal has been closed by the administrator.");
                            }
                        });
                    } else {
                        setErrorMsg("Invalid Access Code. Please check the code provided by Kolthoff Consulting.");
                    }
                } catch (err) {
                    console.error(err);
                    if(err.code === 'permission-denied') {
                         setErrorMsg("Permission Denied: Please check Firebase Authorized Domains.");
                    } else {
                         setErrorMsg("Database connection error. Please try again.");
                    }
                }
                
                setLoading(false);
            };

            const handleSimulateUpload = (id) => {
                setUploadSimulating(id);
                setTimeout(() => {
                    setUploadSimulating(false);
                    alert("File securely uploaded to Kolthoff Consulting encrypted drive.");
                }, 1500);
            };

            if (!clientData) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full glass-panel rounded-2xl p-8 relative overflow-hidden shadow-2xl">
                            <div className="absolute -top-20 -right-20 w-48 h-48 bg-brandTeal-500/10 blur-[50px] rounded-full pointer-events-none"></div>
                            
                            <div className="text-center mb-8 relative z-10">
                                <div className="w-16 h-16 mx-auto rounded-2xl bg-brandTeal-500/10 border border-brandTeal-500/30 flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(20,184,166,0.15)]">
                                    <svg className="w-8 h-8 stroke-current text-brandTeal-500" viewBox="0 0 100 100" fill="none" strokeWidth="6" strokeLinejoin="round">
                                        <path d="M50 12 C72 16 84 22 84 22 V54 C84 72 70 85 50 90 C30 85 16 72 16 54 V22 C16 22 28 16 50 12 Z"/>
                                        <path d="M36 50 L46 60 L66 36" strokeWidth="8" strokeLinecap="round"/>
                                    </svg>
                                </div>
                                <h1 className="text-2xl font-serif font-bold text-white mb-2">Secure Client Portal</h1>
                                <p className="text-xs text-slate-400">Enter your secure access code to view your operational roadmap and asset vault.</p>
                            </div>

                            {sysError && (
                                <div className="mb-6 p-4 rounded-lg bg-rose-500/10 border border-rose-500/30 text-rose-400 text-xs font-bold text-center">
                                    {sysError}
                                </div>
                            )}

                            {errorMsg && (
                                <div className="mb-6 p-3 rounded-lg bg-amber-500/10 border border-amber-500/30 text-amber-400 text-xs font-bold text-center">
                                    {errorMsg}
                                </div>
                            )}

                            <form onSubmit={handleLogin} className="space-y-6 relative z-10">
                                <div>
                                    <label className="block text-[10px] font-mono font-bold text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                                        <Icons.Lock /> SOW Access Code
                                    </label>
                                    <input 
                                        type="text" 
                                        value={accessCode}
                                        onChange={(e) => setAccessCode(e.target.value)}
                                        placeholder="e.g. CLIENT-1234"
                                        className="w-full bg-brandNavy-955 border border-brandNavy-700 focus:border-brandTeal-500 rounded-xl p-4 text-center text-lg font-mono font-bold text-white placeholder:text-slate-600 focus:outline-none transition-colors"
                                        disabled={loading || !!sysError}
                                    />
                                </div>
                                <button 
                                    type="submit"
                                    disabled={loading || !accessCode || !!sysError}
                                    className="w-full py-4 bg-brandTeal-500 hover:bg-brandTeal-400 text-brandNavy-955 font-bold rounded-xl transition-all shadow-lg shadow-brandTeal-500/20 disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    {loading ? "Authenticating..." : "Access Secure Vault"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const pendingActions = (clientData.actionItems || []).filter(a => a.status === 'pending');

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-64 bg-brandNavy-955 border-r border-brandNavy-800 flex flex-col shrink-0 relative z-20 hidden md:flex">
                        <div className="p-6 border-b border-brandNavy-800">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-brandTeal-500/10 border border-brandTeal-500/30 flex items-center justify-center text-brandTeal-400 shadow-[0_0_15px_rgba(20,184,166,0.15)]">
                                    <svg className="w-6 h-6 stroke-current text-brandTeal-500" viewBox="0 0 100 100" fill="none" strokeWidth="6" strokeLinejoin="round">
                                        <path d="M50 12 C72 16 84 22 84 22 V54 C84 72 70 85 50 90 C30 85 16 72 16 54 V22 C16 22 28 16 50 12 Z"/>
                                        <path d="M36 50 L46 60 L66 36" strokeWidth="8" strokeLinecap="round"/>
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-[11px] font-extrabold tracking-widest text-white uppercase leading-none">KOLTHOFF</h1>
                                    <span className="text-[9px] text-brandTeal-500 font-bold uppercase tracking-widest">Consulting</span>
                                </div>
                            </div>
                        </div>

                        <div className="p-6">
                            <p className="text-[10px] font-mono text-slate-500 uppercase tracking-widest mb-3 font-bold">Client Portal</p>
                            <div className="bg-brandNavy-900 border border-brandNavy-700 rounded-lg p-3 mb-6">
                                <p className="text-xs font-bold text-white truncate" title={clientData.companyName}>{clientData.companyName}</p>
                                <p className="text-[10px] text-slate-400 font-mono mt-1">SOW: {clientData.sowReference}</p>
                            </div>

                            <nav className="space-y-2">
                                <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-bold tracking-wide transition-all duration-200 ${activeTab === 'dashboard' ? 'bg-brandTeal-500 text-brandNavy-955 shadow-[0_4px_15px_rgba(20,184,166,0.2)]' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Dashboard /> Executive Dashboard</button>
                                <button onClick={() => setActiveTab('roadmap')} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-bold tracking-wide transition-all duration-200 ${activeTab === 'roadmap' ? 'bg-brandTeal-500 text-brandNavy-955 shadow-[0_4px_15px_rgba(20,184,166,0.2)]' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.MapMap /> Strategic Roadmap</button>
                                <button onClick={() => setActiveTab('vault')} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-bold tracking-wide transition-all duration-200 ${activeTab === 'vault' ? 'bg-brandTeal-500 text-brandNavy-955 shadow-[0_4px_15px_rgba(20,184,166,0.2)]' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Vault /> Secure Asset Vault</button>
                            </nav>
                        </div>

                        <div className="mt-auto p-6 border-t border-brandNavy-800">
                            <button onClick={() => setClientData(null)} className="flex items-center gap-2 text-xs text-rose-400 hover:text-rose-300 transition-colors w-full font-bold uppercase tracking-wider">
                                🔒 Sign Out
                            </button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto relative z-10 scroll-smooth">
                        
                        {/* Mobile Nav */}
                        <div className="md:hidden flex bg-brandNavy-955 p-4 border-b border-brandNavy-800 overflow-x-auto gap-2">
                             <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-2 rounded text-xs font-bold ${activeTab === 'dashboard' ? 'bg-brandTeal-500 text-brandNavy-955' : 'bg-brandNavy-900 text-slate-300'}`}>Dashboard</button>
                             <button onClick={() => setActiveTab('roadmap')} className={`px-4 py-2 rounded text-xs font-bold ${activeTab === 'roadmap' ? 'bg-brandTeal-500 text-brandNavy-955' : 'bg-brandNavy-900 text-slate-300'}`}>Roadmap</button>
                             <button onClick={() => setActiveTab('vault')} className={`px-4 py-2 rounded text-xs font-bold ${activeTab === 'vault' ? 'bg-brandTeal-500 text-brandNavy-955' : 'bg-brandNavy-900 text-slate-300'}`}>Vault</button>
                             <button onClick={() => setClientData(null)} className="px-4 py-2 rounded text-xs font-bold bg-rose-900/50 text-rose-400">Exit</button>
                        </div>

                        <header className="hidden md:flex sticky top-0 z-30 bg-brandNavy-955/80 backdrop-blur-md border-b border-brandNavy-800 px-8 py-4 justify-between items-center">
                            <h2 className="text-lg font-bold text-white font-serif tracking-wide capitalize">
                                {activeTab === 'dashboard' ? 'Executive Overview' : activeTab}
                            </h2>
                            <div className="flex items-center gap-3">
                                <span className="text-[10px] font-mono text-brandTeal-400 bg-brandTeal-500/10 border border-brandTeal-500/20 px-2.5 py-1 rounded font-bold uppercase tracking-wider flex items-center gap-2">
                                    <div className="w-1.5 h-1.5 rounded-full bg-brandTeal-400 animate-pulse"></div> Live Sync Active
                                </span>
                            </div>
                        </header>

                        <div className="p-4 md:p-8 max-w-6xl mx-auto pb-24">
                            
                            {/* DASHBOARD TAB */}
                            {activeTab === 'dashboard' && (
                                <div className="space-y-8 fade-in">
                                    <div className="glass-panel rounded-2xl p-6 md:p-8 relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-64 h-64 bg-brandTeal-500/5 blur-[80px] rounded-full pointer-events-none"></div>
                                        <h2 className="text-2xl font-serif font-bold text-white mb-2">Welcome back, {clientData.repName}</h2>
                                        <p className="text-sm text-slate-400 mb-8 max-w-2xl leading-relaxed">
                                            Your operational upgrade is currently in progress. Review pending action items below to ensure we maintain our target execution timeline.
                                        </p>

                                        <div className="bg-brandNavy-955 border border-brandNavy-800 rounded-xl p-5">
                                            <div className="flex justify-between items-end mb-3">
                                                <div>
                                                    <p className="text-[10px] font-mono text-slate-500 uppercase tracking-widest font-bold mb-1">Current Active Phase</p>
                                                    <p className="text-brandTeal-400 font-bold text-sm">{clientData.currentPhase}</p>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-2xl font-bold text-white font-mono">{clientData.progressPercentage}%</span>
                                                </div>
                                            </div>
                                            <div className="w-full bg-brandNavy-900 rounded-full h-2.5 border border-brandNavy-800 overflow-hidden">
                                                <div className="bg-gradient-to-r from-brandTeal-600 to-brandTeal-400 h-2.5 rounded-full transition-all duration-1000" style={{ width: `${clientData.progressPercentage}%` }}></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div className="lg:col-span-2 space-y-4">
                                            <h3 className="text-sm font-bold uppercase tracking-widest text-slate-300 font-mono flex items-center gap-2">
                                                <span className="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>
                                                Required Action Items ({pendingActions.length})
                                            </h3>
                                            <div className="space-y-3">
                                                {pendingActions.map(action => (
                                                    <div key={action.id} className="glass-panel rounded-xl p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-l-4 border-l-rose-500">
                                                        <div>
                                                            <h4 className="font-bold text-white text-sm">{action.title}</h4>
                                                            <p className="text-xs text-slate-400 mt-1 leading-relaxed">{action.desc || "Please complete this task to advance the roadmap."}</p>
                                                        </div>
                                                        <div className="shrink-0">
                                                            <button 
                                                                onClick={() => handleSimulateUpload(action.id)}
                                                                disabled={uploadSimulating === action.id}
                                                                className="px-4 py-2 bg-brandNavy-800 hover:bg-brandNavy-700 border border-brandNavy-600 text-white text-xs font-bold rounded-lg transition-all flex items-center w-full sm:w-auto justify-center"
                                                            >
                                                                {uploadSimulating === action.id ? 'Processing...' : <><Icons.Check /> Mark Complete</>}
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                                {pendingActions.length === 0 && (
                                                    <div className="glass-panel rounded-xl p-8 text-center border border-brandNavy-800">
                                                        <Icons.CheckCircle className="w-8 h-8 text-emerald-500 mx-auto mb-2" />
                                                        <p className="text-sm font-bold text-slate-300">You're all caught up!</p>
                                                        <p className="text-xs text-slate-500 mt-1">Kolthoff Consulting is processing the next deliverables.</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <h3 className="text-sm font-bold uppercase tracking-widest text-slate-300 font-mono">Value Tracker</h3>
                                            <div className="glass-panel rounded-xl p-5 space-y-5">
                                                <div>
                                                    <p className="text-[10px] font-mono text-slate-500 uppercase tracking-widest font-bold mb-1 flex items-center gap-1">
                                                        <Icons.AlertCircle /> Annual "Chaos Tax" Risk
                                                    </p>
                                                    <p className="text-xl font-bold text-rose-400 font-mono">{formatCurrency(clientData.metrics?.annualLeakageIdentified)}</p>
                                                </div>
                                                <div className="pt-4 border-t border-brandNavy-800">
                                                    <p className="text-[10px] font-mono text-brandTeal-500 uppercase tracking-widest font-bold mb-1 flex items-center gap-1">
                                                        <Icons.TrendingUp /> Leakage Eliminated
                                                    </p>
                                                    <p className="text-2xl font-bold text-emerald-400 font-mono">{formatCurrency(clientData.metrics?.chaosTaxEliminated)}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* ROADMAP TAB */}
                            {activeTab === 'roadmap' && (
                                <div className="space-y-8 fade-in">
                                    <div>
                                        <h2 className="text-2xl font-serif font-bold text-white mb-2">Strategic Implementation Roadmap</h2>
                                        <p className="text-sm text-slate-400 max-w-3xl leading-relaxed">
                                            A live, transparent view of our execution timeline.
                                        </p>
                                    </div>

                                    <div className="glass-panel rounded-2xl p-6 relative before:absolute before:inset-0 before:ml-[31px] before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-brandNavy-700 before:to-transparent">
                                        <div className="space-y-8 relative">
                                            {(clientData.roadmap || []).map((item, idx) => {
                                                let statusColor, statusBg, dotColor;
                                                if (item.status === 'completed') {
                                                    statusColor = 'text-emerald-400'; statusBg = 'bg-emerald-500/10 border-emerald-500/30'; dotColor = 'bg-emerald-500 shadow-[0_0_10px_#10b981]';
                                                } else if (item.status === 'active') {
                                                    statusColor = 'text-brandTeal-400'; statusBg = 'bg-brandTeal-500/10 border-brandTeal-500/30'; dotColor = 'bg-brandTeal-500 shadow-[0_0_15px_#14b8a6] animate-pulse';
                                                } else {
                                                    statusColor = 'text-slate-500'; statusBg = 'bg-brandNavy-800 border-brandNavy-700'; dotColor = 'bg-brandNavy-700';
                                                }

                                                return (
                                                    <div key={item.id || idx} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                                                        <div className="flex items-center justify-center w-8 h-8 rounded-full border-4 border-[#02050e] bg-brandNavy-900 shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 shadow-sm z-10">
                                                            <span className={`w-3 h-3 rounded-full ${dotColor}`}></span>
                                                        </div>
                                                        
                                                        <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] glass-panel border border-brandNavy-800 rounded-xl p-5 shadow-lg">
                                                            <div className="flex justify-between items-start mb-1">
                                                                <span className={`text-[10px] font-bold uppercase tracking-wider font-mono px-2 py-0.5 rounded border ${statusBg} ${statusColor}`}>
                                                                    {item.status}
                                                                </span>
                                                                <span className="text-[10px] font-mono text-slate-500 font-bold">{item.date}</span>
                                                            </div>
                                                            <h4 className={`font-bold text-sm mt-2 ${item.status === 'pending' ? 'text-slate-400' : 'text-white'}`}>{item.title}</h4>
                                                            <p className="text-xs text-slate-400 mt-2 leading-relaxed">{item.details}</p>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* VAULT TAB */}
                            {activeTab === 'vault' && (
                                <div className="space-y-8 fade-in">
                                    <div>
                                        <h2 className="text-2xl font-serif font-bold text-white mb-2">Secure Asset Vault</h2>
                                        <p className="text-sm text-slate-400 max-w-3xl leading-relaxed">
                                            Access all finalized deliverables here. Links redirect to our authenticated Google Workspace backend.
                                        </p>
                                    </div>

                                    <div className="glass-panel rounded-2xl overflow-hidden border border-brandNavy-800">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="bg-brandNavy-900/30 text-slate-400 uppercase text-[9px] tracking-wider font-extrabold border-b border-brandNavy-800 font-mono">
                                                        <th className="p-4">Category</th>
                                                        <th className="p-4">Document Title</th>
                                                        <th className="p-4 text-right">Action</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-brandNavy-800/50 text-sm">
                                                    {(clientData.assets || []).map((asset, idx) => (
                                                        <tr key={asset.id || idx} className="hover:bg-brandNavy-900/40 transition-colors group">
                                                            <td className="p-4">
                                                                <span className="text-[9px] bg-brandNavy-800 text-slate-300 px-2 py-1 rounded font-bold font-mono border border-brandNavy-700">{asset.category}</span>
                                                            </td>
                                                            <td className="p-4 font-bold text-slate-200 flex items-center gap-2">
                                                                <Icons.FileText /> {asset.title}
                                                            </td>
                                                            <td className="p-4 text-right">
                                                                <a href={asset.gDriveLink} target="_blank" rel="noreferrer" className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-brandNavy-800 hover:bg-brandTeal-500/10 border border-brandNavy-600 hover:border-brandTeal-500/40 text-slate-300 hover:text-brandTeal-400 text-[10px] font-bold uppercase tracking-wider rounded transition-all">
                                                                    <Icons.Download /> Open
                                                                </a>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {(!clientData.assets || clientData.assets.length === 0) && (
                                                        <tr><td colSpan="3" className="p-8 text-center text-slate-500 text-xs">No assets have been uploaded yet.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
