          const [activeDocId, setActiveDocId] = useState('help');
          const [showMobileMenu, setShowMobileMenu] = useState(true);

          const activeDoc = activeDocId !== 'help' ? policies.find(p => p.id === activeDocId) : null;

          return (
            <div className="flex flex-col md:flex-row h-full bg-slate-50 overflow-hidden relative">
              
              {/* SIDEBAR */}
              <div className={`w-full md:w-64 bg-white border-b md:border-b-0 md:border-r border-slate-200 flex-col shadow-sm z-10 shrink-0 ${!showMobileMenu ? 'hidden md:flex' : 'flex'}`}>
                <div className="p-4 md:p-6 border-b border-slate-100 flex items-center justify-between">
                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icons.BookOpen /> Policies</h2>
                  <button className="md:hidden p-1 text-slate-500" onClick={() => setShowMobileMenu(false)}><Icons.X /></button>
                </div>
                <div className="p-2 md:p-3 flex-1 overflow-y-auto hide-scrollbar space-y-4">
                  
                  <div>
                      <div className="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Company Documents</div>
                      {policies.length === 0 ? (
                          <div className="px-4 text-xs text-slate-500 italic">No policies published yet.</div>
                      ) : (
                          policies.map(doc => (
                              <button key={doc.id} onClick={() => { setActiveDocId(doc.id); setShowMobileMenu(false); }} className={`w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium flex items-center gap-3 transition-colors ${activeDocId === doc.id ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-100'}`}>
                                  <Icons.FileText className="w-4 h-4 shrink-0" /> <span className="truncate">{doc.title || 'Untitled Document'}</span>
                              </button>
                          ))
                      )}
                  </div>

                  <div>
                      <div className="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Training</div>
                      <button onClick={() => { setActiveDocId('help'); setShowMobileMenu(false); }} className={`w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium flex items-center gap-3 transition-colors ${activeDocId === 'help' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-100'}`}>
                          <Icons.Play /> Help & Training
                      </button>
                  </div>

                </div>
              </div>

              {/* MAIN SCROLL AREA */}
              <div className={`flex-1 flex-col overflow-hidden bg-slate-50 ${showMobileMenu ? 'hidden md:flex' : 'flex'}`}>
                <div className="md:hidden p-4 bg-white border-b border-slate-200 flex items-center gap-2 shrink-0">
                    <button onClick={() => setShowMobileMenu(true)} className="p-2 -ml-2 mr-1 text-slate-500 hover:bg-slate-100 rounded-md shrink-0">
                      <Icons.ChevronLeft />
                    </button>
                    <h1 className="text-lg font-bold text-slate-800 truncate">{activeDocId === 'help' ? 'Help & Training' : (activeDoc?.title || 'Document')}</h1>
                </div>

                <div className="flex-1 overflow-y-auto">
                    {activeDocId === 'help' ? (
                       <HelpAndTraining />
                    ) : activeDoc ? (
                        <div className="p-4 md:p-8 max-w-4xl mx-auto w-full">
                            <div className="bg-white border border-slate-200 rounded-xl p-6 md:p-10 shadow-sm">
                                <h1 className="text-3xl font-black text-slate-900 mb-2">{activeDoc.title || 'Untitled Document'}</h1>
                                {activeDoc.lastUpdated && <p className="text-sm text-slate-500 mb-8 font-mono">Last Updated: {activeDoc.lastUpdated}</p>}
                                <div className="w-full h-px bg-slate-100 mb-8"></div>
                                <MarkdownField value={activeDoc.content || 'No content provided.'} className="text-slate-700 leading-relaxed" />
                            </div>
                        </div>
                    ) : (
                        <div className="p-8 text-center text-slate-500">Document not found.</div>
                    )}
                </div>
              </div>
            </div>
          );
        };

        // --- MAIN APP COMPONENT ---
        const MainApp = () => {
          const { currentUser, setCurrentUser, tenantFeatures } = useContext(AppContext);
          const [currentApp, setCurrentApp] = useState(''); 

          // Smart app routing fallback based on entitlements
          useEffect(() => {
              if (tenantFeatures.messenger) { if (!currentApp) setCurrentApp('messenger'); }
              else if (tenantFeatures.approvals) { if (!currentApp || currentApp === 'messenger') setCurrentApp('approvals'); }
              else if (tenantFeatures.vault) { if (!currentApp || currentApp === 'messenger' || currentApp === 'approvals') setCurrentApp('vault'); }
              else if (tenantFeatures.crm) { if (!currentApp) setCurrentApp('crm'); }
              else { setCurrentApp('none'); }
          }, [tenantFeatures, currentApp]);

          if (!currentUser) return <LoginScreen />;

          return (
            <div className="flex flex-col md:flex-row h-screen w-full bg-slate-900 text-slate-900 font-sans overflow-hidden">
              
              {/* DESKTOP SIDEBAR NAVIGATION */}
              <div className="hidden md:flex w-16 bg-slate-900 flex-col items-center py-4 shrink-0 shadow-xl z-20">
                <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center mb-8 shadow-lg text-white">
                  <Icons.Building />
                </div>
                <nav className="flex-1 flex flex-col gap-4 w-full px-2">
                  {tenantFeatures.messenger && <button onClick={() => setCurrentApp('messenger')} className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all ${currentApp === 'messenger' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`} title="Messenger"><Icons.MessageSquare /></button>}
                  {tenantFeatures.approvals && <button onClick={() => setCurrentApp('approvals')} className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all ${currentApp === 'approvals' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`} title="Approvals"><Icons.CheckSquare /></button>}
                  {tenantFeatures.vault && <button onClick={() => setCurrentApp('vault')} className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all ${currentApp === 'vault' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`} title="Company Policies"><Icons.BookOpen /></button>}
                  {tenantFeatures.crm && <button onClick={() => setCurrentApp('crm')} className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all ${currentApp === 'crm' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-800'}`} title="CRM"><Icons.Users /></button>}
                  
                  {currentUser.role === 'admin' && (
                    <div className="mt-4 border-t border-slate-800 pt-4 w-full flex flex-col items-center gap-4">
                      <button onClick={() => setCurrentApp('admin')} className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all ${currentApp === 'admin' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`} title="Suite Admin"><Icons.Settings /></button>
                    </div>
                  )}
                </nav>
                <div className="mt-auto pt-4 border-t border-slate-800 w-full flex justify-center group cursor-pointer" onClick={() => {if(confirm('Log out?')) setCurrentUser(null);}}>
                  <Avatar name={currentUser.name} size="md" />
                </div>
              </div>

              {/* MAIN CONTENT AREA */}
              <div className="flex-1 bg-white flex flex-col overflow-hidden md:rounded-l-2xl shadow-2xl relative mb-16 md:mb-0">
                {currentApp === 'messenger' && tenantFeatures.messenger && <MessengerApp />}
                {currentApp === 'approvals' && tenantFeatures.approvals && <ApprovalApp />}
                {currentApp === 'vault' && tenantFeatures.vault && <CompanyPoliciesApp />}
                {currentApp === 'admin' && <SuiteAdminApp />}
                {currentApp === 'none' && <div className="flex items-center justify-center h-full text-slate-500 font-medium">No workspace modules enabled. Contact administrator.</div>}
                
                {currentApp === 'crm' && tenantFeatures.crm && (
                    <div className="flex flex-col items-center justify-center h-full text-slate-400 bg-slate-50 gap-4">
                        <Icons.Users className="w-16 h-16 opacity-20" />
                        <h2 className="text-xl font-bold text-slate-600">Client CRM</h2>
                        <p className="text-sm">Module unlocked! Coming soon.</p>
                    </div>
                )}
              </div>

              {/* MOBILE BOTTOM NAVIGATION */}
              <div className="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-slate-900 flex items-center justify-around shrink-0 shadow-[0_-4px_10px_rgba(0,0,0,0.2)] z-50 px-2 pb-safe border-t border-slate-800">
                  {tenantFeatures.messenger && <button onClick={() => setCurrentApp('messenger')} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${currentApp === 'messenger' ? 'bg-blue-600 text-white' : 'text-slate-400'}`} title="Messenger"><Icons.MessageSquare /></button>}
                  {tenantFeatures.approvals && <button onClick={() => setCurrentApp('approvals')} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${currentApp === 'approvals' ? 'bg-blue-600 text-white' : 'text-slate-400'}`} title="Approvals"><Icons.CheckSquare /></button>}
                  {tenantFeatures.vault && <button onClick={() => setCurrentApp('vault')} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${currentApp === 'vault' ? 'bg-blue-600 text-white' : 'text-slate-400'}`} title="Policies"><Icons.BookOpen /></button>}
                  {tenantFeatures.crm && <button onClick={() => setCurrentApp('crm')} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${currentApp === 'crm' ? 'bg-blue-600 text-white' : 'text-slate-400'}`} title="CRM"><Icons.Users /></button>}
                  
                  {currentUser.role === 'admin' && (
                    <button onClick={() => setCurrentApp('admin')} className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${currentApp === 'admin' ? 'bg-blue-600 text-white' : 'text-slate-400'}`} title="Suite Admin"><Icons.Settings /></button>
                  )}
                  <div className="w-10 h-10 flex justify-center items-center cursor-pointer border-l border-slate-800 pl-2 ml-1" onClick={() => {if(confirm('Log out?')) setCurrentUser(null);}}>
                    <Avatar name={currentUser.name} size="sm" />
                  </div>
              </div>

            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<AppProvider><MainApp /></AppProvider>);
    </script>
</body>
</html>
