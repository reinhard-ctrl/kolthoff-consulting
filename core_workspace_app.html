            AlignLeft: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>,

            Server: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>,

            AlignJustify: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>,

            Calendar: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            ChevronDown: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>,
            CircleDot: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>,
            Square: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>,
            Save: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        };

        // --- HELPERS ---
        const generateId = () => Math.random().toString(36).substr(2, 9);

        const evaluateCondition = (step, formData) => {
          if (!step.condition || !step.condition.fieldId) return true;
          const { fieldId, operator, value } = step.condition;
          const formVal = formData[fieldId];
          if (formVal === undefined || formVal === null || formVal === '') return false;
          const numFormVal = Number(formVal);
          const numVal = Number(value);
          const isNumericComparison = !isNaN(numFormVal) && !isNaN(numVal) && value !== '';
          switch (operator) {
            case '>': return isNumericComparison ? numFormVal > numVal : String(formVal) > String(value);
            case '<': return isNumericComparison ? numFormVal < numVal : String(formVal) < String(value);
            case '>=': return isNumericComparison ? numFormVal >= numVal : String(formVal) >= String(value);
            case '<=': return isNumericComparison ? numFormVal <= numVal : String(formVal) <= String(value);
            case '==': return String(formVal) === String(value);
            case '!=': return String(formVal) !== String(value);
            case 'contains': return String(formVal).toLowerCase().includes(String(value).toLowerCase());
            default: return true;
          }
        };

        const getNextValidStepIndex = (template, formData, startIndex) => {
          for (let i = startIndex; i < template.flowSteps.length; i++) {
            if (evaluateCondition(template.flowSteps[i], formData)) return i;
          }
          return -1;
        };

        // --- GLOBAL CONTEXT ---
        const AppContext = createContext();

        const AppProvider = ({ children }) => {
          const [currentUser, setCurrentUser] = useState(null);
          const [users, setUsers] = useState([]);
          const [departments, setDepartments] = useState([]);
          const [templates, setTemplates] = useState([]);
          const [requests, setRequests] = useState([]);
          const [policies, setPolicies] = useState([]);
          
          // Chat State
          const [chats, setChats] = useState([]);
          const [messages, setMessages] = useState([]);
          
          // Feature Entitlements Configuration
          const [tenantFeatures, setTenantFeatures] = useState({ messenger: true, approvals: true, vault: false, crm: false });

          const [isAuthed, setIsAuthed] = useState(false);
          const [authError, setAuthError] = useState('');

          useEffect(() => {
            let checkInterval = setInterval(() => {
              if (window.firebaseAuth && window.firebaseDb && window.signInAnonymously) {
                clearInterval(checkInterval);
                const initAuth = async () => {
                  try {
                    if (window.initialAuthToken) {
                        await window.signInWithCustomToken(window.firebaseAuth, window.initialAuthToken);
                    } else {
                        await window.signInAnonymously(window.firebaseAuth);
                    }
                    setIsAuthed(true);
                  } catch (e) {
                    console.error("Auth error:", e);
                    setAuthError('Firebase Auth blocked. Check domain settings.');
                  }
                };
                initAuth();
              }
            }, 50);
            return () => clearInterval(checkInterval);
          }, []);

          // Cloud Sync Listeners
          useEffect(() => {
            if (!isAuthed) return;
            const db = window.firebaseDb;
            const appId = window.appId;

            const unsubUsers = window.onSnapshot(window.collection(db, 'artifacts', appId, 'public', 'data', 'core_users'), snap => {
                const fetched = []; snap.forEach(doc => fetched.push(doc.data())); setUsers(fetched);
            });
            const unsubDepts = window.onSnapshot(window.collection(db, 'artifacts', appId, 'public', 'data', 'core_departments'), snap => {
                const fetched = []; snap.forEach(doc => fetched.push(doc.data())); setDepartments(fetched);
            });
            const unsubTemplates = window.onSnapshot(window.collection(db, 'artifacts', appId, 'public', 'data', 'core_templates'), snap => {
                const fetched = []; snap.forEach(doc => fetched.push(doc.data())); setTemplates(fetched);
            });
            const unsubRequests = window.onSnapshot(window.collection(db, 'artifacts', appId, 'public', 'data', 'core_requests'), snap => {
                const fetched = []; snap.forEach(doc => fetched.push(doc.data())); setRequests(fetched);
            });
            const unsubChats = window.onSnapshot(window.collection(db, 'artifacts', appId, 'public', 'data', 'core_chats'), snap => {
                const fetched = []; snap.forEach(doc => fetched.push(doc.data())); setChats(fetched);
            });
            const unsubMessages = window.onSnapshot(window.collection(db, 'artifacts', appId, 'public', 'data', 'core_messages'), snap => {
                const fetched = []; snap.forEach(doc => fetched.push(doc.data())); 
                setMessages(fetched.sort((a, b) => a.timestamp - b.timestamp));
            });
            const unsubConfig = window.onSnapshot(window.doc(db, 'artifacts', appId, 'public', 'data', 'tenant_settings', 'config'), snap => {
                if (snap.exists() && snap.data().features) {
                    setTenantFeatures(snap.data().features);
                } else {
                    // Default fallback if no config exists yet
                    setTenantFeatures({ messenger: true, approvals: true, vault: false, crm: false });
                }
            });
            const unsubPolicies = window.onSnapshot(window.collection(db, 'artifacts', appId, 'public', 'data', 'core_policies'), snap => {
                const fetched = []; snap.forEach(doc => fetched.push({id: doc.id, ...doc.data()})); 
                setPolicies(fetched);
            });

            return () => { unsubUsers(); unsubDepts(); unsubTemplates(); unsubRequests(); unsubChats(); unsubMessages(); unsubConfig(); unsubPolicies(); };
          }, [isAuthed]);

          const getCurrentApprover = (request) => {
            if (request.status !== 'pending') return null;
            const template = templates.find(t => t.id === request.templateId);
            if (!template) return null;
            const step = template.flowSteps[request.currentStepIndex];
            if (!step) return null;
            if (step.type === 'specific') return step.approverId;
            if (step.type === 'manager') {
              const requester = users.find(u => u.id === request.requesterId);
              return requester ? requester.managerId : null;
            }
            return null;
          };

          const contextValue = {
            currentUser, setCurrentUser,
            users, departments, templates, requests, chats, messages, policies,
            tenantFeatures,
            getCurrentApprover, isAuthed, authError
          };

          return <AppContext.Provider value={contextValue}>{children}</AppContext.Provider>;
        };

        // --- SHARED UI COMPONENTS ---
        const Avatar = ({ name, size = 'md' }) => {
          const initials = name ? name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() : '?';
          const sizeClasses = { sm: 'w-8 h-8 text-xs', md: 'w-10 h-10 text-sm', lg: 'w-12 h-12 text-base' };
          return (
            <div className={`${sizeClasses[size]} rounded-full bg-blue-600 text-white flex items-center justify-center font-semibold shrink-0`}>
              {initials}
            </div>
          );
        };

        const Button = ({ children, variant = 'primary', className = '', ...props }) => {
          const baseStyle = "px-4 py-2 rounded-md font-medium transition-colors flex items-center justify-center gap-2 text-sm disabled:opacity-50";
          const variants = {
            primary: "bg-blue-600 text-white hover:bg-blue-700 shadow-sm",
            secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200 border border-slate-200",
            danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-200",
            ghost: "bg-transparent text-slate-600 hover:bg-slate-100",
          };
          return <button className={`${baseStyle} ${variants[variant]} ${className}`} {...props}>{children}</button>;
        };

        const MarkdownField = ({ value, className }) => {
            const renderMarkdown = (markdownString) => {
                try {
                    if (window.marked) {
                        if (typeof window.marked.parse === 'function') {
                            return window.marked.parse(markdownString || '');
                        } else if (typeof window.marked === 'function') {
                            return window.marked(markdownString || '');
                        }
                    }
                    return markdownString || '';
                } catch (e) {
                    console.error("Markdown parse error", e);
                    return markdownString || '';
                }
            };
            return <div className={`markdown-body ${className}`} dangerouslySetInnerHTML={{ __html: renderMarkdown(value) }} />;
        };

        // --- SEED / LOGIN SCREEN ---
        const LoginScreen = () => {
            const { isAuthed, authError, users, setCurrentUser } = useContext(AppContext);
            const [emailInput, setEmailInput] = useState('');
            const [isSeeding, setIsSeeding] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                const user = users.find(u => u.email.toLowerCase() === emailInput.toLowerCase().trim());
                if (user) {
                    setCurrentUser(user);
                } else {
                    alert("Email not found in the organization. If the database is empty, click 'Seed Database'.");
                }
            };

            const handleSeedDatabase = async () => {
                if (!isAuthed) return;
                setIsSeeding(true);
                const db = window.firebaseDb;
                const appId = window.appId;
                const batchPromises = [];

                const seedDepts = [
                  { id: 'dept_1', name: 'Management', parentId: null },
                  { id: 'dept_2', name: 'Engineering', parentId: null },
                  { id: 'dept_3', name: 'Human Resources', parentId: null }
                ];
                const seedUsers = [
                  { id: 'u_1', name: 'Alice Admin', email: 'admin@workspace.com', departmentId: 'dept_1', managerId: null, role: 'admin' },
                  { id: 'u_2', name: 'Bob Engineer', email: 'bob@workspace.com', departmentId: 'dept_2', managerId: 'u_1', role: 'user' }
                ];
                const seedTemplates = [
                  {
                    id: 't_1', name: 'Leave Request', icon: 'Calendar',
                    fields: [
                      { id: 'f_1', type: 'text', label: 'Reason for leave', required: true },
                      { id: 'f_2', type: 'number', label: 'Number of Days', required: true },
                    ],
                    flowSteps: [{ id: 's_1', type: 'manager', label: 'Direct Manager Approval', condition: null }]
                  }
                ];
                const seedChats = [
                    { id: 'c_1', type: 'direct', participants: ['u_1', 'u_2'] }
                ];
                const seedMessages = [
                    { id: 'm_1', chatId: 'c_1', senderId: 'u_2', text: 'Hi Alice, did you review the PR?', timestamp: Date.now() - 3600000 },
                    { id: 'm_2', chatId: 'c_1', senderId: 'u_1', text: 'Yes, looks good. I will merge it now.', timestamp: Date.now() - 3500000 }
                ];
                const seedConfig = {
                    features: { messenger: true, approvals: true, vault: true, crm: false }
                };

                const seedPolicies = [
                    {
                        id: 'pol_1', 
                        title: 'Employee Handbook', 
                        lastUpdated: '2026-06-22',
                        content: '# Welcome to the Company\n\nThis handbook outlines our core policies.\n\n## Timekeeping\nStandard working hours are structured from 9:00 AM to 6:00 PM, Monday through Friday.'
                    }
                ];

                try {
                    seedDepts.forEach(d => batchPromises.push(window.setDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'core_departments', d.id), d)));
                    seedUsers.forEach(u => batchPromises.push(window.setDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'core_users', u.id), u)));
                    seedTemplates.forEach(t => batchPromises.push(window.setDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'core_templates', t.id), t)));
                    seedChats.forEach(c => batchPromises.push(window.setDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'core_chats', c.id), c)));
                    seedMessages.forEach(m => batchPromises.push(window.setDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'core_messages', m.id), m)));
                    batchPromises.push(window.setDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'tenant_settings', 'config'), seedConfig));
                    seedPolicies.forEach(p => batchPromises.push(window.setDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'core_policies', p.id), p)));

                    await Promise.all(batchPromises);
                    alert("Database Seeded! You can now login as admin@workspace.com or bob@workspace.com");
                } catch(e) {
                    console.error("Seeding failed", e);
                }
                setIsSeeding(false);
            };

            return (
                <div className="flex h-screen items-center justify-center bg-slate-900 overflow-hidden font-sans">
                    <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/10 blur-[100px] rounded-full pointer-events-none"></div>
                    
                    <div className="bg-slate-800/80 backdrop-blur-md p-6 md:p-10 rounded-2xl w-full max-w-md mx-4 border border-slate-700 relative z-10 shadow-2xl">
                        <div className="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center text-white mx-auto mb-6 shadow-lg shadow-blue-600/30">
                            <Icons.MessageSquare />
                        </div>
                        
                        <h1 className="text-2xl font-bold text-white text-center mb-2">Team Portal</h1>
                        <p className="text-sm text-slate-400 text-center mb-8">Enter your organizational email to access the suite.</p>

                        <form onSubmit={handleLogin} className="space-y-4">
                            <input 
                                type="email" 
                                value={emailInput}
                                onChange={(e) => setEmailInput(e.target.value)}
                                placeholder="Enter email (e.g. admin@workspace.com)"
                                className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition-colors"
                            />
                            {authError && <p className="text-xs text-red-400 font-bold bg-red-500/10 p-2 rounded">{authError}</p>}
                            
                            <button type="submit" disabled={!isAuthed} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg px-4 py-3 text-sm transition-all shadow-md disabled:opacity-50">
                                Sign In
                            </button>
                        </form>

                        <div className="mt-8 pt-6 border-t border-slate-700">
                            <p className="text-xs text-slate-500 text-center mb-3">Testing a new deployment?</p>
                            <button onClick={handleSeedDatabase} disabled={!isAuthed || isSeeding || users.length > 0} className="w-full bg-slate-700 hover:bg-slate-600 text-white font-medium rounded-lg px-4 py-2 text-xs transition-all disabled:opacity-50 border border-slate-600">
                                {isSeeding ? "Seeding Data..." : users.length > 0 ? "Database Already Seeded" : "Seed Demo Database"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- SUB COMPONENTS ---

        // 1. Messenger App
        const MessengerApp = () => {
          const { currentUser, users, chats, messages } = useContext(AppContext);
          const [activeChatId, setActiveChatId] = useState(null);
          const [messageInput, setMessageInput] = useState('');
          const [isCreatingChat, setIsCreatingChat] = useState(false);
          const [newChatName, setNewChatName] = useState('');
          const [selectedUsers, setSelectedUsers] = useState([]);
          
          // AI States
          const [showAIModal, setShowAIModal] = useState(false);
          const [aiPrompt, setAiPrompt] = useState('');
          const [isAILoading, setIsAILoading] = useState(false);

          const messagesEndRef = useRef(null);

          const activeChat = chats.find(c => c.id === activeChatId);
          // Filter messages for active chat
          const chatMessages = messages.filter(m => m.chatId === activeChatId);

          useEffect(() => {
            messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
          }, [chatMessages]);

          const handleSendMessage = async (e) => {
            e.preventDefault();
            if (!messageInput.trim() || !activeChat) return;

            const newMessage = {
              id: generateId(),
              chatId: activeChat.id,
              senderId: currentUser.id,
              text: messageInput.trim(),
              timestamp: Date.now()
            };

            setMessageInput(''); 
            await window.setDoc(window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'core_messages', newMessage.id), newMessage);
          };

          const handleDeleteMessage = async (msgId) => {
            if(confirm('Delete this message?')) {
              await window.deleteDoc(window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'core_messages', msgId));
            }
          };

          const handleAIDraft = async (e) => {
            e.preventDefault();
            if (!aiPrompt.trim()) return;
            setIsAILoading(true);
            
            try {
                const apiKey = "";
                // Exponential backoff retry logic for Gemini API
                const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
                    try {
                        const res = await fetch(url, options);
                        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                        return await res.json();
                    } catch (err) {
                        if (retries > 0) {
                            await new Promise(resolve => setTimeout(resolve, delay));
                            return fetchWithRetry(url, options, retries - 1, delay * 2);
                        }
                        throw err;
                    }
                };

                const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Draft a brief, professional workplace chat message based on this instruction: ${aiPrompt}` }] }],
                        systemInstruction: { parts: [{ text: "You are a professional workplace assistant. Output ONLY the drafted message text without quotes or explanations." }] }
                    })
                });
                
                const draftedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (draftedText) {
                    setMessageInput(draftedText.trim());
                    setShowAIModal(false);
                    setAiPrompt('');
                }
            } catch (err) {
                console.error("AI Draft Error:", err);
                setMessageInput("Sorry, the AI drafting service is currently unavailable.");
                setShowAIModal(false);
            }
            setIsAILoading(false);
          };

          const handleCreateChat = async (e) => {
            e.preventDefault();
            if (selectedUsers.length === 0) return alert("Select at least one user");
            
            const isGroup = selectedUsers.length > 1 || newChatName.trim() !== '';
            const newChatId = generateId();
            const newChat = {
                id: newChatId,
                type: isGroup ? 'group' : 'direct',
                name: isGroup ? (newChatName || 'New Group Chat') : null,
                participants: [currentUser.id, ...selectedUsers]
            };
            
            await window.setDoc(window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'core_chats', newChatId), newChat);
            setIsCreatingChat(false);
            setNewChatName('');
            setSelectedUsers([]);
            setActiveChatId(newChatId);
          };

          const toggleUserSelection = (userId) => {
            setSelectedUsers(prev => prev.includes(userId) ? prev.filter(id => id !== userId) : [...prev, userId]);
          };

          const getChatName = (chat) => {
            if (chat.type === 'group') return chat.name;
            const otherParticipantId = chat.participants.find(id => id !== currentUser.id);
            const otherUser = users.find(u => u.id === otherParticipantId);
            return otherUser ? otherUser.name : 'Unknown User';
          };

          return (
            <div className="flex h-full bg-white overflow-hidden relative">
              
              {/* CHAT LIST (Hidden on mobile if a chat is active) */}
              <div className={`w-full md:w-80 border-r border-slate-200 flex-col bg-slate-50 shrink-0 ${activeChatId ? 'hidden md:flex' : 'flex'}`}>
                <div className="p-4 border-b border-slate-200 bg-white flex items-center gap-2">
                  <div className="relative flex-1">
                    <Icons.Search />
                    <input type="text" placeholder="Search chats" className="w-full pl-9 pr-4 py-2 bg-slate-100 border-transparent rounded-md text-sm focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" />
                  </div>
                  <button onClick={() => setIsCreatingChat(true)} className="p-2 bg-blue-50 text-blue-600 rounded-md hover:bg-blue-100 transition-colors shrink-0" title="New Chat"><Icons.MessagePlus /></button>
                </div>
                <div className="flex-1 overflow-y-auto">
                  {chats.filter(c => c.participants.includes(currentUser.id)).map(chat => {
                    const cMessages = messages.filter(m => m.chatId === chat.id);
                    const lastMessage = cMessages[cMessages.length - 1];
                    return (
                      <div key={chat.id} onClick={() => setActiveChatId(chat.id)} className={`p-4 flex gap-3 cursor-pointer hover:bg-slate-100 transition-colors border-b border-slate-100 ${activeChatId === chat.id ? 'bg-blue-50/50' : ''}`}>
                        <Avatar name={getChatName(chat)} />
                        <div className="flex-1 min-w-0">
                          <div className="flex justify-between items-baseline mb-1">
                            <h3 className="font-semibold text-slate-800 text-sm truncate">{getChatName(chat)}</h3>
                            {lastMessage && <span className="text-xs text-slate-400 shrink-0 ml-2">{new Date(lastMessage.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>}
                          </div>
                          <p className="text-sm text-slate-500 truncate">{lastMessage ? lastMessage.text : 'No messages yet'}</p>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* ACTIVE CHAT AREA (Hidden on mobile if no chat is active) */}
              <div className={`flex-1 flex-col bg-white ${!activeChatId ? 'hidden md:flex' : 'flex'}`}>
                {activeChat ? (
                  <>
                    <div className="p-4 border-b border-slate-200 flex items-center justify-between shadow-sm z-10 bg-white shrink-0">
                      <div className="flex items-center gap-3">
                        <button onClick={() => setActiveChatId(null)} className="md:hidden p-2 -ml-2 mr-1 text-slate-500 hover:bg-slate-100 rounded-md">
                          <Icons.ChevronLeft />
                        </button>
                        <Avatar name={getChatName(activeChat)} />
                        <div>
                          <h2 className="font-semibold text-slate-800">{getChatName(activeChat)}</h2>
                          <p className="text-xs text-slate-500">{activeChat.type === 'group' ? `${activeChat.participants.length} members` : 'Online'}</p>
                        </div>
                      </div>
                      <Button variant="ghost" className="!p-2"><Icons.MoreVertical /></Button>
                    </div>

                    <div className="flex-1 overflow-y-auto p-4 space-y-6 bg-slate-50/50">
                      {chatMessages.map((msg, index) => {
                        const isMe = msg.senderId === currentUser.id;
                        const sender = users.find(u => u.id === msg.senderId);
                        const showAvatar = index === 0 || chatMessages[index - 1].senderId !== msg.senderId;

                        return (
                          <div key={msg.id} className={`flex gap-3 max-w-2xl group ${isMe ? 'ml-auto flex-row-reverse' : ''}`}>
                            {showAvatar ? <div className="w-8 shrink-0">{!isMe && <Avatar name={sender?.name} size="sm" />}</div> : <div className="w-8 shrink-0" />}
                            <div className={`flex flex-col ${isMe ? 'items-end' : 'items-start'}`}>
                              {showAvatar && !isMe && <span className="text-xs text-slate-500 mb-1 ml-1">{sender?.name}</span>}
                              <div className="flex items-center gap-2">
                                  {isMe && (
                                      <button onClick={() => handleDeleteMessage(msg.id)} className="p-1 text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                          <Icons.Trash2 />
                                      </button>
                                  )}
                                  <div className={`px-4 py-2 rounded-2xl shadow-sm text-sm break-words whitespace-pre-wrap ${isMe ? 'bg-blue-600 text-white rounded-tr-sm' : 'bg-white border border-slate-100 text-slate-800 rounded-tl-sm'}`}>
                                    {msg.text}
                                  </div>
                              </div>
                              <span className="text-[10px] text-slate-400 mt-1">{new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                            </div>
                          </div>
                        );
                      })}
                      <div ref={messagesEndRef} />
                    </div>

                    <div className="p-4 bg-white border-t border-slate-200 shrink-0 pb-safe">
                      <form onSubmit={handleSendMessage} className="flex gap-2">
                        <button type="button" onClick={() => setShowAIModal(true)} className="p-2 text-purple-600 bg-purple-50 hover:bg-purple-100 rounded-md transition-colors border border-purple-100 shrink-0" title="Draft with AI">
                          <Icons.Sparkles />
                        </button>
                        <input type="text" value={messageInput} onChange={(e) => setMessageInput(e.target.value)} placeholder="Type a message..." className="flex-1 px-4 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
                        <Button type="submit" variant="primary" className="!px-4 shrink-0"><Icons.Send /></Button>
                      </form>
                    </div>
                  </>
                ) : (
                  <div className="flex-1 flex flex-col items-center justify-center bg-slate-50 text-slate-400">
                    <Icons.MessageSquare className="w-16 h-16 mb-4 opacity-20" />
                    <p>Select a chat to start messaging</p>
                  </div>
                )}
              </div>

              {/* Create Chat Modal */}
              {isCreatingChat && (
                <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-lg shadow-xl w-full max-w-md flex flex-col overflow-hidden max-h-[80vh]">
                    <div className="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                      <h3 className="font-semibold text-slate-800">New Message</h3><button onClick={() => {setIsCreatingChat(false); setSelectedUsers([]); setNewChatName('');}} className="text-slate-400 hover:text-slate-700"><Icons.X /></button>
                    </div>
                    <form onSubmit={handleCreateChat} className="p-4 md:p-6 flex flex-col flex-1 overflow-hidden">
                      <div className="mb-4">
                          <label className="block text-sm mb-1 text-slate-700">Group Name (Optional)</label>
                          <input type="text" value={newChatName} onChange={e => setNewChatName(e.target.value)} placeholder="If adding multiple people..." className="w-full px-3 py-2 border rounded-md text-sm" />
                      </div>
                      <div className="mb-2 text-sm font-medium text-slate-700">Select Contacts:</div>
                      <div className="flex-1 overflow-y-auto border border-slate-200 rounded-md p-2 space-y-1 mb-4">
                          {users.filter(u => u.id !== currentUser.id).map(u => (
                              <div key={u.id} onClick={() => toggleUserSelection(u.id)} className={`flex items-center gap-3 p-2 rounded-md cursor-pointer transition-colors ${selectedUsers.includes(u.id) ? 'bg-blue-50 border border-blue-200' : 'hover:bg-slate-50 border border-transparent'}`}>
                                  <input type="checkbox" checked={selectedUsers.includes(u.id)} readOnly className="rounded border-slate-300 pointer-events-none" />
                                  <Avatar name={u.name} size="sm" />
                                  <div className="flex-1 min-w-0">
                                      <div className="font-medium text-sm text-slate-800 truncate">{u.name}</div>
                                      <div className="text-xs text-slate-500 truncate">{u.email}</div>
                                  </div>
                              </div>
                          ))}
                      </div>
                      <div className="flex justify-end gap-2 border-t border-slate-100 pt-4 shrink-0">
                        <Button type="button" variant="secondary" onClick={() => {setIsCreatingChat(false); setSelectedUsers([]); setNewChatName('');}}>Cancel</Button>
                        <Button type="submit">Start Chat</Button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* AI Draft Modal */}
              {showAIModal && (
                <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-lg shadow-xl w-full max-w-md flex flex-col overflow-hidden">
                    <div className="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-gradient-to-r from-purple-50 to-blue-50">
                      <h3 className="font-semibold text-slate-800 flex items-center gap-2"><Icons.Sparkles /> Draft with Gemini AI</h3>
                      <button onClick={() => setShowAIModal(false)} className="text-slate-400 hover:text-slate-700"><Icons.X /></button>
                    </div>
                    <form onSubmit={handleAIDraft} className="p-4 md:p-6 flex flex-col gap-4">
                      <p className="text-sm text-slate-600">What do you want to say? Gemini will draft a professional message for you.</p>
                      <textarea 
                        value={aiPrompt} 
                        onChange={e => setAiPrompt(e.target.value)} 
                        placeholder="e.g. Tell Alice the TPS report is delayed until tomorrow morning..." 
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm min-h-[100px] focus:outline-none focus:ring-2 focus:ring-purple-500"
                        autoFocus
                      />
                      <div className="flex justify-end gap-2 pt-2">
                        <Button type="button" variant="secondary" onClick={() => setShowAIModal(false)}>Cancel</Button>
                        <Button type="submit" className="bg-gradient-to-r from-purple-600 to-blue-600 border-none text-white hover:bg-purple-700" disabled={isAILoading}>
                          {isAILoading ? 'Drafting...' : 'Generate Draft'}
                        </Button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // 2. Suite Admin
        const SuiteAdminApp = () => {
          const { users, departments, currentUser } = useContext(AppContext);
          const [selectedDeptId, setSelectedDeptId] = useState(null);
          const [editingUser, setEditingUser] = useState(null);
          const [showMobileMenu, setShowMobileMenu] = useState(true);

          if (currentUser.role !== 'admin') return <div className="p-8 text-center text-slate-500">Access Denied.</div>;

          const displayedUsers = selectedDeptId ? users.filter(u => u.departmentId === selectedDeptId) : users;

          const handleSaveUser = async (e) => {
            e.preventDefault();
            await window.setDoc(window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'core_users', editingUser.id), editingUser);
            setEditingUser(null);
          };

          return (
            <div className="flex h-full bg-white overflow-hidden relative">
              
              {/* ADMIN SIDEBAR (Menu) */}
              <div className={`w-full md:w-72 border-r border-slate-200 bg-slate-50 flex-col shrink-0 ${!showMobileMenu ? 'hidden md:flex' : 'flex'}`}>
                <div className="p-4 border-b border-slate-200 bg-white">
                  <h2 className="font-semibold text-slate-800 flex items-center gap-2"><Icons.Building /> Organization</h2>
                </div>
                <div className="p-2 flex-1 overflow-y-auto">
                  <button onClick={() => { setSelectedDeptId(null); setShowMobileMenu(false); }} className={`w-full text-left px-3 py-2 rounded-md text-sm mb-1 ${!selectedDeptId ? 'bg-blue-100 text-blue-700 font-medium' : 'text-slate-700 hover:bg-slate-200'}`}>All Members</button>
                  <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider mt-4 mb-2 px-3 flex justify-between items-center">
                    Departments
                  </div>
                  {departments.map(dept => (
                    <button key={dept.id} onClick={() => { setSelectedDeptId(dept.id); setShowMobileMenu(false); }} className={`w-full text-left px-3 py-2 rounded-md text-sm mb-1 flex items-center gap-2 ${selectedDeptId === dept.id ? 'bg-blue-100 text-blue-700 font-medium' : 'text-slate-700 hover:bg-slate-200'}`}>
                      <Icons.Users /> {dept.name}
                    </button>
                  ))}
                </div>
              </div>

              {/* MAIN CONTENT AREA */}
              <div className={`flex-1 flex-col bg-white ${showMobileMenu ? 'hidden md:flex' : 'flex'}`}>
                <div className="p-4 md:p-6 border-b border-slate-200 flex justify-between items-start md:items-center bg-white shrink-0">
                  <div className="flex items-center gap-2">
                    <button onClick={() => setShowMobileMenu(true)} className="md:hidden p-2 -ml-2 mr-1 text-slate-500 hover:bg-slate-100 rounded-md shrink-0">
                      <Icons.ChevronLeft />
                    </button>
                    <div>
                      <h1 className="text-xl md:text-2xl font-bold text-slate-800">{selectedDeptId ? departments.find(d => d.id === selectedDeptId)?.name : 'All Members'}</h1>
                      <p className="text-slate-500 text-xs md:text-sm mt-1">Manage users, roles, and assignments.</p>
                    </div>
                  </div>
                  <Button variant="primary" className="shrink-0 ml-4 hidden sm:flex" onClick={() => setEditingUser({id: generateId(), name:'', email:'', departmentId:'', managerId:'', role:'user'})}><Icons.Plus /> Add Member</Button>
                </div>
                
                {/* Mobile Add Button row */}
                <div className="p-4 sm:hidden border-b border-slate-100 bg-slate-50">
                  <Button variant="primary" className="w-full" onClick={() => setEditingUser({id: generateId(), name:'', email:'', departmentId:'', managerId:'', role:'user'})}><Icons.Plus /> Add Member</Button>
                </div>

                <div className="p-4 md:p-6 flex-1 overflow-y-auto">
                  <div className="border border-slate-200 rounded-lg overflow-x-auto">
                    <table className="w-full text-left text-sm whitespace-nowrap">
                      <thead className="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-xs font-semibold">
                        <tr><th className="px-4 md:px-6 py-4">Name</th><th className="px-4 md:px-6 py-4">Department</th><th className="px-4 md:px-6 py-4">Direct Manager</th><th className="px-4 md:px-6 py-4 text-right">Actions</th></tr>
                      </thead>
                      <tbody className="divide-y divide-slate-200 bg-white">
                        {displayedUsers.map(user => {
                          const dept = departments.find(d => d.id === user.departmentId);
                          const manager = users.find(u => u.id === user.managerId);
                          return (
                            <tr key={user.id} className="hover:bg-slate-50">
                              <td className="px-4 md:px-6 py-4"><div className="flex items-center gap-3"><Avatar name={user.name} size="sm" /><div><div className="font-medium text-slate-800">{user.name}</div><div className="text-slate-500 text-xs">{user.email}</div></div></div></td>
                              <td className="px-4 md:px-6 py-4 text-slate-600">{dept?.name || '—'}</td>
                              <td className="px-4 md:px-6 py-4">{manager ? <div className="flex items-center gap-2 text-slate-600"><Avatar name={manager.name} size="sm" />{manager.name}</div> : <span className="text-slate-400 italic">No manager</span>}</td>
                              <td className="px-4 md:px-6 py-4 text-right"><Button variant="ghost" className="!px-2 !py-1 text-blue-600 ml-auto" onClick={() => setEditingUser({...user})}><Icons.Edit /> Edit</Button></td>
                            </tr>
                          )
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>

              {/* Edit User Modal */}
              {editingUser && (
                <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-lg shadow-xl w-full max-w-md flex flex-col overflow-hidden max-h-[90vh]">
                    <div className="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 shrink-0">
                      <h3 className="font-semibold text-slate-800">Edit Member Info</h3><button onClick={() => setEditingUser(null)} className="text-slate-400 p-1"><Icons.X /></button>
                    </div>
                    <form onSubmit={handleSaveUser} className="p-6 space-y-4 overflow-y-auto">
                      <div><label className="block text-sm mb-1 font-medium">Full Name</label><input type="text" required value={editingUser.name} onChange={e => setEditingUser({...editingUser, name: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none" /></div>
                      <div><label className="block text-sm mb-1 font-medium">Email</label><input type="email" required value={editingUser.email} onChange={e => setEditingUser({...editingUser, email: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none" /></div>
                      <div>
                        <label className="block text-sm mb-1 font-medium">Department</label>
                        <select value={editingUser.departmentId || ''} onChange={e => setEditingUser({...editingUser, departmentId: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"><option value="">None</option>{departments.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}</select>
                      </div>
                      <div>
                        <label className="block text-sm mb-1 font-medium">Direct Manager</label>
                        <select value={editingUser.managerId || ''} onChange={e => setEditingUser({...editingUser, managerId: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"><option value="">None</option>{users.filter(u => u.id !== editingUser.id).map(u => <option key={u.id} value={u.id}>{u.name}</option>)}</select>
                      </div>
                      <div>
                        <label className="block text-sm mb-1 font-medium">System Role</label>
                        <select value={editingUser.role} onChange={e => setEditingUser({...editingUser, role: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"><option value="user">Standard User</option><option value="admin">Administrator</option></select>
                      </div>
                      <div className="pt-4 flex justify-end gap-2 border-t border-slate-100 mt-6"><Button type="button" variant="secondary" onClick={() => setEditingUser(null)}>Cancel</Button><Button type="submit">Save Changes</Button></div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // 3. Approvals App
        const ApprovalApp = () => {
          const { currentUser, users, templates, requests, getCurrentApprover } = useContext(AppContext);
          const [activeTab, setActiveTab] = useState('new_request'); 
          const [selectedTemplateForForm, setSelectedTemplateForForm] = useState(null);
          const [formData, setFormData] = useState({});
          const [viewingRequest, setViewingRequest] = useState(null);
          
          // IT Request State
          const [showITModal, setShowITModal] = useState(false);
          const [itRequestText, setItRequestText] = useState('');

          const pendingTodos = requests.filter(req => req.status === 'pending' && getCurrentApprover(req) === currentUser.id);
          const myRequests = requests.filter(req => req.requesterId === currentUser.id);

          const handleSubmitRequest = async (e) => {
            e.preventDefault();
            const firstValidStepIndex = getNextValidStepIndex(selectedTemplateForForm, formData, 0);
            const newRequest = {
              id: generateId(),
              templateId: selectedTemplateForForm.id,
              requesterId: currentUser.id,
              formData: { ...formData },
              status: firstValidStepIndex === -1 ? 'approved' : 'pending',
              currentStepIndex: firstValidStepIndex === -1 ? 0 : firstValidStepIndex,
              history: [{ action: 'submitted', userId: currentUser.id, timestamp: Date.now() }]
            };
            if (firstValidStepIndex === -1) {
              newRequest.history.push({ action: 'approved', userId: 'system', timestamp: Date.now() + 1, stepName: 'Auto-approved' });
            }
            await window.setDoc(window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'core_requests', newRequest.id), newRequest);
            setSelectedTemplateForForm(null); setFormData({}); setActiveTab('my_requests');
          };

          const handleActionOnRequest = async (request, action) => {
            const template = templates.find(t => t.id === request.templateId);
            let newStatus = request.status;
            let newStepIndex = request.currentStepIndex;
            const historyEntry = { action: action === 'approve' ? 'approved' : 'rejected', userId: currentUser.id, timestamp: Date.now(), stepName: template.flowSteps[request.currentStepIndex]?.label };

            if (action === 'reject') { newStatus = 'rejected'; } 
            else if (action === 'approve') {
              const nextValidStepIndex = getNextValidStepIndex(template, request.formData, request.currentStepIndex + 1);
              if (nextValidStepIndex !== -1) newStepIndex = nextValidStepIndex; 
              else newStatus = 'approved';
            }

            const updatedReq = { ...request, status: newStatus, currentStepIndex: newStepIndex, history: [...request.history, historyEntry] };
            await window.setDoc(window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'core_requests', updatedReq.id), updatedReq);
            setViewingRequest(null);
          };

          const handleSubmitITRequest = async (e) => {
            e.preventDefault();
            if (!itRequestText.trim()) return;
            const reqId = generateId();
            await window.setDoc(window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'core_it_requests', reqId), {
               id: reqId, requesterId: currentUser.id, text: itRequestText, timestamp: Date.now(), status: 'open'
            });
            setShowITModal(false);
            setItRequestText('');
            alert("IT Support Request submitted to Kolthoff Consulting.");
          };

          const renderTable = (dataList, isTodo = false) => (
            <div className="bg-white border border-slate-200 rounded-lg overflow-x-auto shadow-sm">
              {dataList.length === 0 ? (
                <div className="p-8 md:p-12 text-center text-slate-400"><Icons.CheckSquare className="w-10 h-10 md:w-12 md:h-12 mx-auto mb-3 opacity-20" /><p className="text-sm">No requests found.</p></div>
              ) : (
                <table className="w-full text-left text-sm whitespace-nowrap md:whitespace-normal">
                  <thead className="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-xs font-semibold">
                    <tr><th className="px-4 md:px-6 py-3 md:py-4">Request Name</th><th className="px-4 md:px-6 py-3 md:py-4">Requester</th><th className="px-4 md:px-6 py-3 md:py-4">Status</th><th className="px-4 md:px-6 py-3 md:py-4 text-right">Action</th></tr>
                  </thead>
                  <tbody className="divide-y divide-slate-200">
                    {dataList.map(req => {
                      const tpl = templates.find(t => t.id === req.templateId);
                      const requester = users.find(u => u.id === req.requesterId);
                      return (
                        <tr key={req.id} className="hover:bg-slate-50">
                          <td className="px-4 md:px-6 py-3 md:py-4 font-medium text-slate-800">{tpl?.name || 'Unknown'}</td>
                          <td className="px-4 md:px-6 py-3 md:py-4"><div className="flex items-center gap-2"><Avatar name={requester?.name} size="sm" />{requester?.name}</div></td>
                          <td className="px-4 md:px-6 py-3 md:py-4"><span className={`px-2.5 py-1 rounded-full text-[10px] md:text-xs font-bold uppercase tracking-wider ${req.status==='approved'?'bg-green-100 text-green-800':req.status==='rejected'?'bg-red-100 text-red-800':'bg-yellow-100 text-yellow-800'}`}>{req.status}</span></td>
                          <td className="px-4 md:px-6 py-3 md:py-4 text-right"><Button variant="secondary" className="!px-3 !py-1.5 ml-auto text-xs md:text-sm" onClick={() => setViewingRequest(req)}>View {isTodo && ' & Approve'}</Button></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
            </div>
          );

          const renderOpsDashboard = () => {
            const globalPending = requests.filter(r => r.status === 'pending');
            const globalProcessed = requests.filter(r => r.status === 'approved' || r.status === 'rejected');
            const approvedCount = globalProcessed.filter(r => r.status === 'approved').length;
            const approvalRate = globalProcessed.length > 0 ? Math.round((approvedCount / globalProcessed.length) * 100) : 0;

            const FORTY_EIGHT_HOURS = 48 * 60 * 60 * 1000;
            const now = Date.now();
            
            const stalledRequests = globalPending.filter(req => {
              const lastHistory = req.history[req.history.length - 1];
              return (now - lastHistory.timestamp) > FORTY_EIGHT_HOURS;
            }).map(req => {
              const lastHistory = req.history[req.history.length - 1];
              const daysStalled = Math.floor((now - lastHistory.timestamp) / (24 * 60 * 60 * 1000));
              return { ...req, daysStalled };
            });

            return (
              <div className="p-4 md:p-8 max-w-6xl mx-auto w-full flex flex-col h-full animate-fade-in">
                <div className="mb-6">
                  <h2 className="text-xl md:text-2xl font-bold text-slate-800">Operations Dashboard</h2>
                  <p className="text-slate-500 text-sm mt-1">High-level view of organizational workflow efficiency and bottlenecks.</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8">
                  <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm flex flex-col justify-center text-center">
                      <span className="text-3xl font-black text-blue-600 mb-1">{globalPending.length}</span>
                      <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Total Pending</span>
                  </div>
                  <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm flex flex-col justify-center text-center">
                      <span className="text-3xl font-black text-slate-800 mb-1">{globalProcessed.length}</span>
                      <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Total Processed</span>
                  </div>
                  <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm flex flex-col justify-center text-center">
                      <span className="text-3xl font-black text-emerald-600 mb-1">{approvalRate}%</span>
                      <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Approval Rate</span>
                  </div>
                </div>

                <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></div>
                  Stalled Requests (>{'>'}48 hrs)
                </h3>
                
                <div className="bg-white border border-slate-200 rounded-lg overflow-x-auto shadow-sm">
                  {stalledRequests.length === 0 ? (
                    <div className="p-8 text-center text-slate-400">
                      <Icons.CheckCircle2 className="w-10 h-10 mx-auto mb-3 opacity-20" />
                      <p className="text-sm">No stalled requests. Your team is highly efficient!</p>
                    </div>
                  ) : (
                    <table className="w-full text-left text-sm whitespace-nowrap md:whitespace-normal">
                      <thead className="bg-rose-50 border-b border-rose-100 text-rose-700 uppercase text-[10px] font-bold tracking-wider">
                        <tr>
                          <th className="px-4 md:px-6 py-3 md:py-4">Request / Form</th>
                          <th className="px-4 md:px-6 py-3 md:py-4">Requester</th>
                          <th className="px-4 md:px-6 py-3 md:py-4">Pending With</th>
                          <th className="px-4 md:px-6 py-3 md:py-4 text-right">Time Stalled</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {stalledRequests.map(req => {
                          const tpl = templates.find(t => t.id === req.templateId);
                          const requester = users.find(u => u.id === req.requesterId);
                          const approverId = getCurrentApprover(req);
                          const approver = users.find(u => u.id === approverId);
                          return (
                            <tr key={req.id} className="hover:bg-rose-50/50">
                              <td className="px-4 md:px-6 py-3 md:py-4 font-medium text-slate-800">{tpl?.name || 'Unknown Form'}</td>
                              <td className="px-4 md:px-6 py-3 md:py-4 text-slate-600">{requester?.name || 'Unknown'}</td>
                              <td className="px-4 md:px-6 py-3 md:py-4 font-medium text-rose-600">{approver?.name || 'System / Unassigned'}</td>
                              <td className="px-4 md:px-6 py-3 md:py-4 text-right font-mono font-bold text-rose-500">{req.daysStalled} Days</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>
            );
          }

          const renderAdminConsole = () => (
            <div className="p-4 md:p-8 max-w-6xl mx-auto w-full flex flex-col h-full">
              <div className="flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4 mb-6">
                <div>
                  <h2 className="text-xl md:text-2xl font-bold text-slate-800">Admin Console: Templates</h2>
                  <p className="text-slate-500 text-sm mt-1">View active approval routing workflows. Structural changes are managed by Kolthoff IT.</p>
                </div>
                <Button variant="primary" className="shrink-0" onClick={() => setShowITModal(true)}>
                  <Icons.MessageSquare /> Request IT Support
                </Button>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                {templates.map(tpl => (
                  <div key={tpl.id} className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow">
                    <div className="flex justify-between items-start mb-4">
                      <div className="w-10 h-10 md:w-12 md:h-12 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center"><Icons.FileText /></div>
                      <span className="text-[10px] uppercase font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded">Active</span>
                    </div>
                    <h4 className="font-semibold text-slate-800 text-lg mb-2">{tpl.name}</h4>
                    <div className="flex gap-4 text-xs md:text-sm text-slate-500">
                      <span className="flex items-center gap-1"><Icons.AlignLeft/> {tpl.fields?.length || 0} Fields</span>
                      <span className="flex items-center gap-1"><Icons.GitMerge/> {tpl.flowSteps?.length || 0} Steps</span>
                    </div>
                  </div>
                ))}
                {templates.length === 0 && (
                    <div className="col-span-1 sm:col-span-2 lg:col-span-3 text-center p-8 text-slate-500 border border-dashed border-slate-300 rounded-xl">No active templates found.</div>
                )}
              </div>
            </div>
          );

          return (
            <div className="flex flex-col md:flex-row h-full bg-slate-50 overflow-hidden relative">
              
              {/* APPROVALS SIDEBAR (Horizontal scrolling tabs on mobile, vertical sidebar on desktop) */}
              <div className="w-full md:w-64 bg-white border-b md:border-b-0 md:border-r border-slate-200 flex flex-col shadow-sm z-10 shrink-0">
                <div className="p-4 md:p-6 border-b border-slate-100 hidden md:block">
                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icons.CheckSquare /> Approvals</h2>
                </div>
                <div className="p-2 md:p-3 flex-1 flex flex-row md:flex-col gap-2 md:gap-1 overflow-x-auto hide-scrollbar">
                  <button onClick={() => setActiveTab('new_request')} className={`shrink-0 md:w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium flex items-center gap-2 md:gap-3 transition-colors ${activeTab === 'new_request' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-100'}`}><Icons.Plus /> Start a Request</button>
                  <button onClick={() => setActiveTab('to_do')} className={`shrink-0 md:w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium flex items-center justify-between transition-colors ${activeTab === 'to_do' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-100'}`}>
                    <div className="flex items-center gap-2 md:gap-3"><Icons.Clock /> To-Do</div>
                    {pendingTodos.length > 0 && <span className="bg-red-500 text-white text-[10px] px-2 rounded-full font-bold ml-2">{pendingTodos.length}</span>}
                  </button>
                  <button onClick={() => setActiveTab('my_requests')} className={`shrink-0 md:w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium flex items-center gap-2 md:gap-3 transition-colors ${activeTab === 'my_requests' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-100'}`}><Icons.List /> My Requests</button>
                  
                  {currentUser.role === 'admin' && (
                    <>
                      <div className="hidden md:block mt-6 mb-2 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Administration</div>
                      <button onClick={() => setActiveTab('ops_dashboard')} className={`shrink-0 md:w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium flex items-center gap-2 md:gap-3 transition-colors ${activeTab === 'ops_dashboard' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-100'}`}><Icons.Activity /> Ops Dashboard</button>
                      <button onClick={() => setActiveTab('admin')} className={`shrink-0 md:w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium flex items-center gap-2 md:gap-3 transition-colors ${activeTab === 'admin' ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-100'}`}><Icons.Settings /> Template Library</button>
                    </>
                  )}
                </div>
              </div>

              {/* MAIN SCROLL AREA */}
              <div className="flex-1 overflow-y-auto">
                {activeTab === 'new_request' && (
                  <div className="p-4 md:p-8 max-w-5xl mx-auto w-full">
                    <h2 className="text-xl md:text-2xl font-bold text-slate-800 mb-6 hidden md:block">Start a New Request</h2>
                    {selectedTemplateForForm ? (
                      <div className="bg-white border border-slate-200 rounded-lg p-5 md:p-8 shadow-sm">
                        <button onClick={() => { setSelectedTemplateForForm(null); setFormData({}); }} className="text-sm font-medium text-blue-600 mb-6 flex items-center gap-1 hover:text-blue-700"><Icons.ChevronLeft className="w-4 h-4" /> Back to Templates</button>
                        <h3 className="text-xl font-bold text-slate-800 mb-6 pb-4 border-b border-slate-100">{selectedTemplateForForm.name}</h3>
                        <form onSubmit={handleSubmitRequest} className="space-y-6">
                          {selectedTemplateForForm.fields.map(field => (
                            <div key={field.id}>
                              <label className="block text-sm font-medium mb-1.5 text-slate-700">{field.label} {field.required && <span className="text-red-500">*</span>}</label>
                              {field.type === 'textarea' ? (
                                <textarea required={field.required} value={formData[field.id] || ''} onChange={e => setFormData({...formData, [field.id]: e.target.value})} className="w-full max-w-xl px-4 py-3 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none" rows="3"></textarea>
                              ) : field.type === 'select' ? (
                                <select required={field.required} value={formData[field.id] || ''} onChange={e => setFormData({...formData, [field.id]: e.target.value})} className="w-full max-w-xl px-4 py-3 border border-slate-300 rounded-md bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                                  <option value="" disabled>Select an option...</option>
                                  {(field.optionsStr || '').split(',').map((o, i) => <option key={i} value={o.trim()}>{o.trim()}</option>)}
                                </select>
                              ) : field.type === 'radio' ? (
                                <div className="flex flex-col gap-2.5 max-w-xl mt-2">
                                  {(field.optionsStr || '').split(',').map((o, i) => (
                                    <label key={i} className="flex items-center gap-3 text-sm cursor-pointer p-2 rounded-md hover:bg-slate-50 border border-transparent hover:border-slate-100 transition-colors">
                                      <input type="radio" name={field.id} required={field.required} value={o.trim()} checked={formData[field.id] === o.trim()} onChange={e => setFormData({...formData, [field.id]: e.target.value})} className="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500"/>
                                      {o.trim()}
                                    </label>
                                  ))}
                                </div>
                              ) : field.type === 'checkbox' ? (
                                <div className="max-w-xl mt-2">
                                  <label className="flex items-center gap-3 text-sm cursor-pointer p-2 rounded-md hover:bg-slate-50 border border-transparent hover:border-slate-100 transition-colors">
                                    <input type="checkbox" required={field.required && !formData[field.id]} checked={!!formData[field.id]} onChange={e => setFormData({...formData, [field.id]: e.target.checked})} className="w-4 h-4 rounded text-blue-600 border-slate-300 focus:ring-blue-500"/>
                                    Yes / Confirm
                                  </label>
                                </div>
                              ) : (
                                <input type={field.type === 'number' ? 'number' : field.type === 'date' ? 'date' : 'text'} required={field.required} value={formData[field.id] || ''} onChange={e => setFormData({...formData, [field.id]: e.target.value})} className="w-full max-w-xl px-4 py-3 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none" />
                              )}
                            </div>
                          ))}
                          <div className="pt-4 border-t border-slate-100">
                             <Button type="submit" variant="primary" className="w-full sm:w-auto px-8 py-3">Submit Request</Button>
                          </div>
                        </form>
                      </div>
                    ) : (
                      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 md:gap-6">
                        {templates.map(tpl => (
                          <div key={tpl.id} onClick={() => setSelectedTemplateForForm(tpl)} className="bg-white border border-slate-200 rounded-xl p-4 md:p-6 cursor-pointer hover:shadow-md hover:border-blue-300 transition-all flex flex-col items-center text-center group">
                            <div className="w-12 h-12 md:w-14 md:h-14 bg-slate-50 group-hover:bg-blue-50 rounded-2xl flex items-center justify-center mb-3 md:mb-4 text-slate-400 group-hover:text-blue-500 transition-colors"><Icons.FileText /></div>
                            <h4 className="font-semibold text-sm md:text-base text-slate-800">{tpl.name}</h4>
                          </div>
                        ))}
                        {templates.length === 0 && (
                            <div className="col-span-2 sm:col-span-3 text-center p-8 text-slate-500">No active templates. Admins can create templates in the Admin Console.</div>
                        )}
                      </div>
                    )}
                  </div>
                )}
                {activeTab === 'to_do' && <div className="p-4 md:p-8 max-w-5xl mx-auto w-full"><h2 className="text-xl md:text-2xl font-bold mb-4 md:mb-6 text-slate-800">Pending Approvals</h2>{renderTable(pendingTodos, true)}</div>}
                {activeTab === 'my_requests' && <div className="p-4 md:p-8 max-w-5xl mx-auto w-full"><h2 className="text-xl md:text-2xl font-bold mb-4 md:mb-6 text-slate-800">My Submissions</h2>{renderTable(myRequests, false)}</div>}
                {activeTab === 'ops_dashboard' && renderOpsDashboard()}
                {activeTab === 'admin' && renderAdminConsole()}
              </div>

              {/* IT Support Request Modal */}
              {showITModal && (
                <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-lg shadow-xl w-full max-w-md flex flex-col overflow-hidden">
                    <div className="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                      <h3 className="font-semibold text-slate-800">Request IT Support</h3>
                      <button onClick={() => setShowITModal(false)} className="text-slate-400 hover:text-slate-700 p-1"><Icons.X /></button>
                    </div>
                    <form onSubmit={handleSubmitITRequest} className="p-6 space-y-4">
                      <p className="text-sm text-slate-600">Need a new form, department change, or workflow update? Submit a ticket to Kolthoff Consulting IT.</p>
                      <textarea 
                        value={itRequestText} 
                        onChange={e => setItRequestText(e.target.value)} 
                        placeholder="e.g. Please add a new 'Travel Expense' form with Manager approval..." 
                        className="w-full px-3 py-2 border border-slate-300 rounded-md text-sm min-h-[100px] focus:outline-none focus:ring-2 focus:ring-blue-500"
                        required
                      />
                      <div className="flex justify-end gap-2 pt-2">
                        <Button type="button" variant="secondary" onClick={() => setShowITModal(false)}>Cancel</Button>
                        <Button type="submit" variant="primary">Submit Ticket</Button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* View/Approve Modal */}
              {viewingRequest && (() => {
                const tpl = templates.find(t => t.id === viewingRequest.templateId);
                const requester = users.find(u => u.id === viewingRequest.requesterId);
                const isCurrentApprover = viewingRequest.status === 'pending' && getCurrentApprover(viewingRequest) === currentUser.id;

                return (
                  <div className="fixed inset-0 bg-slate-900/40 flex items-center justify-center md:justify-end z-50 p-4 md:p-0">
                    <div className="bg-white h-full w-full max-w-2xl shadow-2xl flex flex-col animate-slide-in-right rounded-lg md:rounded-none overflow-hidden max-h-[90vh] md:max-h-full">
                      <div className="px-4 md:px-6 py-4 border-b flex justify-between items-center bg-white shrink-0">
                        <div><h3 className="text-lg md:text-xl font-bold text-slate-800">{tpl?.name}</h3><p className="text-xs md:text-sm text-slate-500">Requested by {requester?.name}</p></div>
                        <button onClick={() => setViewingRequest(null)} className="p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-500"><Icons.X /></button>
                      </div>
                      <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50">
                        <div className="bg-white border border-slate-200 rounded-lg p-4 md:p-5 mb-6 shadow-sm">
                          <h4 className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">Form Details</h4>
                          {tpl?.fields.map(f => (
                            <div key={f.id} className="grid grid-cols-1 sm:grid-cols-3 gap-1 sm:gap-4 border-b border-slate-50 pb-3 mb-3 last:border-0 last:pb-0 last:mb-0">
                              <span className="text-xs md:text-sm text-slate-500 font-medium">{f.label}</span>
                              <span className="text-sm font-semibold text-slate-800 sm:col-span-2 break-words whitespace-pre-wrap">
                                {f.type === 'checkbox' ? (viewingRequest.formData[f.id] ? 'Yes' : 'No') : (viewingRequest.formData[f.id] || '—')}
                              </span>
                            </div>
                          ))}
                        </div>
                        <div className="bg-white border border-slate-200 rounded-lg p-4 md:p-5 shadow-sm">
                          <h4 className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">Process History</h4>
                          <div className="space-y-4">
                              {viewingRequest.history.map((hist, idx) => {
                                const u = users.find(user => user.id === hist.userId);
                                return (
                                  <div key={idx} className="flex gap-3 relative">
                                    {idx !== viewingRequest.history.length - 1 && <div className="absolute left-[1.15rem] top-8 bottom-[-1rem] w-px bg-slate-200"></div>}
                                    <div className="w-9 h-9 rounded-full flex items-center justify-center bg-blue-50 border border-blue-100 text-blue-600 shrink-0 z-10"><Icons.Check /></div>
                                    <div className="pt-1"><p className="text-sm font-bold text-slate-800">{u?.name || 'System'} <span className="text-slate-500 font-medium">{hist.action}</span></p><p className="text-xs text-slate-400 mt-0.5">{new Date(hist.timestamp).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}</p></div>
                                  </div>
                                )
                              })}
                          </div>
                        </div>
                      </div>
                      {isCurrentApprover && (
                        <div className="p-4 md:p-6 bg-white border-t border-slate-200 flex gap-3 shrink-0 pb-safe">
                          <Button variant="danger" className="flex-1 py-3" onClick={() => handleActionOnRequest(viewingRequest, 'reject')}><Icons.X /> Reject</Button>
                          <Button variant="primary" className="flex-1 py-3 bg-green-600 hover:bg-green-700 border-transparent" onClick={() => handleActionOnRequest(viewingRequest, 'approve')}><Icons.Check /> Approve</Button>
                        </div>
                      )}
                    </div>
                  </div>
                );
              })()}
            </div>
          );
        };

        // 4. Company Policies App (Knowledge Integration)
        const HelpAndTraining = () => (
            <div className="p-4 md:p-8 max-w-4xl mx-auto w-full">
                <h2 className="text-2xl font-bold text-slate-800 mb-6 hidden md:block">Help & Training</h2>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                        <div className="aspect-video bg-slate-900 flex flex-col items-center justify-center text-white relative group cursor-pointer">
                            <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center group-hover:bg-brandTeal-500 transition-colors duration-300">
                                <Icons.Play />
                            </div>
                        </div>
                        <div className="p-4">
                            <h3 className="font-bold text-slate-800">Welcome to Workspace</h3>
                            <p className="text-xs text-slate-500 mt-1">A 2-minute tour of your new operational tools.</p>
                        </div>
                    </div>
                    <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                        <div className="aspect-video bg-slate-900 flex flex-col items-center justify-center text-white relative group cursor-pointer">
                            <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center group-hover:bg-brandTeal-500 transition-colors duration-300">
                                <Icons.Play />
                            </div>
                        </div>
                        <div className="p-4">
                            <h3 className="font-bold text-slate-800">Submitting Approvals</h3>
                            <p className="text-xs text-slate-500 mt-1">Learn how to fill forms and track your requests.</p>
                        </div>
                    </div>
                </div>
                
                <h3 className="font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">Quick Start Guides</h3>
                <div className="grid grid-cols-1 gap-4">
                   <div className="bg-white border border-slate-200 p-4 rounded-lg flex items-start gap-4 shadow-sm hover:border-blue-300 transition-colors cursor-pointer">
                      <div className="bg-blue-100 text-blue-600 p-2.5 rounded-lg shrink-0"><Icons.MessageSquare /></div>
                      <div>
                        <h4 className="font-bold text-sm text-slate-800">How to use Messenger & AI</h4>
                        <p className="text-xs text-slate-600 mt-1">Learn how to create group chats and use Gemini to draft your messages professionally.</p>
                      </div>
                   </div>
                   <div className="bg-white border border-slate-200 p-4 rounded-lg flex items-start gap-4 shadow-sm hover:border-blue-300 transition-colors cursor-pointer">
                      <div className="bg-emerald-100 text-emerald-600 p-2.5 rounded-lg shrink-0"><Icons.CheckSquare /></div>
                      <div>
                        <h4 className="font-bold text-sm text-slate-800">Approving Requests</h4>
                        <p className="text-xs text-slate-600 mt-1">A guide for managers on how to review, approve, or reject pending team requests.</p>
                      </div>
                   </div>
                </div>
            </div>
        );

        const CompanyPoliciesApp = () => {
          const { policies } = useContext(AppContext);
