            const [delayHoursWeekly, setDelayHoursWeekly] = useState(6);

            const chaosFinancials = useMemo(() => {

                // Standard 160-hour PH work month -> Hourly cost of labor

                // Weekly delays * 4.33 weeks/month * team size * hourly cost

                // Cost of our benchmark audit (e.g., Diagnostics Audit at base rate)
                const auditInvestmentEst = 185000; 
                const firstYearROIPercent = Math.round(((annualChaosTotal - auditInvestmentEst) / auditInvestmentEst) * 100);

                return {
                    totalMonthlyPayroll,
                    monthlyTurnoverLoss,
                    monthlyInefficiencyLoss,
                    annualChaosTotal,
                    firstYearROIPercent
                };
            }, [teamSize, avgMonthlySalary, delayHoursWeekly]);
