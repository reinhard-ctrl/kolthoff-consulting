                const dailyChaosBleed = Math.round(annualChaosTotal / 365);

                                    <div className="p-6 bg-brandNavy-950 border border-brandNavy-750 rounded-2xl flex flex-col justify-center items-center text-center">
                                        <span className="text-[10px] font-mono tracking-widest text-slate-400 uppercase font-bold mb-4">The Lost Payroll Formula</span>
                                        <div id="modal-math-roi" className="text-sm font-semibold select-all text-white py-4 overflow-x-auto w-full max-w-full">
                                            {"$$\\Omega_c = \\frac{T \\cdot S_{\\text{monthly}} \\cdot 0.12 \\cdot 12 + (H_{\\text{weekly}} \\cdot 4.33 \\cdot T \\cdot R_{\\text{avg}} \\cdot 12)}{12 \\cdot T \\cdot S_{\\text{monthly}}}$$"}
                                        </div>
                                    </div>

                                    {/* Variable Meanings */}
                                    <div className="space-y-2">
                                        <h4 className="font-bold text-white font-mono uppercase tracking-wider text-[10px] flex items-center gap-1.5">
                                            <span className="h-1.5 w-1.5 rounded-full bg-brandBlue-400 inline-block"></span>
                                            Variable Parameter Key
                                        </h4>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pl-3 text-slate-400 font-mono text-[10px] font-semibold">
                                            <div>
                                                <strong className="text-white">{"$T$"}</strong> = Total Employees
                                            </div>
                                            <div>
                                                <strong className="text-white">{"$S_{\\text{monthly}}$"}</strong> = Average Monthly Base Salary (₱)
                                            </div>
                                            <div>
                                                <strong className="text-white">{"$H_{\\text{weekly}}$"}</strong> = Wasted Hours per Employee Weekly
                                            </div>
                                            <div>
                                                <strong className="text-white">{"$R_{\\text{avg}}$"}</strong> = Average Hourly Rate ({"$S_{\\text{monthly}} / 160$"})
                                            </div>
                                        </div>
                                    </div>

                                    {/* Logic Breakdown */}
                                    <div className="space-y-3 bg-brandNavy-950/50 p-4 border border-brandNavy-800 rounded-xl">
                                        <h4 className="font-bold text-white font-mono uppercase tracking-wider text-[10px]">What This Formula Factors In:</h4>
                                        <ul className="list-disc list-inside space-y-2 text-slate-400 text-[11px] font-semibold">
                                            <li><strong className="text-slate-200 font-sans">Turnover Loss (12%):</strong> Wasted money spent recruiting, hiring, and onboarding replacements when frustrated employees leave.</li>
                                            <li><strong className="text-slate-200 font-sans">Workflow Loss:</strong> The actual payroll value spent on manual tasks, chasing approvals, and correcting communication mistakes.</li>
                                        </ul>
                                    </div>
                                </div>

                                <div className="pt-4 border-t border-brandNavy-800 text-center">
                                    <button 
                                        onClick={() => setIsMathModalOpen(false)}
                                        className="px-6 py-2.5 bg-brandNavy-800 hover:bg-brandNavy-750 text-white font-bold text-xs uppercase tracking-wider rounded-lg transition-all border border-brandNavy-750"
                                    >
                                        Close Math Details
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Render the public landing page in the DOM target
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
