        // Secure Obfuscation Layer (Data Privacy Act RA 10173 Compliant)
        const SecureStorage = {
            encrypt: (rawData, secretKey = 'kolthoff-secure') => {
                const jsonStr = JSON.stringify(rawData);
                let result = '';
                for (let i = 0; i < jsonStr.length; i++) {
                    const charCode = jsonStr.charCodeAt(i) ^ secretKey.charCodeAt(i % secretKey.length);
                    result += String.fromCharCode(charCode);
                }
                return btoa(unescape(encodeURIComponent(result)));
            },
            
            decrypt: (encryptedData, secretKey = 'kolthoff-secure') => {
                try {
                    if (!encryptedData) return null;
                    const decoded = decodeURIComponent(escape(atob(encryptedData)));
                    let result = '';
                    for (let i = 0; i < decoded.length; i++) {
                        const charCode = decoded.charCodeAt(i) ^ secretKey.charCodeAt(i % secretKey.length);
                        result += String.fromCharCode(charCode);
                    }
                    return JSON.parse(result);
                } catch (e) {
                    return null;
                }
            }
        };

        function loadSavedData(key, fallback) {
            try {
                const saved = localStorage.getItem(key);
                if (!saved) return fallback;
                try {
                    return JSON.parse(saved);
                } catch (normalError) {
                    const decrypted = SecureStorage.decrypt(saved);
                    return decrypted !== null ? decrypted : fallback;
                }
            } catch (e) {
                return fallback;
            }
        }

        function persistSecureData(key, data) {
            try {
                const encrypted = SecureStorage.encrypt(data);
                localStorage.setItem(key, encrypted);
            } catch (e) {
                console.error("Cache write exception safely managed.", e);
            }
        }

        function App() {
            // Main views: 'landing' (contains embedded planner demo), or simulated gate views
            const [workbookTab, setWorkbookTab] = useState('sandbox');
            const [showLockModal, setShowLockModal] = useState(false);
            const [targetedTabName, setTargetedTabName] = useState('');

            // Sliders state for Chaos Tax Calculator
            const [staffCount, setStaffCount] = useState(15);
            const [monthlySalary, setMonthlySalary] = useState(25000);
            const [lostHours, setLostHours] = useState(2);

            // Modal states
            const [showFormulaModal, setShowFormulaModal] = useState(false);
            const [showTermsModal, setShowTermsModal] = useState(false);
            const [showPrivacyModal, setShowPrivacyModal] = useState(false);

            // Intake form states
            const [companyName, setCompanyName] = useState('');
            const [repName, setRepName] = useState('');
            const [workEmail, setWorkEmail] = useState('');
            const [painPoint, setPainPoint] = useState('Chaotic Viber Group Chats & Manual Spreadsheet Sprawl');
            const [dpaChecked, setDpaChecked] = useState(false);
            const [dpaError, setDpaError] = useState(false);

            // Core Workbook states hydrated locally
            const [tasks, setTasks] = useState(() => loadSavedData('kc_demo_tasks', INITIAL_TASKS));
            const [frictionBuffer, setFrictionBuffer] = useState(15);
            const [weeklyHours, setWeeklyHours] = useState(16);

            const principalRate = 3500;
            const seniorRate = 2500;
            const associateRate = 1500;

            function getRateForTier(tier) {
                if (tier === 'principal') return principalRate;
                if (tier === 'senior') return seniorRate;
                return associateRate;
            }

            useEffect(() => {
                persistSecureData('kc_demo_tasks', tasks);
            }, [tasks]);

            // Calculator outputs
            const calculatedChaosTax = useMemo(() => {
                return Math.round(staffCount * monthlySalary * 12 * (lostHours / 8));
            }, [staffCount, monthlySalary, lostHours]);

            const calculatedRecoveryPotential = useMemo(() => {
                return Math.round(calculatedChaosTax * 0.4);
            }, [calculatedChaosTax]);

            // Workbook live metrics
            const selectedTasks = useMemo(() => tasks.filter(t => t.selected), [tasks]);
            const totalTargetEffort = useMemo(() => {
                const baseHours = selectedTasks.reduce((acc, curr) => acc + curr.estHours, 0);
                return Math.round(baseHours * (1 + frictionBuffer / 100));
            }, [selectedTasks, frictionBuffer]);

            const expectedWeeks = useMemo(() => {
                if (totalTargetEffort <= 0) return "N/A";
                const exactWeeks = totalTargetEffort / weeklyHours;
                const ceilingWeeks = Math.ceil(exactWeeks);
                if (ceilingWeeks <= 1) return "1 - 2 Weeks";
                if (ceilingWeeks <= 2) return "2 - 3 Weeks";
                return `${ceilingWeeks - 1} - ${ceilingWeeks} Weeks`;
            }, [totalTargetEffort, weeklyHours]);

            const estimatedCostUndiscounted = useMemo(() => {
                const bufferMultiplier = 1 + (frictionBuffer / 100);
                return Math.round(selectedTasks.reduce((acc, curr) => {
                    return acc + (curr.estHours * getRateForTier(curr.tier));
                }, 0) * bufferMultiplier);
            }, [selectedTasks, frictionBuffer]);

            const estimatedCostWithTax = useMemo(() => {
                return Math.round(estimatedCostUndiscounted * 1.12);
            }, [estimatedCostUndiscounted]);

            const netSavingsROI = useMemo(() => {
                return Math.max(0, calculatedChaosTax - estimatedCostWithTax);
            }, [calculatedChaosTax, estimatedCostWithTax]);

            const roiPercent = useMemo(() => {
                if (estimatedCostWithTax <= 0) return 0;
                return Math.round((netSavingsROI / estimatedCostWithTax) * 100);
            }, [netSavingsROI, estimatedCostWithTax]);

            // Gate Interception Link triggered upon click
            const handleWorkbookTabClick = (tabId, label) => {
                if (tabId === 'sandbox') {
                    setWorkbookTab('sandbox');
                } else {
                    setTargetedTabName(label);
                    setShowLockModal(true);
                }

                    `We have pre-configured our operational parameters on your portal and would like to schedule our activation sync to unlock our Proposal and customized PDF files. Here are our metrics:\n\n` +

                    `2. Representative Name: ${repName || '[Enter Owner Name]'}\n` +

                    `• Est. Project Cost: ${formatCurrency(estimatedCostWithTax)} (Incl. 12% VAT)\n` +
                    `• Est. First-Year Savings: ${formatCurrency(netSavingsROI)} (${roiPercent}% SOW ROI)\n\n` +
                    `Please check your schedule slots for this week. I verify that this request adheres fully to RA 10173.\n\n` +
                    `Sincerely,\n` +
                    `${repName || '[Your Name]'}`
                );

                window.location.href = `mailto:${recipient}?subject=${subject}&body=${body}`;
                setShowLockModal(false);
            };

            const handleMainFormSubmit = (e) => {
                e.preventDefault();

                    return;
                }
