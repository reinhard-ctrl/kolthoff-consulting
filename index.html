        // SVG Symbols optimized to use React-compliant camelCase attributes
        const IconTrendingDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-rose-400"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>;
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-400"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="ml-1.5 transition-transform group-hover:translate-x-1"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-brandBlue-500"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-brandBlue-500"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;

        const IconCalculator = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect width="16" height="20" x="4" y="2" rx="2"/>
                <line x1="8" x2="16" y1="6" y2="6"/>

            </svg>
        );

        // GLOBAL FORMAT CURRENCY UTILITY DEFINITION
        const formatCurrency = (val) => {
            return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 0 }).format(val);
        };

        function App() {
            // Interactive Leakage Calculator States
            const [teamSize, setTeamSize] = useState(30);
            const [avgMonthlySalary, setAvgMonthlySalary] = useState(45000);
            const [delayHoursWeekly, setDelayHoursWeekly] = useState(6);

            // Dynamic Calculator Leakage Math
            const publicCalculatedChaos = useMemo(() => {
                const totalMonthlyPayroll = teamSize * avgMonthlySalary;
                const avgHourlyRate = avgMonthlySalary / 160;
                const monthlyTurnoverLoss = totalMonthlyPayroll * 0.12;
                const monthlyInefficiencyLoss = Math.round(delayHoursWeekly * 4.33 * teamSize * avgHourlyRate);
                const annualChaosTotal = Math.round((monthlyTurnoverLoss + monthlyInefficiencyLoss) * 12);
                const firstYearROIPercent = Math.round(((annualChaosTotal - 185000) / 185000) * 100);

                return { annualChaosTotal, firstYearROIPercent, monthlyTurnoverLoss, monthlyInefficiencyLoss };
            }, [teamSize, avgMonthlySalary, delayHoursWeekly]);

            // Direct mail link generator with custom inquiry body - simplified email template

                const subject = encodeURIComponent("Operational Diagnostics Audit Request");

I am writing to request an Operational Diagnostics Audit to evaluate our workflow architecture and mitigate potential operational risks.

Please coordinate with us for an initial briefing session.

Our Contact Details:
- Company Name: 
- Primary Contact Representative: 
- Contact Mobile/Email: 

Optional Pain Point Description (Bottlenecks, delays, or process challenges):


Best regards,`);
                return `mailto:contact@kolthoff-consulting.com?subject=${subject}&body=${body}`;
            }, []);

            // Trigger MathJax typeset updates cleanly on ROI changes
            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    const mathElement = document.getElementById('math-roi');
                    if (mathElement) {
                        window.MathJax.typesetClear([mathElement]);
                        window.MathJax.typesetPromise([mathElement]).catch(err => console.warn(err));
                    }
                }
            }, [publicCalculatedChaos.firstYearROIPercent]);

            return (
                <div className="font-sans min-h-screen text-slate-300 bg-brandNavy-950">
                    
                    {/* High-Status Corporate Header (STREAMLINED: CONTACT COORDINATES REMOVED FROM VIEWPORT HEADER) */}
                    <header className="border-b border-brandNavy-700/50 bg-brandNavy-950/95 sticky top-0 z-50 backdrop-blur-md font-sans">

                                <IconWebsiteLogo className="w-10 h-10 text-brandBlue-400" />
                                <div>
                                    <span className="font-sans font-extrabold tracking-wider text-base sm:text-lg uppercase block text-white leading-none">
                                        KOLTHOFF <span className="text-brandBlue-400">CONSULTING</span>
                                    </span>
                                    <span className="text-[9px] text-brandBlue-400 font-mono tracking-[0.25em] uppercase block mt-1.5 font-bold">Operational Architecture & Strategy</span>
                                </div>
                            </div>
                            
                            <nav className="hidden md:flex items-center gap-8 text-xs font-semibold uppercase tracking-widest text-slate-400">
                                <a href="#chaos" className="hover:text-white transition-colors duration-200">The Cost of Chaos</a>
                                <a href="#diagnostics" className="hover:text-white transition-colors duration-200">Scale-Up Lifecycle</a>
                                <a href={mailtoLink} className="px-5 py-2.5 bg-brandBlue-500 hover:bg-brandBlue-600 text-slate-955 font-bold rounded transition-all duration-300 shadow-lg shadow-brandBlue-950/40 hover:-translate-y-0.5 font-sans uppercase">
                                    Book Diagnostic Audit
                                </a>
                            </nav>
                        </div>
                    </header>

                    {/* Hero Section */}
                    <section className="relative overflow-hidden pt-24 pb-28 border-b border-brandNavy-700/60 bg-brandNavy-950 text-slate-100">
                        <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-brandBlue-500/5 blur-[120px] rounded-full" />
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">

                                    B2B MANAGEMENT ADVISORY
                                </span>
                                <h1 className="text-4xl sm:text-6xl font-serif font-bold text-white leading-tight">

                                </h1>
                                <p className="text-slate-300 text-sm sm:text-base leading-relaxed max-w-2xl font-light">

                                        <div>

                                                <span className="text-slate-100 font-semibold font-mono">{formatCurrency(publicCalculatedChaos.monthlyTurnoverLoss * 12)} / year</span>
                                            </div>

                                        >

                                        </div>

                    <section id="diagnostics" className="py-24 border-b border-brandNavy-900 bg-brandNavy-950 text-slate-100 font-sans">
                        <div className="max-w-7xl mx-auto px-6 space-y-16">
                            
                            {/* Section Header */}
                            <div className="max-w-3xl mx-auto text-center space-y-3">
                                <span className="text-xs font-mono font-bold tracking-[0.25em] text-brandBlue-400 uppercase">360° Scale-Up Lifecycle</span>
                                <h2 className="text-3xl sm:text-4xl font-serif font-bold text-white">Our Operational Architecture Roadmap</h2>
