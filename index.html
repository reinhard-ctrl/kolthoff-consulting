<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]

            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']

    <!-- MathJax for rendering LaTeX formulas dynamically with high fidelity -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

        input[type="range"]::-webkit-slider-thumb {

            appearance: none;
            width: 18px;
            height: 18px;

</head>
<body class="bg-brandNavy-950 text-slate-100 antialiased selection:bg-brandBlue-600 selection:text-white min-h-screen">

                    <rect x="47.5" y="24.5" width="5" height="6" rx="1" fill="currentColor" transform="rotate(45 50 52)" />

                    <rect x="47.5" y="24.5" width="5" height="6" rx="1" fill="currentColor" transform="rotate(225 50 52)" />
                    <rect x="47.5" y="24.5" width="5" height="6" rx="1" fill="currentColor" transform="rotate(270 50 52)" />
                    <rect x="47.5" y="24.5" width="5" height="6" rx="1" fill="currentColor" transform="rotate(315 50 52)" />
                </g>
                <path d="M38 52 L47 61 L64 39" stroke="#2563EB" strokeWidth="7" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
        );

        // SVG Symbols optimized to use React-compliant camelCase attributes
        const IconTrendingDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-rose-400"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>;
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-400"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="ml-1.5 transition-transform group-hover:translate-x-1"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;
        const IconClock = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-brandBlue-500"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-brandBlue-500"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-brandBlue-500"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconMail = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>;
        const IconGlobe = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>;
        const IconCalculator = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect width="16" height="20" x="4" y="2" rx="2"/>
                <line x1="8" x2="16" y1="6" y2="6"/>
                <line x1="16" x2="16" y1="14" y2="18"/>
                <path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>
            </svg>
        );

        // GLOBAL FORMAT CURRENCY UTILITY DEFINITION
        const formatCurrency = (val) => {
            return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 0 }).format(val);
        };

        function App() {
            // Interactive Leakage Calculator States
            const [teamSize, setTeamSize] = useState(30);
            const [avgMonthlySalary, setAvgMonthlySalary] = useState(45000);
            const [delayHoursWeekly, setDelayHoursWeekly] = useState(6);

            // Dynamic Calculator Leakage Math
            const publicCalculatedChaos = useMemo(() => {
                const totalMonthlyPayroll = teamSize * avgMonthlySalary;
                const avgHourlyRate = avgMonthlySalary / 160;
                const monthlyTurnoverLoss = totalMonthlyPayroll * 0.12;
                const monthlyInefficiencyLoss = Math.round(delayHoursWeekly * 4.33 * teamSize * avgHourlyRate);
                const annualChaosTotal = Math.round((monthlyTurnoverLoss + monthlyInefficiencyLoss) * 12);
                const firstYearROIPercent = Math.round(((annualChaosTotal - 185000) / 185000) * 100);

                return { annualChaosTotal, firstYearROIPercent, monthlyTurnoverLoss, monthlyInefficiencyLoss };
            }, [teamSize, avgMonthlySalary, delayHoursWeekly]);

            // Direct mail link generator with custom inquiry body - simplified email template
            const mailtoLink = useMemo(() => {
                const subject = encodeURIComponent("Operational Diagnostics Audit Request");
                const body = encodeURIComponent(`Dear Reinhard,

I am writing to request an Operational Diagnostics Audit to evaluate our workflow architecture and mitigate potential operational risks.

Please coordinate with us for an initial briefing session.

Our Contact Details:
- Company Name: 
- Primary Contact Representative: 
- Contact Mobile/Email: 

Optional Pain Point Description (Bottlenecks, delays, or process challenges):


Best regards,`);
                return `mailto:contact@kolthoff-consulting.com?subject=${subject}&body=${body}`;
            }, []);

            // Trigger MathJax typeset updates cleanly on ROI changes
            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    const mathElement = document.getElementById('math-roi');
                    if (mathElement) {
                        window.MathJax.typesetClear([mathElement]);
                        window.MathJax.typesetPromise([mathElement]).catch(err => console.warn(err));
                    }
                }
            }, [publicCalculatedChaos.firstYearROIPercent]);

            return (
                <div className="font-sans min-h-screen text-slate-300">
                    
                    {/* High-Status Corporate Header */}
                    <header className="border-b border-brandNavy-700/50 bg-brandNavy-950/95 sticky top-0 z-50 backdrop-blur-md">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <IconWebsiteLogo className="w-10 h-10 text-brandBlue-400" />
                                <div>
                                    <span className="font-sans font-extrabold tracking-wider text-base sm:text-lg uppercase block text-white">
                                        KOLTHOFF <span className="text-brandBlue-400">CONSULTING</span>
                                    </span>
                                    <span className="text-[9px] text-brandBlue-400 font-mono tracking-[0.25em] uppercase block -mt-1 font-bold">Operational Architecture & Strategy</span>
                                </div>
                            </div>
                            
                            <nav className="hidden md:flex items-center gap-8 text-xs font-semibold uppercase tracking-widest text-slate-400">
                                <a href="#chaos" className="hover:text-white transition-colors duration-200 font-sans">The Cost of Chaos</a>
                                <a href="#diagnostics" className="hover:text-white transition-colors duration-200 font-sans">Operational Diagnostics</a>
                                <a href="#ecosystem" className="hover:text-white transition-colors duration-200 font-sans">360° Portfolio</a>
                                <a href={mailtoLink} className="px-5 py-2.5 bg-brandBlue-500 hover:bg-brandBlue-600 text-slate-950 font-bold rounded transition-all duration-300 shadow-lg shadow-brandBlue-950/40 hover:-translate-y-0.5 font-sans">
                                    Book Diagnostic Audit
                                </a>
                            </nav>
                        </div>
                    </header>

                    {/* Hero Section */}
                    <section className="relative overflow-hidden pt-24 pb-28 border-b border-brandNavy-700/60 bg-brandNavy-950 text-slate-100">
                        <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-brandBlue-500/5 blur-[120px] rounded-full" />
                        <div className="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
                            <div className="lg:col-span-7 space-y-6">
                                <span className="text-xs font-mono font-bold tracking-[0.3em] text-brandBlue-400 uppercase bg-brandBlue-950/40 border border-brandBlue-900/30 px-3.5 py-1.5 rounded inline-block">
                                    B2B MANAGEMENT ADVISORY
                                </span>
                                <h1 className="text-4xl sm:text-6xl font-serif font-bold text-white leading-tight">
                                    Stop Bleeding Cash. <br />
                                    <span className="text-brandBlue-400 font-bold">Fix Your Process Architecture.</span>
                                </h1>
                                <p className="text-slate-300 text-sm sm:text-base leading-relaxed max-w-2xl font-light">
                                    We audit and re-engineer workflows for mid-sized enterprises and corporate groups in the Philippines. By eliminating process chaos and institutional delays, we return clear margin profits directly to your bottom line.
                                </p>
                                <div className="pt-4 flex flex-col sm:flex-row gap-4 font-sans font-medium">
                                    <a href="#chaos" className="group px-8 py-4 bg-brandBlue-500 hover:bg-brandBlue-600 text-white font-bold text-xs uppercase tracking-wider rounded transition-all shadow-lg shadow-brandBlue-950/30 flex items-center justify-center hover:-translate-y-0.5">
                                        Audit Your Financial Waste <IconArrowRight />
                                    </a>
                                    <a href="#diagnostics" className="px-8 py-4 bg-brandNavy-800 hover:bg-brandNavy-750 text-slate-200 font-bold text-xs uppercase tracking-wider rounded border border-brandNavy-700 flex items-center justify-center transition-all duration-300 hover:-translate-y-0.5">
                                        Explore Diagnostics Audit
                                    </a>
                                </div>
                            </div>

                            <div className="lg:col-span-5 bg-brandNavy-900/90 border border-brandNavy-700 p-8 rounded-2xl shadow-2xl relative">

                                    <span className="w-2 h-2 rounded-full bg-brandBlue-400 inline-block"></span>
                                </div>
                                <h3 className="text-xs font-mono tracking-widest text-slate-400 uppercase font-bold mb-4">Core Partnership Philosophy</h3>
                                <p className="font-serif italic text-lg text-slate-100 leading-relaxed mb-6">
                                    "A business cannot scale if its reporting lines are blurred, its compliance registers are exposed, or its core operational playbook resides inside the minds of single employees."

                                        360
                                    </div>
                                    <div className="text-xs font-sans font-medium">
                                        <span className="font-bold text-white block">Outcome-Based Pricing</span>
                                        <span className="text-slate-400 mt-0.5 block">100% Flat-Rate Guarantees. No hourly scope-creep.</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Cost of Chaos Assessment Tool */}
                    <section id="chaos" className="py-24 border-b border-slate-200 bg-slate-50 text-slate-800">

                                                </label>
                                                <span className="text-sm font-mono font-bold text-brandBlue-600 bg-brandBlue-50 px-2.5 py-1 rounded">₱{avgMonthlySalary.toLocaleString()}</span>
                                            </div>
                                            <input 
                                                type="range" 
                                                min="15000" 
                                                max="120000" 
                                                step="5000"
                                                value={avgMonthlySalary} 
                                                onChange={(e) => setAvgMonthlySalary(parseInt(e.target.value))}
                                                className="w-full accent-brandBlue-500 bg-slate-100 h-2 rounded-lg cursor-pointer"
                                            />
                                        </div>

                                        <div>
                                            <div className="flex justify-between items-center mb-3">
                                                <label className="text-xs font-mono uppercase tracking-widest text-slate-700 font-bold flex items-center gap-1.5">
                                                    <IconClock /> Avg. Delay per Staff Weekly
                                                </label>
                                                <span className="text-sm font-mono font-bold text-brandBlue-600 bg-brandBlue-50 px-2.5 py-1 rounded">{delayHoursWeekly} Hours</span>
                                            </div>
                                            <input 
                                                type="range" 
                                                min="1" 
                                                max="15" 
                                                value={delayHoursWeekly} 
                                                onChange={(e) => setDelayHoursWeekly(parseInt(e.target.value))}

                                            />

                                    </div>

                                    <div className="p-4 bg-slate-50 rounded-xl border border-slate-200/80 text-[11px] text-slate-500 leading-relaxed font-sans font-medium">

                                    </div>
                                </div>

                                <div className="lg:col-span-6 bg-brandNavy-900 border-2 border-brandBlue-500/20 p-8 rounded-2xl shadow-2xl flex flex-col justify-between relative overflow-hidden text-slate-100">

                                            {formatCurrency(publicCalculatedChaos.annualChaosTotal)}
                                        </span>
                                        <div className="mt-6 space-y-3.5 border-b border-brandNavy-700/80 pb-6 text-sm">
                                            <div className="flex justify-between">
                                                <span className="text-slate-400 font-light font-medium">Frictional Turnover Loss:</span>
                                                <span className="text-slate-100 font-semibold font-mono">{formatCurrency(publicCalculatedChaos.monthlyTurnoverLoss * 12)} / year</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-slate-400 font-light font-medium">Weekly System Delay Loss:</span>
                                                <span className="text-slate-100 font-semibold font-mono">{formatCurrency(publicCalculatedChaos.monthlyInefficiencyLoss * 12)} / year</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-6 space-y-4">
                                        <div className="flex items-center gap-2 mb-1">
                                            <IconTrendingUp />
                                            <span className="text-[10px] font-mono font-bold tracking-widest text-emerald-400 uppercase">Diagnostics Audit ROI Projection</span>
                                        </div>
                                        
                                        <div 
                                            id="math-roi" 
                                            key={publicCalculatedChaos.firstYearROIPercent} 
                                            className="bg-brandNavy-950/80 p-4 rounded-xl border border-brandNavy-700/50 text-[11px] font-mono text-slate-400 min-h-[50px] flex items-center justify-center text-center font-semibold"
                                        >
                                            {"$$\\text{ROI} = \\frac{\\text{Chaos Leakage} - \\text{Audit Fee}}{\\text{Audit Fee}} \\times 100 \\approx +" + publicCalculatedChaos.firstYearROIPercent + "\\%$$"}
                                        </div>
                                        
                                        <p className="text-xs text-slate-300 leading-relaxed font-light font-sans font-semibold">
                                            A standard **Operational Diagnostics Audit** identifies and maps these leakage sources, giving you the exact blueprint to recover these lost margins in Year 1.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Operational Diagnostics Sprint Deliverables */}
                    <section id="diagnostics" className="py-24 border-b border-slate-200 bg-white text-slate-800 font-sans font-semibold">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="max-w-3xl mx-auto text-center mb-16 space-y-3">
                                <span className="text-xs font-mono font-bold tracking-[0.25em] text-brandBlue-600 uppercase">The Mandatory Entry Point</span>
                                <h2 className="text-3xl sm:text-4xl font-serif font-bold text-slate-900">Operational Diagnostics Audit</h2>
                                <p className="text-sm text-slate-600 leading-relaxed">
                                    We do not sell blindly. Every long-term optimization program begins with a structured, intensive diagnostics sprint. Over a highly focused <strong>1 to 2-week timeline</strong>, we align your organization's reality under 6 clear deliverables:
                                </p>
                            </div>
