name: Firebase Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run test:rules
        continue-on-error: true

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_PRODUCTION: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: 'npm'
      - run: npm ci --include=dev && npm run build
        env:
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}

      - id: google-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: kolthoff-portal
          create_credentials_file: true
          export_environment_variables: true

      - name: Prune stale Firebase preview channels
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
          CURRENT_CHANNEL: pr-${{ github.event.pull_request.number }}
          KEEP_CHANNELS: "8"
        run: |
          node <<'NODE'
          const { execSync } = require('child_process');
          const keep = Number(process.env.KEEP_CHANNELS || 8);
          const current = process.env.CURRENT_CHANNEL;
          const raw = execSync(
            'npx --yes firebase-tools@15.22.3 hosting:channel:list --project kolthoff-portal --json',
            { encoding: 'utf8', env: process.env, stdio: ['pipe', 'pipe', 'inherit'] }
          );
          const data = JSON.parse(raw);
          const channels = (data.result?.channels || [])
            .map((c) => ({
              id: c.name.split('/').pop(),
              expireTime: c.expireTime || c.updateTime || '',
            }))
            .filter((c) => /^pr-\d+$/.test(c.id))
            .sort((a, b) => a.expireTime.localeCompare(b.expireTime));
          const deletable = channels
            .filter((c) => c.id !== current)
            .slice(0, Math.max(0, channels.length - keep));
          for (const ch of deletable) {
            console.log(`Deleting stale preview channel: ${ch.id}`);
            try {
              execSync(
                `npx --yes firebase-tools@15.22.3 hosting:channel:delete ${ch.id} --project kolthoff-portal --non-interactive --force`,
                { stdio: 'inherit', env: process.env }
              );
            } catch (err) {
              console.warn(`Failed to delete channel ${ch.id}`);
            }
          }
          if (deletable.length === 0) console.log('No stale preview channels to prune.');
          NODE

      - name: Deploy hosting preview channel
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
        run: |
          npx --yes firebase-tools@15.22.3 hosting:channel:deploy "pr-${{ github.event.pull_request.number }}" \
            --expires 7d \
            --project kolthoff-portal \
            --non-interactive || {
              echo "::warning::Firebase preview channel deploy skipped (quota or transient error). Production deploy on merge is unaffected."
              exit 0
            }

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    env:
      NPM_CONFIG_PRODUCTION: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: 'npm'
      - run: npm ci --include=dev && npm run build
        env:
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
      - run: npm ci --prefix functions --include=dev && npm run build --prefix functions

      - id: google-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: kolthoff-portal
          create_credentials_file: true
          export_environment_variables: true

      - uses: google-github-actions/setup-gcloud@v2

      - name: Remove orphaned validateWorkbookProfile (wrong trigger type)
        continue-on-error: true
        run: |
          gcloud functions delete validateWorkbookProfile \
            --region=asia-southeast1 \
            --project=kolthoff-portal \
            --gen2 \
            --quiet

      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.google-auth.outputs.credentials_file_path }}
        run: |
          npx --yes firebase-tools@15.22.3 deploy \
            --only hosting,firestore:rules,storage,functions \
            --project kolthoff-portal \
            --non-interactive \
            --force

      - name: Allow public invoke on login Cloud Functions (skipped if org policy blocks allUsers)
        continue-on-error: true
        run: |
          REGION=asia-southeast1
          PROJECT=kolthoff-portal
          for FN in verifyAdminPasscode generatePortalToken provisionGoogleStaff; do
            gcloud functions add-iam-policy-binding "$FN" \
              --gen2 --region="$REGION" --project="$PROJECT" \
              --member="allUsers" \
              --role="roles/cloudfunctions.invoker" \
              --quiet || true
          done
          for SVC in verifyadminpasscode generateportaltoken; do
            gcloud run services add-iam-policy-binding "$SVC" \
              --region="$REGION" --project="$PROJECT" \
              --member="allUsers" \
              --role="roles/run.invoker" \
              --quiet || true
          done
          gcloud iam service-accounts add-iam-policy-binding \
            413958125034-compute@developer.gserviceaccount.com \
            --project="$PROJECT" \
            --member="serviceAccount:413958125034-compute@developer.gserviceaccount.com" \
            --role="roles/iam.serviceAccountTokenCreator" \
            --quiet || true
