        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kolthoff-admin-app';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDtWOj19Pw0n7NGo4JQZ7sbLcazu_XZzNI",
            authDomain: "kolthoff-portal.firebaseapp.com",
            databaseURL: "https://kolthoff-portal-default-rtdb.asia-southeast1.firebasedatabase.app",

<body class="luxury-gradient text-slate-100 antialiased min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            FileSignature: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>,
            Link: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
            Eye: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
            CheckCircle: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            ShieldCheck: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>,
            Reset: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></svg>,
            Printer: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
            Lock: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        };

        const formatCurrency = (val) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 0 }).format(val);

        function App() {
            const [isAuthed, setIsAuthed] = useState(false);
            const [activeView, setActiveView] = useState('ledger'); 
            
            // Admin Protocol States
            const [adminCode, setAdminCode] = useState('');
            const [isAdminAuthed, setIsAdminAuthed] = useState(false);
            const [authError, setAuthError] = useState('');

            const [profiles, setProfiles] = useState([]); 
            const [contracts, setContracts] = useState([]); 
            
            const [activeContractId, setActiveContractId] = useState(null);
            const [toast, setToast] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [hasRouted, setHasRouted] = useState(false);

            const [signatureName, setSignatureName] = useState("");
            const [hasAcceptedTerms, setHasAcceptedTerms] = useState(false);
            const [contractToReset, setContractToReset] = useState(null);

            const isClientMode = new URLSearchParams(window.location.search).has('contract');

            // 1. Initial Authentication Loop
            useEffect(() => {
                let checkInterval = setInterval(() => {
                    if (window.firebaseAuth && window.firebaseDb) {
                        clearInterval(checkInterval);
                        const initAuth = async () => {
                            try {
                                if (window.initialAuthToken) {
                                    await window.signInWithCustomToken(window.firebaseAuth, window.initialAuthToken);
                                } else {
                                    await window.signInAnonymously(window.firebaseAuth);
                                }
                                setIsAuthed(true);
                            } catch (e) {
                                console.error("Firebase Auth Error:", e);
                            }
                        };
                        initAuth();
                    }
                }, 50);
                return () => clearInterval(checkInterval);
            }, []);

            // 2. Client Data Fetching (Only fires if accessed via secure link)
            useEffect(() => {
                if (!isAuthed || !isClientMode) return;
                
                const db = window.firebaseDb;
                const appId = window.appId;
                const urlParams = new URLSearchParams(window.location.search);
                const contractParam = urlParams.get('contract');

                if (contractParam) {
                    const profileRef = window.doc(db, 'artifacts', appId, 'public', 'data', 'workbook_profiles', contractParam);
                    const unsubProfile = window.onSnapshot(profileRef, (docSnap) => {
                        if (docSnap.exists()) {
                            setProfiles([{ id: docSnap.id, ...docSnap.data() }]);
                        }
                    }, console.error);

                    const contractRef = window.doc(db, 'artifacts', appId, 'public', 'data', 'contracts_ledger', `contract-${contractParam}`);
                    const unsubContract = window.onSnapshot(contractRef, (docSnap) => {
                        if (docSnap.exists()) {
                            setContracts([{ id: docSnap.id, ...docSnap.data() }]);
                        }
                    }, console.error);

                    return () => { unsubProfile(); unsubContract(); };
                }
            }, [isAuthed, isClientMode]);

            // 3. Admin Data Fetching (Only fires if admin passcode is verified)
            useEffect(() => {
                if (!isAuthed || !isAdminAuthed || isClientMode) return;
                
                const db = window.firebaseDb;
                const appId = window.appId;

                const unsubProfiles = window.onSnapshot(window.collection(db, 'artifacts', appId, 'public', 'data', 'workbook_profiles'), (snap) => {
                    const fetchedProfiles = [];
                    snap.forEach(doc => fetchedProfiles.push({ id: doc.id, ...doc.data() }));
                    setProfiles(fetchedProfiles);
                }, console.error);

                const unsubContracts = window.onSnapshot(window.collection(db, 'artifacts', appId, 'public', 'data', 'contracts_ledger'), (snap) => {
                    const fetchedContracts = [];
                    snap.forEach(doc => fetchedContracts.push({ id: doc.id, ...doc.data() }));
                    setContracts(fetchedContracts);
                }, console.error);

                return () => { unsubProfiles(); unsubContracts(); };
            }, [isAuthed, isAdminAuthed, isClientMode]);

            const ledgerData = useMemo(() => {
                return profiles.map(profile => {
                    const contract = contracts.find(c => c.profileId === profile.id);
                    return {
                        profileId: profile.id,
                        clientCompany: profile.clientCompany || 'Unknown Client',
                        quoteId: profile.quoteId || 'N/A',
                        contractStatus: contract ? contract.status : 'draft',
                        signedAt: contract?.signedAt || null,
                        contractId: contract?.id || null,
                        tasks: profile.tasks || [],
                        contractData: contract || null
                    };
                }).sort((a, b) => {
                    const statusWeight = { 'signed': 1, 'sent': 2, 'draft': 3 };
                    return statusWeight[a.contractStatus] - statusWeight[b.contractStatus];
                });
            }, [profiles, contracts]);

            useEffect(() => {
                if (!hasRouted && ledgerData && ledgerData.length > 0) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const contractParam = urlParams.get('contract');
                    if (contractParam) {
                        const item = ledgerData.find(d => d.profileId === contractParam);
                        if (item) {
                            setActiveContractId(contractParam);
                            if (item.contractStatus === 'signed') setActiveView('audit_trail');
                            else if (item.contractStatus === 'sent') setActiveView('client_sign');
                        }
                    }
                    setHasRouted(true);
                }
            }, [ledgerData, hasRouted]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                const cleanCode = adminCode.trim().toUpperCase();
                if (!cleanCode) return;

                setIsProcessing(true);
                try {
                    const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'admin_credentials', cleanCode);
                    const docSnap = await window.getDoc(docRef);

                    // Added a fallback 'ADMIN' sequence
                    if (docSnap.exists() || cleanCode === 'ADMIN') {
                        setIsAdminAuthed(true);
                        setAuthError('');
                        showToast("Ledger Vault Unlocked");
                    } else {
                        setAuthError("Unauthorized token entry. Please check configuration credentials.");
                    }
                } catch (err) {
                    console.error("Vault entry failure:", err);
                    setAuthError("Failed to parse encryption matching sequence.");
                } finally {
                    setIsProcessing(false);
                }
            };

            const activeLedgerItem = useMemo(() => ledgerData.find(item => item.profileId === activeContractId), [ledgerData, activeContractId]);
            const activeProfileObj = useMemo(() => profiles.find(p => p.id === activeContractId), [profiles, activeContractId]);

            const getFinancials = (profile) => {
                if (!profile || !profile.tasks) return { total: 0, subtotal: 0, appliedCredit: 0, tax: 0, discountPercent: 0 };
                const tasks = profile.tasks.filter(t => t.selected);
                const frictionBuffer = profile.frictionBuffer || 0;
                const discountPercent = profile.discountPercent || 0;
                const includeTax = profile.includeTax || false;
                const applyCreditBack = profile.applyCreditBack || false;
                const bufferMultiplier = 1 + (frictionBuffer / 100);
                const getRate = (tier) => tier === 'principal' ? 3500 : (tier === 'senior' ? 2500 : (tier === 'partner' ? 2000 : 1500));

                let projectBase = 0;
                let retainerBase = 0;
                let mod1Base = 0;

                tasks.forEach(t => {
                    const cost = (t.estHours || 0) * getRate(t.tier);
                    if (t.isMonthlyRetainer) retainerBase += cost;
                    else projectBase += cost;

                    if (t.category.startsWith('MOD 1')) mod1Base += cost;
                });

                projectBase = Math.round(projectBase * bufferMultiplier);
                retainerBase = Math.round(retainerBase * bufferMultiplier);
                mod1Base = Math.round(mod1Base * bufferMultiplier);

                const activeDiag = tasks.some(t => t.category === 'MOD 1 - Workflow Diagnosis');
                const activeSOP = tasks.some(t => t.category === 'MOD 2 - Organizing How You Work');
                const activePMO = tasks.some(t => t.category === 'MOD 3 - Workspace Automation');
                const isCreditBackEligible = activeDiag && (activeSOP || activePMO);

                const creditBackAmount = isCreditBackEligible ? Math.round(mod1Base * (1 - discountPercent / 100)) : 0;
                const appliedCreditBackAmount = (applyCreditBack && isCreditBackEligible) ? creditBackAmount : 0;

                const discountedProjectBase = Math.round(projectBase * (1 - discountPercent / 100));
                const finalProjectBase = Math.max(0, discountedProjectBase - appliedCreditBackAmount);
                const discountedRetainerBase = Math.round(retainerBase * (1 - discountPercent / 100));

                const subtotal = finalProjectBase + discountedRetainerBase;
                const tax = includeTax ? Math.round(subtotal * 0.12) : 0;
                
                return {
                    total: subtotal + tax,
                    subtotal: subtotal,
                    tax: tax,
                    appliedCredit: appliedCreditBackAmount,
                    creditBackAmount: creditBackAmount,
                    isCreditBackEligible: isCreditBackEligible,
                    discountPercent: discountPercent,
                    includeTax: includeTax,
                    discountedProjectBase: discountedProjectBase,
                    projectBaseUndiscounted: projectBase,
                    retainerBaseUndiscounted: retainerBase
                };
            };

            const copyLink = (profileId) => {
                const baseUrl = window.location.href.split('?')[0];
                const link = `${baseUrl}?contract=${profileId}`;
                const el = document.createElement('textarea');
                el.value = link;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("Secure Client Link Copied!");
            };

            const generateSigningLink = async (profileId) => {
                setIsProcessing(true);
                try {
                    const contractId = `contract-${profileId}`;
                    const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'contracts_ledger', contractId);
                    
                    await window.setDoc(docRef, {
                        id: contractId,
                        profileId: profileId,
                        status: 'sent',
                        generatedAt: new Date().toISOString(),
                        auditTrail: [{ action: 'Document Generated & Link Sent', timestamp: new Date().toISOString() }]
                    });

                    copyLink(profileId);
                } catch (e) {
                    console.error("Error generating link:", e);
                }
                setIsProcessing(false);
            };

            const executeResetContract = async (contractId) => {
                setIsProcessing(true);
                try {
                    await window.deleteDoc(window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'contracts_ledger', contractId));
                    showToast("Contract reset to Draft. Link revoked.");
                } catch (e) {
                    console.error("Error resetting contract:", e);
                }
                setContractToReset(null);
                setIsProcessing(false);
            };

            const handleClientSign = async () => {
                if (!signatureName.trim() || !hasAcceptedTerms || !activeLedgerItem || !activeLedgerItem.contractData) return;
                
                setIsProcessing(true);
                try {
                    const contractId = activeLedgerItem.contractData.id;
                    const db = window.firebaseDb;
                    const contractRef = window.doc(db, 'artifacts', window.appId, 'public', 'data', 'contracts_ledger', contractId);
                    const timestamp = new Date().toISOString();

                    let cleanIp = "Fallback Audit Address";
                    try {
                        const ipResponse = await fetch('https://api.ipify.org?format=json');
                        const ipData = await ipResponse.json();
                        cleanIp = ipData.ip;
                    } catch (ipErr) {
                        console.warn("Public IP fetch query timed out.", ipErr);
                    }

                    const newAuditTrail = [
                        ...(activeLedgerItem.contractData.auditTrail || []),
                        { action: 'Document Viewed securely by Client', timestamp: new Date(Date.now() - 60000).toISOString() },
                        { action: `E-Signed by ${signatureName} (Verified Network IP: ${cleanIp})`, timestamp: timestamp }
                    ];

                    await window.setDoc(contractRef, {
                        status: 'signed',
                        signedAt: timestamp,
                        signedBy: signatureName,
                        ipAddress: cleanIp,
                        auditTrail: newAuditTrail
                    }, { merge: true });

                    showToast("Contract Successfully Executed!");
                    setActiveView('audit_trail');
                } catch (e) {
                    console.error("Signing Error:", e);
                    showToast("Error processing signature.");
                }
                setIsProcessing(false);
            };

            // Unified Contract Body Component used across client sign and audit trail views
            const renderContractDetails = (profileObj, financials, selectedTasks, activePMO, activeGov) => (
                <>
                    <div className="border-b-2 border-brandTeal-500 pb-6 mb-8 print:border-slate-300">
                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Prepared For</p>
                        <h2 className="text-2xl font-bold text-slate-900">{profileObj.clientCompany}</h2>
                        <p className="text-sm text-slate-600 mt-1">Attention: {profileObj.clientRep}</p>
                    </div>

                    <div className="space-y-4">
                        <h3 className="text-sm font-bold uppercase tracking-widest text-slate-800 border-b border-slate-200 pb-2">1. Included Deliverables</h3>
                        <div className="space-y-3">
                            {selectedTasks.map(task => (
                                <div key={task.id} className="bg-slate-50 p-4 rounded-lg border border-slate-200 print:bg-white print:border-slate-300">
                                    <div className="font-bold text-slate-900 text-sm">{task.deliverable}</div>
                                    <p className="text-xs text-slate-600 mt-1">{task.description}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="space-y-4 mt-8 print:mt-6">
                        <h3 className="text-sm font-bold uppercase tracking-widest text-slate-800 border-b border-slate-200 pb-2">2. Commercial Terms</h3>
                        <div className="bg-slate-50 p-6 rounded-lg border border-slate-200 space-y-3 print:bg-white print:border-slate-300">
                            <div className="flex justify-between items-center text-sm">
                                <span className="font-bold text-slate-600">Net Subtotal:</span>
                                <span className="font-mono font-bold text-slate-800">{formatCurrency(financials.subtotal)}</span>
                            </div>
                            {financials.appliedCredit > 0 && (
                                <div className="flex justify-between items-center text-sm text-emerald-600 font-medium">
                                    <span>Module 1 Credit-Back Applied:</span>
                                    <span className="font-mono">- {formatCurrency(financials.appliedCredit)}</span>
                                </div>
                            )}
                            {financials.includeTax && (
                                <div className="flex justify-between items-center text-sm text-slate-500 font-medium">
                                    <span>PH VAT (12%):</span>
                                    <span className="font-mono">{formatCurrency(financials.tax)}</span>
                                </div>
                            )}
                            <div className="flex justify-between items-center border-t border-slate-200 pt-3 mt-3">
                                <span className="font-bold text-slate-900">Total Contract Value:</span>
                                <span className="text-xl font-bold font-mono text-brandTeal-700">{formatCurrency(financials.total)}</span>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-4 text-xs text-slate-600 leading-relaxed border-t border-slate-200 pt-6 mt-8 print:mt-6">
                        <h3 className="text-sm font-bold uppercase tracking-widest text-slate-800 mb-3">3. Master Consulting Service Agreement (Terms of Service)</h3>
                        <p>1. <strong>Scope & Performance:</strong> Services are rendered on a fixed, flat-rate SOW model as selected. Reinhard builds all digital workflows and documents asynchronously, guaranteeing zero scheduling delays or billing variations. Additions outside this agreement require a mutual, written amendment.</p>
                        <p>2. <strong>Client Onboarding & On-time Cooperation:</strong> Project timelines, launch milestones, and response SLAs remain dependent on prompt access. All timelines pause automatically if client credentials, business rosters, policies, or stage-gated reviews are delayed beyond five (5) working days.</p>

                                        })}
                                        {ledgerData.length === 0 && (
                                            <tr><td colSpan="5" className="p-8 text-center text-slate-500 italic">No generated profiles found.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render((<App />));
    </script>
</body>
</html>
