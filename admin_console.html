<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Console | Client Portal Manager</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 12 C72 16 84 22 84 22 V54 C84 72 70 85 50 90 C30 85 16 72 16 54 V22 C16 22 28 16 50 12 Z' fill='%2314B8A6' fill-opacity='0.08' stroke='%2314B8A6' stroke-width='4.5' stroke-linejoin='round' /><path d='M36 50 L46 60 L66 36' stroke='%2314B8A6' stroke-width='7.5' stroke-linecap='round' stroke-linejoin='round' /></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght=0,100..900;1,100..900&family=Playfair+Display:ital,wght=0,400..900;1,400..900&display=swap" rel="stylesheet">

    <!-- Firebase Module Initialization (Adapts to Canvas or Local Storage) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDtWOj19Pw0n7NGo4JQZ7sbLcazu_XZzNI",
            authDomain: "kolthoff-portal.firebaseapp.com",
            databaseURL: "https://kolthoff-portal-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kolthoff-portal",
            storageBucket: "kolthoff-portal.firebasestorage.app",
            messagingSenderId: "413958125034",
            appId: "1:413958125034:web:7d9d6d5f0b11a2c73b2e93"
        };
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kolthoff-admin-app'; 
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        const app = initializeApp(firebaseConfig);
        window.firebaseAuth = getAuth(app);
        window.firebaseDb = getFirestore(app);
        
        window.appId = appId;
        window.initialAuthToken = initialAuthToken;
        window.signInAnonymously = signInAnonymously;
        window.signInWithCustomToken = signInWithCustomToken;
        window.doc = doc;
        window.setDoc = setDoc;
        window.deleteDoc = deleteDoc;
        window.onSnapshot = onSnapshot;
        window.collection = collection;
    </script>

    <!-- React and ReactDOM CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js" crossorigin></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandNavy: { 955: '#02050e', 950: '#020613', 900: '#09111F', 850: '#0C1626', 800: '#0F1A2C', 700: '#1B2C46' },
                        brandTeal: { 300: '#5EEAD4', 400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488' }
                    },
                    fontFamily: { sans: ['"Montserrat"', 'sans-serif'], serif: ['"Playfair Display"', 'serif'] }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020613; }
        ::-webkit-scrollbar-thumb { background: #1B2C46; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #14B8A6; }
        body { background-color: #02050e; }
        .glass-panel { background: rgba(9, 17, 31, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(46, 69, 103, 0.4); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-200 antialiased min-h-screen font-sans selection:bg-brandTeal-600 selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Plus: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>,
            Check: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/></svg>,
            Cloud: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>,
            Edit: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Close: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        };

        const generateEmptyClient = (code) => ({
            companyName: "New Client Corp",
            repName: "Representative Name",
            sowReference: code,
            currentPhase: "MOD 1: Workflow Diagnosis",
            progressPercentage: 0,
            metrics: { annualLeakageIdentified: 0, chaosTaxEliminated: 0, saasSavingsIdentified: 0 },
            actionItems: [], roadmap: [], assets: [], contracts: []
        });

        function App() {
            // Cloud State
            const [db, setDb] = useState({});
            const [workbookProfiles, setWorkbookProfiles] = useState([]);
            const [activeCode, setActiveCode] = useState(null);
            
            // Local Editing Draft
            const [draftClient, setDraftClient] = useState(null);
            
            const [isEditingCode, setIsEditingCode] = useState(false);
            const [newCodeInput, setNewCodeInput] = useState('');
            
            // UI State
            const [toast, setToast] = useState(null);
            const [isAuthed, setIsAuthed] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [errorMsg, setErrorMsg] = useState("");

            useEffect(() => {
                let checkInterval = setInterval(() => {
                    if (window.firebaseAuth && window.firebaseDb && window.signInAnonymously) {
                        clearInterval(checkInterval);
                        
                        const initAuth = async () => {
                            try {
                                if (window.initialAuthToken) {
                                    await window.signInWithCustomToken(window.firebaseAuth, window.initialAuthToken);
                                } else {
                                    await window.signInAnonymously(window.firebaseAuth);
                                }
                                setIsAuthed(true);

                                // Attach live listener to pull all clients (Portals)
                                const clientsRef = window.collection(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'clients');
                                window.onSnapshot(clientsRef, (snapshot) => {
                                    const newData = {};
                                    snapshot.forEach(doc => {
                                        newData[doc.id] = doc.data();
                                    });
                                    setDb(newData);
                                }, (error) => {
                                    console.error("Firestore sync error:", error);
                                    setErrorMsg("Error syncing with cloud database. Did you authorize the domain?");
                                });

                                // Attach live listener to pull all SOW Planner Profiles (Internal Workbook)
                                const profilesRef = window.collection(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'workbook_profiles');
                                window.onSnapshot(profilesRef, (snapshot) => {
                                    const fetchedProfiles = [];
                                    snapshot.forEach(doc => {
                                        fetchedProfiles.push({ id: doc.id, ...doc.data() });
                                    });
                                    setWorkbookProfiles(fetchedProfiles);
                                }, console.error);

                            } catch (e) {
                                console.error("Authentication error:", e);
                                setErrorMsg("Firebase Auth Blocked: Check local file origin or domain settings.");
                            }
                        };
                        
                        initAuth();
                    }
                }, 50);

                return () => clearInterval(checkInterval);
            }, []);

            const handleSelectClient = (code) => {
                setActiveCode(code);
                if (db[code]) {
                    // Always ensure we have arrays even if db has missing fields
                    const clientData = db[code];
                    setDraftClient({
                        ...clientData,
                        actionItems: clientData.actionItems || [],
                        roadmap: clientData.roadmap || [],
                        assets: clientData.assets || [],
                        contracts: clientData.contracts || [],
                        metrics: clientData.metrics || { annualLeakageIdentified: 0, chaosTaxEliminated: 0, saasSavingsIdentified: 0 }
                    });
                }
            };

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            // DYNAMIC IMPORT HANDLER FROM PLANNER SOW
            const handleImportProfile = async (e) => {
                const profileId = e.target.value;
                if (!profileId) return;
                
                const profile = workbookProfiles.find(p => p.id === profileId);
                if (!profile) return;
                
                // Use the SOW Reference (Quote ID) as the Client Portal login code
                const newCode = profile.quoteId || `CLIENT-${Date.now()}`;
                
                // If it already exists, just open it
                if (db[newCode]) {
                    showToast("Portal for this SOW already exists. Selecting it now.");
                    handleSelectClient(newCode);
                    e.target.value = "";
                    return;
                }

                // Generate new client data mapping from Planner SOW
                const newClient = {
                    companyName: profile.clientCompany || "New Client",
                    repName: profile.clientRep || "Representative",
                    sowReference: profile.quoteId || newCode,
                    currentPhase: "MOD 1: Workflow Diagnosis",
                    progressPercentage: 0,
                    metrics: { 
                        annualLeakageIdentified: profile.annualOperationalLeakage || 0, 
                        chaosTaxEliminated: 0, 
                        saasSavingsIdentified: 0 
                    },
                    actionItems: [], 
                    roadmap: [], 
                    assets: [], 
                    contracts: []
                };

                try {
                    const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'clients', newCode);
                    await window.setDoc(docRef, newClient);
                    setActiveCode(newCode);
                    setDraftClient(newClient);
                    showToast("Client portal successfully generated from Planner SOW.");
                } catch(err) {
                    console.error(err);
                    showToast("Failed to create portal. Check database permissions.");
                }
                e.target.value = "";
            };

            const handleAddClient = async () => {
                if (!isAuthed) return;
                const newCode = `CLIENT-${Math.floor(Math.random() * 10000)}`;
                const newClient = generateEmptyClient(newCode);
                
                try {
                    const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'clients', newCode);
                    await window.setDoc(docRef, newClient);
                    
                    setActiveCode(newCode);
                    setDraftClient(newClient);
                    
                    showToast("New blank client portal generated in Cloud.");
                } catch (e) {
                    console.error("Error creating client:", e);
                    showToast("Failed to create client.");
                    setErrorMsg("Database Blocked: Please update your Firestore Security Rules to allow writes.");
                }
            };

            const executeDeleteClient = async () => {
                if (!isAuthed || !deleteConfirm) return;
                try {
                    const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'clients', deleteConfirm);
                    await window.deleteDoc(docRef);
                    if (activeCode === deleteConfirm) {
                        setActiveCode(null);
                        setDraftClient(null);
                    }
                    showToast("Client portal permanently deleted.");
                } catch(e) {
                    console.error("Error deleting client:", e);
                }
                setDeleteConfirm(null);
            };

            const saveNewAccessCode = async () => {
                const cleanCode = newCodeInput.trim().toUpperCase();
                if (!cleanCode || cleanCode === activeCode) {
                    setIsEditingCode(false);
                    return;
                }
                if (db[cleanCode]) {
                    showToast("Error: This access code is already in use.");
                    return;
                }
                
                setIsSaving(true);
                try {
                    const updatedClient = { ...draftClient, sowReference: cleanCode };
                    
                    // 1. Save data to the new document ID
                    const newDocRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'clients', cleanCode);
                    await window.setDoc(newDocRef, updatedClient);
                    
                    // 2. Delete the old document ID
                    const oldDocRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'clients', activeCode);
                    await window.deleteDoc(oldDocRef);
                    
                    // 3. Update local state
                    setActiveCode(cleanCode);
                    setDraftClient(updatedClient);
                    setIsEditingCode(false);
                    showToast("Access code updated successfully.");
                } catch (e) {
                    console.error("Error changing access code:", e);
                    showToast("Failed to change access code.");
                }
                setIsSaving(false);
            };

            const saveDraftToCloud = async () => {
                if (!isAuthed || !activeCode || !draftClient) return;
                setIsSaving(true);
                try {
                    const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'clients', activeCode);
                    await window.setDoc(docRef, draftClient);
                    showToast("Changes synced to Client Portal.");
                } catch(e) {
                    console.error("Error saving draft:", e);
                    showToast("Failed to sync changes.");
                }
                setIsSaving(false);
            };

            const updateDraft = (field, value) => {
                setDraftClient(prev => ({ ...prev, [field]: value }));
            };

            const updateDraftMetric = (metric, value) => {
                setDraftClient(prev => ({ 
                    ...prev, 
                    metrics: { ...(prev.metrics || {}), [metric]: Number(value) } 
                }));
            };

            const updateArrayItem = (arrayName, index, field, value) => {
                setDraftClient(prev => {
                    const newArray = [...(prev[arrayName] || [])];
                    newArray[index] = { ...newArray[index], [field]: value };
                    return { ...prev, [arrayName]: newArray };
                });
            };

            const addArrayItem = (arrayName, template) => {
                setDraftClient(prev => ({ 
                    ...prev, 
                    [arrayName]: [...(prev[arrayName] || []), { id: Date.now(), ...template }] 
                }));
            };

            const removeArrayItem = (arrayName, index) => {
                setDraftClient(prev => {
                    const newArray = [...(prev[arrayName] || [])];
                    newArray.splice(index, 1);
                    return { ...prev, [arrayName]: newArray };
                });
            };

            return (
                <div className="flex h-screen overflow-hidden bg-[#02050e]">
                    
                    {deleteConfirm && (
                        <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-brandNavy-900 border border-rose-500/30 p-6 rounded-xl w-full max-w-sm shadow-2xl text-center">
                                <h3 className="text-lg font-bold text-white mb-2">Delete Client Portal?</h3>
                                <p className="text-xs text-slate-400 mb-6">This will permanently erase the database for <strong className="text-rose-400">{deleteConfirm}</strong>. This action cannot be undone.</p>
                                <div className="flex justify-center gap-3">
                                    <button onClick={() => setDeleteConfirm(null)} className="px-4 py-2 rounded bg-brandNavy-800 text-slate-300 hover:bg-brandNavy-700 font-bold text-xs transition-colors">Cancel</button>
                                    <button onClick={executeDeleteClient} className="px-4 py-2 rounded bg-rose-600 hover:bg-rose-500 text-white font-bold text-xs transition-colors">Delete Permanently</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {toast && (
                        <div className="fixed top-4 right-4 z-50 bg-brandTeal-500 text-brandNavy-955 px-4 py-2 rounded shadow-lg font-bold text-sm flex items-center gap-2 animate-fade-in">
                            <Icons.Check /> {toast}
                        </div>
                    )}

                    {/* SIDEBAR: Client List */}
                    <aside className="w-72 bg-brandNavy-950 border-r border-brandNavy-800 flex flex-col shrink-0 relative z-20">
                        <div className="p-6 border-b border-brandNavy-800 flex justify-between items-center">
                            <div>
                                <h1 className="text-sm font-extrabold tracking-widest text-white uppercase leading-none mb-1">Admin Console</h1>
                                <span className="text-[10px] text-brandTeal-500 font-bold uppercase tracking-widest">Portal Manager</span>
                            </div>
                            {isAuthed ? (
                                <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]" title="Cloud Connected"></div>
                            ) : (
                                <div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse" title="Connecting..."></div>
                            )}
                        </div>

                        <div className="p-4 flex-1 overflow-y-auto space-y-2">
                            {errorMsg && (
                                <div className="bg-rose-950/30 border border-rose-500/50 text-rose-400 text-[10px] p-3 rounded mb-4">
                                    {errorMsg}
                                </div>
                            )}

                            {/* DYNAMIC IMPORT FROM PLANNER SOW DROPDOWN */}
                            <select 
                                onChange={handleImportProfile} 
                                className="w-full flex justify-center items-center gap-2 py-2.5 px-2 bg-brandNavy-800 hover:bg-brandNavy-700 text-slate-300 text-[10px] font-bold rounded transition-colors focus:outline-none cursor-pointer uppercase tracking-wider mb-2 border border-brandTeal-500/30 font-sans"
                            >
                                <option value="">+ Import SOW from Planner</option>
                                {workbookProfiles.map(p => (
                                    <option key={p.id} value={p.id}>{p.clientCompany} ({p.quoteId})</option>
                                ))}
                            </select>

                            <div className="flex justify-between items-center mb-4 px-2 mt-4 border-t border-brandNavy-800 pt-4">
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Active Client Portals</span>
                                <span className="bg-brandNavy-800 text-slate-300 text-[10px] px-2 py-0.5 rounded-full">{Object.keys(db).length}</span>
                            </div>

                            {Object.entries(db).map(([code, data]) => (
                                <button
                                    key={code}
                                    onClick={() => handleSelectClient(code)}
                                    className={`w-full text-left p-3 rounded-lg border transition-all ${activeCode === code ? 'bg-brandNavy-800 border-brandTeal-500/50 shadow-md' : 'bg-transparent border-transparent hover:bg-brandNavy-900'}`}
                                >
                                    <div className="font-bold text-white text-sm truncate">{data.companyName}</div>
                                    <div className="text-[10px] text-brandTeal-400 font-mono mt-1 flex justify-between">
                                        <span>🔑 {code}</span>
                                        <span>{data.progressPercentage || 0}%</span>
                                    </div>
                                </button>
                            ))}
                        </div>

                        <div className="p-4 border-t border-brandNavy-800 space-y-3">
                            <button 
                                onClick={handleAddClient}
                                disabled={!isAuthed}
                                className="w-full flex justify-center items-center gap-2 py-2.5 bg-brandNavy-800/50 hover:bg-brandNavy-800 text-slate-400 hover:text-slate-200 text-xs font-bold rounded transition-colors disabled:opacity-50 border border-brandNavy-700 border-dashed"
                            >
                                <Icons.Plus /> Blank Portal Override
                            </button>
                        </div>
                    </aside>

                    {/* MAIN EDITOR */}
                    <main className="flex-1 overflow-y-auto bg-brandNavy-900/30 p-8 relative z-10 scroll-smooth">
                        {draftClient ? (
                            <div className="max-w-4xl mx-auto space-y-6 animate-fade-in">
                                <div className="flex justify-between items-end border-b border-brandNavy-700 pb-4 sticky top-0 bg-[#02050e] pt-4 z-30">
                                    <div>
                                        <h2 className="text-2xl font-bold text-white">{draftClient.companyName}</h2>
                                        <div className="flex items-center gap-2 mt-1">
                                            <span className="text-sm text-slate-400 font-mono">Portal Access Code:</span>
                                            {isEditingCode ? (
                                                <div className="flex items-center gap-2">
                                                    <input 
                                                        type="text" 
                                                        value={newCodeInput} 
                                                        onChange={e => setNewCodeInput(e.target.value.toUpperCase())}
                                                        className="bg-brandNavy-955 border border-brandTeal-500 rounded px-2 py-1 text-sm text-white font-mono focus:outline-none uppercase"
                                                        placeholder="NEW CODE"
                                                    />
                                                    <button onClick={saveNewAccessCode} className="text-brandTeal-400 hover:text-brandTeal-300 p-1" title="Save Code"><Icons.Check /></button>
                                                    <button onClick={() => setIsEditingCode(false)} className="text-slate-400 hover:text-slate-300 p-1" title="Cancel"><Icons.Close /></button>
                                                </div>
                                            ) : (
                                                <div className="flex items-center gap-2">
                                                    <span className="text-sm text-brandTeal-400 font-mono font-bold">{activeCode}</span>
                                                    <button onClick={() => { setNewCodeInput(activeCode); setIsEditingCode(true); }} className="text-slate-500 hover:text-brandTeal-400 p-1 transition-colors" title="Change Access Code">
                                                        <Icons.Edit />
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <button 
                                            onClick={() => setDeleteConfirm(activeCode)}
                                            className="px-3 py-2 text-rose-400 hover:bg-rose-500/10 rounded text-xs font-bold transition-colors"
                                        >
                                            Delete Portal
                                        </button>
                                        <button 
                                            onClick={saveDraftToCloud}
                                            disabled={isSaving}
                                            className="flex items-center gap-2 px-6 py-2 bg-brandTeal-500 hover:bg-brandTeal-400 text-brandNavy-955 rounded font-bold text-xs shadow-lg shadow-brandTeal-500/20 transition-all disabled:opacity-50"
                                        >
                                            <Icons.Cloud /> {isSaving ? "Syncing..." : "💾 Save to Cloud"}
                                        </button>
                                    </div>
                                </div>

                                {/* Section 1: Basics */}
                                <section className="glass-panel p-6 rounded-xl space-y-4 shadow-lg">
                                    <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 border-b border-brandNavy-700 pb-2">1. General Information</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div>
                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Company Name</label>
                                            <input type="text" value={draftClient.companyName || ''} onChange={e => updateDraft('companyName', e.target.value)} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-sm text-white focus:border-brandTeal-500 focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Representative Name</label>
                                            <input type="text" value={draftClient.repName || ''} onChange={e => updateDraft('repName', e.target.value)} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-sm text-white focus:border-brandTeal-500 focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">SOW Reference Code</label>
                                            <input type="text" value={draftClient.sowReference || ''} onChange={e => updateDraft('sowReference', e.target.value)} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-sm text-white focus:border-brandTeal-500 focus:outline-none font-mono" />
                                        </div>
                                    </div>
                                </section>

                                {/* Section 2: Progress & Metrics */}
                                <section className="glass-panel p-6 rounded-xl space-y-4 shadow-lg">
                                    <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 border-b border-brandNavy-700 pb-2">2. Progress & ROI Metrics</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        <div className="lg:col-span-2">
                                            <label className="block text-[10px] uppercase font-bold text-slate-500 mb-1">Current Display Phase</label>
                                            <input type="text" value={draftClient.currentPhase || ''} onChange={e => updateDraft('currentPhase', e.target.value)} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-sm text-white focus:border-brandTeal-500 focus:outline-none" />
                                        </div>
                                        <div className="lg:col-span-2">
                                            <label className="block text-[10px] uppercase font-bold text-brandTeal-500 mb-1">Overall Progress (%)</label>
                                            <input type="number" min="0" max="100" value={draftClient.progressPercentage || 0} onChange={e => updateDraft('progressPercentage', Number(e.target.value))} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-sm text-white font-mono focus:border-brandTeal-500 focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] uppercase font-bold text-rose-400 mb-1">Annual Chaos Tax Risk (₱)</label>
                                            <input type="number" value={(draftClient.metrics || {}).annualLeakageIdentified || 0} onChange={e => updateDraftMetric('annualLeakageIdentified', e.target.value)} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-sm text-white font-mono focus:border-brandTeal-500 focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] uppercase font-bold text-emerald-400 mb-1">Chaos Tax Eliminated (₱)</label>
                                            <input type="number" value={(draftClient.metrics || {}).chaosTaxEliminated || 0} onChange={e => updateDraftMetric('chaosTaxEliminated', e.target.value)} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-sm text-white font-mono focus:border-brandTeal-500 focus:outline-none" />
                                        </div>
                                        <div className="lg:col-span-2">
                                            <label className="block text-[10px] uppercase font-bold text-purple-400 mb-1">SaaS Savings Identified (₱)</label>
                                            <input type="number" value={(draftClient.metrics || {}).saasSavingsIdentified || 0} onChange={e => updateDraftMetric('saasSavingsIdentified', e.target.value)} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-sm text-white font-mono focus:border-brandTeal-500 focus:outline-none" />
                                        </div>
                                    </div>
                                </section>

                                {/* Section 3: Google Drive Vault Assets */}
                                <section className="glass-panel p-6 rounded-xl space-y-4 shadow-lg">
                                    <div className="flex justify-between items-center border-b border-brandNavy-700 pb-2">
                                        <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400">3. Secure Vault Links (Google Drive)</h3>
                                        <button onClick={() => addArrayItem('assets', { title: "New File", category: "MOD 1", date: "TBD", type: "pdf", gDriveLink: "https://drive.google.com/..." })} className="text-[10px] font-bold bg-brandNavy-800 px-3 py-1.5 rounded hover:bg-brandTeal-500 hover:text-brandNavy-955 transition-colors">+ Add Link</button>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {(draftClient.assets || []).map((asset, idx) => (
                                            <div key={asset.id || idx} className="flex flex-col md:flex-row gap-2 items-center bg-brandNavy-950 p-3 rounded border border-brandNavy-800">
                                                <input type="text" value={asset.category} onChange={e => updateArrayItem('assets', idx, 'category', e.target.value)} className="w-full md:w-32 bg-transparent border border-brandNavy-700 rounded px-2 py-1.5 text-xs text-white focus:outline-none focus:border-brandTeal-500" placeholder="Category" />
                                                <input type="text" value={asset.title} onChange={e => updateArrayItem('assets', idx, 'title', e.target.value)} className="w-full md:flex-1 bg-transparent border border-brandNavy-700 rounded px-2 py-1.5 text-xs text-white focus:outline-none focus:border-brandTeal-500" placeholder="File Title" />
                                                <input type="text" value={asset.gDriveLink} onChange={e => updateArrayItem('assets', idx, 'gDriveLink', e.target.value)} className="w-full md:flex-1 bg-transparent border border-brandNavy-700 rounded px-2 py-1.5 text-xs text-brandTeal-400 font-mono focus:outline-none focus:border-brandTeal-500" placeholder="Paste GDrive URL here..." />
                                                <button onClick={() => removeArrayItem('assets', idx)} className="p-2 text-rose-500 hover:text-rose-400 bg-brandNavy-900 rounded border border-brandNavy-800"><Icons.Trash /></button>
                                            </div>
                                        ))}
                                        {(draftClient.assets || []).length === 0 && <p className="text-xs text-slate-500">No vault links configured.</p>}
                                    </div>
                                </section>

                                {/* Section 4: Roadmap */}
                                <section className="glass-panel p-6 rounded-xl space-y-4 shadow-lg">
                                    <div className="flex justify-between items-center border-b border-brandNavy-700 pb-2">
                                        <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400">4. Strategic Roadmap</h3>
                                        <button onClick={() => addArrayItem('roadmap', { title: "New Milestone", status: "pending", date: "TBD", details: "..." })} className="text-[10px] font-bold bg-brandNavy-800 px-3 py-1.5 rounded hover:bg-brandTeal-500 hover:text-brandNavy-955 transition-colors">+ Add Milestone</button>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {(draftClient.roadmap || []).map((milestone, idx) => (
                                            <div key={milestone.id || idx} className="flex flex-col md:flex-row gap-3 items-start bg-brandNavy-950 p-4 rounded border border-brandNavy-800">
                                                <select value={milestone.status} onChange={e => updateArrayItem('roadmap', idx, 'status', e.target.value)} className="w-full md:w-auto bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-xs font-bold text-white focus:outline-none focus:border-brandTeal-500 uppercase tracking-wider">
                                                    <option value="pending">Pending</option>
                                                    <option value="active">Active</option>
                                                    <option value="completed">Completed</option>
                                                </select>
                                                <div className="flex-1 w-full space-y-2">
                                                    <div className="flex flex-col md:flex-row gap-2 w-full">
                                                        <input type="text" value={milestone.title} onChange={e => updateArrayItem('roadmap', idx, 'title', e.target.value)} className="w-full md:flex-1 bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-brandTeal-500 font-bold" placeholder="Milestone Title" />
                                                        <input type="text" value={milestone.date} onChange={e => updateArrayItem('roadmap', idx, 'date', e.target.value)} className="w-full md:w-40 bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-xs text-slate-400 focus:outline-none focus:border-brandTeal-500 font-mono" placeholder="Date/Timeline" />
                                                    </div>
                                                    <input type="text" value={milestone.details} onChange={e => updateArrayItem('roadmap', idx, 'details', e.target.value)} className="w-full bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-xs text-slate-400 focus:outline-none focus:border-brandTeal-500" placeholder="Details/Description" />
                                                </div>
                                                <button onClick={() => removeArrayItem('roadmap', idx)} className="p-2 text-rose-500 hover:text-rose-400 md:mt-1 bg-brandNavy-900 rounded border border-brandNavy-800"><Icons.Trash /></button>
                                            </div>
                                        ))}
                                        {(draftClient.roadmap || []).length === 0 && <p className="text-xs text-slate-500">No roadmap milestones configured.</p>}
                                    </div>
                                </section>

                                {/* Section 5: Action Items (Intake Engine) */}
                                <section className="glass-panel p-6 rounded-xl space-y-4 shadow-lg">
                                    <div className="flex justify-between items-center border-b border-brandNavy-700 pb-2">
                                        <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400">5. Client Action Items (Intake)</h3>
                                        <button onClick={() => addArrayItem('actionItems', { title: "New Action", desc: "...", type: "upload", status: "pending" })} className="text-[10px] font-bold bg-brandNavy-800 px-3 py-1.5 rounded hover:bg-brandTeal-500 hover:text-brandNavy-955 transition-colors">+ Add Action</button>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {(draftClient.actionItems || []).map((action, idx) => (
                                            <div key={action.id || idx} className="flex flex-col md:flex-row gap-3 items-start md:items-center bg-brandNavy-950 p-4 rounded border border-brandNavy-800">
                                                <div className="flex gap-2 w-full md:w-auto shrink-0">
                                                    <select value={action.status} onChange={e => updateArrayItem('actionItems', idx, 'status', e.target.value)} className="flex-1 md:w-auto bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-xs font-bold text-white focus:outline-none focus:border-brandTeal-500 uppercase">
                                                        <option value="pending">Pending</option>
                                                        <option value="completed">Completed</option>
                                                    </select>
                                                    <select value={action.type} onChange={e => updateArrayItem('actionItems', idx, 'type', e.target.value)} className="flex-1 md:w-auto bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-brandTeal-500 font-mono">
                                                        <option value="upload">Upload</option>
                                                        <option value="review">Review Link</option>
                                                        <option value="document">Doc Sign</option>
                                                    </select>
                                                </div>
                                                <div className="flex-1 w-full space-y-2">
                                                    <input type="text" value={action.title} onChange={e => updateArrayItem('actionItems', idx, 'title', e.target.value)} className="w-full bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-brandTeal-500 font-bold" placeholder="Action Title" />
                                                    <input type="text" value={action.desc} onChange={e => updateArrayItem('actionItems', idx, 'desc', e.target.value)} className="w-full bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-[11px] text-slate-400 focus:outline-none focus:border-brandTeal-500" placeholder="Short description instruction..." />
                                                </div>
                                                <button onClick={() => removeArrayItem('actionItems', idx)} className="p-2 text-rose-500 hover:text-rose-400 bg-brandNavy-900 rounded border border-brandNavy-800 w-full md:w-auto"><Icons.Trash /></button>
                                            </div>
                                        ))}
                                        {(draftClient.actionItems || []).length === 0 && <p className="text-xs text-slate-500">No action items configured.</p>}
                                    </div>
                                </section>

                                {/* Section 6: Contracts & Billing */}
                                <section className="glass-panel p-6 rounded-xl space-y-4 shadow-lg">
                                    <div className="flex justify-between items-center border-b border-brandNavy-700 pb-2">
                                        <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400">6. Contracts & Billing</h3>
                                        <button onClick={() => addArrayItem('contracts', { title: "New Contract", date: "TBD", status: "Pending", link: "" })} className="text-[10px] font-bold bg-brandNavy-800 px-3 py-1.5 rounded hover:bg-brandTeal-500 hover:text-brandNavy-955 transition-colors">+ Add Document</button>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {(draftClient.contracts || []).map((doc, idx) => (
                                            <div key={doc.id || idx} className="flex flex-col md:flex-row gap-3 items-start md:items-center bg-brandNavy-950 p-4 rounded border border-brandNavy-800">
                                                <select value={doc.status} onChange={e => updateArrayItem('contracts', idx, 'status', e.target.value)} className="w-full md:w-32 bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-xs font-bold text-white focus:outline-none focus:border-brandTeal-500 uppercase tracking-wider">
                                                    <option value="Pending">Pending</option>
                                                    <option value="Active">Active</option>
                                                    <option value="Paid">Paid</option>
                                                </select>
                                                <div className="flex-1 w-full space-y-2">
                                                    <div className="flex flex-col md:flex-row gap-2 w-full">
                                                        <input type="text" value={doc.title} onChange={e => updateArrayItem('contracts', idx, 'title', e.target.value)} className="w-full md:flex-1 bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-brandTeal-500 font-bold" placeholder="Document Title (e.g., Master Service Agreement)" />
                                                        <input type="text" value={doc.date} onChange={e => updateArrayItem('contracts', idx, 'date', e.target.value)} className="w-full md:w-40 bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-xs text-slate-400 focus:outline-none focus:border-brandTeal-500 font-mono" placeholder="Date Issued" />
                                                    </div>
                                                    <input type="text" value={doc.link} onChange={e => updateArrayItem('contracts', idx, 'link', e.target.value)} className="w-full bg-transparent border border-brandNavy-700 rounded px-3 py-2 text-xs text-brandTeal-400 focus:outline-none focus:border-brandTeal-500 font-mono" placeholder="Link to Invoice/Contract (optional)" />
                                                </div>
                                                <button onClick={() => removeArrayItem('contracts', idx)} className="p-2 text-rose-500 hover:text-rose-400 md:mt-1 bg-brandNavy-900 rounded border border-brandNavy-800 w-full md:w-auto"><Icons.Trash /></button>
                                            </div>
                                        ))}
                                        {(draftClient.contracts || []).length === 0 && <p className="text-xs text-slate-500">No contracts or billing documents configured.</p>}
                                    </div>
                                </section>

                            </div>
                        ) : (
                            <div className="flex items-center justify-center h-full text-slate-500 flex-col gap-4">
                                <div className="w-20 h-20 rounded-full border-4 border-brandNavy-800 border-dashed flex items-center justify-center mb-2">
                                    <svg className="w-8 h-8 text-brandNavy-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>
                                </div>
                                <div className="text-lg font-bold text-slate-400">No Portal Selected</div>
                                <div className="text-sm">Select a client from the sidebar or import a new one from the SOW Planner.</div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
