        const isDescendant = (lanes, childId, potentialParentId) => {
            let currentId = potentialParentId;
            while (currentId) {
                if (currentId === childId) return true;
                const currentLane = lanes.find(l => l.id === currentId);
                currentId = currentLane ? currentLane.parentId : null;
            }
            return false;
        };

        const buildTree = (lanes) => {
            const map = {};
            const roots = [];
            
            lanes.forEach(l => {
                map[l.id] = { ...l, children: [] };
            });
            
            lanes.forEach(l => {
                const mapped = map[l.id];
                if (l.parentId && map[l.parentId]) {
                    map[l.parentId].children.push(mapped);
                } else {
                    roots.push(mapped);
                }
            });
            
            return roots;
        };

            const [connectionSourceId, setConnectionSourceId] = useState(null);
            
            const [zoom, setZoom] = useState(1);
            const [pan, setPan] = useState({ x: 50, y: 50 });

            const svgRef = useRef(null);

            const fileInputRef = useRef(null);

            const stateRef = useRef({ zoom, pan });
            useEffect(() => { stateRef.current = { zoom, pan }; }, [zoom, pan]);

            useEffect(() => {
                const svg = svgRef.current;
                if (!svg) return;
                const handleWheel = (e) => {
                    e.preventDefault(); 
                    const { zoom: currentZoom, pan: currentPan } = stateRef.current;
                    const zoomFactor = 1 - e.deltaY * 0.001;
                    const newZoom = Math.min(Math.max(0.15, currentZoom * zoomFactor), 3);
                    const rect = svg.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
                    const svgX = (mouseX - currentPan.x) / currentZoom; const svgY = (mouseY - currentPan.y) / currentZoom;
                    setZoom(newZoom); setPan({ x: mouseX - svgX * newZoom, y: mouseY - svgY * newZoom });
                };
                svg.addEventListener('wheel', handleWheel, { passive: false });
                return () => svg.removeEventListener('wheel', handleWheel);
            }, []);

            const adjustZoom = (delta) => {
                const newZoom = Math.min(Math.max(0.15, zoom + delta), 3);
                const rect = svgRef.current.getBoundingClientRect();
                const centerX = rect.width / 2; const centerY = rect.height / 2;
                const svgX = (centerX - pan.x) / zoom; const svgY = (centerY - pan.y) / zoom;
                setZoom(newZoom); setPan({ x: centerX - svgX * newZoom, y: centerY - svgY * newZoom });
            };

            const getSvgPoint = (clientX, clientY) => {
                if (!svgRef.current || !gRef.current) return { x: 0, y: 0 };
                const pt = svgRef.current.createSVGPoint();
                pt.x = clientX; pt.y = clientY;
                const ctm = gRef.current.getScreenCTM();
                return ctm ? pt.matrixTransform(ctm.inverse()) : { x: clientX, y: clientY };
            };

            const handleSvgPointerDown = (e) => {
                if (e.target.tagName === 'svg' || e.target.tagName === 'g' || e.target.tagName === 'path') {

                    if (interactionMode === 'connect') setConnectionSourceId(null);

                    updatePresentOnly({ ...activeTab.present, nodes: nodes.map(n => n.id === draggingNodeId ? { ...n, x: pt.x, y: pt.y } : n) });

                    setMousePos(pt);

                    else {
                        if (connectionSourceId !== id && !edges.find(ed => ed.source === connectionSourceId && ed.target === id)) {
                            commitUpdate({ ...activeTab.present, edges: [...edges, { id: 'e' + Date.now(), source: connectionSourceId, target: id }] });
                        }
                        setConnectionSourceId(null);
                    }
                } else {
                    setSelectedElement({ type: 'node', id });
                    if (isDouble) setEditingElement({ type: 'node', id });
                    else { setDraggingNodeId(id); setIsDraggingNode(false); }
                }
            };

            const addNode = (type) => {
                const spawnX = (-pan.x + window.innerWidth / 2) / zoom;
                const spawnY = (-pan.y + window.innerHeight / 2) / zoom;
                const labelByType = {
                    approval: 'Approval Req',
                    milestone: 'Milestone',
                    text: 'Label',
                    callout: 'Important note',
                    process: 'New Process',
                };
                const calloutDefaults = { fill: '#fef3c7', stroke: '#f59e0b', textColor: '#92400e', delayMinutes: 0, affectedStaff: 0, hourlyRate: 0, description: '', roleId: '' };
                const newNode = {
                    id: 'n' + Date.now(),
                    type,
                    label: labelByType[type] || 'New Process',
                    x: spawnX,
                    y: spawnY,
                    ...(type === 'callout' ? calloutDefaults : type === 'text' ? { delayMinutes: 0, affectedStaff: 0, hourlyRate: 0, description: '', roleId: '' } : DEFAULT_PROPS),
                };
                commitUpdate({ ...activeTab.present, nodes: [...nodes, newNode] });
                setSelectedElement({ type: 'node', id: newNode.id }); setEditingElement({ type: 'node', id: newNode.id }); setInteractionMode('select');
            };

            const addLane = () => {
                const maxY = lanes.reduce((max, l) => Math.max(max, l.y), 0);
                const newLane = { id: 'l' + Date.now(), label: 'New Department', y: maxY + 120, parentId: null };
                commitUpdate({ ...activeTab.present, lanes: [...lanes, newLane] });
                setEditingElement({ type: 'lane', id: newLane.id }); setSelectedElement({ type: 'lane', id: newLane.id });
            };

            const addPhase = () => {
                const EC = window.EngagementConfig || {};
                const modIndex = Math.min(phases.length, (EC.MODULES?.length || 4) - 1);
                const mod = EC.MODULES?.[modIndex];
                const defaultLabel = mod?.shortTitle || mod?.title || 'New Phase';
                const lastPhase = phases.reduce((last, p) => p.x > last.x ? p : last, phases[0]);
                const newPhase = { id: 'p' + Date.now(), label: defaultLabel, x: lastPhase ? lastPhase.x + lastPhase.w : 200, w: 350, type: 'mid', color: '#f5f5f5', text: '#333333' };
                commitUpdate({ ...activeTab.present, phases: [...phases, newPhase] });
                setEditingElement({ type: 'phase', id: newPhase.id }); setSelectedElement({ type: 'phase', id: newPhase.id });
            };

            const getElementData = (info) => {
                if (info.type === 'node') return nodes.find(n => n.id === info.id);
                if (info.type === 'lane') return lanes.find(l => l.id === info.id);
                if (info.type === 'phase') return phases.find(p => p.id === info.id);
                if (info.type === 'edge') return edges.find(e => e.id === info.id);
                return null;
            };

            const handleElementUpdatePresentOnly = (updates) => {
                if (editingElement.type === 'node') updatePresentOnly({ ...activeTab.present, nodes: nodes.map(n => n.id === editingElement.id ? { ...n, ...updates } : n) });
                if (editingElement.type === 'lane') updatePresentOnly({ ...activeTab.present, lanes: lanes.map(l => l.id === editingElement.id ? { ...l, ...updates } : l) });
                if (editingElement.type === 'phase') updatePresentOnly({ ...activeTab.present, phases: phases.map(p => p.id === editingElement.id ? { ...p, ...updates } : p) });
                if (editingElement.type === 'edge') updatePresentOnly({ ...activeTab.present, edges: edges.map(e => e.id === editingElement.id ? { ...e, ...updates } : e) });
            };

            const handleElementDelete = () => {
                let newPresent = { ...activeTab.present };
                if (editingElement.type === 'node') {
                    newPresent.nodes = newPresent.nodes.filter(n => n.id !== editingElement.id);
                    newPresent.edges = newPresent.edges.filter(e => e.source !== editingElement.id && e.target !== editingElement.id);
                } else if (editingElement.type === 'lane') {
                    const deletedParentId = lanes.find(l => l.id === editingElement.id)?.parentId || null;
                    newPresent.lanes = newPresent.lanes
                        .filter(l => l.id !== editingElement.id)
                        .map(l => l.parentId === editingElement.id ? { ...l, parentId: deletedParentId } : l);
                    newPresent.nodes = newPresent.nodes.map(n => n.roleId === editingElement.id ? { ...n, roleId: '' } : n);
                }
                else if (editingElement.type === 'phase') newPresent.phases = newPresent.phases.filter(p => p.id !== editingElement.id);
                else if (editingElement.type === 'edge') newPresent.edges = newPresent.edges.filter(e => e.id !== editingElement.id);
                updatePresentOnly(newPresent);
                setEditingElement(null); setSelectedElement(null);
            };

            const getOrthogonalPath = (source, target) => {
                if (!source || !target) return '';
                const sx = source.x; const sy = source.y; const tx = target.x; const ty = target.y;
                const targetRadius = target.type && DIM[target.type] ? DIM[target.type].r + 3 : 0;
                const dx = tx - sx; const dy = ty - sy;
                let endX = tx; let endY = ty;
                if (Math.abs(dx) < 5) { endY = dy > 0 ? ty - targetRadius : ty + targetRadius; return `M ${sx} ${sy} L ${tx} ${endY}`; }
                if (Math.abs(dy) < 5) { endX = dx > 0 ? tx - targetRadius : tx + targetRadius; return `M ${sx} ${sy} L ${endX} ${ty}`; }
                if (Math.abs(dx) > Math.abs(dy)) {
                    endX = dx > 0 ? tx - targetRadius : tx + targetRadius; const midX = sx + dx / 2;
                    return `M ${sx} ${sy} L ${midX} ${sy} L ${midX} ${ty} L ${endX} ${ty}`;
                } else {
                    endY = dy > 0 ? ty - targetRadius : ty + targetRadius; const midY = sy + dy / 2;
                    return `M ${sx} ${sy} L ${sx} ${midY} L ${tx} ${midY} L ${tx} ${endY}`;
                }
            };

            return (
                <div className="flex h-full w-full relative">
                    <div className="absolute top-0 left-0 right-0 bg-brandNavy-950 border-b border-brandNavy-800 flex items-center justify-between shadow-md z-10 shrink-0 h-12">
                        <div className="flex flex-1 overflow-x-auto no-scrollbar h-full items-end">
                            {tabs.map(tab => (
                                <div key={tab.id} onClick={() => { setActiveTabId(tab.id); setPan({x:50, y:50}); setZoom(1); }} className={`flex items-center gap-3 px-4 py-2 border-b-2 cursor-pointer transition-colors max-w-[200px] h-full ${activeTabId === tab.id ? 'border-brandTeal-500 bg-brandNavy-900 text-white' : 'border-transparent text-slate-400 hover:bg-brandNavy-900 hover:text-slate-200'}`}>
                                    {editingTabId === tab.id ? (
                                        <input autoFocus onBlur={() => setEditingTabId(null)} onKeyDown={(e) => { if (e.key === 'Enter') setEditingTabId(null); }} value={tab.name} onChange={(e) => renameTab(tab.id, e.target.value)} className="bg-brandNavy-955 border border-brandNavy-700 px-1 text-xs text-white outline-none w-full" />
                                    ) : (
                                        <span className="text-xs font-bold truncate select-none" onDoubleClick={(e) => { e.stopPropagation(); setEditingTabId(tab.id); }}>{tab.name}</span>
                                    )}
                                    {tabs.length > 1 && (
                                        <button onClick={(e) => closeTab(e, tab.id)} className="text-slate-500 hover:text-rose-400 ml-auto shrink-0"><Icons.Close /></button>
                                    )}
                                </div>
                            ))}
                            <button onClick={addNewTab} className="h-full px-4 text-slate-400 hover:text-white hover:bg-brandNavy-900 border-b-2 border-transparent transition-colors flex items-center justify-center"><Icons.Plus /></button>
                        </div>
                        <div className="flex items-center gap-2 px-4 border-l border-brandNavy-800 h-full">
                            <button onClick={undo} disabled={activeTab.past.length === 0} className={`p-1.5 rounded transition-colors ${activeTab.past.length > 0 ? 'text-slate-300 hover:bg-brandNavy-800' : 'text-slate-600 cursor-not-allowed'}`} title="Undo"><Icons.Undo /></button>
                            <button onClick={redo} disabled={activeTab.future.length === 0} className={`p-1.5 rounded transition-colors ${activeTab.future.length > 0 ? 'text-slate-300 hover:bg-brandNavy-800' : 'text-slate-600 cursor-not-allowed'}`} title="Redo"><Icons.Redo /></button>
                            <div className="w-px h-6 bg-brandNavy-700 mx-1"></div>
                            <button onClick={exportData} className="p-1.5 rounded text-emerald-400 hover:bg-brandNavy-800 transition-colors flex items-center gap-1 text-[10px] font-bold uppercase tracking-wider" title="Export JSON Workspace"><Icons.Download /> Save</button>
                            <button onClick={() => fileInputRef.current.click()} className="p-1.5 rounded text-brandTeal-400 hover:bg-brandNavy-800 transition-colors flex items-center gap-1 text-[10px] font-bold uppercase tracking-wider" title="Import JSON Workspace"><Icons.Upload /> Load</button>
                            <input type="file" ref={fileInputRef} onChange={importData} accept=".json" className="hidden" />
                        </div>
                    </div>

                    <div className="absolute top-16 left-4 bg-white/90 backdrop-blur rounded-lg shadow-lg border border-slate-200 z-10 flex flex-col p-2 space-y-2">
                        <button onClick={() => addNode('process')} className="p-2 hover:bg-slate-100 rounded text-slate-700" title="Add Process"><Icons.Process /></button>
                        <button onClick={() => addNode('approval')} className="p-2 hover:bg-slate-100 rounded text-slate-700" title="Add Approval"><Icons.Approval /></button>
                        <button onClick={() => addNode('milestone')} className="p-2 hover:bg-slate-100 rounded text-slate-700" title="Add Milestone"><Icons.Milestone /></button>
                        <button onClick={() => addNode('text')} className="p-2 hover:bg-slate-100 rounded text-slate-700" title="Add Text"><Icons.TextShape /></button>
                        <button onClick={() => addNode('callout')} className="p-2 hover:bg-slate-100 rounded text-slate-700" title="Add Lightning Callout"><Icons.Lightning /></button>
                        <div className="h-px bg-slate-200 w-full"></div>
                        <button onClick={addLane} className="p-2 hover:bg-slate-100 rounded text-slate-700" title="Add Org Unit Lane"><Icons.Lane /></button>
                        <button onClick={addPhase} className="p-2 hover:bg-slate-100 rounded text-slate-700" title="Add Phase Header"><Icons.Phase /></button>
                        <div className="h-px bg-slate-200 w-full"></div>
                        <button onClick={() => { setInteractionMode('select'); setConnectionSourceId(null); }} className={`p-2 rounded ${interactionMode === 'select' ? 'bg-blue-100 text-blue-600' : 'hover:bg-slate-100 text-slate-700'}`} title="Select/Move"><Icons.Move /></button>
                        <button onClick={() => { setInteractionMode('connect'); setSelectedElement(null); }} className={`p-2 rounded ${interactionMode === 'connect' ? 'bg-blue-100 text-blue-600' : 'hover:bg-slate-100 text-slate-700'}`} title="Connect Nodes"><Icons.Link /></button>
                    </div>

                    <div className="absolute bottom-6 right-6 flex items-center bg-white/90 backdrop-blur rounded-lg shadow-xl border border-slate-200 z-10 p-1">
                        <button onClick={() => setSnapToGrid(!snapToGrid)} className={`p-2 rounded transition-colors ${snapToGrid ? 'bg-blue-100 text-blue-600' : 'text-slate-400 hover:bg-slate-100'}`} title="Toggle Snap to Grid"><Icons.Grid /></button>
                        <div className="w-px h-4 bg-slate-200 mx-1"></div>
                        <button onClick={() => adjustZoom(-0.25)} className="p-2 hover:bg-slate-100 rounded text-slate-600"><Icons.ZoomOut /></button>
                        <div className="w-16 text-center text-xs font-mono font-bold text-slate-600 select-none">{Math.round(zoom * 100)}%</div>
                        <button onClick={() => adjustZoom(0.25)} className="p-2 hover:bg-slate-100 rounded text-slate-600"><Icons.ZoomIn /></button>
                        <div className="w-px h-4 bg-slate-200 mx-1"></div>
                        <button onClick={() => { setZoom(1); setPan({x:50, y:50}); }} className="p-2 hover:bg-slate-100 rounded text-slate-600"><Icons.Target /></button>
                    </div>

                    <div className="flex-1 relative overflow-hidden bg-[#fafafa] mt-12">
                        {interactionMode === 'connect' && (
                            <div className="absolute top-4 left-20 bg-blue-100 border border-blue-400 text-blue-800 px-4 py-2 rounded-lg shadow-md z-10 font-medium text-sm flex items-center gap-2 pointer-events-none">
                                <span className="animate-pulse w-2 h-2 bg-blue-600 rounded-full"></span>
                                {connectionSourceId ? 'Click target block to link' : 'Click a source block to start connection'}
                            </div>
                        )}
                        <svg ref={svgRef} className={`w-full h-full ${interactionMode === 'connect' ? 'cursor-crosshair' : (isPanning ? 'cursor-grabbing' : 'cursor-grab')}`} onPointerDown={handleSvgPointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp}>
                            <defs>
                                <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#333333" /></marker>
                                <marker id="arrowhead-sel" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3b82f6" /></marker>
                                <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#cbd5e1" /></pattern>
                            </defs>
                            <g ref={gRef} transform={`translate(${pan.x}, ${pan.y}) scale(${zoom})`}>
                                {snapToGrid && <rect x="-10000" y="-10000" width="20000" height="20000" fill="url(#dotGrid)" className="pointer-events-none" />}
                                <g className="pointer-events-auto">
                                    {lanes.map((lane) => {
                                        const laneFill = lane.fill || "#fff2cc";
                                        const laneStroke = lane.stroke || "#d6b656";
                                        const laneTextColor = lane.textColor || "#333333";
                                        return (
                                            <g key={lane.id} className={`lane ${selectedElement?.id === lane.id && selectedElement?.type === 'lane' ? 'selected-lane' : ''}`} onPointerDown={(e) => { e.stopPropagation(); setSelectedElement({ type: 'lane', id: lane.id }); }} onDoubleClick={(e) => { e.stopPropagation(); setEditingElement({ type: 'lane', id: lane.id }); }}>
                                                <line x1="180" y1={lane.y - 60} x2="3000" y2={lane.y - 60} stroke="#e2e8f0" strokeWidth="1" />
                                                <line x1="165" y1={lane.y} x2="3000" y2={lane.y} stroke="#cbd5e1" strokeWidth="1.5" strokeDasharray="5,5" className="pointer-events-none" />
                                                <ellipse cx="90" cy={lane.y} rx="75" ry="25" fill={laneFill} stroke={laneStroke} strokeWidth="2" />
                                                <foreignObject x="20" y={lane.y - 20} width="140" height="40" className="pointer-events-none">
                                                    <div className="w-full h-full flex items-center justify-center text-center font-bold text-[10px] leading-tight px-2" style={{ whiteSpace: 'pre-wrap', color: laneTextColor }}>{lane.label}</div>
                                                </foreignObject>
                                            </g>
                                        );
                                    })}
                                    <g transform="translate(0, 10)">
                                        {phases.map(phase => {
                                            const { x, w, type } = phase; const h = 40, offset = 20; let path = '';
                                            if (type === 'start') path = `M ${x},0 L ${x+w-offset},0 L ${x+w},${h/2} L ${x+w-offset},${h} L ${x},${h} Z`;
                                            else if (type === 'mid') path = `M ${x-offset},0 L ${x+w-offset},0 L ${x+w},${h/2} L ${x+w-offset},${h} L ${x-offset},${h} L ${x},${h/2} Z`;
                                            else if (type === 'end') path = `M ${x-offset},0 L ${x+w},0 L ${x+w},${h} L ${x-offset},${h} L ${x},${h/2} Z`;
                                            return (
                                                <g key={phase.id} className={`phase ${selectedElement?.id === phase.id && selectedElement?.type === 'phase' ? 'selected-phase' : ''}`} onPointerDown={(e) => { e.stopPropagation(); setSelectedElement({ type: 'phase', id: phase.id }); }} onDoubleClick={(e) => { e.stopPropagation(); setEditingElement({ type: 'phase', id: phase.id }); }}>
                                                    <path d={path} fill={phase.color} stroke="#cbd5e1" strokeWidth="1" />
                                                    <text x={phase.x + phase.w/2} y="20" textAnchor="middle" dominantBaseline="middle" fontSize="14" fontWeight="bold" fill={phase.text} letterSpacing="1" className="pointer-events-none">{phase.label}</text>
                                                    {phase.type !== 'end' && <line x1={phase.x + phase.w - 10} y1="40" x2={phase.x + phase.w - 10} y2="2000" stroke="#e2e8f0" strokeWidth="2" className="pointer-events-none" />}
                                                </g>
                                            );
                                        })}
                                    </g>
                                </g>
                                {edges.map(edge => {
                                    const sourceNode = nodes.find(n => n.id === edge.source); const targetNode = nodes.find(n => n.id === edge.target);
                                    if (!sourceNode || !targetNode) return null;
                                    const pathData = getOrthogonalPath(sourceNode, targetNode); const midX = (sourceNode.x + targetNode.x) / 2; const midY = (sourceNode.y + targetNode.y) / 2;
                                    const isSelected = selectedElement?.id === edge.id && selectedElement?.type === 'edge';
                                    const edgeStroke = edge.stroke || "#333333"; const edgeWidth = edge.strokeWidth || 1.5;
                                    return (
                                        <g key={edge.id} className={`edge-group ${isSelected ? 'selected-edge' : ''}`} onPointerDown={(e) => { e.stopPropagation(); setSelectedElement({ type: 'edge', id: edge.id }); }} onDoubleClick={(e) => { e.stopPropagation(); setEditingElement({ type: 'edge', id: edge.id }); }}>
                                            <path d={pathData} fill="none" stroke="transparent" strokeWidth="15" />
                                            <path d={pathData} fill="none" className="edge-path transition-colors group-hover:stroke-red-500" stroke={isSelected ? "#3b82f6" : edgeStroke} strokeWidth={isSelected ? edgeWidth + 1 : edgeWidth} strokeDasharray={edge.dashed ? "4,4" : "none"} markerEnd={isSelected ? "url(#arrowhead-sel)" : "url(#arrowhead)"} strokeLinejoin="round" />
                                            {edge.label && (<g className="pointer-events-none"><rect x={midX - 30} y={midY - 10} width="60" height="20" fill="#ffffff" rx="4" opacity="0.9" /><text x={midX} y={midY} dominantBaseline="middle" textAnchor="middle" fontSize="10" fill="#3b82f6" fontWeight="bold">{edge.label}</text></g>)}
                                        </g>
                                    );
                                })}
                                {interactionMode === 'connect' && connectionSourceId && (<path d={getOrthogonalPath(nodes.find(n => n.id === connectionSourceId) || {x:0, y:0}, {x: mousePos.x, y: mousePos.y})} fill="none" stroke="#3b82f6" strokeWidth="2" strokeDasharray="5,5" strokeLinejoin="round" />)}
                                {nodes.map(node => (<NodeShape key={node.id} node={node} isSelected={selectedElement?.id === node.id && selectedElement?.type === 'node'} onPointerDown={(e, id) => handleNodeAction(e, id, false)} onDoubleClick={(e, id) => handleNodeAction(e, id, true)} />))}
                            </g>
                        </svg>
                    </div>

                    <ElementSettingsFloatingPanel editingElement={editingElement} getElementData={getElementData} lanes={lanes} onClose={() => setEditingElement(null)} onUpdatePresentOnly={handleElementUpdatePresentOnly} onPushToPast={pushToPast} onDelete={() => { pushToPast(); handleElementDelete(); }} />
                </div>
            );
        };

        // --- RECURSIVE VISUAL ORG NODE COMPONENT ---
        const OrgNode = ({ node, selectNode, selectedId, onAddChild, onDeleteNode, onEditNode }) => {
            const hasChildren = node.children && node.children.length > 0;
            const isSelected = selectedId === node.id;
            
            const cardBg = node.fill || '#0f172a';
            const cardBorder = node.stroke || '#334155';
            const textFill = node.textColor || '#f8fafc';
            
            return (
                <div className="flex flex-col items-center relative px-4">
                    {/* Main Node Card */}
                    <div 
                        onClick={(e) => { e.stopPropagation(); selectNode(node); }}
                        style={{ backgroundColor: cardBg, borderColor: isSelected ? '#14b8a6' : cardBorder }}
                        className={`group relative z-10 p-4 rounded-xl shadow-md border transition-all duration-200 cursor-pointer min-w-[200px] text-center ${
                            isSelected 
                                ? 'ring-2 ring-brandTeal-400 shadow-[0_0_15px_rgba(20,184,166,0.3)]' 
                                : 'hover:border-brandTeal-500/50 hover:shadow-lg'
                        }`}
                    >
                        {/* Accent top gradient indicator */}
                        <div className="absolute top-0 left-0 right-0 h-1 rounded-t-xl bg-gradient-to-r from-brandTeal-500 to-brandTeal-300"></div>
                        
                        {/* Label & Owner */}
                        <h4 style={{ color: textFill }} className="text-xs font-bold uppercase tracking-wider mt-1 whitespace-pre-wrap">{node.label.replace(/\n/g, ' ')}</h4>
                        <p className="text-[10px] text-slate-400 mt-1 font-medium italic">{node.owner || 'No Lead'}</p>
                        
                        {/* Interactive Floating Hover Panel */}
                        <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 flex items-center bg-brandNavy-950 border border-brandNavy-800 rounded-full py-1 px-2.5 shadow-2xl gap-2 z-50">
                            <button 
                                onClick={(e) => { e.stopPropagation(); onAddChild(node.id); }}
                                className="p-1 text-slate-400 hover:text-brandTeal-400 rounded-full hover:bg-brandNavy-900 transition-colors" 
                                title="Add Sub-unit"
                            >
                                <Icons.Plus />
                            </button>
                            <button 
                                onClick={(e) => { e.stopPropagation(); onEditNode(node); }}
                                className="p-1 text-slate-400 hover:text-brandAmber-400 rounded-full hover:bg-brandNavy-900 transition-colors" 
                                title="Edit Unit Details"
                            >
                                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.2">
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                                </svg>
                            </button>
                            <button 
                                onClick={(e) => { e.stopPropagation(); onDeleteNode(node.id); }}
                                className="p-1 text-slate-400 hover:text-rose-400 rounded-full hover:bg-brandNavy-900 transition-colors" 
                                title="Delete Reporting Unit"
                            >
                                <Icons.Trash />
                            </button>
                        </div>
                    </div>

                    {/* Vertical connector down from parent card */}
                    {hasChildren && (
                        <div className="w-0.5 h-6 bg-brandNavy-800"></div>
                    )}

                    {/* Children flex row with centered orthogonal connector lines */}
                    {hasChildren && (
                        <div className="flex pt-6 relative">
                            {node.children.map((child, index) => {
                                const isFirst = index === 0;
                                const isLast = index === node.children.length - 1;
                                return (
                                    <div key={child.id} className="relative flex flex-col items-center">
                                        {/* Segmented Horizontal connector line spanning middle siblings */}
                                        <div 
                                            className="absolute top-0 h-0.5 bg-brandNavy-800" 
                                            style={{ 
                                                left: isFirst ? '50%' : '0%', 
                                                right: isLast ? '50%' : '0%' 
                                            }}
                                        ></div>
                                        
                                        {/* Centered vertical connector leading to child card */}
                                        <div className="w-0.5 h-6 bg-brandNavy-800 -mt-6"></div>
                                        
                                        <OrgNode 
                                            node={child} 
                                            selectNode={selectNode} 
                                            selectedId={selectedId}
                                            onAddChild={onAddChild}
                                            onDeleteNode={onDeleteNode}
                                            onEditNode={onEditNode}
                                        />
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        // --- ORG CHART BUILDER VIEW COMPONENT ---
        const OrgChartBuilder = ({ activeTab, pushToPast, updatePresentOnly, commitUpdate, setSelectedElement, selectedElement }) => {
            const { lanes, nodes } = activeTab.present;
            const [selectedLaneId, setSelectedLaneId] = useState(null);
            const [zoom, setZoom] = useState(1);
            const [searchQuery, setSearchQuery] = useState('');

            const selectedLane = lanes.find(l => l.id === selectedLaneId);

            // Construct visual hierarchy tree dynamically
            const treeData = useMemo(() => buildTree(lanes), [lanes]);

            // Add Child Organization Unit (Reporting Lane)
            const handleAddChild = (parentId) => {
                pushToPast();
                const id = 'l' + Date.now();
                const maxY = lanes.reduce((max, l) => Math.max(max, l.y), 0);
                const newLane = { id, label: 'New Sub-Department', owner: 'New Owner', y: maxY + 120, parentId, fill: '#1e293b', stroke: '#475569', textColor: '#f8fafc' };
                commitUpdate({ ...activeTab.present, lanes: [...lanes, newLane] });
                setSelectedLaneId(id);
            };

            // Add Root Node (Autonomous reporting tree)
            const handleAddRoot = () => {
                pushToPast();
                const id = 'l' + Date.now();
                const maxY = lanes.reduce((max, l) => Math.max(max, l.y), 0);
                const newLane = { id, label: 'New Root Department', owner: 'New Owner', y: maxY + 120, parentId: null, fill: '#1e293b', stroke: '#475569', textColor: '#f8fafc' };
                commitUpdate({ ...activeTab.present, lanes: [...lanes, newLane] });
                setSelectedLaneId(id);
            };

            // Cascade deletes safely promoting children to parent node & cleaning up diagram references
            const handleDeleteLane = (laneId) => {
                pushToPast();
                const targetLane = lanes.find(l => l.id === laneId);
                if (!targetLane) return;
                const deletedParentId = targetLane.parentId || null;
                
                const updatedLanes = lanes
                    .filter(l => l.id !== laneId)
                    .map(l => l.parentId === laneId ? { ...l, parentId: deletedParentId } : l);
                    
                const updatedNodes = nodes.map(n => n.roleId === laneId ? { ...n, roleId: '' } : n);
                
                commitUpdate({ 
                    ...activeTab.present, 
                    lanes: updatedLanes,
                    nodes: updatedNodes 
                });
                setSelectedLaneId(null);
            };

            const handleUpdateLane = (updates) => {
                updatePresentOnly({
                    ...activeTab.present,
                    lanes: lanes.map(l => l.id === selectedLaneId ? { ...l, ...updates } : l)
                });
            };

            const departmentNodes = selectedLane ? nodes.filter(n => n.roleId === selectedLane.id) : [];

            return (
                <div className="space-y-6 animate-fade-in max-w-7xl mx-auto h-[calc(100vh-140px)] flex flex-col">
                    <div className="shrink-0 flex justify-between items-start">
                        <div>
                            <h2 className="text-2xl font-bold text-white mb-1">Organization Chart Architecture</h2>
                            <p className="text-xs text-slate-400 max-w-3xl leading-relaxed">Design your reporting structures and agency models visually. Department items synchronized from org charts instantly map into swimlanes, re-route process maps, and configure RACI tables.</p>
                        </div>
                        <button onClick={handleAddRoot} className="px-3.5 py-2.5 bg-brandTeal-500 hover:bg-brandTeal-600 text-brandNavy-955 text-xs font-bold rounded-xl transition-all shadow-[0_4px_14px_rgba(20,184,166,0.25)] flex items-center gap-1.5 shrink-0">
                            <Icons.Plus /> Add Root Department
                        </button>
                    </div>

                    <div className="flex-1 flex gap-6 min-h-0 overflow-hidden">
                        {/* Interactive Vector Canvas Workspace */}
                        <div className="flex-1 flex flex-col bg-brandNavy-900 border border-brandNavy-800 rounded-2xl overflow-hidden relative shadow-2xl">
                            <div className="shrink-0 p-4 bg-brandNavy-950 border-b border-brandNavy-800 flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <span className="text-[10px] font-mono uppercase tracking-wider text-slate-400 font-bold">Zoom Scale</span>
                                    <button onClick={() => setZoom(z => Math.max(0.5, z - 0.1))} className="p-1.5 text-slate-400 hover:text-white hover:bg-brandNavy-800 rounded transition-colors" title="Zoom Out"><Icons.ZoomOut /></button>
                                    <input type="range" min="0.5" max="1.5" step="0.1" value={zoom} onChange={(e) => setZoom(Number(e.target.value))} className="w-24 h-1 bg-brandNavy-700 rounded-lg appearance-none cursor-pointer accent-brandTeal-500" />
                                    <button onClick={() => setZoom(z => Math.min(1.5, z + 0.1))} className="p-1.5 text-slate-400 hover:text-white hover:bg-brandNavy-800 rounded transition-colors" title="Zoom In"><Icons.ZoomIn /></button>
                                    <span className="text-[10px] font-mono text-brandTeal-400 font-bold">{Math.round(zoom * 100)}%</span>
                                </div>
                                <div className="relative">
                                    <input 
                                        type="text" 
                                        placeholder="Filter by title..." 
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className="bg-brandNavy-900 border border-brandNavy-800 rounded-xl py-1.5 px-3.5 pl-9 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-brandTeal-500 w-52"
                                    />
                                    <svg className="w-3.5 h-3.5 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                                    </svg>
                                </div>
                            </div>

                            <div className="flex-1 overflow-auto p-12 flex justify-center items-start no-scrollbar bg-brandNavy-955/20">
                                <div 
                                    style={{ transform: `scale(${zoom})`, transformOrigin: 'top center' }}
                                    className="transition-transform duration-200 flex flex-col items-center gap-10 min-w-max"
                                >
                                    {treeData.length === 0 ? (
                                        <div className="text-center py-20 text-slate-500 text-sm">
                                            <div className="p-3 bg-brandNavy-850 border border-brandNavy-700 text-brandTeal-500 inline-block rounded-xl mb-3"><Icons.Sitemap /></div>
                                            <p className="font-bold">No Departments Configured</p>
                                            <button onClick={handleAddRoot} className="mt-4 px-3 py-1.5 bg-brandNavy-800 hover:bg-brandNavy-750 rounded text-xs text-brandTeal-400 font-bold border border-brandNavy-700 transition-colors">Setup First Department</button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-14 items-center">
                                            {treeData
                                                .filter(root => !searchQuery || root.label.toLowerCase().includes(searchQuery.toLowerCase()) || (root.owner && root.owner.toLowerCase().includes(searchQuery.toLowerCase())))
                                                .map(root => (
                                                    <OrgNode 
                                                        key={root.id} 
                                                        node={root} 
                                                        selectNode={(n) => setSelectedLaneId(n.id)} 
                                                        selectedId={selectedLaneId}
                                                        onAddChild={handleAddChild}
                                                        onDeleteNode={handleDeleteLane}
                                                        onEditNode={(n) => setSelectedLaneId(n.id)}
                                                    />
                                                ))
                                            }
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Side Settings Control Center */}
                        <div className="w-[380px] bg-brandNavy-900 border border-brandNavy-800 rounded-2xl flex flex-col overflow-hidden shadow-2xl shrink-0">
                            <div className="p-4 bg-brandNavy-950 border-b border-brandNavy-800 flex justify-between items-center">
                                <h3 className="text-xs font-bold uppercase tracking-wider text-white">Interactive Inspector</h3>
                                {selectedLane && (
                                    <button onClick={() => handleDeleteLane(selectedLane.id)} className="text-rose-400 hover:text-rose-300 text-[10px] font-bold uppercase flex items-center gap-1 transition-colors">
                                        <Icons.Trash /> Delete
                                    </button>
                                )}
                            </div>

                            <div className="flex-1 overflow-y-auto p-5 space-y-4 text-xs">
                                {selectedLane ? (
                                    <>
                                        <div>
                                            <label className="text-[10px] font-mono text-slate-400 uppercase tracking-wider block mb-1">Unit Title</label>
                                            <input 
                                                type="text" 
                                                onFocus={pushToPast}
                                                value={selectedLane.label} 
                                                onChange={(e) => handleUpdateLane({ label: e.target.value })} 
                                                className="w-full bg-brandNavy-950 border border-brandNavy-800 rounded-lg p-2.5 text-xs text-white focus:outline-none focus:border-brandTeal-500 font-bold" 
                                            />
                                        </div>

                                        <div>
                                            <label className="text-[10px] font-mono text-slate-400 uppercase tracking-wider block mb-1">Leader / Owner</label>
                                            <input 
                                                type="text" 
                                                onFocus={pushToPast}
                                                value={selectedLane.owner || ''} 
                                                onChange={(e) => handleUpdateLane({ owner: e.target.value })} 
                                                className="w-full bg-brandNavy-950 border border-brandNavy-800 rounded-lg p-2.5 text-xs text-white focus:outline-none focus:border-brandTeal-500 font-semibold" 
                                                placeholder="e.g. Executive Director" 
                                            />
                                        </div>

                                        <div>
                                            <label className="text-[10px] font-mono text-slate-400 uppercase tracking-wider block mb-1">Parent Department</label>
                                            <select 
                                                onFocus={pushToPast}
                                                value={selectedLane.parentId || ''} 
                                                onChange={(e) => {
                                                    const val = e.target.value || null;
                                                    if (val && isDescendant(lanes, selectedLane.id, val)) return;
                                                    handleUpdateLane({ parentId: val });
                                                }} 
                                                className="w-full bg-brandNavy-950 border border-brandNavy-800 rounded-lg p-2.5 text-xs text-white focus:outline-none focus:border-brandTeal-500"
                                            >
                                                <option value="">None (Top-Level Root)</option>
                                                {lanes
                                                    .filter(l => l.id !== selectedLane.id && !isDescendant(lanes, selectedLane.id, l.id))
                                                    .map(l => (
                                                        <option key={l.id} value={l.id}>{l.label.replace(/\n/g, ' ')}</option>
                                                    ))
                                                }
                                            </select>
                                        </div>

                                        <div>
                                            <label className="text-[10px] font-mono text-slate-400 uppercase tracking-wider block mb-1">Diagram Lane Y-Position ({selectedLane.y}px)</label>
                                            <input 
                                                type="range" 
                                                min="50" 
                                                max="1500" 
                                                step="20"
                                                onFocus={pushToPast}
                                                value={selectedLane.y} 
                                                onChange={(e) => handleUpdateLane({ y: Number(e.target.value) })} 
                                                className="w-full accent-brandTeal-500 mt-1" 
                                            />
                                            <div className="flex justify-between text-[9px] text-slate-500 font-mono mt-1">
                                                <span>Top Swimlanes</span>
                                                <span>Bottom Swimlanes</span>
                                            </div>
                                        </div>

                                        <div className="border-t border-brandNavy-800 pt-4">
                                            <h4 className="text-[10px] font-mono text-brandTeal-400 uppercase tracking-wider mb-2.5 font-bold">Swimlane & Org Card Theme</h4>
                                            <div className="grid grid-cols-3 gap-2">
                                                <div>
                                                    <label className="text-[9px] text-slate-400 block mb-1 font-mono uppercase">Fill</label>
                                                    <input 
                                                        type="color" 
                                                        onFocus={pushToPast}
                                                        value={selectedLane.fill || '#1e293b'} 
                                                        onChange={(e) => handleUpdateLane({ fill: e.target.value })} 
                                                        className="w-full h-8 rounded-lg cursor-pointer bg-brandNavy-950 border border-brandNavy-800" 
                                                    />
                                                </div>
                                                <div>
                                                    <label className="text-[9px] text-slate-400 block mb-1 font-mono uppercase">Stroke</label>
                                                    <input 
                                                        type="color" 
                                                        onFocus={pushToPast}
                                                        value={selectedLane.stroke || '#475569'} 
                                                        onChange={(e) => handleUpdateLane({ stroke: e.target.value })} 
                                                        className="w-full h-8 rounded-lg cursor-pointer bg-brandNavy-950 border border-brandNavy-800" 
                                                    />
                                                </div>
                                                <div>
                                                    <label className="text-[9px] text-slate-400 block mb-1 font-mono uppercase">Text</label>
                                                    <input 
                                                        type="color" 
                                                        onFocus={pushToPast}
                                                        value={selectedLane.textColor || '#f8fafc'} 
                                                        onChange={(e) => handleUpdateLane({ textColor: e.target.value })} 
                                                        className="w-full h-8 rounded-lg cursor-pointer bg-brandNavy-950 border border-brandNavy-800" 
                                                    />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="border-t border-brandNavy-800 pt-4">
                                            <div className="flex justify-between items-center mb-2">
                                                <h4 className="text-[10px] font-mono text-slate-400 uppercase tracking-wider font-bold">Connected Workflow Blocks ({departmentNodes.length})</h4>
                                            </div>
                                            {departmentNodes.length === 0 ? (
                                                <p className="text-[10px] text-slate-500 italic">No workflow blocks assigned to this department yet.</p>
                                            ) : (
                                                <div className="space-y-1.5 max-h-[150px] overflow-y-auto pr-1">
                                                    {departmentNodes.map(n => (
                                                        <div key={n.id} className="p-2 bg-brandNavy-950 border border-brandNavy-850 rounded-lg flex justify-between items-center hover:border-brandTeal-500/30 transition-colors">
                                                            <span className="font-semibold text-slate-300 truncate max-w-[150px]">{n.label.replace('\n', ' ')}</span>
                                                            <div className="flex gap-1">
                                                                <span className="text-[8px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded uppercase font-bold tracking-wide">{n.type}</span>
                                                                <span className={`text-[8px] px-1.5 py-0.5 rounded font-bold tracking-wide uppercase ${
                                                                    n.risk === 'High Delay Risk' ? 'bg-rose-500/20 text-rose-400' :
                                                                    n.risk === 'Bottleneck Priority' ? 'bg-amber-500/20 text-amber-400' :
                                                                    'bg-emerald-500/20 text-emerald-400'
                                                                }`}>{n.risk}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </>
                                ) : (
                                    <div className="text-center py-24 text-slate-500">
                                        <svg className="w-8 h-8 mx-auto text-slate-600 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5">
                                            <path strokeLinecap="round" strokeLinejoin="round" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" />
                                        </svg>
                                        <p className="font-bold text-xs">No Unit Selected</p>
                                        <p className="text-[10px] text-slate-600 mt-1">Select any card in the Org Chart to inspect metadata, parent connections, and visual styling blocks.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- SUITE SUB-COMPONENTS ---
        const RaciBuilder = ({ activeTab, raciAssignments, setRaciAssignments }) => {
            const raciActivities = activeTab.present.nodes.filter(n => n.type === 'process' || n.type === 'approval').sort((a,b) => a.x - b.x); 
            const roles = activeTab.present.lanes.sort((a,b) => a.y - b.y);

            const handleRaciChange = (actId, roleId, val) => {
                const copy = { ...raciAssignments };
                if (!copy[actId]) copy[actId] = {};
                copy[actId][roleId] = val;
                setRaciAssignments(copy);
            };

            return (
                <div className="space-y-8 animate-fade-in max-w-6xl mx-auto">
                    <div>
                        <h2 className="text-2xl font-bold text-white mb-2">Role Architecture & RACI Grid</h2>
                        <p className="text-sm text-slate-400 max-w-3xl leading-relaxed">Assign strict execution boundaries across the selected workflow. Roles are automatically mapped from your Organization Unit lanes in the Diagrammer.</p>
                    </div>

                    <div className="glass-panel rounded-2xl p-6 shadow-xl overflow-x-auto bg-brandNavy-900 border border-brandNavy-800">
                        <h3 className="text-sm font-bold uppercase tracking-wider text-white mb-4 border-b border-brandNavy-700 pb-2">Responsibility Intersections: {activeTab.name}</h3>
                        <table className="w-full text-left border-collapse text-xs min-w-[600px]">
                            <thead>
                                <tr className="border-b border-brandNavy-700">
                                    <th className="pb-3 px-3 text-slate-400 font-mono uppercase tracking-wider w-1/4">Milestone Activity</th>
                                    {roles.map(r => (
                                        <th key={r.id} className="pb-3 px-2 text-center text-slate-200">
                                            <div className="font-bold">{r.label.replace('\n', ' ')}</div>
                                            <div className="text-[9px] text-brandTeal-400/80 font-mono mt-0.5">{r.owner || 'Unassigned'}</div>
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-brandNavy-800/50">
                                {raciActivities.map(act => (
                                    <tr key={act.id} className="hover:bg-brandNavy-800/30 transition-colors">
                                        <td className="py-3 px-3 font-semibold text-slate-300">{act.label.replace('\n', ' ')}</td>
                                        {roles.map(role => {
                                            const assign = raciAssignments[act.id]?.[role.id] || '';
                                            let badgeClass = "border border-brandNavy-700 text-slate-500 bg-brandNavy-950";
                                            if (assign === 'R') badgeClass = "bg-emerald-500/20 border border-emerald-500/50 text-emerald-400 font-bold";
                                            if (assign === 'A') badgeClass = "bg-brandAmber-500/20 border border-brandAmber-500/50 text-brandAmber-400 font-bold";
                                            if (assign === 'C') badgeClass = "bg-purple-500/20 border border-purple-500/50 text-purple-400 font-bold";
                                            if (assign === 'I') badgeClass = "bg-slate-500/20 border border-slate-500/50 text-slate-300 font-bold";

                                            return (
                                                <td key={role.id} className="py-3 px-2 text-center">
                                                    <select value={assign} onChange={(e) => handleRaciChange(act.id, role.id, e.target.value)} className={`appearance-none w-8 h-8 text-center rounded-lg focus:outline-none cursor-pointer ${badgeClass}`}>
                                                        <option value="">-</option><option value="R">R</option><option value="A">A</option><option value="C">C</option><option value="I">I</option>
                                                    </select>
                                                </td>
                                            );
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthed, setIsAuthed] = useState(false);
            const [authError, setAuthError] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            
            const [workbookProfiles, setWorkbookProfiles] = useState([]);
            const [activeProfileId, setActiveProfileId] = useState("");

            const [activeNav, setActiveNav] = useState('flowcharts');
            
            const createEmptyTab = (id, name) => ({ id, name, past: [], present: { ...EMPTY_CANVAS }, future: [] });

            const [workflowInit] = useState(() => {
                const id = 'tab-' + Date.now();
                return {
                    tabs: [createEmptyTab(id, 'Diagram 1')],
                    activeTabId: id,
                };
            });
            const [tabs, setTabs] = useState(workflowInit.tabs);
            const [activeTabId, setActiveTabId] = useState(workflowInit.activeTabId);
            const [raciAssignments, setRaciAssignments] = useState({});
            const [selectedElement, setSelectedElement] = useState(null);

            // 1) Auth Setup
            useEffect(() => {
                let checkInterval = setInterval(() => {
                    if (window.firebaseAuth && window.signInAnonymously) {
                        clearInterval(checkInterval);
                        const initAuth = async () => {
                            try {
                                if (window.initialAuthToken) await window.signInWithCustomToken(window.firebaseAuth, window.initialAuthToken); 
                                else await window.kolthoffStaffReady 
                            } catch (e) { setAuthError(e.message || "Referrer restricted"); }
                        };
                        initAuth();
                        const unsubscribe = window.onAuthStateChanged(window.firebaseAuth, (currentUser) => {
                            setUser(currentUser);
                            if (currentUser) { setIsAuthed(true); setAuthError(null); } else setIsAuthed(false);
                        });
                        return () => unsubscribe();
                    }
                }, 50);
                return () => clearInterval(checkInterval);
            }, []);

            // 2) Data Fetching + deep-link profile from ?profile=
            useEffect(() => {
                if (!user) return;
                const profilesRef = window.collection(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'workbook_profiles');
                const unsubscribe = window.onSnapshot(profilesRef, (snapshot) => {
                    const fetchedProfiles = [];
                    snapshot.forEach(doc => { fetchedProfiles.push({ id: doc.id, ...doc.data() }); });
                    setWorkbookProfiles(fetchedProfiles);
                    setActiveProfileId(current => {
                        const params = new URLSearchParams(window.location.search);
                        const linked = params.get('profile');
                        if (linked && fetchedProfiles.find(p => p.id === linked)) return linked;
                        if (!fetchedProfiles.find(p => p.id === current) && fetchedProfiles.length > 0) return fetchedProfiles[0].id;
                        return current;
                    });
                }, (err) => console.error("Firestore Snapshot Sync Error:", err));
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                const profile = workbookProfiles.find(p => p.id === activeProfileId);
                const WT = window.WorkflowTabs;
                if (!profile) return;
                const resolved = WT?.resolveWorkflowTabs(profile, 'workflow');
                if (resolved?.tabs?.length) {
                    setTabs(WT.hydrateTabs(resolved.tabs));
                    setActiveTabId(resolved.activeTabId || resolved.tabs[0].id);
                } else {
                    const id = 'tab-' + Date.now();
                    setTabs([createEmptyTab(id, 'Diagram 1')]);
                    setActiveTabId(id);
                }
                setRaciAssignments(profile.raciAssignments || {});
            }, [activeProfileId, workbookProfiles]);

            const triggerToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 3000); };

            const handleSaveToCloud = async () => {
                if (authError) return triggerToast("❌ Sync Disabled (GCP Key Issue)");
                if (!isAuthed || !activeProfileId) return;
                setIsSaving(true);
                try {
                    const profileRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'workbook_profiles', activeProfileId);
                    const profileSnap = await window.getDoc(profileRef);
                    const existing = profileSnap.exists() ? profileSnap.data() : {};
                    const tabsPayload = window.WorkflowTabs.buildWorkflowTabsPayload('workflow', tabs, activeTabId, existing);
                    await window.setDoc(profileRef, { ...tabsPayload, raciAssignments }, { merge: true });
                    triggerToast("💾 Saved to Cloud!");
                } catch (e) { triggerToast("❌ Error saving."); }
                setIsSaving(false);
            };

            const profileLabel = (p) => window.EngagementConfig?.getClientDisplayName?.(p) || p.clientCompany || 'Untitled Company';

            const activeTab = tabs.find(t => t.id === activeTabId) || tabs[0];

            return (
                <div className="flex h-full min-h-0 overflow-hidden bg-brandNavy-955 font-sans">
                    {toastMessage && (<div role="alert" className="fixed bottom-6 right-6 z-[100] bg-brandTeal-600 text-white text-xs font-bold px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 animate-bounce"><span>✓</span>{toastMessage}</div>)}

                    {!IS_EMBED && (
                    <aside className="w-[300px] bg-brandNavy-900 border-r border-brandNavy-800 flex flex-col shrink-0 no-print z-20 shadow-2xl">
                        <div className="p-6 border-b border-brandNavy-800 flex justify-between items-center group">
                            <div><h1 className="text-sm font-extrabold tracking-widest text-brandTeal-500 uppercase leading-none mb-1">Kolthoff Consulting</h1><span className="text-[10px] text-white font-bold uppercase tracking-widest">Mod2: Workflow Builder</span></div>
                            <div className="relative">
                                <div className={`w-2 h-2 rounded-full cursor-help ${isAuthed ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : (authError ? 'bg-rose-500 shadow-[0_0_8px_#f43f5e]' : 'bg-amber-500 animate-pulse')}`}></div>
                                {authError && <div className="absolute right-0 top-full mt-2 w-48 bg-rose-950/90 border border-rose-500/50 p-2 rounded text-[9px] text-rose-200 hidden group-hover:block z-50">Sync Disabled (Offline)</div>}
                            </div>
                        </div>

                        <div className="p-4 border-b border-brandNavy-800 bg-brandNavy-950">
                            <label className="text-[9px] font-mono text-slate-500 uppercase tracking-widest font-bold mb-1.5 block">Active Workspace</label>
                            <select value={activeProfileId} onChange={(e) => setActiveProfileId(e.target.value)} className="w-full bg-brandNavy-900 border border-brandNavy-700 rounded p-2 text-xs font-semibold text-slate-200 outline-none focus:border-brandTeal-500" disabled={!!authError}>
                                {workbookProfiles.length === 0 && <option value="">{authError ? "Local Session Default" : "Loading..."}</option>}
                                {workbookProfiles.map(p => <option key={p.id} value={p.id}>{profileLabel(p)}</option>)}
                            </select>
                        </div>
                        
                        <nav className="p-4 flex-1 overflow-y-auto space-y-2">
                            <p className="text-[9px] font-mono text-slate-500 uppercase tracking-widest font-bold mb-3 px-1">Editors & Builders</p>
                            <button onClick={() => setActiveNav('flowcharts')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'flowcharts' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Layout /> 1. Workflow Diagrammer</button>
                            <button onClick={() => setActiveNav('raci')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'raci' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Users /> 2. RACI Architecture</button>
                            <button onClick={() => setActiveNav('orgchart')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'orgchart' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Sitemap /> 3. Org Chart Builder</button>
                        </nav>

                        <div className="p-4 border-t border-brandNavy-800 bg-brandNavy-950">
                            <button onClick={handleSaveToCloud} disabled={isSaving || !!authError} className={`w-full flex justify-center items-center gap-2 py-3 rounded text-xs font-bold transition-all ${authError ? 'bg-brandNavy-850 text-slate-500 border border-brandNavy-700' : 'bg-brandNavy-800 hover:bg-brandNavy-700 text-slate-200'}`}>
                                {authError ? <Icons.AlertCircle /> : <Icons.Cloud />} {isSaving ? "Syncing..." : (authError ? "Offline Mode" : "Sync to Cloud")}
                            </button>
                        </div>
                    </aside>
                    )}

                    <main className="flex-1 overflow-hidden relative z-10 flex flex-col min-w-0">
                        {IS_EMBED && (
                            <div className="shrink-0 bg-brandNavy-900/95 border-b border-brandNavy-800 px-4 py-2 flex justify-end items-center gap-2 no-print">
                                <button type="button" onClick={handleSaveToCloud} disabled={isSaving || !!authError} className={`px-3 py-1.5 rounded text-[10px] font-bold uppercase tracking-wider ${authError ? 'bg-brandNavy-850 text-slate-500' : 'bg-brandTeal-500 hover:bg-brandTeal-600 text-brandNavy-955'}`}>
                                    {isSaving ? 'Syncing…' : 'Sync Diagram'}
                                </button>
                            </div>
                        )}
                        {activeNav !== 'flowcharts' && (
                            <header data-app-chrome className="shrink-0 bg-brandNavy-955/80 backdrop-blur-md border-b border-brandNavy-800 px-8 py-4 flex justify-between items-center no-print">
                                <h2 className="text-sm font-bold text-brandTeal-400 font-mono tracking-widest uppercase">
                                    {activeNav === 'raci' ? '2. Accountability' : activeNav === 'orgchart' ? '3. Organization Chart' : 'Studio'}
                                </h2>
                            </header>
                        )}

                        <div className={`flex-1 overflow-y-auto ${activeNav === 'flowcharts' ? '' : 'p-8 max-w-[1600px] mx-auto pb-24 w-full'}`}>
                            {activeNav === 'flowcharts' && (
                                <WorkflowCanvasBuilder 
                                    tabs={tabs} setTabs={setTabs} activeTabId={activeTabId} setActiveTabId={setActiveTabId}
                                    undo={() => setTabs(prev => prev.map(t => { if (t.id !== activeTabId || t.past.length === 0) return t; const p = t.past[t.past.length-1]; return { ...t, past: t.past.slice(0, -1), present: p, future: [t.present, ...t.future] }; }))}
                                    redo={() => setTabs(prev => prev.map(t => { if (t.id !== activeTabId || t.future.length === 0) return t; const n = t.future[0]; return { ...t, past: [...t.past, t.present], present: n, future: t.future.slice(1) }; }))}
                                    pushToPast={() => setTabs(prev => prev.map(t => t.id === activeTabId ? { ...t, past: [...t.past, t.present], future: [] } : t))}
                                    updatePresentOnly={(n) => setTabs(prev => prev.map(t => t.id === activeTabId ? { ...t, present: n } : t))}
                                    commitUpdate={(n) => setTabs(prev => prev.map(t => t.id === activeTabId ? { ...t, past: [...t.past, t.present], present: n, future: [] } : t))}
                                    addNewTab={() => { const id = 'tab-'+Date.now(); setTabs([...tabs, createEmptyTab(id, 'New Diagram')]); setActiveTabId(id); }}
                                    closeTab={(e, id) => { e.stopPropagation(); if (tabs.length === 1) return; const newT = tabs.filter(t => t.id !== id); setTabs(newT); if (activeTabId === id) setActiveTabId(newT[0].id); }}
                                    renameTab={(id, name) => setTabs(tabs.map(t => t.id === id ? { ...t, name } : t))}
                                    exportData={() => { const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(tabs)); a.download = "workflow_workspace.json"; a.click(); }}
                                    importData={(e) => { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev) => { try { const p = JSON.parse(ev.target.result); if(Array.isArray(p)){ setTabs(p); setActiveTabId(p[0].id); } } catch(err){ alert("Invalid File."); } }; r.readAsText(f); e.target.value = null; }}
                                />
                            )}
                            {activeNav === 'raci' && <RaciBuilder activeTab={activeTab} raciAssignments={raciAssignments} setRaciAssignments={setRaciAssignments} />}
                            {activeNav === 'orgchart' && (
                                <OrgChartBuilder 
                                    activeTab={activeTab}
                                    pushToPast={() => setTabs(prev => prev.map(t => t.id === activeTabId ? { ...t, past: [...t.past, t.present], future: [] } : t))}
                                    updatePresentOnly={(n) => setTabs(prev => prev.map(t => t.id === activeTabId ? { ...t, present: n } : t))}
                                    commitUpdate={(n) => setTabs(prev => prev.map(t => t.id === activeTabId ? { ...t, past: [...t.past, t.present], present: n, future: [] } : t))}
                                    setSelectedElement={setSelectedElement}
                                    selectedElement={selectedElement}
                                />
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
