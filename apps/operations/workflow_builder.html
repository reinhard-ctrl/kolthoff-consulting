        <script type="module" src="../../shared/firebase-init.js?v=20250702-firebase-v2"></script>

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandNavy: { 955: '#02050e', 950: '#020613', 900: '#09111F', 850: '#0C1626', 800: '#0F1A2C', 750: '#15233A', 700: '#1B2C46', 600: '#2E4567' },
                        brandTeal: { 50: '#F0FDFA', 100: '#CCFBF1', 200: '#99F6E4', 300: '#5EEAD4', 400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488', 700: '#0F766E', 855: '#115E59', 950: '#042F2E' },
                        brandAmber: { 50: '#FFFBEB', 100: '#FEF3C7', 400: '#FBBF24', 500: '#F59E0B', 600: '#D97706' }

                    fontFamily: { sans: ['"Montserrat"', 'sans-serif'], serif: ['"Playfair Display"', 'serif'] }

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020613; }
        ::-webkit-scrollbar-thumb { background: #0F1A2C; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #14B8A6; }
 
        .luxury-gradient { background: radial-gradient(circle at 50% -20%, #0F1A2C 0%, #020613 100%); }
        
        /* Canvas Specific Overrides */
        .canvas-container { cursor: grab; }
        .canvas-container:active { cursor: grabbing; }
        .node, .lane, .phase, .edge-group { cursor: pointer; transition: filter 0.2s; }
        .node:hover, .lane:hover, .phase:hover { filter: brightness(0.95); }
        @keyframes dash { to { stroke-dashoffset: 100; } }
        .selected circle, .selected polygon { stroke: #3b82f6 !important; stroke-width: 3 !important; stroke-dasharray: 5,5; animation: dash 10s linear infinite; }
        .selected-lane ellipse { stroke: #3b82f6 !important; stroke-width: 3 !important; stroke-dasharray: 5,5; animation: dash 10s linear infinite; }
        .selected-phase path { stroke: #3b82f6 !important; stroke-width: 3 !important; stroke-dasharray: 5,5; animation: dash 10s linear infinite; }
        .selected-edge path.edge-path { stroke: #3b82f6 !important; stroke-width: 2.5 !important; stroke-dasharray: 5,5 !important; animation: dash 10s linear infinite; }
        .no-select { user-select: none; -webkit-user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-pop-in { animation: popIn 0.2s ease-out forwards; }
        .animate-fade-in { animation: popIn 0.2s ease-out forwards; } 

        .page-break { page-break-before: always; }
        .page-break-inside-avoid { page-break-inside: avoid; }

        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }

        html, body, #root { height: 100%; }
        html.workflow-embed body { overflow: hidden; }
    </style>

        if (new URLSearchParams(window.location.search).has('embed')) {
            document.documentElement.classList.add('workflow-embed');

<body class="luxury-gradient text-slate-100 antialiased selection:bg-brandTeal-600 selection:text-white h-full overflow-hidden">

    <div id="root"></div>

    <script src="../../shared/engagement-config.js?v=20250701-content-v2"></script>
    <script src="../../shared/mod-gating.js?v=20250707-mod2-gate-v1"></script>
    <script src="../../shared/workflow-tabs.js?v=20250707-diagnosis-bpmn-v1"></script>
    <script src="../../shared/diagram-editor.js?v=20250707-diagnosis-bpmn-v1"></script>
    <script src="../../shared/sop-sync.js?v=20250707-diagnosis-bpmn-v1"></script>

    <script type="text/babel" data-presets="react,env">
        const { useState, useMemo, useEffect, useRef } = React;
        const IS_EMBED = document.documentElement.classList.contains('workflow-embed');

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) return (
                    <div className="p-10 text-rose-500 font-mono bg-brandNavy-955 min-h-screen">
                        <h1 className="text-2xl font-bold mb-4">React Compilation Error</h1>
                        <p className="bg-rose-950 p-4 rounded border border-rose-500/30 whitespace-pre-wrap">{this.state.error.toString()}</p>
                    </div>
                );
                return this.props.children;
            }
        }
        const WORKFLOW_APP = window.WorkflowTabs?.parseWorkflowAppFromSearch?.(window.location.search) || 'workflow';
        const IS_DIAGNOSIS_MODE = WORKFLOW_APP === 'diagnosis';
        const MG = () => window.ModGating || {};

        const Mod2LockedPanel = ({ profile, appLabel }) => {
            const reportHref = IS_EMBED ? '/admin/app/diagnosis-reports' : '/apps/delivery/diagnoses_report.html';
            const client = window.EngagementConfig?.getClientDisplayName?.(profile) || profile?.clientCompany || 'this workspace';
            return (
                <div className="flex flex-col items-center justify-center flex-1 min-h-[360px] p-10 text-center max-w-lg mx-auto">
                    <div className="w-14 h-14 rounded-full bg-brandAmber-500/10 border border-brandAmber-500/30 flex items-center justify-center text-brandAmber-400 text-2xl mb-4">🔒</div>
                    <h2 className="text-lg font-bold text-white mb-2">Module 2 locked</h2>
                    <p className="text-sm text-slate-400 leading-relaxed mb-6">
                        Complete the Business Leak Scan (Module 1) for <span className="text-slate-200 font-semibold">{client}</span> before editing {appLabel}.
                    </p>
                    <a href={reportHref} className="px-5 py-2.5 bg-brandTeal-500 hover:bg-brandTeal-400 text-brandNavy-955 text-xs font-bold uppercase tracking-wider rounded-lg">Open Leak Scan Report</a>
                    <p className="text-[10px] text-slate-500 mt-4">Mark Business Leak Scan complete after the Leak Scan Report is uploaded and synced to the portal. Mod 2 to-be workflows build on your Leak Scan findings — not the as-is maps from Mod 1.</p>
                </div>
            );
        };

        const DrawIoEmbed = ({ preset = 'bpmn', xml, onXmlChange, onSvgExport, height = 520, hideApplyButton = false, exportControllerRef }) => {
            const iframeRef = useRef(null);
            const readyRef = useRef(false);
            const configuredRef = useRef(false);
            const pendingXmlRef = useRef(xml);
            const exportWaitRef = useRef(null);
            const presetData = window.DiagramEditor?.getPreset(preset);
            const embedUrl = window.DiagramEditor?.getDrawioEmbedUrl({
                libs: presetData?.embedLibs || presetData?.configure?.defaultLibraries?.split(';')[0] || 'bpmn',
            }) || 'https://embed.diagrams.net/?embed=1&proto=json&configure=1&libraries=1&libs=bpmn';

            const postAction = (payload) => {
                iframeRef.current?.contentWindow?.postMessage(JSON.stringify(payload), '*');
            };

            const sendLoad = (diagramXml) => {
                postAction({
                    action: 'load',
                    xml: diagramXml || window.DiagramEditor?.BLANK_BPMN_XML || '',
                    autosave: 1,
                });
            };

            const maybeFinishExport = () => {
                const pending = exportWaitRef.current;
                if (!pending || !pending.gotXml || !pending.gotSvg) return;
                pending.resolve({ xml: pending.xml || '', svg: pending.svg || '' });
                exportWaitRef.current = null;
            };

            const applyDiagram = () => new Promise((resolve, reject) => {
                exportWaitRef.current = { resolve, reject, gotXml: false, gotSvg: false, xml: '', svg: '' };
                postAction({ action: 'export', format: 'xml', xml: true, spin: 'Saving…' });
                postAction({ action: 'export', format: 'xmlsvg', spin: 'Saving…' });
                setTimeout(() => {
                    if (!exportWaitRef.current) return;
                    exportWaitRef.current.reject(new Error('Diagram export timed out'));
                    exportWaitRef.current = null;
                }, 20000);
            });

            useEffect(() => {
                if (exportControllerRef) exportControllerRef.current = { applyDiagram };
            });

            useEffect(() => {
                pendingXmlRef.current = xml;
                if (readyRef.current && configuredRef.current) sendLoad(xml);
            }, [xml]);

            useEffect(() => {
                const handler = (evt) => {
                    if (!evt.data || typeof evt.data !== 'string') return;
                    let msg;
                    try { msg = JSON.parse(evt.data); } catch { return; }

                    if (msg.event === 'configure') {
                        configuredRef.current = true;
                        postAction({
                            action: 'configure',
                            config: presetData?.configure || window.DiagramEditor?.getPreset(preset)?.configure || {},
                        });
                    }
                    if (msg.event === 'init') {
                        readyRef.current = true;
                        sendLoad(pendingXmlRef.current);
                    }
                    if (msg.event === 'export') {
                        if (msg.format === 'xml' && msg.xml) {
                            if (onXmlChange) onXmlChange(msg.xml);
                            if (exportWaitRef.current) {
                                exportWaitRef.current.gotXml = true;
                                exportWaitRef.current.xml = msg.xml;
                            }
                        }
                        if ((msg.format === 'xmlsvg' || msg.format === 'svg') && msg.data) {
                            if (onSvgExport) onSvgExport(msg.data);
                            if (exportWaitRef.current) {
                                exportWaitRef.current.gotSvg = true;
                                exportWaitRef.current.svg = msg.data;
                            }
                        }
                        maybeFinishExport();
                    }
                    if (msg.event === 'autosave' && msg.xml && onXmlChange) onXmlChange(msg.xml);
                };
                window.addEventListener('message', handler);
                return () => window.removeEventListener('message', handler);
            }, [preset, onXmlChange, onSvgExport]);

            return (
                <div className="flex flex-col gap-3 h-full min-h-0">
                    {!hideApplyButton && (
                        <div className="flex flex-wrap gap-2 no-print shrink-0">
                            <button
                                type="button"
                                onClick={() => applyDiagram().catch(() => {})}
                                className="text-[10px] font-bold uppercase bg-brandTeal-500 hover:bg-brandTeal-600 text-brandNavy-955 px-3 py-1.5 rounded-lg transition-colors"
                            >
                                Apply Diagram
                            </button>
                        </div>
                    )}
                    <iframe
                        ref={iframeRef}
                        src={embedUrl}
                        className="w-full flex-1 min-h-[420px] border border-brandNavy-800 rounded-xl bg-white"
                        style={typeof height === 'number' ? { height } : height === '100%' ? { height: '100%' } : undefined}
                        title="draw.io BPMN editor"
                    />
                </div>
            );
        };

        const BpmnWorkflowStudio = ({ tabs, setTabs, activeTabId, setActiveTabId, addNewTab, closeTab, renameTab, showLeakagePanel, diagramExportRef, hideApplyButton = false }) => {
            const [editingTabId, setEditingTabId] = useState(null);
            const activeTab = tabs.find((t) => t.id === activeTabId) || tabs[0];
            const present = window.DiagramEditor?.normalizeWorkflowPresent(activeTab?.present) || { drawioXml: '', format: 'bpmn' };
            const isLegacy = present.format === 'legacy';

            const updatePresent = (patch) => {
                setTabs((prev) => prev.map((t) => (t.id === activeTabId ? { ...t, present: { ...window.DiagramEditor.normalizeWorkflowPresent(t.present), ...patch, format: 'bpmn' } } : t)));
            };

            const handleXmlChange = (drawioXml) => updatePresent({ drawioXml });
            const handleSvgExport = (svgCache) => updatePresent({ svgCache });

            const updateCellMeta = (cellId, field, value) => {
                setTabs((prev) => prev.map((t) => {
                    if (t.id !== activeTabId) return t;
                    const norm = window.DiagramEditor.normalizeWorkflowPresent(t.present);
                    const cellMeta = { ...(norm.cellMeta || {}), [cellId]: { ...(norm.cellMeta?.[cellId] || {}), [field]: value } };
                    return { ...t, present: { ...norm, cellMeta, format: norm.format === 'legacy' ? 'bpmn' : norm.format } };
                }));
            };

            const vm = window.DiagramEditor?.getWorkflowViewModel(activeTab?.present) || { tasks: [], lanes: [] };
            const leakageTasks = vm.tasks.filter((t) => t.type !== 'gateway' && t.type !== 'event');

            return (
                <div className="flex flex-col h-full min-h-0">
                    <div className="shrink-0 flex items-center gap-2 px-4 py-2 border-b border-brandNavy-800 bg-brandNavy-950 no-print overflow-x-auto">
                        {tabs.map((tab) => (
                            <div key={tab.id} className={`flex items-center gap-1 px-2 py-1 rounded-lg border max-w-[220px] ${tab.id === activeTabId ? 'border-brandTeal-500 bg-brandNavy-800' : 'border-brandNavy-800 bg-brandNavy-900'}`}>
                                {editingTabId === tab.id ? (
                                    <input
                                        autoFocus
                                        value={tab.name}
                                        onChange={(e) => renameTab(tab.id, e.target.value)}
                                        onBlur={() => setEditingTabId(null)}
                                        onKeyDown={(e) => { if (e.key === 'Enter') setEditingTabId(null); if (e.key === 'Escape') setEditingTabId(null); }}
                                        className="bg-brandNavy-950 border border-brandTeal-500/50 px-1.5 py-0.5 text-[10px] font-bold text-white outline-none w-full min-w-[6rem]"
                                    />
                                ) : (
                                    <button
                                        type="button"
                                        onClick={() => setActiveTabId(tab.id)}
                                        onDoubleClick={(e) => { e.preventDefault(); setEditingTabId(tab.id); }}
                                        className="text-[10px] font-bold uppercase text-slate-200 truncate max-w-[160px]"
                                        title="Double-click to rename"
                                    >
                                        {tab.name}
                                    </button>
                                )}
                                {tabs.length > 1 && (
                                    <button type="button" aria-label="Close tab" onClick={(e) => closeTab(e, tab.id)} className="text-slate-500 hover:text-rose-400 shrink-0"><Icons.Close /></button>
                                )}
                            </div>
                        ))}
                        <button type="button" onClick={addNewTab} className="text-[10px] font-bold uppercase text-brandTeal-400 px-2 py-1 border border-brandTeal-500/30 rounded-lg shrink-0">+ Tab</button>
                        <span className="text-[9px] text-slate-500 font-mono uppercase tracking-wider ml-1 hidden sm:inline">Double-click tab to rename</span>
                    </div>

                    {isLegacy && (
                        <div className="shrink-0 mx-4 mt-3 p-3 rounded-lg border border-amber-500/40 bg-amber-500/10 text-[11px] text-amber-100 no-print">
                            Legacy canvas detected. Build the BPMN 2.0 diagram below — saving replaces the old format with draw.io standard shapes.
                        </div>
                    )}

                    <div className="flex-1 min-h-0 p-4">
                        <DrawIoEmbed
                            preset="bpmn"
                            xml={isLegacy ? window.DiagramEditor.BLANK_BPMN_XML : present.drawioXml}
                            onXmlChange={handleXmlChange}
                            onSvgExport={handleSvgExport}
                            height="100%"
                            hideApplyButton={hideApplyButton}
                            exportControllerRef={diagramExportRef}
                        />
                    </div>

                    {showLeakagePanel && leakageTasks.length > 0 && (
                        <details className="shrink-0 border-t border-brandNavy-800 bg-brandNavy-900 no-print group">
                            <summary className="cursor-pointer list-none p-4 flex items-center justify-between gap-3 hover:bg-brandNavy-800/40 transition-colors">
                                <span className="flex items-center gap-2 min-w-0">
                                    <span className="text-slate-500 group-open:rotate-90 transition-transform inline-block shrink-0">▸</span>
                                    <span className="text-[10px] font-mono uppercase tracking-wider text-rose-400 font-bold truncate">Task Leakage (Mod 1)</span>
                                </span>
                                <span className="text-[9px] font-mono text-slate-500 uppercase tracking-wider shrink-0">{leakageTasks.length} task{leakageTasks.length === 1 ? '' : 's'}</span>
                            </summary>
                            <div className="px-4 pb-4 max-h-56 overflow-y-auto border-t border-brandNavy-800/50">
                                <div className="grid grid-cols-4 gap-2 items-end text-[10px] font-mono uppercase tracking-wider text-slate-400 font-bold mb-2 px-0.5 pt-3">
                                    <span>BPMN Task</span>
                                    <span className="text-rose-400">Delay (mins)</span>
                                    <span>Staff Count</span>
                                    <span>Hourly Rate ($)</span>
                                </div>
                                <div className="space-y-2">
                                    {leakageTasks.map((task) => (
                                        <div key={task.id} className="grid grid-cols-4 gap-2 items-center text-[10px]">
                                            <div className="col-span-1 font-semibold text-slate-200 truncate" title={task.label}>{task.label}</div>
                                            <div>
                                                <label className="sr-only">Delay minutes for {task.label}</label>
                                                <input type="number" min="0" aria-label={`Delay minutes for ${task.label}`} value={task.delayMinutes || 0} onChange={(e) => updateCellMeta(task.id, 'delayMinutes', Number(e.target.value))} className="w-full bg-brandNavy-950 border border-rose-500/30 rounded px-2 py-1 text-rose-300 font-mono" />
                                            </div>
                                            <div>
                                                <label className="sr-only">Staff count for {task.label}</label>
                                                <input type="number" min="0" aria-label={`Staff count for ${task.label}`} value={task.affectedStaff || 1} onChange={(e) => updateCellMeta(task.id, 'affectedStaff', Number(e.target.value))} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded px-2 py-1 text-slate-200 font-mono" />
                                            </div>
                                            <div>
                                                <label className="sr-only">Hourly rate for {task.label}</label>
                                                <input type="number" min="0" aria-label={`Hourly rate for ${task.label}`} value={task.hourlyRate || 150} onChange={(e) => updateCellMeta(task.id, 'hourlyRate', Number(e.target.value))} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded px-2 py-1 text-slate-200 font-mono" />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </details>
                    )}
                </div>
            );
        };

        const Icons = {
            Layout: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>,
            Users: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path strokeLinecap="round" strokeLinejoin="round" d="M23 21v-2a4 4 0 0 0-3-3.87"/><path strokeLinecap="round" strokeLinejoin="round" d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            Cloud: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>,
            AlertCircle: () => <svg className="w-4 h-4 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Process: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="9"/></svg>,
            Approval: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 3 21 12 12 21 3 12 12 3"/></svg>,
            Milestone: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 22 12 12 22 2 12 12 2"/></svg>,
            TextShape: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>,
            Move: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M19 9l3 3-3 3M9 19l3 3-3 3M2 12h20M12 2v20"/></svg>,
            Link: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>,
            Close: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>,
            DragHandle: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M8 9h8M8 15h8"/></svg>,
            ZoomIn: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>,
            ZoomOut: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>,
            Target: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="2"/></svg>,
            Grid: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>,
            Lane: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/></svg>,
            Phase: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h12l4 8-4 8H4Z"/></svg>,
            Undo: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>,
            Redo: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/></svg>,
            Plus: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Download: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Upload: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
            Sitemap: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="3" width="6" height="4" rx="1"/><rect x="3" y="14" width="6" height="4" rx="1"/><rect x="15" y="14" width="6" height="4" rx="1"/><path d="M12 7v4m-6 0h12v3M12 11v3"/></svg>,
            Lightning: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z"/></svg>
        };

        // --- SUITE SUB-COMPONENTS ---
        const WorkflowTabPicker = ({ tabs, activeTabId, setActiveTabId, label = 'Workflow tab' }) => (
            <div className="max-w-md">
                <label className="text-[10px] font-mono text-slate-400 uppercase tracking-widest font-bold mb-1 block">{label}</label>
                <select
                    value={activeTabId}
                    onChange={(e) => setActiveTabId(e.target.value)}
                    className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-xs font-semibold text-slate-200 outline-none focus:border-brandTeal-500"
                >
                    {(tabs || []).map((tab) => (
                        <option key={tab.id} value={tab.id}>{tab.name}</option>
                    ))}
                </select>
            </div>
        );

        const RaciBuilder = ({ tabs, activeTabId, setActiveTabId, activeTab, raciAssignments, setRaciAssignments }) => {
            const vm = window.DiagramEditor?.getWorkflowViewModel(activeTab?.present) || { tasks: [], lanes: [] };
            const raciActivities = vm.tasks.filter((t) => t.type !== 'gateway' && t.type !== 'event');
            const roles = vm.lanes.length ? vm.lanes : [{ id: 'lane-default', label: 'Responsible Role', owner: '' }];

            const handleRaciChange = (actId, roleId, val) => {
                const copy = { ...raciAssignments };
                if (!copy[actId]) copy[actId] = {};
                copy[actId][roleId] = val;
                setRaciAssignments(copy);
            };

            return (
                <div className="space-y-8 animate-fade-in max-w-6xl mx-auto">
                    <div>
                        <h2 className="text-2xl font-bold text-white mb-2">Role Architecture & RACI Grid</h2>
                        <p className="text-sm text-slate-400 max-w-3xl leading-relaxed">Assign RACI boundaries across BPMN tasks. Swimlanes from the draw.io diagram become role columns.</p>
                    </div>

                    <WorkflowTabPicker tabs={tabs} activeTabId={activeTabId} setActiveTabId={setActiveTabId} label={IS_DIAGNOSIS_MODE ? 'As-is workflow tab' : 'To-be workflow tab'} />

                    <div className="glass-panel rounded-2xl p-6 shadow-xl overflow-x-auto bg-brandNavy-900 border border-brandNavy-800">
                        <h3 className="text-sm font-bold uppercase tracking-wider text-white mb-4 border-b border-brandNavy-700 pb-2">Responsibility Intersections: {activeTab.name}</h3>
                        <table className="w-full text-left border-collapse text-xs min-w-[600px]">
                            <thead>
                                <tr className="border-b border-brandNavy-700">
                                    <th className="pb-3 px-3 text-slate-400 font-mono uppercase tracking-wider w-1/4">Milestone Activity</th>
                                    {roles.map(r => (
                                        <th key={r.id} className="pb-3 px-2 text-center text-slate-200">
                                            <div className="font-bold">{r.label.replace('\n', ' ')}</div>
                                            <div className="text-[9px] text-brandTeal-400/80 font-mono mt-0.5">{r.owner || 'Unassigned'}</div>
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-brandNavy-800/50">
                                {raciActivities.map(act => (
                                    <tr key={act.id} className="hover:bg-brandNavy-800/30 transition-colors">
                                        <td className="py-3 px-3 font-semibold text-slate-300">{act.label}</td>
                                        {roles.map(role => {
                                            const assign = raciAssignments[act.id]?.[role.id] || '';
                                            let badgeClass = "border border-brandNavy-700 text-slate-500 bg-brandNavy-950";
                                            if (assign === 'R') badgeClass = "bg-emerald-500/20 border border-emerald-500/50 text-emerald-400 font-bold";
                                            if (assign === 'A') badgeClass = "bg-brandAmber-500/20 border border-brandAmber-500/50 text-brandAmber-400 font-bold";
                                            if (assign === 'C') badgeClass = "bg-purple-500/20 border border-purple-500/50 text-purple-400 font-bold";
                                            if (assign === 'I') badgeClass = "bg-slate-500/20 border border-slate-500/50 text-slate-300 font-bold";

                                            return (
                                                <td key={role.id} className="py-3 px-2 text-center">
                                                    <select value={assign} onChange={(e) => handleRaciChange(act.id, role.id, e.target.value)} className={`appearance-none w-8 h-8 text-center rounded-lg focus:outline-none cursor-pointer ${badgeClass}`}>
                                                        <option value="">-</option><option value="R">R</option><option value="A">A</option><option value="C">C</option><option value="I">I</option>
                                                    </select>
                                                </td>
                                            );
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isAuthed, setIsAuthed] = useState(false);
            const [authError, setAuthError] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);
            
            const [workbookProfiles, setWorkbookProfiles] = useState([]);
            const [activeProfileId, setActiveProfileId] = useState("");

            const [activeNav, setActiveNav] = useState('flowcharts');
            
            const createEmptyTab = (id, name) => ({
                id,
                name,
                past: [],
                present: window.DiagramEditor?.createEmptyWorkflowPresent?.() || { drawioXml: '', svgCache: '', cellMeta: {}, format: 'bpmn' },
                future: [],
            });

            const [workflowInit] = useState(() => {
                const id = 'tab-' + Date.now();
                return {
                    tabs: [createEmptyTab(id, 'Diagram 1')],
                    activeTabId: id,
                };
            });
            const [tabs, setTabs] = useState(workflowInit.tabs);
            const [activeTabId, setActiveTabId] = useState(workflowInit.activeTabId);
            const [raciAssignments, setRaciAssignments] = useState({});
            const diagramExportRef = useRef(null);
            const autoSaveReadyRef = useRef(false);
            const autoSaveTimerRef = useRef(null);
            const applyDiagramAndSaveRef = useRef(null);

            // 1) Auth Setup
            useEffect(() => {
                let checkInterval = setInterval(() => {
                    if (window.firebaseAuth && window.signInAnonymously) {
                        clearInterval(checkInterval);
                        const initAuth = async () => {
                            try {
                                if (window.initialAuthToken) await window.signInWithCustomToken(window.firebaseAuth, window.initialAuthToken); 
                                else await window.kolthoffStaffReady 
                            } catch (e) { setAuthError(e.message || "Referrer restricted"); }
                        };
                        initAuth();
                        const unsubscribe = window.onAuthStateChanged(window.firebaseAuth, (currentUser) => {
                            setUser(currentUser);
                            if (currentUser) { setIsAuthed(true); setAuthError(null); } else setIsAuthed(false);
                        });
                        return () => unsubscribe();
                    }
                }, 50);
                return () => clearInterval(checkInterval);
            }, []);

            // 2) Data Fetching + deep-link profile from ?profile=
            useEffect(() => {
                if (!user) return;
                const profilesRef = window.collection(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'workbook_profiles');
                const unsubscribe = window.onSnapshot(profilesRef, (snapshot) => {
                    const fetchedProfiles = [];
                    snapshot.forEach(doc => { fetchedProfiles.push({ id: doc.id, ...doc.data() }); });
                    setWorkbookProfiles(fetchedProfiles);
                    setActiveProfileId(current => {
                        const params = new URLSearchParams(window.location.search);
                        const linked = params.get('profile');
                        if (linked && fetchedProfiles.find(p => p.id === linked)) return linked;
                        if (!fetchedProfiles.find(p => p.id === current) && fetchedProfiles.length > 0) return fetchedProfiles[0].id;
                        return current;
                    });
                }, (err) => console.error("Firestore Snapshot Sync Error:", err));
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                autoSaveReadyRef.current = false;
            }, [activeProfileId]);

            useEffect(() => {
                const profile = workbookProfiles.find(p => p.id === activeProfileId);
                const WT = window.WorkflowTabs;
                if (!profile) return;
                const resolved = WT?.resolveEditorTabs?.(profile, WORKFLOW_APP) || WT?.resolveWorkflowTabs(profile, WORKFLOW_APP);
                if (resolved?.tabs?.length) {
                    setTabs(WT.hydrateTabs(resolved.tabs));
                    setActiveTabId(resolved.activeTabId || resolved.tabs[0].id);
                } else {
                    const id = 'tab-' + Date.now();
                    setTabs([createEmptyTab(id, IS_DIAGNOSIS_MODE ? 'As-Is Diagram 1' : 'Diagram 1')]);
                    setActiveTabId(id);
                }
                setRaciAssignments(profile.raciAssignments || {});
                autoSaveReadyRef.current = false;
                setTimeout(() => { autoSaveReadyRef.current = true; }, 1200);
            }, [activeProfileId, workbookProfiles]);

            const triggerToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 3000); };

            const handleSaveToCloud = async ({ silent = false } = {}) => {
                if (authError) {
                    if (!silent) triggerToast("❌ Sync Disabled (GCP Key Issue)");
                    return false;
                }
                if (!isAuthed || !activeProfileId) return false;
                if (mod2Locked) {
                    if (!silent) triggerToast('❌ Complete Mod 1 before saving Mod 2 workflows');
                    return false;
                }
                setIsSaving(true);
                try {
                    const profileRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'workbook_profiles', activeProfileId);
                    const profileSnap = await window.getDoc(profileRef);
                    const existing = profileSnap.exists() ? profileSnap.data() : {};
                    const tabsPayload = window.WorkflowTabs.buildWorkflowTabsPayload(WORKFLOW_APP, tabs, activeTabId, existing);
                    await window.setDoc(profileRef, { ...tabsPayload, raciAssignments }, { merge: true });

                    if (IS_DIAGNOSIS_MODE) {
                        let totalAnnual = 0;
                        tabs.forEach((tab) => {
                            const vm = window.DiagramEditor?.getWorkflowViewModel(tab.present) || { tasks: [] };
                            const tax = window.DiagramEditor?.computeTabChaosTax?.(vm.tasks) || { annual: 0 };
                            totalAnnual += tax.annual || 0;
                        });
                        const EC = window.EngagementConfig || {};
                        const chaosTax = EC.buildChaosTaxPayload
                            ? EC.buildChaosTaxPayload('diagnosis', totalAnnual, {})
                            : { source: 'diagnosis', value: totalAnnual, inputs: {} };
                        await window.setDoc(profileRef, {
                            annualOperationalLeakage: totalAnnual,
                            chaosTax,
                        }, { merge: true });
                        if (window.PortalSync?.syncProfileToPortalIfExists) {
                            try {
                                const profileForSync = {
                                    ...existing,
                                    ...tabsPayload,
                                    raciAssignments,
                                    subSaaS: existing.subSaaS,
                                    chaosTax,
                                    annualOperationalLeakage: totalAnnual,
                                    id: activeProfileId,
                                };
                                await window.PortalSync.syncProfileToPortalIfExists(profileForSync, { syncIntakeAssets: false });
                            } catch (portalErr) {
                                console.warn('Portal sync skipped:', portalErr);
                            }
                        }
                    }

                    if (!IS_DIAGNOSIS_MODE && window.SopSync) {
                        const profileForSop = { ...existing, ...tabsPayload, raciAssignments };
                        const policyRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'policy_documents', activeProfileId);
                        const policySnap = await window.getDoc(policyRef);
                        const policyData = policySnap.exists() ? policySnap.data() : {};
                        const sops = window.SopSync.buildSopsFromWorkflowTabs(tabs, profileForSop);
                        if (sops.length) {
                            await window.setDoc(policyRef, window.SopSync.mergeSopsIntoPolicyData(policyData, sops), { merge: true });
                            if (!silent) triggerToast(`💾 Saved + auto-synced ${sops.length} SOP(s) to Policy Studio!`);
                        } else if (!silent) {
                            triggerToast('💾 Saved to Cloud!');
                        }
                    } else if (!silent) {
                        triggerToast(IS_DIAGNOSIS_MODE ? '💾 Saved as-is workflows (Mod 1)!' : '💾 Saved to Cloud!');
                    }
                    return true;
                } catch (e) {
                    if (!silent) triggerToast("❌ Error saving.");
                    return false;
                } finally {
                    setIsSaving(false);
                }
            };

            const applyDiagramAndSave = async ({ silent = false, applyDiagram = true } = {}) => {
                if (applyDiagram) await diagramExportRef.current?.applyDiagram?.();
                return handleSaveToCloud({ silent });
            };

            applyDiagramAndSaveRef.current = applyDiagramAndSave;

            useEffect(() => {
                if (!IS_EMBED || !IS_DIAGNOSIS_MODE) return;
                const handler = async (evt) => {
                    if (!evt.data || typeof evt.data !== 'string') return;
                    let msg;
                    try { msg = JSON.parse(evt.data); } catch { return; }
                    if (msg?.type !== 'kolthoff-workflow-save-request') return;
                    const respond = (ok, error) => {
                        window.parent.postMessage(JSON.stringify({
                            type: 'kolthoff-workflow-save-result',
                            requestId: msg.requestId,
                            ok,
                            error: error || null,
                        }), '*');
                    };
                    try {
                        await applyDiagramAndSaveRef.current?.({ silent: true, applyDiagram: msg.applyDiagram !== false });
                        respond(true);
                    } catch (e) {
                        respond(false, e?.message || 'Workflow save failed');
                    }
                };
                window.addEventListener('message', handler);
                return () => window.removeEventListener('message', handler);
            }, []);

            useEffect(() => {
                if (!IS_EMBED || !IS_DIAGNOSIS_MODE) return;
                if (!autoSaveReadyRef.current || authError || !isAuthed || !activeProfileId || isSaving) return;

                clearTimeout(autoSaveTimerRef.current);
                autoSaveTimerRef.current = setTimeout(() => {
                    applyDiagramAndSave({ silent: true }).catch(() => {});
                }, 5000);

                return () => clearTimeout(autoSaveTimerRef.current);
            }, [tabs, activeTabId, raciAssignments, authError, isAuthed, activeProfileId, isSaving]);

            const profileLabel = (p) => window.EngagementConfig?.getClientDisplayName?.(p) || p.clientCompany || 'Untitled Company';

            const activeProfile = useMemo(
                () => workbookProfiles.find((p) => p.id === activeProfileId) || null,
                [workbookProfiles, activeProfileId],
            );
            const mod2Locked = !IS_DIAGNOSIS_MODE && !MG().isMod1Complete?.(activeProfile);

            const activeTab = tabs.find(t => t.id === activeTabId) || tabs[0];

            return (
                <div className="flex h-full min-h-0 overflow-hidden bg-brandNavy-955 font-sans">
                    {toastMessage && (<div role="alert" className="fixed bottom-6 right-6 z-[100] bg-brandTeal-600 text-white text-xs font-bold px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 animate-bounce"><span>✓</span>{toastMessage}</div>)}

                    {!IS_EMBED && (
                    <aside className="w-[300px] bg-brandNavy-900 border-r border-brandNavy-800 flex flex-col shrink-0 no-print z-20 shadow-2xl">
                        <div className="p-6 border-b border-brandNavy-800 flex justify-between items-center group">
                            <div><h1 className="text-sm font-extrabold tracking-widest text-brandTeal-500 uppercase leading-none mb-1">Kolthoff Consulting</h1><span className="text-[10px] text-white font-bold uppercase tracking-widest">{IS_DIAGNOSIS_MODE ? 'Mod1: As-Is Workflow' : 'Mod2: Workflow Builder'}</span></div>
                            <div className="relative">
                                <div className={`w-2 h-2 rounded-full cursor-help ${isAuthed ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : (authError ? 'bg-rose-500 shadow-[0_0_8px_#f43f5e]' : 'bg-amber-500 animate-pulse')}`}></div>
                                {authError && <div className="absolute right-0 top-full mt-2 w-48 bg-rose-950/90 border border-rose-500/50 p-2 rounded text-[9px] text-rose-200 hidden group-hover:block z-50">Sync Disabled (Offline)</div>}
                            </div>
                        </div>

                        <div className="p-4 border-b border-brandNavy-800 bg-brandNavy-950">
                            <label className="text-[10px] font-mono text-slate-400 uppercase tracking-widest font-bold mb-1.5 block">Active Workspace</label>
                            <select value={activeProfileId} onChange={(e) => setActiveProfileId(e.target.value)} className="w-full bg-brandNavy-900 border border-brandNavy-700 rounded p-2 text-xs font-semibold text-slate-200 outline-none focus:border-brandTeal-500" disabled={!!authError}>
                                {workbookProfiles.length === 0 && <option value="">{authError ? "Local Session Default" : "Loading..."}</option>}
                                {workbookProfiles.map(p => <option key={p.id} value={p.id}>{profileLabel(p)}</option>)}
                            </select>
                        </div>
                        
                        <nav className="p-4 flex-1 overflow-y-auto space-y-2">
                            <p className="text-[10px] font-mono text-slate-400 uppercase tracking-widest font-bold mb-3 px-1">Editors & Builders</p>
                            <button onClick={() => setActiveNav('flowcharts')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'flowcharts' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Layout /> 1. BPMN Workflow</button>
                            <button onClick={() => setActiveNav('raci')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'raci' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Users /> 2. RACI Architecture</button>
                        </nav>

                        <div className="p-4 border-t border-brandNavy-800 bg-brandNavy-950">
                            <button onClick={() => handleSaveToCloud()} disabled={isSaving || !!authError} className={`w-full flex justify-center items-center gap-2 py-3 rounded text-xs font-bold transition-all ${authError ? 'bg-brandNavy-850 text-slate-500 border border-brandNavy-700' : 'bg-brandNavy-800 hover:bg-brandNavy-700 text-slate-200'}`}>
                                {authError ? <Icons.AlertCircle /> : <Icons.Cloud />} {isSaving ? "Syncing..." : (authError ? "Offline Mode" : "Sync to Cloud")}
                            </button>
                        </div>
                    </aside>
                    )}

                    <main className="flex-1 overflow-hidden relative z-10 flex flex-col min-w-0">
                        {IS_EMBED && !IS_DIAGNOSIS_MODE && (
                            <div className="shrink-0 bg-brandNavy-900/95 border-b border-brandNavy-800 px-4 py-2 flex justify-between items-center gap-2 no-print">
                                <span className="text-[10px] font-mono uppercase tracking-wider text-slate-400">
                                    Mod 2 · To-be workflow (workflowBuilder)
                                </span>
                                <button type="button" onClick={() => handleSaveToCloud()} disabled={isSaving || !!authError} className={`px-3 py-1.5 rounded text-[10px] font-bold uppercase tracking-wider ${authError ? 'bg-brandNavy-850 text-slate-500' : 'bg-brandTeal-500 hover:bg-brandTeal-600 text-brandNavy-955'}`}>
                                    {isSaving ? 'Syncing…' : 'Sync Diagram'}
                                </button>
                            </div>
                        )}
                        {activeNav !== 'flowcharts' && (
                            <header data-app-chrome className="shrink-0 bg-brandNavy-955/80 backdrop-blur-md border-b border-brandNavy-800 px-8 py-4 flex justify-between items-center no-print">
                                <h2 className="text-sm font-bold text-brandTeal-400 font-mono tracking-widest uppercase">
                                    {activeNav === 'raci' ? '2. Accountability' : 'BPMN 2.0 Workflow Studio'}
                                </h2>
                            </header>
                        )}

                        <div className={`flex-1 min-h-0 ${activeNav === 'flowcharts' ? 'overflow-hidden' : 'overflow-y-auto p-8 max-w-[1600px] mx-auto pb-24 w-full'}`}>
                            {mod2Locked ? (
                                <Mod2LockedPanel profile={activeProfile} appLabel="to-be workflows (Mod 2)" />
                            ) : (
                            <>
                            {activeNav === 'flowcharts' && (
                                <BpmnWorkflowStudio
                                    tabs={tabs}
                                    setTabs={setTabs}
                                    activeTabId={activeTabId}
                                    setActiveTabId={setActiveTabId}
                                    addNewTab={() => { const id = 'tab-' + Date.now(); setTabs([...tabs, createEmptyTab(id, IS_DIAGNOSIS_MODE ? 'As-Is Process' : 'To-Be Process')]); setActiveTabId(id); }}
                                    closeTab={(e, id) => { e.stopPropagation(); if (tabs.length === 1) return; const newT = tabs.filter(t => t.id !== id); setTabs(newT); if (activeTabId === id) setActiveTabId(newT[0].id); }}
                                    renameTab={(id, name) => setTabs(tabs.map(t => t.id === id ? { ...t, name } : t))}
                                    showLeakagePanel={IS_DIAGNOSIS_MODE}
                                    diagramExportRef={diagramExportRef}
                                    hideApplyButton={IS_EMBED && IS_DIAGNOSIS_MODE}
                                />
                            )}
                            {activeNav === 'raci' && (
                                <RaciBuilder
                                    tabs={tabs}
                                    activeTabId={activeTabId}
                                    setActiveTabId={setActiveTabId}
                                    activeTab={activeTab}
                                    raciAssignments={raciAssignments}
                                    setRaciAssignments={setRaciAssignments}
                                />
                            )}
                            </>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
