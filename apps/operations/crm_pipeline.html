    <script type="text/babel">

        const PRODUCT = window.ProductConfig?.getProductConfig?.() || { branding: { name: 'Studio', accent: 'North' }, crmSubtitle: 'Track leads from inquiry to signed deal', crmBadge: 'Sales' };

            const isAgencyOps = PRODUCT.id === 'agency-ops-starter' || PRODUCT.starterMode;
            const companyName = [PRODUCT.branding?.name, PRODUCT.branding?.accent].filter(Boolean).join(' ').trim()
                || (isAgencyOps ? 'Studio North' : 'Kolthoff Consulting');
            return {
                companyName,

                primaryColor: isAgencyOps ? '#4f46e5' : '#14B8A6',
                logoUrl: '',

        })();

        const KolthoffHeaderLogo = () => (
            <div className="w-9 h-9 rounded-xl bg-brandTeal-500/10 border border-brandTeal-500/30 flex items-center justify-center text-brandTeal-400 font-bold shadow-neon-teal">
                <svg className="w-5 h-5 stroke-current text-brandTeal-500" viewBox="0 0 100 100" fill="none" aria-hidden="true">
                    <path d="M50 12 C72 16 84 22 84 22 V54 C84 72 70 85 50 90 C30 85 16 72 16 54 V22 C16 22 28 16 50 12 Z" strokeWidth="6" strokeLinejoin="round" />
                    <path d="M36 50 L46 60 L66 36" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round" />

        const renderHeaderLogo = (brand) => {
            if (!STARTER_UI) return <KolthoffHeaderLogo />;
            if (brand.logoUrl) {
                return <img src={brand.logoUrl} alt="" className="h-9 w-auto max-w-[120px] object-contain" />;

            return (
                <div className="w-9 h-9 rounded-xl flex items-center justify-center text-white font-bold text-sm border" style={{ backgroundColor: brand.primaryColor, borderColor: `${brand.primaryColor}66` }}>
                    {(brand.companyName || 'A').charAt(0)}

        };

        const renderHeaderTitle = (brand) => {
            if (!STARTER_UI) {
                return (
                    <>
                        {PRODUCT.branding?.name}
                        {PRODUCT.branding?.accent ? <span className="text-brandTeal-500"> {PRODUCT.branding.accent}</span> : null}
                    </>
                );
            }
            const d = window.TenantBranding?.splitDisplay?.(brand.companyName) || { line1: brand.companyName, line2: '' };
            return <>{d.line1}{d.line2 ? <span style={{ color: brand.primaryColor }}> {d.line2}</span> : null}</>;
        };

        // SEED DATA
        const initialDeals = [
            { id: "KC-2026-SSL888", leadName: "Sam Koo", company: "SSL 888 Trading Inc.", titleRole: "President", email: "sam.koo@ssl888.com", mobile: "+63 917 123 4567", contactInfo: "facebook", leadSource: "Warm Referral", pipelineStatus: "Proposal", estValue: 91350, nextAction: "on Hold", followUpDate: "", notes: "MOD 3 focus — Lark approval forms & team training", status: "Active" },
            { id: "KC-2026-GAJA", leadName: "Terence Lim", company: "Gaja Kitchen Stories Inc.", titleRole: "President", email: "terence@gajakitchen.ph", mobile: "+63 918 987 6543", contactInfo: "whatsapp", leadSource: "Warm Referral", pipelineStatus: "Proposal", estValue: 68971, nextAction: "on Hold", followUpDate: "", notes: "MOD 1+2 after merger timing clears", status: "Active" },
            { id: "KC-2026-SPORTS", leadName: "Andre Uy", company: "Sportsplus", titleRole: "President", email: "", mobile: "", contactInfo: "whatsapp", leadSource: "Warm Referral", pipelineStatus: "Lead / Prospect", estValue: 0, nextAction: "schedule follow up", followUpDate: "", notes: "Remind him about operational role and specific workflow constraints to solve", status: "Active" },
            { id: "KC-2026-LIGA", leadName: "Dennis Berger", company: "LigaConnect", titleRole: "Founder", email: "d.berger@ligaconnect.com", mobile: "", contactInfo: "facebook", leadSource: "Cold Outreach", pipelineStatus: "Lead / Prospect", estValue: 0, nextAction: "on hold", followUpDate: "", notes: "Building grassroots sports communities in Manila. High strategic partner value.", status: "Active" },
            { id: "KC-2026-GTS", leadName: "Gian Joaquin", company: "Good Transport Solutions Inc.", titleRole: "Operations Head", email: "", mobile: "", contactInfo: "linkedin", leadSource: "Linkedin Content", pipelineStatus: "Meeting", estValue: 40375, nextAction: "Meeting on Monday", followUpDate: "2026-06-22", notes: "Business Leak Scan scoping call", status: "Active" },
            { id: "KC-2026-FINCOM", leadName: "Patt & Justin", company: "FinCom Asia", titleRole: "", email: "", mobile: "", contactInfo: "whatsapp", leadSource: "Warm Referral", pipelineStatus: "Meeting", estValue: 40375, nextAction: "Reminder on Monday", followUpDate: "2026-06-22", notes: "Exploratory leak scan + workspace demo", status: "Active" },
            { id: "KC-2026-TELE", leadName: "Alexander Gendrano", company: "Telecom Corp", titleRole: "Director", email: "", mobile: "", contactInfo: "linkedin", leadSource: "Linkedin Content", pipelineStatus: "Closed Won/Lost", estValue: 120000, nextAction: "Contract Executed", followUpDate: "2026-06-19", notes: "Strategic consultation partnership signed and initialized successfully.", status: "Won" },
            { id: "KC-2026-MINESKI", leadName: "Dar Cayabyab", company: "Mineski PH", titleRole: "Country Manager", email: "", mobile: "", contactInfo: "whatsapp", leadSource: "Warm Referral", pipelineStatus: "Closed Won/Lost", estValue: 40375, nextAction: "Lost to competitor pricing", followUpDate: "", notes: "Lost at MOD 1 price point — built internal workflow tool instead", status: "Lost" }
        ];

        const initialContacts = [
            { id: "contact-1", name: "Emman Guerrero", titleRole: "Head of Legal", company: "Freelance / Corp", contactInfo: "facebook", contacted: true, label: "medium", nextAction: "pending feedback", note: "connector and strategic partner?" },
            { id: "contact-2", name: "Tony Josue", titleRole: "Sales Consultant", company: "Independent", contactInfo: "whatsapp", contacted: true, label: "hot", nextAction: "meet monday", note: "connector and collab" },
            { id: "contact-3", name: "Dr. Frederick Gian Carlo Joaquin", titleRole: "Head of Operations", company: "Good Transport Solutions Inc.", contactInfo: "linkedin", contacted: true, label: "hot", nextAction: "schedule meeting", note: "business process review" },
            { id: "contact-4", name: "Benson Te", titleRole: "CEO", company: "WP / Gaming", contactInfo: "linkedin", contacted: true, label: "medium", nextAction: "schedule meeting", note: "connector and Marketing Agent" },
            { id: "contact-5", name: "Mark Navarro", titleRole: "CEO", company: "Player Two", contactInfo: "facebook", contacted: true, label: "medium", nextAction: "schedule meeting", note: "present service at his business chapter" }
        ];

        const initialPartners = [
            { id: "partner-1", name: "Anne Kolthoff", role: "Partner", businessProposal: "Education Center", investmentBudget: 600000, phase: "Discover", nextAction: "pending inquiry to Komun", note: "" },
            { id: "partner-2", name: "Erwin Yaco", role: "Partner", businessProposal: "MSP", investmentBudget: 100000, phase: "Appraise", nextAction: "define SOW for MSP", note: "" },
            { id: "partner-3", name: "Reah Molina", role: "Partner", businessProposal: "Cafe Shop", investmentBudget: 900000, phase: "Appraise", nextAction: "location research", note: "" }
        ];

        const pipelineStages = ["Lead / Prospect", "Meeting", "Proposal", "Negotiation", "Closed Won/Lost"];
        const todayStr = "2026-06-19"; // System mock date context

        function App() {
            // FIREBASE CLOUD STATE
            const [isAuthed, setIsAuthed] = useState(false);
            const [authErrorDetails, setAuthErrorDetails] = useState(null);
            const [deals, setDeals] = useState([]);
            const [contacts, setContacts] = useState([]);
            const [partners, setPartners] = useState([]);
            const [plannerProfiles, setPlannerProfiles] = useState([]);
            const [brand, setBrand] = useState(defaultBrand);

            useEffect(() => {
                if (!window.TenantBranding?.subscribe) return undefined;
                return window.TenantBranding.subscribe(setBrand);
            }, []);

            // PIPELINE PRESENTATION MODULES
            const [viewMode, setViewMode] = useState("board"); // "board" | "list" | "calendar"
            const [activeTab, setActiveTab] = useState("deals");
            const [searchQuery, setSearchQuery] = useState("");
            const [sourceFilter, setSourceFilter] = useState("All");
            const [statusFilter, setStatusFilter] = useState("Active");
            const [activityFilter, setActivityFilter] = useState("All");
            
            // CALENDAR SPECIFIC STATE
            const [calendarDate, setCalendarDate] = useState(new Date(`${todayStr}T00:00:00`));
            
            // MODAL STATES
            const [isDealModalOpen, setIsDealModalOpen] = useState(false);
            const [isContactModalOpen, setIsContactModalOpen] = useState(false);
            const [isPartnerModalOpen, setIsPartnerModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null); 
            const [deleteConfirm, setDeleteConfirm] = useState(null); 
            const [showCelebration, setShowCelebration] = useState(false);
            const [celebrationDetails, setCelebrationDetails] = useState({ name: "", value: "" });
            const [shareModalOpen, setShareModalOpen] = useState(false);
            const [shareToken, setShareToken] = useState(() => localStorage.getItem('kolthoff_crm_share_token') || '');
            const [shareEnabled, setShareEnabled] = useState(false);
            const [shareBusy, setShareBusy] = useState(false);
            const [shareCopyHint, setShareCopyHint] = useState('');
            const isDraggingDeal = useRef(false);
            const shareStorageKey = 'kolthoff_crm_share_token';

            // 1. INITIALIZE FIREBASE AUTHENTICATION
            useEffect(() => {
                if (window.FirebaseErrors?.isFileProtocol?.()) {
                    setAuthErrorDetails('auth/requests-from-referer-null-are-blocked');
                }
            }, []);

            useEffect(() => {
                let cancelled = false;
                let checkInterval;
                const timeout = setTimeout(() => {
                    if (cancelled) return;
                    clearInterval(checkInterval);
                    if (!window.firebaseAuth || !window.firebaseDb) {
                        setAuthErrorDetails('Cloud sync failed to load. If you see a firebase-init error in the console, refresh after the latest deploy.');
                    } else if (!window.kolthoffStaffReady) {
                        setAuthErrorDetails('Staff authentication module failed to load. Refresh the page or sign in via Admin.');
                    }
                }, 15000);

                checkInterval = setInterval(() => {
                    if (window.firebaseAuth && window.firebaseDb && window.kolthoffStaffReady) {
                        clearInterval(checkInterval);
                        clearTimeout(timeout);
                        const initAuth = async () => {
                            try {
                                await window.kolthoffStaffReady;
                                if (!cancelled) {
                                    setIsAuthed(true);
                                    setAuthErrorDetails(null);
                                }
                            } catch (e) {
                                console.error("Firebase Auth Error:", e);
                                if (!cancelled) {
                                    setIsAuthed(false);
                                    setAuthErrorDetails(e?.code || e.message || "Authentication failed.");
                                }
                            }
                        };
                        initAuth();
                    }
                }, 50);

                return () => { cancelled = true; clearInterval(checkInterval); clearTimeout(timeout); };
            }, []);

            // 2. ATTACH CLOUD SYNC LISTENERS
            useEffect(() => {
                if (!isAuthed) return;

                let dealsSeeded = false;
                let contactsSeeded = false;
                let partnersSeeded = false;

                const db = window.firebaseDb;
                const appId = window.appId;

                const dealsRef = window.collection(db, 'artifacts', appId, 'public', 'data', 'crm_deals');
                const unsubDeals = window.onSnapshot(dealsRef, (snap) => {
                    if (snap.empty && !dealsSeeded && !window.KOLTHOFF_DISABLE_CLIENT_SEED) {
                        dealsSeeded = true;
                        initialDeals.forEach(d => window.setDoc(window.doc(dealsRef, d.id), d));
                    } else {
                        const fetched = [];
                        snap.forEach(doc => fetched.push(doc.data()));
                        fetched.sort((a, b) => a.id.localeCompare(b.id));
                        setDeals(fetched);
                    }
                }, console.error);

                const contactsRef = window.collection(db, 'artifacts', appId, 'public', 'data', 'crm_contacts');
                const unsubContacts = window.onSnapshot(contactsRef, (snap) => {
                    if (snap.empty && !contactsSeeded && !window.KOLTHOFF_DISABLE_CLIENT_SEED) {
                        contactsSeeded = true;
                        initialContacts.forEach(c => window.setDoc(window.doc(contactsRef, c.id), c));
                    } else {
                        const fetched = [];
                        snap.forEach(doc => fetched.push(doc.data()));
                        fetched.sort((a, b) => a.id.localeCompare(b.id));
                        setContacts(fetched);
                    }
                }, console.error);

                const partnersRef = window.collection(db, 'artifacts', appId, 'public', 'data', 'crm_partners');
                const unsubPartners = window.onSnapshot(partnersRef, (snap) => {
                    if (snap.empty && !partnersSeeded && !window.KOLTHOFF_DISABLE_CLIENT_SEED) {
                        partnersSeeded = true;
                        initialPartners.forEach(p => window.setDoc(window.doc(partnersRef, p.id), p));
                    } else {
                        const fetched = [];
                        snap.forEach(doc => fetched.push(doc.data()));
                        fetched.sort((a, b) => a.id.localeCompare(b.id));
                        setPartners(fetched);
                    }
                }, console.error);

                const profilesRef = window.collection(db, 'artifacts', appId, 'public', 'data', 'workbook_profiles');
                const unsubProfiles = window.onSnapshot(profilesRef, (snap) => {
                    const fetchedProfiles = [];
                    snap.forEach(doc => fetchedProfiles.push({ id: doc.id, ...doc.data() }));
                    setPlannerProfiles(fetchedProfiles);
                }, console.error);

                return () => { unsubDeals(); unsubContacts(); unsubPartners(); unsubProfiles(); };
            }, [isAuthed]);

            const getDealHealth = (deal) => {
                // Ampel logic: green = on track, amber = attention today/paused, red = overdue, gray = unscheduled
                if (deal.status === "Won") {
                    return {
                        text: "Closed Won",
                        icon: "🏆",
                        dot: "bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.55)]",
                        frame: "deal-card-frame border border-emerald-500/55 border-l-emerald-400 bg-emerald-950/25",
                        actionTint: "border-emerald-500/25 bg-emerald-950/30",
                        glow: "won-card-active"
                    };
                }
                if (deal.status === "Lost") {
                    return {
                        text: "Closed Lost",
                        icon: "❌",
                        dot: "bg-slate-500",
                        frame: "deal-card-frame border border-slate-600/45 border-l-slate-500 bg-rose-950/15 opacity-75",
                        actionTint: "border-slate-600/30 bg-slate-900/40"
                    };
                }

                if (deal.nextAction && deal.nextAction.toLowerCase().includes("on hold")) {
                    return {
                        text: "On Hold",
                        icon: "⏸️",
                        dot: "bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.45)]",
                        frame: "deal-card-frame border border-amber-500/50 border-l-amber-400 bg-amber-950/20",
                        actionTint: "border-amber-500/25 bg-amber-950/25"
                    };
                }
                if (!deal.followUpDate) {
                    return {
                        text: "No Action Scheduled",
                        icon: "⚪",
                        dot: "bg-slate-500",
                        frame: "deal-card-frame border border-slate-600/40 border-l-slate-500 bg-slate-900/35",
                        actionTint: "border-slate-600/25 bg-slate-900/45"
                    };
                }

                const dateVal = new Date(deal.followUpDate);
                const todayVal = new Date(todayStr);

                if (dateVal < todayVal) {
                    return {
                        text: "Overdue",
                        icon: "🔴",
                        dot: "bg-rose-500 shadow-[0_0_8px_#EF4444] animate-pulse",
                        frame: "deal-card-frame border border-rose-500/60 border-l-rose-500 bg-rose-950/25",
                        actionTint: "border-rose-500/30 bg-rose-950/30"
                    };
                }
                if (deal.followUpDate === todayStr) {
                    return {
                        text: "Due Today",
                        icon: "🟡",
                        dot: "bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.55)]",
                        frame: "deal-card-frame border border-amber-500/55 border-l-amber-400 bg-amber-950/20",
                        actionTint: "border-amber-500/25 bg-amber-950/25"
                    };
                }
                return {
                    text: "Scheduled",
                    icon: "🟢",
                    dot: "bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]",
                    frame: "deal-card-frame border border-emerald-500/45 border-l-emerald-500 bg-emerald-950/15",
                    actionTint: "border-emerald-500/20 bg-emerald-950/20"
                };
            };

            const findSyncedProfile = (dealId) => plannerProfiles.find(
                (p) => p.quoteId === dealId || p.id === dealId || p.links?.crmDealId === dealId
            );

            const getProfileDealValue = (profile) => {
                if (!profile) return 0;
                const fin = window.Financials?.getFinancials(profile);
                return fin?.total ?? fin?.subtotal ?? 0;
            };

            const getDealDisplayValue = (deal) => {
                const syncedProfile = findSyncedProfile(deal.id);
                return syncedProfile ? getProfileDealValue(syncedProfile) : parseFloat(deal.estValue || 0);
            };

            // Keep stored deal values aligned when linked planner SOWs change
            useEffect(() => {
                if (!isAuthed || !window.firebaseDb || !window.Financials || deals.length === 0) return;

                deals.forEach((deal) => {
                    const syncedProfile = findSyncedProfile(deal.id);
                    if (!syncedProfile) return;

                    const syncedValue = getProfileDealValue(syncedProfile);
                    const storedValue = Math.round(parseFloat(deal.estValue || 0));
                    if (storedValue === syncedValue) return;

                    const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'crm_deals', deal.id);
                    window.setDoc(docRef, { estValue: syncedValue }, { merge: true }).catch(console.error);
                });
            }, [deals, plannerProfiles, isAuthed]);

            const stats = useMemo(() => {
                let totalValue = 0, activeCount = 0, wonCount = 0, lostCount = 0, overdueCount = 0;

                deals.forEach(d => {
                    const val = getDealDisplayValue(d);

                    const health = getDealHealth(d);
                    if (d.status === "Active" || !d.status) {
                        activeCount++;
                        totalValue += val;
                        if (health.text === "Overdue") overdueCount++;
                    } else if (d.status === "Won") { wonCount++; } else if (d.status === "Lost") { lostCount++; }
                });

                const totalClosed = wonCount + lostCount;
                const winRate = totalClosed > 0 ? Math.round((wonCount / totalClosed) * 100) : 0;
                const avgSize = activeCount > 0 ? Math.round(totalValue / activeCount) : 0;

                return { totalValue, activeCount, winRate, avgSize, overdueCount };
            }, [deals, plannerProfiles]);

            const getShareUrl = () => {
                if (!shareToken || !window.CrmShare) return '';
                return window.CrmShare.buildShareUrl(shareToken);
            };

            const loadShareSettings = async (tokenOverride) => {
                if (!window.firebaseDb || !window.CrmShare) return;
                const token = tokenOverride || shareToken || localStorage.getItem(shareStorageKey);
                if (!token) return;

                const link = await window.CrmShare.ensureShareLink(window.firebaseDb, window.appId, token);
                setShareToken(token);
                setShareEnabled(!!link.enabled);
                localStorage.setItem(shareStorageKey, token);
            };

            useEffect(() => {
                if (!isAuthed || !window.CrmShare) return;
                loadShareSettings().catch(console.error);
            }, [isAuthed]);

            useEffect(() => {
                if (!isAuthed || !shareEnabled || !shareToken || !window.CrmShare) return;
                window.CrmShare.syncPublicPipelineView(window.firebaseDb, window.appId, shareToken, deals, stats)
                    .catch(console.error);
            }, [isAuthed, shareEnabled, shareToken, deals, stats]);

            const openShareModal = async () => {
                if (!window.firebaseDb || !window.CrmShare) return;
                setShareBusy(true);
                setShareCopyHint('');
                try {
                    let token = shareToken || localStorage.getItem(shareStorageKey);
                    if (!token) {
                        token = window.CrmShare.generateShareToken();
                        await window.CrmShare.ensureShareLink(window.firebaseDb, window.appId, token);
                    }
                    await loadShareSettings(token);
                    setShareModalOpen(true);
                } catch (err) {
                    console.error(err);
                    setShareCopyHint('Unable to prepare share link.');
                } finally {
                    setShareBusy(false);
                }
            };

            const toggleShareEnabled = async () => {
                if (!shareToken || !window.CrmShare) return;
                setShareBusy(true);
                try {
                    const nextEnabled = !shareEnabled;
                    await window.CrmShare.setShareLinkEnabled(window.firebaseDb, window.appId, shareToken, nextEnabled);
                    setShareEnabled(nextEnabled);
                    if (nextEnabled) {
                        await window.CrmShare.syncPublicPipelineView(window.firebaseDb, window.appId, shareToken, deals, stats);
                    }
                } catch (err) {
                    console.error(err);
                    setShareCopyHint('Unable to update sharing status.');
                } finally {
                    setShareBusy(false);
                }
            };

            const copyShareLink = async () => {
                const url = getShareUrl();
                if (!url) return;
                try {
                    await navigator.clipboard.writeText(url);
                    setShareCopyHint('Link copied to clipboard.');
                } catch {
                    window.prompt('Copy this link:', url);
                    setShareCopyHint('Copy the link from the dialog.');
                }
            };

            const regenerateShareLink = async () => {
                if (!window.firebaseDb || !window.CrmShare) return;
                if (!window.confirm('Generate a new share link? The previous link will stop working immediately.')) return;
                setShareBusy(true);
                setShareCopyHint('');
                try {
                    if (shareEnabled && shareToken) {
                        await window.CrmShare.setShareLinkEnabled(window.firebaseDb, window.appId, shareToken, false);
                    }
                    const token = window.CrmShare.generateShareToken();
                    await window.CrmShare.ensureShareLink(window.firebaseDb, window.appId, token);
                    setShareToken(token);
                    setShareEnabled(false);
                    localStorage.setItem(shareStorageKey, token);
                } catch (err) {
                    console.error(err);
                    setShareCopyHint('Unable to regenerate link.');
                } finally {
                    setShareBusy(false);
                }
            };

            // --- FIRESTORE WRITE ACTIONS ---

            const persistDealUpdate = async (dealId, patch) => {
                const deal = deals.find((d) => d.id === dealId);
                if (!deal) return;
                const updatedDeal = { ...deal, ...patch };
                const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'crm_deals', dealId);
                await window.setDoc(docRef, updatedDeal, { merge: true });
                if (window.CrmPlannerSync?.syncDealToLinkedProfile) {
                    try {
                        await window.CrmPlannerSync.syncDealToLinkedProfile(
                            window.firebaseDb,
                            window.appId,
                            updatedDeal,
                            plannerProfiles,
                        );
                    } catch (err) {
                        console.warn('CRM → planner sync skipped:', err);
                    }
                }
            };

            const handleDragStart = (e, dealId) => {
                e.dataTransfer.setData("dealId", dealId);
                isDraggingDeal.current = true;
            };
            const handleDragEnd = () => { setTimeout(() => { isDraggingDeal.current = false; }, 0); };
            const openDealDetails = (deal) => {
                if (isDraggingDeal.current) return;
                setEditingItem(deal);
                setIsDealModalOpen(true);
            };
            const stopCardClick = (e) => e.stopPropagation();
            const handleDragOver = (e) => { e.preventDefault(); };

            // For Kanban Board Pipeline Drop
            const handleDrop = async (e, targetStage) => {
                e.preventDefault();
                const dealId = e.dataTransfer.getData("dealId");
                if (dealId) {
                    const deal = deals.find(d => d.id === dealId);
                    if (deal) {
                        let updatedStatus = deal.status || "Active";
                        const finalValue = getDealDisplayValue(deal);

                        if (targetStage === "Closed Won/Lost") {
                            if (updatedStatus !== "Won" && updatedStatus !== "Lost") {
                                updatedStatus = "Won";
                                setCelebrationDetails({ name: deal.leadName + " (" + (deal.company || "Individual") + ")", value: new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(finalValue) });
                                setShowCelebration(true); setTimeout(() => setShowCelebration(false), 4500);
                            }
                        } else {
                            if (updatedStatus === "Won" || updatedStatus === "Lost") { updatedStatus = "Active"; }
                        }

                        await persistDealUpdate(dealId, { pipelineStatus: targetStage, status: updatedStatus, estValue: finalValue });
                    }
                }
            };

            // For Calendar Day Drop (Rescheduling)
            const handleCalendarDrop = async (e, targetDateStr) => {
                e.preventDefault();
                const dealId = e.dataTransfer.getData("dealId");
                if (dealId) {
                    const deal = deals.find(d => d.id === dealId);
                    if (deal) {
                        const finalValue = getDealDisplayValue(deal);

                        const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'crm_deals', dealId);
                        await window.setDoc(docRef, { ...deal, followUpDate: targetDateStr, estValue: finalValue }, { merge: true });
                    }
                }
            };

            const resolveDealStatus = async (dealId, nextStatus) => {
                const deal = deals.find(d => d.id === dealId);
                if (deal) {
                    const finalValue = getDealDisplayValue(deal);

                    if (nextStatus === "Won") {
                        setCelebrationDetails({ name: deal.leadName + " (" + (deal.company || "Individual") + ")", value: new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(finalValue) });
                        setShowCelebration(true); setTimeout(() => setShowCelebration(false), 4500);
                    }
                    const newPipelineStatus = (nextStatus === "Won" || nextStatus === "Lost") ? "Closed Won/Lost" : "Negotiation";

                    await persistDealUpdate(dealId, { status: nextStatus, pipelineStatus: newPipelineStatus, estValue: finalValue });
                }
            };

            const saveDeal = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                
                let inputStatus = formData.get("status") || "Active";
                let inputPipelineStatus = formData.get("pipelineStatus") || "Lead / Prospect";

                if (inputPipelineStatus === "Closed Won/Lost" && inputStatus === "Active") {
                    inputStatus = "Won";
                } else if (inputStatus !== "Active" && inputPipelineStatus !== "Closed Won/Lost") {
                    inputPipelineStatus = "Closed Won/Lost";
                }

                const customIdInput = formData.get("customId");
                const finalId = customIdInput ? customIdInput.trim().toUpperCase().replace(/\s+/g, '-') : `KC-${new Date().getFullYear()}-${Math.floor(1000 + Math.random() * 9000)}`;

                const isCurrentlySynced = findSyncedProfile(finalId);
                const finalEstValue = isCurrentlySynced ? getProfileDealValue(isCurrentlySynced) : parseFloat(formData.get("estValue") || 0);

                const data = {
                    id: finalId,
                    leadName: formData.get("leadName"), company: formData.get("company"), titleRole: formData.get("titleRole"),
                    email: formData.get("email") || "", mobile: formData.get("mobile") || "", contactInfo: formData.get("contactInfo"),
                    leadSource: formData.get("leadSource"), pipelineStatus: inputPipelineStatus, estValue: finalEstValue,
                    nextAction: formData.get("nextAction"), followUpDate: formData.get("followUpDate"), notes: formData.get("notes"),
                    status: inputStatus
                };

                if (data.status === "Won" && (!editingItem || editingItem.status !== "Won")) {
                    setCelebrationDetails({ name: data.leadName + " (" + (data.company || "Individual") + ")", value: new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP' }).format(finalEstValue) });
                    setShowCelebration(true); setTimeout(() => setShowCelebration(false), 4500);
                }

                const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'crm_deals', data.id);
                await window.setDoc(docRef, data);
                if (window.CrmPlannerSync?.syncDealToLinkedProfile) {
                    try {
                        await window.CrmPlannerSync.syncDealToLinkedProfile(window.firebaseDb, window.appId, data, plannerProfiles);
                    } catch (err) {
                        console.warn('CRM → planner sync skipped:', err);
                    }
                }

                if (editingItem && editingItem.id && !editingItem.pipelineStatusOnly && editingItem.id !== finalId) {
                    const oldDocRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'crm_deals', editingItem.id);
                    await window.deleteDoc(oldDocRef);
                }
                
                setIsDealModalOpen(false); setEditingItem(null);
            };

            const saveContact = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const id = editingItem && editingItem.id ? editingItem.id : "contact-" + Date.now();
                const data = {
                    id: id, name: formData.get("name"), titleRole: formData.get("titleRole"), company: formData.get("company"),
                    contactInfo: formData.get("contactInfo"), contacted: formData.get("contacted") === "true",
                    label: formData.get("label"), nextAction: formData.get("nextAction"), note: formData.get("note")
                };
                const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'crm_contacts', id);
                await window.setDoc(docRef, data);
                setIsContactModalOpen(false); setEditingItem(null);
            };

            const savePartner = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const id = editingItem && editingItem.id ? editingItem.id : "partner-" + Date.now();
                const data = {
                    id: id, name: formData.get("name"), role: formData.get("role") || "Partner", businessProposal: formData.get("businessProposal"),
                    investmentBudget: parseFloat(formData.get("investmentBudget") || 0), phase: formData.get("phase"),
                    nextAction: formData.get("nextAction"), note: formData.get("note")
                };
                const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'crm_partners', id);
                await window.setDoc(docRef, data);
                setIsPartnerModalOpen(false); setEditingItem(null);
            };

            const toggleContactStatus = async (contactId, currentStatus) => {
                const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'crm_contacts', contactId);
                await window.setDoc(docRef, { contacted: !currentStatus }, { merge: true });
            };

            const executeDelete = async () => {
                if (!deleteConfirm) return;
                let collectionName = '';
                if (deleteConfirm.type === 'deal') collectionName = 'crm_deals';
                if (deleteConfirm.type === 'contact') collectionName = 'crm_contacts';
                if (deleteConfirm.type === 'partner') collectionName = 'crm_partners';

                const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', collectionName, deleteConfirm.id);
                await window.deleteDoc(docRef);

                if (deleteConfirm.type === 'deal') setIsDealModalOpen(false);
                if (deleteConfirm.type === 'contact') setIsContactModalOpen(false);
                if (deleteConfirm.type === 'partner') setIsPartnerModalOpen(false);
                
                setEditingItem(null); setDeleteConfirm(null);
            };

            // --- FILTERS ---
            const filteredDeals = useMemo(() => {
                return deals.filter(deal => {
                    const matchQuery = 
                        deal.id.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        deal.leadName.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        (deal.company && deal.company.toLowerCase().includes(searchQuery.toLowerCase())) ||
                        (deal.email && deal.email.toLowerCase().includes(searchQuery.toLowerCase())) ||
                        (deal.notes && deal.notes.toLowerCase().includes(searchQuery.toLowerCase()));
                    
                    const matchSource = sourceFilter === "All" || deal.leadSource === sourceFilter;
                    
                    let matchStatus = true;
                    if (viewMode === "list") {
                        matchStatus = 
                            statusFilter === "All" ||
                            (statusFilter === "Active" && (deal.status === "Active" || !deal.status)) ||
                            (statusFilter === "Won" && deal.status === "Won") ||
                            (statusFilter === "Lost" && deal.status === "Lost");
                    } else {
                        if (statusFilter === "Won") { matchStatus = deal.status === "Won"; } 
                        else if (statusFilter === "Lost") { matchStatus = deal.status === "Lost"; } 
                        else if (statusFilter === "Active") { matchStatus = (deal.status === "Active" || !deal.status || deal.status === "Won" || deal.status === "Lost"); }
                    }

                    const health = getDealHealth(deal);
                    const matchActivity = 
                        activityFilter === "All" ||
                        (activityFilter === "Overdue" && health.text === "Overdue") ||
                        (activityFilter === "Today" && health.text === "Due Today") ||
                        (activityFilter === "Unscheduled" && health.text === "No Action Scheduled");

                    return matchQuery && matchSource && matchStatus && matchActivity;
                });
            }, [deals, searchQuery, sourceFilter, statusFilter, activityFilter, viewMode]);

            const filteredContacts = useMemo(() => {
                return contacts.filter(c => {
                    const q = searchQuery.toLowerCase();
                    return (
                        c.name.toLowerCase().includes(q) || (c.company && c.company.toLowerCase().includes(q)) ||
                        (c.titleRole && c.titleRole.toLowerCase().includes(q)) || (c.note && c.note.toLowerCase().includes(q))
                    );
                });
            }, [contacts, searchQuery]);

            const filteredPartners = useMemo(() => {
                return partners.filter(p => {
                    const q = searchQuery.toLowerCase();
                    return (
                        p.name.toLowerCase().includes(q) || p.role.toLowerCase().includes(q) ||
                        p.businessProposal.toLowerCase().includes(q) || (p.note && p.note.toLowerCase().includes(q))
                    );
                });
            }, [partners, searchQuery]);

            if (!isAuthed) {
                return (
                    <div className={STARTER_UI ? "starter-app-root starter-loading-screen min-h-screen flex flex-col items-center justify-center px-6 bg-slate-100" : "min-h-screen flex flex-col items-center justify-center text-slate-400 px-6"}>
                        <div className={`flex items-center gap-3 ${STARTER_UI ? 'text-sm font-medium text-slate-500' : ''}`}>
                            <div className={`w-2 h-2 rounded-full animate-pulse ${STARTER_UI ? 'starter-loading-dot' : 'bg-brandTeal-500'}`} />
                            Loading...
                        </div>
                        {authErrorDetails && (() => {
                            const help = window.FirebaseErrors?.getFirebaseConnectionHelp(authErrorDetails) || {
                                title: 'Firebase Connection Error',
                                summary: authErrorDetails,
                                steps: [],
                            };
                            return (
                                <div className={`text-xs font-medium p-4 rounded mt-4 max-w-lg text-left leading-relaxed ${STARTER_UI ? 'text-amber-700 bg-amber-50 border border-amber-200' : 'text-amber-400 bg-amber-500/10'}`}>
                                    <strong className={`block font-bold mb-1 ${STARTER_UI ? 'text-amber-800' : 'text-amber-300'}`}>{help.title}</strong>
                                    <span className={`block ${STARTER_UI ? 'text-slate-600' : 'text-slate-300'}`}>{help.summary}</span>
                                    {help.steps.length > 0 && (
                                        <ul className={`mt-2 space-y-1 list-disc pl-4 ${STARTER_UI ? 'text-slate-500' : 'text-slate-400'}`}>
                                            {help.steps.map((step, i) => <li key={i}>{step}</li>)}
                                        </ul>
                                    )}
                                </div>
                            );
                        })()}
                    </div>
                );
            }

            return (
                <div className={STARTER_UI ? "starter-app-root min-h-screen flex flex-col pb-12 bg-slate-100" : "min-h-screen flex flex-col pb-12 bg-gradient-to-b from-[#061727] via-[#091f33] to-[#02050e]"}>
                    
                    {/* CONFETTI & NOTIFICATION POPUP ON DEAL WON */}
                    {showCelebration && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm transition-all duration-300" role="dialog" aria-modal="true" aria-labelledby="celebration-title">
                            <div className="bg-gradient-to-br from-brandNavy-900 to-brandNavy-950 p-8 rounded-2xl border-2 border-brandTeal-500 max-w-md w-full mx-4 shadow-2xl shadow-brandTeal-500/20 text-center relative overflow-hidden animate-[bounce_1s_ease-out_1]">
                                <div className="absolute -left-10 -top-10 w-28 h-28 bg-brandTeal-500/10 rounded-full blur-xl" aria-hidden="true" />
                                <div className="absolute -right-10 -bottom-10 w-28 h-28 bg-brandTeal-500/10 rounded-full blur-xl" aria-hidden="true" />
                                
                                <div className="text-6xl mb-4" aria-hidden="true">🏆</div>
                                <h3 id="celebration-title" className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-brandTeal-400 to-emerald-400 tracking-tight font-serif">Deal Closed Won!</h3>
                                <p className="text-slate-400 text-xs mt-1 uppercase tracking-widest font-sans font-bold">Kolthoff Pipeline Milestone</p>
                                
                                <div className="my-6 p-4 bg-brandNavy-955/70 rounded-xl border border-brandNavy-800">
                                    <div className="text-white font-bold text-lg">{celebrationDetails.name}</div>
                                    <div className="text-brandTeal-400 font-mono text-2xl font-bold mt-1">{celebrationDetails.value}</div>
                                </div>
                                <button 
                                    onClick={() => setShowCelebration(false)}
                                    className="px-6 py-2.5 bg-gradient-to-r from-brandTeal-500 to-brandTeal-600 hover:from-brandTeal-600 hover:to-brandTeal-700 text-brandNavy-955 font-bold rounded-lg text-sm transition-all shadow-md shadow-brandTeal-500/20"
                                >
                                    Awesome! Let's Keep Rolling
                                </button>
                            </div>
                        </div>
                    )}

                    {/* CUSTOM RECONCILED DELETE CONFIRMATION MODAL */}
                    {deleteConfirm && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4" role="dialog" aria-modal="true" aria-labelledby="delete-confirm-title">
                            <div className="bg-gradient-to-br from-[#0C1626] to-[#020613] rounded-2xl border border-rose-500/30 max-w-sm w-full p-6 shadow-2xl relative">
                                <div className="text-center">
                                    <div className="text-4xl" aria-hidden="true">⚠️</div>
                                    <h3 id="delete-confirm-title" className="font-extrabold text-white text-base mt-3 font-sans">Confirm Permanent Deletion</h3>
                                    <p className="text-slate-400 text-xs mt-2 leading-relaxed font-sans">
                                        Are you absolutely sure you want to delete <strong className="text-slate-200">"{deleteConfirm.name}"</strong>? This record will be permanently purged across all devices.
                                    </p>
                                </div>
                                <div className="flex gap-2.5 mt-6 justify-end">
                                    <button 
                                        onClick={() => setDeleteConfirm(null)}
                                        className="px-4 py-2 bg-brandNavy-900 border border-brandNavy-700 text-slate-300 font-bold text-[10px] uppercase tracking-wider rounded-lg hover:bg-brandNavy-800 transition-all flex-1"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={executeDelete}
                                        className="px-4 py-2 bg-rose-600 hover:bg-rose-500 text-white font-bold text-[10px] uppercase tracking-wider rounded-lg transition-all flex-1"
                                    >
                                        Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TOP BRAND BAR */}
                    <header className="crm-main-header border-b border-brandNavy-700/50 bg-brandNavy-955/80 backdrop-blur-md sticky top-0 z-40 px-4 md:px-8 xl:px-12 py-3">
                        <div className="crm-header-inner max-w-full mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            
                            <div data-app-chrome className="flex items-center gap-3">
                                {renderHeaderLogo(brand)}
                                <div>
                                    <div className="flex items-center gap-2">
                                        <h1 className={STARTER_UI ? "starter-page-title text-sm font-sans" : "text-sm font-extrabold tracking-tight text-white uppercase font-sans"}>
                                            {renderHeaderTitle(brand)}
                                        </h1>
                                        <span className={STARTER_UI
                                            ? `flex items-center gap-1.5 text-[8px] px-1.5 py-0.5 rounded font-mono font-bold uppercase tracking-wider border starter-badge`
                                            : `flex items-center gap-1.5 text-[8px] bg-brandTeal-500/10 text-brandTeal-400 border border-brandTeal-500/20 px-1.5 py-0.5 rounded font-mono font-bold uppercase tracking-wider`}
                                            style={STARTER_UI ? { color: brand.primaryColor, borderColor: `${brand.primaryColor}44`, backgroundColor: `${brand.primaryColor}18` } : undefined}>
                                            <div className={`w-1.5 h-1.5 rounded-full ${isAuthed ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : 'bg-amber-500 animate-pulse'}`} title={isAuthed ? "Cloud Synced" : "Connecting..."}></div>
                                            {STARTER_UI ? (brand.crmBadge || 'SALES PIPELINE') : (PRODUCT.crmBadge || brand.crmBadge || 'PIPEDRIVE STUDIO')}
                                        </span>
                                    </div>
                                    <p className={STARTER_UI ? "starter-page-subtitle text-[11px] font-sans" : "text-[9px] text-brandNavy-300 font-semibold tracking-wide"}>{STARTER_UI ? (brand.crmSubtitle || brand.tagline) : (PRODUCT.crmSubtitle || brand.crmSubtitle || brand.tagline)}</p>
                                </div>
                            </div>

                            <nav aria-label="Main Navigation">
                                <div className={STARTER_UI ? "starter-segment flex p-1 rounded-xl" : "flex bg-[#09111F] border border-brandNavy-700/60 p-1 rounded-xl"}>
                                    <button onClick={() => setActiveTab("deals")} className={`px-3 py-1 rounded-lg transition-all flex items-center gap-1.5 ${STARTER_UI ? `starter-segment-btn ${activeTab === "deals" ? "starter-segment-btn-active" : ""}` : `text-[10px] font-bold uppercase tracking-wider ${activeTab === "deals" ? "bg-brandTeal-500 text-brandNavy-955 shadow-md shadow-brandTeal-500/10" : "text-brandNavy-300 hover:text-white"}`}`}>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label htmlFor="deal-leadName" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Lead Name *</label>

                                        </div>

                                            <label htmlFor="deal-contactInfo" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Socials / Messenger Link</label>
                                            <input id="deal-contactInfo" type="text" name="contactInfo" placeholder="facebook, whatsapp, linkedin" defaultValue={editingItem?.contactInfo || ""} className="w-full bg-[#020613] border border-brandNavy-700/60 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-brandTeal-500" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4 bg-brandNavy-955/40 p-3 rounded-lg border border-brandNavy-700/30">
                                        <div>
                                            <label htmlFor="deal-email" className="block text-[9px] font-bold text-brandTeal-400/80 uppercase tracking-wider mb-1 font-mono">Email Address</label>
                                            <input id="deal-email" type="email" name="email" placeholder="contact@company.com" defaultValue={editingItem?.email || ""} className="w-full bg-[#020613] border border-brandNavy-700/60 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-brandTeal-500" />
                                        </div>
                                        <div>
                                            <label htmlFor="deal-mobile" className="block text-[9px] font-bold text-brandTeal-400/80 uppercase tracking-wider mb-1 font-mono">Mobile Number</label>

                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label htmlFor="deal-pipelineStatus" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Pipeline Status Stage</label>
                                            <select id="deal-pipelineStatus" name="pipelineStatus" defaultValue={editingItem?.pipelineStatus || "Lead / Prospect"} className="w-full bg-[#020613] border border-brandNavy-700/60 rounded-lg p-2 text-xs text-white focus:outline-none">
                                                {pipelineStages.map(stg => (<option key={stg} value={stg}>{stg}</option>))}

                                        </div>

                                            <label htmlFor="deal-status" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Resolution Status</label>

                                                <option value="Active">Active / Open In Pipeline</option>
                                                <option value="Won">🏆 Closed Won</option>
                                                <option value="Lost">❌ Closed Lost</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label htmlFor="deal-leadSource" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Lead Source</label>
                                            <select id="deal-leadSource" name="leadSource" defaultValue={editingItem?.leadSource || "Warm Referral"} className="w-full bg-[#020613] border border-brandNavy-700/60 rounded-lg p-2 text-xs text-white focus:outline-none">
                                                <option value="Warm Referral">Warm Referral</option>
                                                <option value="Cold Outreach">Cold Outreach</option>
                                                <option value="Linkedin Content">Linkedin Content</option>
                                                <option value="Partnership Network">Partnership Network</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label htmlFor="deal-estValue" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono flex items-center justify-between">
                                                <span>Estimated Value (₱)</span>
                                                {editingItem && findSyncedProfile(editingItem.id) && (
                                                    <span className="text-emerald-400">🔄 Synced</span>
                                                )}
                                            </label>
                                            {(() => {
                                                const isCurrentlySynced = editingItem && findSyncedProfile(editingItem.id);
                                                const syncedDisplayValue = isCurrentlySynced ? getProfileDealValue(isCurrentlySynced) : (editingItem?.estValue ?? "");
                                                return (
                                                    <>
                                                        <input 
                                                            id="deal-estValue" 
                                                            type="number" 
                                                            name="estValue" 
                                                            placeholder={isCurrentlySynced ? "Auto-synced from Planner" : "0.00"} 
                                                            defaultValue={syncedDisplayValue}
                                                            disabled={!!isCurrentlySynced}
                                                            className={`w-full bg-[#020613] border border-brandNavy-700/60 rounded-lg p-2 text-xs font-mono focus:outline-none focus:border-brandTeal-500 ${isCurrentlySynced ? 'opacity-50 cursor-not-allowed' : 'text-white'}`} 
                                                        />
                                                        {isCurrentlySynced && <p className="text-[8.5px] text-emerald-400 mt-1.5 font-mono">Amount is securely locked & synced with the live SOW Subtotal from Planner.</p>}
                                                    </>
                                                );
                                            })()}
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label htmlFor="deal-nextAction" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Next Action Items</label>
                                            <input id="deal-nextAction" type="text" name="nextAction" defaultValue={editingItem?.nextAction || ""} placeholder="e.g. send SOW document" className="w-full bg-[#020613] border border-brandNavy-700/60 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-brandTeal-500" />
                                        </div>
                                        <div>
                                            <label htmlFor="deal-followUpDate" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Follow-Up Date</label>
                                            <input id="deal-followUpDate" type="date" name="followUpDate" defaultValue={editingItem?.followUpDate || ""} className="w-full bg-[#020613] border border-brandNavy-700/60 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-brandTeal-500" />
                                        </div>
                                    </div>

                                    <div>
                                        <label htmlFor="deal-notes" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Internal Notes & Context</label>

                                    </div>

                                    <div className="flex items-center justify-between border-t border-brandNavy-700/50 pt-4 mt-6">
                                        {editingItem && editingItem.id && !editingItem.pipelineStatusOnly ? (
                                            <button type="button" onClick={() => setDeleteConfirm({ type: 'deal', id: editingItem.id, name: editingItem.leadName })} className="px-4 py-2 bg-rose-950 hover:bg-rose-900 border border-rose-500/30 text-rose-400 font-bold text-[10px] uppercase tracking-wider rounded-lg transition-all">🗑️ Delete Deal</button>
                                        ) : <span aria-hidden="true" />}
                                        <div className="flex gap-2">
                                            <button type="button" onClick={() => { setIsDealModalOpen(false); setEditingItem(null); }} className="px-4 py-2 bg-brandNavy-955 border border-brandNavy-700/60 text-slate-300 font-bold text-[10px] uppercase tracking-wider rounded-lg hover:bg-brandNavy-800 transition-all">Cancel</button>
                                            <button type="submit" className="px-6 py-2 bg-brandTeal-500 hover:bg-brandTeal-600 text-brandNavy-955 font-bold text-[10px] uppercase tracking-wider rounded-lg transition-all">Save Deal State</button>
                                        </div>
                                    </div>
                                </form>
                            </div>

                    {isContactModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 backdrop-blur-sm p-4 overflow-y-auto" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title">
                            <div className="bg-gradient-to-br from-brandNavy-900 to-brandNavy-950 rounded-2xl border border-brandNavy-700/60 max-w-xl w-full p-6 shadow-2xl relative text-xs font-semibold">
                                <div className="flex items-center justify-between border-b border-brandNavy-700/50 pb-3 mb-4">
                                    <h3 id="contact-modal-title" className="font-extrabold text-white text-sm uppercase tracking-wide">{editingItem && editingItem.id ? "📝 Edit Contact Info" : "👤 Add New Contact Stakeholder"}</h3>
                                    <button type="button" onClick={() => { setIsContactModalOpen(false); setEditingItem(null); }} className="text-slate-400 hover:text-white font-bold" aria-label="Close modal">✕</button>
                                </div>
                                <form onSubmit={saveContact} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label htmlFor="contact-name" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Full Name *</label>
                                            <input id="contact-name" required type="text" name="name" defaultValue={editingItem?.name || ""} className="w-full bg-[#020613] border border-brandNavy-700/60 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-brandTeal-500" />

                                        </div>
                                        <div>
                                            <label htmlFor="contact-info" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Contact Details</label>

                                        </div>
                                    </div>

                                        <div>

                                                <option value="false">Pending (Not yet contacted)</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label htmlFor="contact-label" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Relationship Label</label>

                                                <option value="medium">⚡ Medium Relationship</option>
                                                <option value="cold">❄️ Cold Outreach</option>

                                            <button type="submit" className="px-6 py-2 bg-brandTeal-500 hover:bg-brandTeal-600 text-brandNavy-955 font-bold text-[10px] uppercase tracking-wider rounded-lg transition-all">Save Contact</button>

                                        <div>
                                            <label htmlFor="partner-role" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Role / Position</label>

                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label htmlFor="partner-phase" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Engagement Phase</label>
                                            <select id="partner-phase" name="phase" defaultValue={editingItem?.phase || "Discover"} className="w-full bg-[#020613] border border-brandNavy-700/60 rounded-lg p-2 text-xs text-white focus:outline-none">
                                                <option value="Discover">Discover</option><option value="Appraise">Appraise</option><option value="Define">Define</option><option value="Execute">Execute</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label htmlFor="partner-nextAction" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Immediate Next Follow-Up Action</label>
                                            <input id="partner-nextAction" type="text" name="nextAction" defaultValue={editingItem?.nextAction || ""} className="w-full bg-[#020613] border border-brandNavy-700/60 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-brandTeal-500" />
                                        </div>
                                    </div>
                                    <div>
                                        <label htmlFor="partner-note" className="block text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1 font-mono">Strategic Collaboration Notes</label>
                                        <textarea id="partner-note" name="note" rows="3" defaultValue={editingItem?.note || ""} className="w-full bg-[#020613] border border-brandNavy-700/60 rounded-lg p-2 text-xs text-white focus:outline-none focus:border-brandTeal-500" placeholder="Synergies, location proposals, partnership timeline..."></textarea>
                                    </div>
                                    <div className="flex items-center justify-between border-t border-brandNavy-700/50 pt-4 mt-6">
                                        {editingItem && editingItem.id ? (<button type="button" onClick={() => setDeleteConfirm({ type: 'partner', id: editingItem.id, name: editingItem.name })} className="px-4 py-2 bg-rose-950 hover:bg-rose-900 border border-rose-500/30 text-rose-400 font-bold text-[10px] uppercase tracking-wider rounded-lg transition-all">Delete Partner Item</button>) : <span aria-hidden="true" />}
                                        <div className="flex gap-2">
                                            <button type="button" onClick={() => { setIsPartnerModalOpen(false); setEditingItem(null); }} className="px-4 py-2 bg-brandNavy-955 border border-brandNavy-700/60 text-slate-300 font-bold text-[10px] uppercase tracking-wider rounded-lg hover:bg-brandNavy-800 transition-all">Cancel</button>
                                            <button type="submit" className="px-6 py-2 bg-brandTeal-500 hover:bg-brandTeal-600 text-brandNavy-955 font-bold text-[10px] uppercase tracking-wider rounded-lg transition-all">Save Partner State</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const rootElement = document.getElementById("root");
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
