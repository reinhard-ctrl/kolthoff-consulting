                    docControl: { version: '1.0', effectiveDate: '2026-06-22', lastReviewed: '2026-06-22', owner: 'Warehouse Operations Manager' },
                    objective: 'This document defines the strict sequential protocol for picking, double-auditing, packing, and dispatching approved outgoing product shipments. Standardizing these milestones minimizes fulfillment discrepancies, secures accurate inventory logging, and prevents SLA turnaround delays.',
                    scope: 'This Standard Operating Procedure is universally binding for all Warehousing, Quality Assurance (QA), Fulfillment, and Logistics Administration personnel involved in preparing client packages for shipment.',
                    prerequisites: '1. Verified administrative access to the Warehouse Management System (WMS).\n2. Standardized protective wrapping, certified bubble rolls, double-wall corrugated cartons, and custom tamper-evident security tape.\n3. Mandatory Personal Protective Equipment (steel-toe safety shoes, puncture-resistant handling gloves, and high-visibility vest) to be worn at all times.',

            handbook: {

                docControl: { version: '1.0', effectiveDate: '2026-06-23', lastReviewed: '2026-06-23', owner: 'Human Resources' },
                introduction: 'Welcome to the organization. This handbook serves as the foundational compliance guidelines, operational policies, and working standards designed to empower our workforce and maintain a highly secure, productive, and respectful professional environment. This manual is a binding agreement outlining your professional duties, expectations, standard operating parameters, and welfare support structures provided by management. All employees are strictly required to read, understand, and adhere to these guidelines during their tenure.',
                mission: 'To drive exceptional operational performance and build resilient organizational processes through standard-setting services, technical expertise, and an unwavering commitment to corporate integrity.',

                timekeeping: 'Standard working hours are structured from 9:00 AM to 6:00 PM, Monday through Friday, with a standard one-hour lunch break daily. All employees must log physical or remote check-ins using biometric terminals or secure digital authorization tokens. A 15-minute grace period is granted to accommodate standard transit delays, after which tardiness records are filed. Unexcused, repetitive, or persistent late arrivals will trigger formal professional reviews and progressive disciplinary actions. Remote staff must maintain active Slack/Teams presence during baseline hours.',
                compensation: 'Salaries are calculated twice per calendar month and directly credited to nominated bank accounts on the 15th and 30th. If a pay date falls on a weekend or legal holiday, processing occurs on the immediately preceding business day. Any claimed overtime hours, premium weekend shifts, or variable commission indicators must be signed off by direct managers and logged in the accounting system three days before payroll runs. Standard payroll deductions include withholding taxes, SSS, PhilHealth, Pag-IBIG contributions, and any voluntary benefits.',
                offboarding: 'Employees seeking to terminate their employment must submit a formal written notice at least thirty (30) days in advance of their intended last working day. This transition period is dedicated to executing structured handover training, archiving digital accounts, returning company laptops or assets, and obtaining official clearances. Failure to render the required 30 days or complete clearances may delay final payroll calculations and the release of certificates of employment or clearance certificates.',

                ],

                    { id: 'cp-1', title: 'Data Security & Non-Disclosure', text: 'All system pricing matrices, proprietary database schemas, source code files, custom integrations, client contact rosters, and strategic marketing formulas constitute highly classified company information. Storing, reproducing, or sharing this data over unauthorized networks or personal drives is strictly prohibited and constitutes grounds for summary dismissal.' },
                    { id: 'cp-2', title: 'Remote Work & VPN Policy', text: 'Employees authorized for telecommuting roles must work from a private, secure location and utilize corporate laptops. Connecting to company environments over public, unencrypted Wi-Fi hotspots is forbidden; all sessions must navigate through the corporate VPN secured with multi-factor authentication.' }

                conduct: {
                    title: 'Code of Conduct & Professional Ethics',
                    docControl: { version: '1.0', effectiveDate: '2026-06-23', lastReviewed: '2026-06-23', owner: 'Compliance Officer' },
                    introduction: 'This Code of Conduct and Professional Ethics establishes the absolute moral, professional, and ethical benchmarks expected from all company employees. It serves as our universal compass, steering corporate interactions with the highest degree of transparency, reliability, respect, and standard compliance across all our organizational pipelines.',
                    sections: [
                        { id: 'c-1', title: 'Dress Code & Professional Grooming Standards', content: 'Employees are required to maintain clean, professional hygiene and present a neat appearance. Business-casual attire is mandatory from Mondays to Thursdays (collared shirts, slacks, professional dresses, or blazers). Fridays are designated smart-casual (clean corporate tees, dark jeans, neat sneakers). Highly casual, extreme, or unsafe clothing is strictly prohibited inside operations or warehouse spaces to minimize hazard risks.' },
                        { id: 'c-2', title: 'Anti-Harassment & Safe Spaces Act (RA 11313) Compliance', content: 'The company maintains a strict zero-tolerance policy against any form of physical, psychological, verbal, or digital harassment, bullying, or discrimination. In strict accordance with the Safe Spaces Act (RA 11313), any behavior of a sexual or demeaning nature that compromises an employee’s dignity or creates a hostile working environment will be immediately investigated. Substantiated violations will result in immediate termination of employment and referral to legal authorities.' },
                        { id: 'c-3', title: 'Conflict of Interest and Ethical Business Transactions', content: 'Employees must avoid situations where personal or financial interests conflict with objective performance. Participating in external activities with direct corporate competitors, utilizing company materials or information to operate private ventures, or accepting luxury hospitality or expensive gifts from vendors is forbidden without explicit written clearance from the Compliance Officer.' },
                        { id: 'c-4', title: 'Intellectual Property & Corporate Asset Protection', content: 'All creative outputs, technical codes, design drafts, database schemas, product designs, copy files, and workflow templates generated during the course of employment remain the sole intellectual property of the organization. Employees must exercise extreme care with company-provided hardware and network services. Utilizing company assets, server instances, API access, or standard work hours to conduct private freelancing, contract consulting, or secondary business ventures is strictly prohibited and constitutes grounds for immediate disciplinary termination.' },
                        { id: 'c-5', title: 'Social Media & Public Relations Guidelines', content: 'Employees are expected to separate personal social media activities from professional duties. Publishing proprietary company data, client details, sensitive internal discussions, pricing grids, or posting discriminatory, defamatory, or derogatory content associated with the company’s brand is strictly prohibited. Only authorized corporate spokespersons are permitted to issue press releases, take media interviews, or comment on company operations to public forums.' },
                        { id: 'c-6', title: 'Anti-Corruption, Bribery, and Whistleblower Protections', content: 'The company operates under a zero-tolerance policy against any form of bribery, kickbacks, or corruption. No employee shall offer, solicit, receive, or accept any direct or indirect monetary or non-monetary benefit to influence business decisions or secure preferential treatment. To report unethical practices, the company provides a secure, confidential Whistleblower Pathway managed by the Compliance Office. Reprisal, retaliation, or professional isolation against any employee raising a good-faith concern is strictly prohibited.' },
                        { id: 'c-7', title: 'Substance-Free Workplace and Health Standards', content: 'Maintaining a highly secure, productive, and safe operational space requires a completely drug-free environment. Possessing, distributing, or working under the influence of illegal narcotics, prohibited substances, or unprescribed tranquilizers inside company premises or client workspaces is grounds for immediate disciplinary termination. Random diagnostic evaluations may be administered in compliance with occupational health and safety rules.' }
                    ]
                },
                nda: {
                    title: 'Non-Disclosure & Confidentiality Agreement (NDA)',
                    docControl: { version: '1.0', effectiveDate: '2026-06-23', lastReviewed: '2026-06-23', owner: 'Legal Counsel' },
                    introduction: 'This Non-Disclosure and Confidentiality Agreement establishes the strict legal guidelines and security requirements protecting non-public information, proprietary workflows, trade secrets, and strategic corporate systems. Execution of this document is a binding prerequisite for employment, contracting, or partnership engagement.',
                    sections: [
                        { id: 'n-1', title: 'Scope and Definition of Confidential Assets', content: 'Confidential Assets are defined as all non-public, sensitive, or proprietary data, including but not limited to system source codes, user database files, client lists, vendor pricing structures, operational SOPs, strategic expansion schedules, financial statements, trade algorithms, and administrative credentials. This encompasses oral communications, digital media, and physical records.' },
                        { id: 'n-2', title: 'Obligations of Security and Prohibited Transmissions', content: 'The receiving party agrees to secure all proprietary documents inside encrypted drives or physical lockboxes. No confidential information may be printed, copied, emailed, or disclosed to third parties unless explicit prior written permission is issued by the Board of Directors. Internal sharing is strictly restricted to employees with an immediate, verified need-to-know workflow. Unauthorized duplication or export of assets will lead to immediate contract termination and structural legal litigation.' },
                        { id: 'n-3', title: 'Agreement Duration, Exclusions and Survival of Restrictions', content: 'The obligations of data protection, secure handling, and confidentiality defined under this NDA shall commence on the first day of asset exposure and shall survive for a period of two (2) years following the official termination of the business, employment, or consulting contract. Exclusions apply only to information that enters the public domain through no fault of the receiving party or is legally demanded by judicial subpoena.' }
                    ]
                },
                dataPrivacy: {
                    title: 'Data Privacy & IT Security Policy',
                    docControl: { version: '1.0', effectiveDate: '2026-06-23', lastReviewed: '2026-06-23', owner: 'IT Director' },
                    introduction: 'This policy governs our technical, physical, and administrative security frameworks designed to protect network assets and personal data. It guarantees strict, ongoing compliance with the Data Privacy Act of 2012 (Republic Act No. 10173) and international security standards like ISO/IEC 27001.',
                    sections: [
                        { id: 'dp-1', title: 'Acceptable Use of Corporate IT Equipment and Systems', content: 'All corporate laptops, servers, accounts, storage drives, and email systems are the sole property of the company. These resources must be utilized exclusively for authorized corporate activities. Downloading unapproved software, bypass utilities, peer-to-peer torrent clients, or accessing high-risk entertainment portals is strictly prohibited to prevent cyber threats, malware, and structural data loss.' },
                        { id: 'dp-2', title: 'Processing PII under RA 10173 and Security Controls', content: 'Pursuant to RA 10173, the collection and processing of Personal Identifiable Information (PII) must adhere to the core principles of Transparency, Legitimacy, and Proportionality. All data collected must be encrypted both at rest (AES-256) and in transit (SSL/TLS) using certified encryption algorithms. Data must be destroyed securely once retention requirements expire. Access is strictly governed by the Principle of Least Privilege.' },
                        { id: 'dp-3', title: 'Strong Password Policy & Multi-Factor Security (MFA)', content: 'All corporate credentials must be protected with complex passwords of at least 12 characters, combining uppercase and lowercase letters, numeric digits, and special characters. Passwords must be updated every 90 days. Multi-Factor Authentication (MFA) must be enabled on all accounts. Sharing system credentials or caching passwords in unencrypted browsers is a severe policy violation.' },
                        { id: 'dp-4', title: 'Data Incident & Breach Management Protocols', content: 'In the event of a security breach or suspicious network anomaly, employees must contact the Security Incident Response Team (SIRT) within 1 hour. Under DPA guidelines, if PII is compromised, the National Privacy Commission (NPC) and affected data subjects must be notified within 72 hours of detection. Failing to report an observed hazard will invoke severe progressive disciplinary actions.' }
                    ]
                },

                    title: 'Health, Safety & Emergency Protocols',
                    docControl: { version: '1.0', effectiveDate: '2026-06-23', lastReviewed: '2026-06-23', owner: 'Facilities Manager' },
                    introduction: 'The safety, physical integrity, and wellness of our workforce are of paramount importance. This document defines the emergency protocols, hazard management plans, and occupational wellness guidelines designed to maintain a completely secure, risk-free work environment in compliance with DOLE Occupational Safety and Health Standards.',
                    sections: [
                        { id: 'hs-1', title: 'Emergency Evacuation Plans and Assembly Routines', content: 'In the event of fire alarms, earthquakes, or chemical spillages, all employees must remain calm, immediately cease work, secure active terminals, and follow the illuminated exit signs to the nearest safety stairwells. Do not use elevators. Gather at the designated corporate Muster Point on the open grounds and remain in position until roll call is concluded by the Safety Wardens.' },
                        { id: 'hs-2', title: 'Hazard Classification and Immediate Reporting Duty', content: 'All employees have an active duty to report physical hazards, exposed wiring, slippery surfaces, or malfunctioning heavy equipment to the Safety Committee. Any workplace incident, minor injury, or near-miss must be logged inside the Safety Registry within two (2) hours of occurrence to trigger corrective measures and insurance reviews.' },
                        { id: 'hs-3', title: 'First Aid Accessibility and Physical Handling Safety', content: 'Fully equipped First Aid kits are located next to safety signage on all floors. Heavy lifting operations inside warehouse sections must adhere to ergonomically sound routines. Mechanical lifts, pallet jacks, or team assists must be utilized for any cargo exceeding 25 kilograms to prevent muscle strain, spinal displacement, or skeletal injury.' },
                        { id: 'hs-4', title: 'Mental Health and Workplace Well-being Support', content: 'In alignment with RA 11036 (Mental Health Act), the company provides anonymous counseling, stress management modules, and active psychological support programs. Healthy boundaries regarding work-life balance must be preserved, and supervisors are trained to maintain supportive, professional interactions at all levels.' }
                    ]
                },
                bcp: {
                    title: 'Business Continuity Plan (BCP)',
                    docControl: { version: '1.0', effectiveDate: '2026-06-23', lastReviewed: '2026-06-23', owner: 'Operations Director' },
                    introduction: 'This Business Continuity Plan (BCP) defines the system redundancies, emergency procedures, and operational overrides required to sustain critical services, client support, and data synchronization during severe power outages, structural damage, cyber incidents, or critical system downtimes.',
                    sections: [
                        { id: 'b-1', title: 'Critical Systems Classification and RTO / RPO Metrics', content: 'Our operations categorize systems into three priority levels. Tier-1 systems (including secure customer portals, real-time sync, and operational routing databases) operate under a Recovery Time Objective (RTO) of four (4) hours and a Recovery Point Objective (RPO) of two (2) hours. Tier-2 applications (such as email systems and ticketing systems) operate under an RTO of 24 hours.' },
                        { id: 'b-2', title: 'Emergency Telecommuting and Remote Service Continuance', content: 'If corporate headquarters or physical offices are rendered inaccessible due to public health mandates, environmental damage, or transport strikes, operations will immediately activate our remote work framework. Employees will use corporate laptops to access secure, cloud-synced databases over encrypted VPN pipelines to ensure zero interruption in client service.' },
                        { id: 'b-3', title: 'Incident Command Hierarchy and Emergency Communication Cascades', content: 'During any critical disruption, an Emergency Crisis Team (ECT) led by the COO and IT Director will oversee all recovery phases. A formal communication tree will be used to send out real-time status updates via secure corporate messaging. Public media and direct client notifications must be managed exclusively by the authorized Public Relations spokesperson.' },
                        { id: 'b-4', title: 'Backup Redundancy and Off-Site Disaster Recovery', content: 'To safeguard transaction records, complete database mirrors are automatically replicated across multi-zone cloud servers hourly. Full physical system backups are archived on secure off-site repositories weekly. Bi-annual simulated disaster drills are executed to audit restore times and certify infrastructure resilience.' }

                    title: 'Service Level Agreement (SLA)',
                    docControl: { version: '1.0', effectiveDate: '2026-06-23', lastReviewed: '2026-06-23', owner: 'Client Success Lead' },

        const moveArrayItem = (arr, index, direction) => {
            const newArr = [...arr];
            if (direction === -1 && index > 0) {
                [newArr[index], newArr[index - 1]] = [newArr[index - 1], newArr[index]];
            } else if (direction === 1 && index < newArr.length - 1) {
                [newArr[index], newArr[index + 1]] = [newArr[index + 1], newArr[index]];
            }
            return newArr;

                        return window.marked.parse(markdownString || '');

                        return window.marked(markdownString || '');
                    }
                }
                return markdownString || '';
            } catch (e) {
                console.error("Markdown parse error", e);
                return markdownString || '';
            }
        };

        const AutoResizeTextarea = ({ id, value, onChange, placeholder, className, isEditMode }) => {

            const adjustHeight = () => {
                const element = textareaRef.current;
                if (element) {
                    element.style.height = 'auto';
                    element.style.height = `${element.scrollHeight}px`;
                }
            };

            useEffect(() => {
                if (isEditMode) {
                    adjustHeight();
                }
            }, [value, isEditMode]);

            useEffect(() => {
                if (isEditMode) {
                    const timer = setTimeout(adjustHeight, 50);
                    return () => clearTimeout(timer);
                }
            }, [isEditMode]);

            if(!isEditMode) return <div id={id} className={`${className} whitespace-pre-wrap`}>{value}</div>;

            return (

                    id={id}

                    placeholder={placeholder} 
                    className={`w-full bg-transparent resize-none overflow-hidden focus:outline-none ${className}`} 
                    rows={1} 
                />
            );
        };

        const MarkdownField = ({ id, value, onChange, placeholder, className, isEditMode }) => {
            const fileRef = useRef();
            const textareaRef = useRef(null);

            const adjustHeight = () => {
                const element = textareaRef.current;
                if (element) {
                    element.style.height = 'auto';
                    element.style.height = `${element.scrollHeight}px`;
                }
            };

            useEffect(() => {
                if (isEditMode) {
                    adjustHeight();
                }
            }, [value, isEditMode]);

            useEffect(() => {
                if (isEditMode) {
                    const timer = setTimeout(adjustHeight, 50);
                    return () => clearTimeout(timer);
                }
            }, [isEditMode]);

            const handleFile = (e) => {
                if(!e.target.files[0]) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let scaleSize = 1;
                        if(img.width > MAX_WIDTH) scaleSize = MAX_WIDTH / img.width;
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        onChange(value + `\n\n![Embedded Image](${canvas.toDataURL('image/jpeg', 0.8)})\n\n`);
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(e.target.files[0]);
            };

            if (!isEditMode) {
                return <div id={id} className={`markdown-body ${className}`} dangerouslySetInnerHTML={{ __html: renderMarkdown(value) }} />;
            }

            return (
                <div className="relative group/md rounded border border-transparent hover:border-slate-200 focus-within:border-brandTeal-404 bg-white">
                    <textarea 
                        id={id}
                        ref={textareaRef} 
                        value={value}

            // Smart Data Merger to safeguard against ReferenceErrors or blank canvases
            const mergePolicyData = (loadedData) => {

                if (!loadedData) return defaultData;
                
                const mergedSops = loadedData.sops || defaultData.sops;
                
                const mergedHandbook = {
                    ...defaultData.handbook,
                    ...(loadedData.handbook || {}),
                    docControl: {
                        ...defaultData.handbook.docControl,
                        ...(loadedData.handbook?.docControl || {})
                    },
                    leaves: loadedData.handbook?.leaves || defaultData.handbook.leaves,
                    discipline: loadedData.handbook?.discipline || defaultData.handbook.discipline,
                    customPolicies: loadedData.customPolicies || loadedData.handbook?.customPolicies || defaultData.handbook.customPolicies
                };
                
                const mergedStandardDocs = {};
                Object.keys(defaultData.standardDocs).forEach(key => {
                    const defaultDoc = defaultData.standardDocs[key];
                    const loadedDoc = loadedData.standardDocs?.[key] || {};
                    mergedStandardDocs[key] = {
                        ...defaultDoc,
                        ...loadedDoc,
                        docControl: {
                            ...defaultDoc.docControl,
                            ...(loadedDoc.docControl || {})
                        },
                        sections: loadedDoc.sections || defaultDoc.sections

                        setLocalPolicyData(JSON.parse(JSON.stringify(DEFAULT_DOCUMENT_DATA)));

            }, [activeProfileId, user, isStandalone]);

            const triggerToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 3000);
            };

            const handleSaveToCloud = async () => {
                if (isStandalone) {
                    triggerToast("💾 Saved Locally! Standalone portal operates completely client-side.");
                    return;
                }
                if (authError) {
                    triggerToast("❌ Cloud Sync Disabled (GCP API Key Restricts Null Referrers)");
                    return;

                if (!isAuthed || !activeProfileId) return;
                setIsSaving(true);
                try {
                    const policyRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'policy_documents', activeProfileId);
                    await window.setDoc(policyRef, localPolicyData);
                    
                    const profileRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'workbook_profiles', activeProfileId);
                    
                    await window.setDoc(profileRef, {

                        clientRep: activeClient.clientRep,

                        policySignatoryTitle: activeClient.policySignatoryTitle,

                    }, { merge: true });

                    if (window.PortalSync?.syncProfileToPortalIfExists) {

            // --- EXPORT CLIENT STANDALONE HUD ENGINE (FETCH CLONING DESIGN) ---
            const handleExportStandalone = async () => {
                if (isStandalone) return;
                setIsSaving(true);
                try {
                    // Pull current HTML source file
                    const response = await fetch(window.location.href);
                    let htmlText = await response.text();
                    
                    // Bundle current snapshot variables safely
                    const brandingJSON = JSON.stringify(activeClient, null, 2);
                    const policyDataJSON = JSON.stringify(localPolicyData, null, 2);

                    const dataPayload = `
    <!-- INJECTED OFFLINE DATA BLOCKS -->
    <script>
        window.STANDALONE_CLIENT = ${brandingJSON};
        window.STANDALONE_POLICIES = ${policyDataJSON};
    <\/script>
                    `;
                    
                    // Inject static data blocks into head tag of cloned build
                    htmlText = htmlText.replace('<head>', '<head>' + dataPayload);
                    
                    // Build standalone HTML blob
                    const blob = new Blob([htmlText], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${activeClient.clientCompany.replace(/[^a-z0-9]/gi, '_')}_Compliance_Portal.html`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                } catch (e) {

                    triggerToast("❌ Error compiling standalone portal.");
                }
                setIsSaving(false);
            };

            const compilePoliciesForVault = () => {
                const policiesArray = [];
                const defaultDate = new Date().toISOString().split('T')[0];

                if (localPolicyData.sops) {
                    localPolicyData.sops.forEach(sop => {
                        let mdContent = `# ${sop.title}\n\n`;
                        if (sop.objective) mdContent += `**Objective:**\n${sop.objective}\n\n`;
                        if (sop.scope) mdContent += `**Scope:**\n${sop.scope}\n\n`;
                        if (sop.prerequisites) mdContent += `**Prerequisites:**\n${sop.prerequisites}\n\n`;
                        if (sop.kpis) mdContent += `**KPIs:**\n${sop.kpis}\n\n`;
                        if (sop.troubleshooting) mdContent += `**Troubleshooting:**\n${sop.troubleshooting}\n\n`;

                        if (sop.steps && sop.steps.length > 0) {
                            mdContent += `### Process Steps\n`;
                            sop.steps.forEach((step, idx) => {
                                mdContent += `**${idx + 1}. ${step.action}**\n*Owner: ${step.owner} | Duration: ${step.duration}*\n${step.details}\n\n`;
                            });
                        }

                        policiesArray.push({
                            id: sop.id || generateId(),
                            title: sop.title || 'Standard Operating Procedure',
                            content: mdContent.trim(),
                            lastUpdated: sop.docControl?.lastReviewed || defaultDate
                        });
                    });
                }

                if (localPolicyData.handbook) {
                    let mdContent = `# ${localPolicyData.handbook.title || 'Employee Handbook'}\n\n`;
                    if (localPolicyData.handbook.introduction) mdContent += `## Introduction\n${localPolicyData.handbook.introduction}\n\n`;
                    if (localPolicyData.handbook.mission) mdContent += `## Mission\n${localPolicyData.handbook.mission}\n\n`;
                    if (localPolicyData.handbook.vision) mdContent += `## Vision\n${localPolicyData.handbook.vision}\n\n`;
                    if (localPolicyData.handbook.timekeeping) mdContent += `## Timekeeping & Attendance\n${localPolicyData.handbook.timekeeping}\n\n`;
                    if (localPolicyData.handbook.compensation) mdContent += `## Compensation & Benefits\n${localPolicyData.handbook.compensation}\n\n`;
                    if (localPolicyData.handbook.offboarding) mdContent += `## Resignation & Offboarding\n${localPolicyData.handbook.offboarding}\n\n`;

                    if (localPolicyData.handbook.leaves && localPolicyData.handbook.leaves.length > 0) {
                        mdContent += `## Leaves Structure\n`;
                        localPolicyData.handbook.leaves.forEach(l => {
                            mdContent += `- **${l.name}** (${l.duration}): ${l.condition}\n`;
                        });
                        mdContent += `\n`;
                    }

                    if (localPolicyData.handbook.discipline && localPolicyData.handbook.discipline.length > 0) {
                        mdContent += `## Discipline Framework\n`;
                        localPolicyData.handbook.discipline.forEach(d => {
                            mdContent += `### ${d.level}\n**Action:** ${d.action}\n**Details:** ${d.details}\n\n`;

                    if (localPolicyData.handbook.customPolicies && localPolicyData.handbook.customPolicies.length > 0) {
                        mdContent += `## Custom Policies\n`;
                        localPolicyData.handbook.customPolicies.forEach(cp => {
                            mdContent += `### ${cp.title}\n${cp.text}\n\n`;
                        });
                    }

                    policiesArray.push({
                        id: 'doc-handbook',
                        title: localPolicyData.handbook.title || 'Employee Handbook',
                        content: mdContent.trim(),
                        lastUpdated: localPolicyData.handbook.docControl?.lastReviewed || defaultDate
                    });
                }

                if (localPolicyData.standardDocs) {
                    Object.keys(localPolicyData.standardDocs).forEach(key => {
                        const doc = localPolicyData.standardDocs[key];
                        let mdContent = `# ${doc.title || 'Standard Document'}\n\n`;
                        if (doc.introduction) mdContent += `## Introduction\n${doc.introduction}\n\n`;

                        if (doc.sections && doc.sections.length > 0) {
                            doc.sections.forEach((sec, idx) => {
                                mdContent += `## ${idx + 1}. ${sec.title}\n${sec.content}\n\n`;
                            });
                        }

                        policiesArray.push({
                            id: `doc-${key}`,
                            title: doc.title || 'Standard Document',
                            content: mdContent.trim(),
                            lastUpdated: doc.docControl?.lastReviewed || defaultDate
                        });
                    });
                }

                return policiesArray;
            };

            const handlePublishToVault = async () => {
                if (isStandalone || authError || !isAuthed || !activeProfileId) return;
                setIsPublishing(true);
                try {
                    const policies = compilePoliciesForVault();
                    for (const policy of policies) {
                        const vaultRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'core_policies', policy.id);
                        await window.setDoc(vaultRef, policy, { merge: true });
                    }
                    if (window.logAudit) {
                        await window.logAudit('policy_vault_publish', { profileId: activeProfileId, count: policies.length });
                    }
                    triggerToast(`📋 Published ${policies.length} policies to Workspace Vault`);
                } catch (e) {
                    console.error('Vault publish error:', e);
                    triggerToast('❌ Failed to publish policies to Vault.');
                }
                setIsPublishing(false);
            };

            // --- EXPORT JSON FOR MASTER ADMIN CONSOLE IMPORTER ---
            const handleExportJSON = () => {
                try {
                    const policiesArray = compilePoliciesForVault();
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(policiesArray, null, 2));
                    const downloadAnchorNode = document.createElement('a');
                    downloadAnchorNode.setAttribute("href", dataStr);
                    const clientName = activeClient?.clientCompany ? activeClient.clientCompany.replace(/[^a-z0-9]/gi, '_') : 'Workspace';
                    downloadAnchorNode.setAttribute("download", `${clientName}_Policies_Export.json`);
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();
                    
                    triggerToast("📄 JSON Policies Exported!");
                } catch(e) {
                    console.error("Export Error: ", e);
                    triggerToast("❌ Failed to export JSON.");

            // Individual document template re-initialization
            const handleResetToDefault = () => {
                if (activeMode === 'sop') {
                    setLocalPolicyData(prev => ({
                        ...prev,
                        sops: JSON.parse(JSON.stringify(DEFAULT_DOCUMENT_DATA.sops))
                    }));
                    triggerToast("🔄 SOP Manual reinitialized to default template! Remember to save changes.");
                } else if (activeMode === 'handbook') {
                    setLocalPolicyData(prev => ({
                        ...prev,
                        handbook: JSON.parse(JSON.stringify(DEFAULT_DOCUMENT_DATA.handbook))
                    }));
                    triggerToast("🔄 Employee Handbook reinitialized to default template! Remember to save changes.");
                } else if (localPolicyData.standardDocs?.[activeMode]) {
                    setLocalPolicyData(prev => ({
                        ...prev,
                        standardDocs: {
                            ...prev.standardDocs,
                            [activeMode]: JSON.parse(JSON.stringify(DEFAULT_DOCUMENT_DATA.standardDocs[activeMode]))
                        }
                    }));
                    triggerToast(`🔄 ${getActiveDocTitle()} reinitialized to default template! Remember to save changes.`);
                }
                setShowResetConfirmModal(false);
            };

            // Global workspace migration to latest compliance templates
            const handleBulkResetToDefault = () => {
                setLocalPolicyData(JSON.parse(JSON.stringify(DEFAULT_DOCUMENT_DATA)));
                triggerToast("🔄 All documents upgraded to latest templates! Remember to click 'Save to Cloud' to commit.");
                setShowBulkResetModal(false);
            };

            // --- SYNC WORKFLOW DIAGRAM AS SOP MANUAL ---
            const handleSyncSopFromTab = (tab) => {
                const profile = workbookProfiles.find(p => p.id === activeProfileId);
                
                const sortedNodes = (tab.present?.nodes || [])
                    .filter(n => n.type === 'process' || n.type === 'approval')
                    .sort((a, b) => a.x - b.x);

                if (sortedNodes.length === 0) {
                    triggerToast("⚠️ This workflow diagram has no process or approval nodes to import.");
                    return;
                }

                // Resolve RACI roles dynamically from active profile RACI assignments matrix and swimlanes
                const rRoles = [];
                const aRoles = [];
                const cRoles = [];
                const iRoles = [];

                sortedNodes.forEach(node => {
                    const lane = tab.present?.lanes?.find(l => l.id === node.roleId);
                    if (lane) {
                        const name = lane.label.replace(/\n/g, ' ');
                        if (!rRoles.includes(name)) rRoles.push(name);
                    }
                });

                if (profile?.raciAssignments) {
                    sortedNodes.forEach(node => {
                        const nodeRaci = profile.raciAssignments[node.id];
                        if (nodeRaci) {
                            Object.entries(nodeRaci).forEach(([laneId, value]) => {
                                const lane = tab.present?.lanes?.find(l => l.id === laneId);
                                if (lane) {
                                    const name = lane.label.replace(/\n/g, ' ');
                                    if (value === 'R' && !rRoles.includes(name)) rRoles.push(name);
                                    if (value === 'A' && !aRoles.includes(name)) aRoles.push(name);
                                    if (value === 'C' && !cRoles.includes(name)) cRoles.push(name);
                                    if (value === 'I' && !iRoles.includes(name)) iRoles.push(name);
                                }
                            });
                        }
                    });
                }

                const mappedSteps = sortedNodes.map(node => {
                    const lane = tab.present?.lanes?.find(l => l.id === node.roleId);
                    return {
                        id: node.id,
                        action: node.label.replace(/\n/g, ' '),
                        owner: lane ? lane.label.replace(/\n/g, ' ') : 'Unassigned',
                        duration: node.duration || '1 Hour',
                        details: node.description || 'Proceed with standard operational precautions as outlined in Mod2 diagrammer.'
                    };
                });

                const uniqueLanes = [...new Set(mappedSteps.map(s => s.owner).filter(o => o !== 'Unassigned'))];

                const newSop = {
                    id: 'sop-' + Date.now(),
                    title: tab.name,
                    docControl: {
                        version: '1.0',
                        effectiveDate: new Date().toISOString().split('T')[0],
                        lastReviewed: new Date().toISOString().split('T')[0],
                        owner: uniqueLanes[0] || 'Operations Lead'
                    },
                    objective: `To standardize the execution steps of the ${tab.name} workflow to optimize efficiency, limit errors, and minimize operational delay points.`,
                    scope: `Applies to all ${uniqueLanes.join(', ') || 'relevant functional team'} personnel involved in this process path.`,
                    prerequisites: `1. Fully trained status on ${tab.name} architecture.\n2. Access to primary software/tools as diagrammed.`,
                    kpis: `1. SLA target times met per process node.\n2. Less than 5% delay deviation on handoffs.`,
                    troubleshooting: `1. Delay on Handoff: Escalate to direct supervisor immediately if an orthogonal pathway stalls.`,
                    raci: {
                        responsible: rRoles.join(', ') || 'Fulfillment Team',
                        accountable: aRoles.join(', ') || uniqueLanes[0] || 'Manager',
                        consulted: cRoles.join(', ') || 'Consulted Stakeholders',
                        informed: iRoles.join(', ') || 'Finance/Management'
                    },
                    steps: mappedSteps
                };

                setLocalPolicyData(prev => {
                    const filtered = (prev.sops || []).filter(s => s.title.toLowerCase() !== tab.name.toLowerCase());
                    return {
                        ...prev,
                        sops: [...filtered, newSop]
                    };
                });

                setShowSyncModal(false);
                triggerToast(`🔄 Successfully synchronized "${tab.name}" as an SOP!`);
            };

            const updateActiveClientField = (field, value) => {
                setActiveClient(prev => ({ ...prev, [field]: value }));
            };

            const updateActiveClientBranding = (field, value) => {
                setActiveClient(prev => ({ ...prev, branding: { ...prev.branding, [field]: value } }));
            };

            const updateDocState = (domain, pathFn) => {
                setLocalPolicyData(prev => ({ ...prev, [domain]: pathFn(prev[domain]) }));
            };

            // SOP Handlers
            const addSOP = () => updateDocState('sops', sops => [...sops, JSON.parse(JSON.stringify(DEFAULT_DOCUMENT_DATA.sops[0]))]);
            const deleteSOP = (id) => updateDocState('sops', sops => sops.filter(s => s.id !== id));
            const updateSOP = (id, field, val) => updateDocState('sops', sops => sops.map(s => s.id === id ? { ...s, [field]: val } : s));
            const updateSopDocControl = (id, field, val) => updateDocState('sops', sops => sops.map(s => s.id === id ? { ...s, docControl: { ...(s.docControl || { version: '1.0', effectiveDate: '', lastReviewed: '', owner: '' }), [field]: val } } : s));
            const updateSopRaci = (id, role, val) => updateDocState('sops', sops => sops.map(s => s.id === id ? { ...s, raci: { ...(s.raci || { responsible: '', accountable: '', consulted: '', informed: '' }), [role]: val } } : s));
            const addStep = (sopId) => updateDocState('sops', sops => sops.map(s => s.id === sopId ? { ...s, steps: [...(s.steps || []), { id: 'step-' + Date.now(), action: 'New Step', owner: '', duration: '', details: '' }] } : s));
            const removeStep = (sopId, stepId) => updateDocState('sops', sops => sops.map(s => s.id === sopId ? { ...s, steps: (s.steps || []).filter(st => st.id !== stepId) } : s));
            const updateStep = (sopId, stepId, field, val) => updateDocState('sops', sops => sops.map(s => s.id === sopId ? { ...s, steps: (s.steps || []).map(st => st.id === stepId ? { ...st, [field]: val } : st) } : s));
            const reorderStep = (sopId, sIdx, dir) => updateDocState('sops', sops => sops.map(s => s.id === sopId ? { ...s, steps: moveArrayItem(s.steps || [], sIdx, dir) } : s));

            // Handbook Handlers
            const updateHandbook = (field, val) => updateDocState('handbook', h => ({ ...h, [field]: val }));
            const updateHandbookDocControl = (field, val) => updateDocState('handbook', h => ({ ...h, docControl: { ...(h.docControl || { version: '1.0', effectiveDate: '', lastReviewed: '', owner: '' }), [field]: val } }));
            const updateHbArray = (arr, id, f, v) => updateDocState('handbook', h => ({ ...h, [arr]: (h[arr] || []).map(i => i.id === id ? { ...i, [f]: v } : i) }));
            const addCustomPolicy = () => updateDocState('handbook', h => ({ ...h, customPolicies: [...(h.customPolicies || []), { id: 'cp-' + Date.now(), title: 'New Policy', text: 'Details...' }] }));
            const removeCustomPolicy = (id) => updateDocState('handbook', h => ({ ...h, customPolicies: (h.customPolicies || []).filter(p => p.id !== id) }));
            
            const addLeave = () => updateDocState('handbook', h => ({ ...h, leaves: [...(h.leaves || []), { id: 'lv-' + Date.now(), name: 'New Leave', duration: '5 Days', condition: 'Standard allocations apply.' }] }));
            const removeLeave = (id) => updateDocState('handbook', h => ({ ...h, leaves: (h.leaves || []).filter(l => l.id !== id) }));
            
            const addDiscipline = () => updateDocState('handbook', h => ({ ...h, discipline: [...(h.discipline || []), { id: 'd-' + Date.now(), level: 'New Infraction Class', action: 'Assigned Sanction', details: 'Remediation details...' }] }));
            const removeDiscipline = (id) => updateDocState('handbook', h => ({ ...h, discipline: (h.discipline || []).filter(d => d.id !== id) }));

            const reorderHbArray = (arr, idx, dir) => updateDocState('handbook', h => ({ ...h, [arr]: moveArrayItem(h[arr] || [], idx, dir) }));

            // Standard Docs Handlers (Conduct, NDA, BCP, SLA, etc.)
            const updateStandardDoc = (key, field, val) => updateDocState('standardDocs', docs => ({ ...docs, [key]: { ...docs[key], [field]: val } }));
            const updateStandardDocControl = (key, field, val) => updateDocState('standardDocs', docs => ({
                ...docs,
                [key]: {
                    ...docs[key],
                    docControl: {
                        ...(docs[key]?.docControl || { version: '1.0', effectiveDate: '', lastReviewed: '', owner: '' }),
                        [field]: val
                    }
                }
            }));
            const updateStandardSection = (key, secId, field, val) => updateDocState('standardDocs', docs => ({ ...docs, [key]: { ...docs[key], sections: (docs[key]?.sections || []).map(s => s.id === secId ? { ...s, [field]: val } : s) } }));
            const addStandardSection = (key) => updateDocState('standardDocs', docs => ({ ...docs, [key]: { ...docs[key], sections: [...(docs[key]?.sections || []), { id: 'sec-' + Date.now(), title: 'New Section', content: 'Details...' }] } }));
            const removeStandardSection = (key, secId) => updateDocState('standardDocs', docs => ({ ...docs, [key]: { ...docs[key], sections: (docs[key]?.sections || []).filter(s => s.id !== secId) } }));
            const reorderStandardSection = (key, idx, dir) => updateDocState('standardDocs', docs => ({ ...docs, [key]: { ...docs[key], sections: moveArrayItem(docs[key]?.sections || [], idx, dir) } }));

            const getActiveDocTitle = () => {
                if (activeMode === 'dashboard') return 'Workspace Dashboard';
                if (activeMode === 'sop') return 'Standard Operating Procedures';
                if (activeMode === 'handbook') return localPolicyData.handbook?.title || 'Employee Handbook';
                if (activeMode === 'branding') return 'Branding & Identity';
                return localPolicyData.standardDocs?.[activeMode]?.title || 'Document';
            };

            const activeProfile = useMemo(() => {
                if (isStandalone) return activeClient;
                return workbookProfiles.find(p => p.id === activeProfileId);
            }, [activeProfileId, workbookProfiles, isStandalone, activeClient]);

            const renderDashboard = () => {
                if (!activeClient) return <div>Loading Data...</div>;
                
                const docsList = [
                    { id: 'handbook', group: 'HR', title: 'Employee Handbook', obj: localPolicyData.handbook },
                    { id: 'conduct', group: 'Legal', title: 'Code of Conduct', obj: localPolicyData.standardDocs?.conduct },
                    { id: 'nda', group: 'Legal', title: 'Non-Disclosure (NDA)', obj: localPolicyData.standardDocs?.nda },
                    { id: 'dataPrivacy', group: 'IT', title: 'Data Privacy & Sec', obj: localPolicyData.standardDocs?.dataPrivacy },
                    { id: 'healthSafety', group: 'Ops', title: 'Health & Safety', obj: localPolicyData.standardDocs?.healthSafety },
                    { id: 'bcp', group: 'Ops', title: 'Business Continuity', obj: localPolicyData.standardDocs?.bcp },

                                            {activeMode !== 'branding' && activeMode !== 'dashboard' && (
                                                <tr className="block print:table-row page-break-avoid">
                                                    <td className="block print:table-cell px-10 pb-10 mt-12 pt-8 border-t border-slate-200 align-top text-sm w-full">
                                                        <div className="grid grid-cols-2 gap-12 w-full">
                                                            <div>
                                                                <p className="text-slate-500 mb-8 font-medium">Acknowledged and Accepted By:</p>
                                                                <div className="border-t border-slate-400 pt-2 font-bold text-slate-900">{activeClient.policySignatoryName || activeClient.clientRep}</div>
                                                                <div className="text-xs text-slate-600 font-semibold mt-1">{activeClient.policySignatoryTitle || activeClient.sponsorTitle}</div>
                                                                <div className="text-xs text-slate-550 mt-1">{activeClient.clientCompany}</div>
                                                            </div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            )}
                                
                                        </tbody> 

                                        {/* Repeating Print Footer */}
                                        {activeMode !== 'branding' && (
                                            <tfoot className="hidden print:table-footer-group">
                                                <tr className="block print:table-row">
                                                    <td className="block print:table-cell pt-4 pb-4 px-10 align-top">
                                                        <div className="border-t-2 pt-3 flex justify-between items-center text-[10px] text-slate-550 font-bold uppercase tracking-wider" style={{ borderColor: activeClient.branding?.primaryColor || '#0f766e' }}>
                                                            <div>{activeClient.clientCompany} — Confidential & Proprietary</div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            </tfoot>
                                        )}

                                    </table>
                                </>
                            )}
                        </main>

                    </div>

                    {/* Draggable/Polished Sync Modal (Matches Mod2 Workflow Studio visual identity) */}
                    {showSyncModal && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm no-print" onPointerDown={() => setShowSyncModal(false)}>
                            <div 
                                className="w-[500px] bg-brandNavy-955 border border-brandNavy-800 border-t-4 border-t-brandTeal-500 rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] p-6 text-left animate-pop-in text-white font-sans flex flex-col gap-4"
                                onPointerDown={(e) => e.stopPropagation()}
                            >
                                <div className="flex justify-between items-center border-b border-brandNavy-800 pb-3">
                                    <div className="flex items-center gap-2 text-brandTeal-400">
                                        <Icons.FileText />
                                        <h3 className="text-sm font-bold uppercase tracking-widest text-white">Import Workflow Diagram</h3>
                                    </div>
                                    <button onClick={() => setShowSyncModal(false)} className="text-slate-400 hover:text-white transition-colors cursor-pointer"><Icons.Close /></button>
                                </div>
                                
                                <p className="text-xs text-slate-400 leading-relaxed">
                                    Select an active workflow tab diagrammed in the <strong>Workflow Studio</strong> to automatically generate or update an operational SOP. This pulls step-by-step actions, durations, Swimlane owners, and translates RACI boundaries instantly.
                                </p>

                                <div className="space-y-3 max-h-[300px] overflow-y-auto pr-1 mt-2">
                                    {(() => {
                                        const availableTabs = activeProfile?.tabs || [];
                                        
                                        if (availableTabs.length === 0) {
                                            return (
                                                <div className="text-center py-8 text-xs text-slate-500 font-medium">
                                                    No active workflows found in this client profile. Map them first in Mod2: Workflow Studio.
                                                </div>
                                            );
                                        }

                                        return availableTabs.map(tab => {
                                            const pNodesCount = (tab.present?.nodes || []).filter(n => n.type === 'process' || n.type === 'approval').length;
                                            return (
                                                <div 
                                                    key={tab.id}
                                                    onClick={() => { handleSyncSopFromTab(tab); setShowSyncModal(false); }}
                                                    className="flex items-center justify-between p-3.5 bg-brandNavy-900 border border-brandNavy-800 hover:border-brandTeal-500 rounded-lg cursor-pointer transition-all group"
                                                >
                                                    <div>
                                                        <h4 className="text-xs font-bold text-slate-100 group-hover:text-brandTeal-404 transition-colors">{tab.name}</h4>
                                                        <p className="text-[10px] text-slate-400 mt-1 font-mono">{pNodesCount} Process Blocks · {tab.present?.lanes?.length || 0} Swimlanes</p>
                                                    </div>
                                                    <button type="button" className="text-[10px] font-bold uppercase bg-brandTeal-500/10 text-brandTeal-404 border border-brandTeal-500/20 px-2.5 py-1 rounded group-hover:bg-brandTeal-500 group-hover:text-brandNavy-955 transition-all">Import</button>
                                                </div>
                                            );
                                        });
                                    })()}
                                </div>

                                <div className="pt-2 border-t border-brandNavy-800 flex justify-end">
                                    <button onClick={() => setShowSyncModal(false)} className="px-4 py-1.5 bg-brandNavy-900 hover:bg-brandNavy-850 text-xs font-bold uppercase rounded border border-brandNavy-800 text-slate-300">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Reset Document Template Confirmation Modal */}
                    {showResetConfirmModal && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm no-print" onPointerDown={() => setShowResetConfirmModal(false)}>
                            <div 
                                className="w-[450px] bg-brandNavy-955 border border-brandNavy-800 border-t-4 border-t-rose-500 rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] p-6 text-left animate-pop-in text-white font-sans flex flex-col gap-4"
                                onPointerDown={(e) => e.stopPropagation()}
                            >
                                <div className="flex justify-between items-center border-b border-brandNavy-800 pb-3">
                                    <div className="flex items-center gap-2 text-rose-400">
                                        <Icons.Reset />
                                        <h3 className="text-sm font-bold uppercase tracking-widest text-white">Reset Document to Template</h3>
                                    </div>
                                    <button onClick={() => setShowResetConfirmModal(false)} className="text-slate-400 hover:text-white transition-colors cursor-pointer"><Icons.Close /></button>
                                </div>
                                
                                <p className="text-xs text-slate-400 leading-relaxed">
                                    Are you sure you want to reset <strong>{getActiveDocTitle()}</strong> to the default compliance template? This will replace your current edits with the latest system draft.
                                </p>

                                <div className="p-3 bg-rose-500/10 border border-rose-500/20 rounded-lg text-rose-300 text-[11px] leading-relaxed font-semibold">
                                    ⚠️ Warning: This action is local and temporary until you click "Save to Cloud". If you proceed and save, your previous custom edits for this document will be permanently overwritten.
                                </div>

                                <div className="pt-2 border-t border-brandNavy-800 flex justify-end gap-2">
                                    <button onClick={() => setShowResetConfirmModal(false)} className="px-4 py-1.5 bg-brandNavy-900 hover:bg-brandNavy-850 text-xs font-bold uppercase rounded border border-brandNavy-800 text-slate-300">Cancel</button>
                                    <button onClick={handleResetToDefault} className="px-4 py-1.5 bg-rose-600 hover:bg-rose-500 text-xs font-bold uppercase rounded text-white shadow-lg transition-all">Reset to Template</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Bulk Workspace Reset Confirmation Modal */}
                    {showBulkResetModal && (
                        <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/60 backdrop-blur-sm no-print" onPointerDown={() => setShowBulkResetModal(false)}>
                            <div 
                                className="w-[480px] bg-brandNavy-955 border border-brandNavy-800 border-t-4 border-t-rose-600 rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.5)] p-6 text-left animate-pop-in text-white font-sans flex flex-col gap-4"
                                onPointerDown={(e) => e.stopPropagation()}
                            >
                                <div className="flex justify-between items-center border-b border-brandNavy-800 pb-3">
                                    <div className="flex items-center gap-2 text-rose-505">
                                        <Icons.Reset />
                                        <h3 className="text-sm font-bold uppercase tracking-widest text-white">Reset All Workspace Documents</h3>
                                    </div>
                                    <button onClick={() => setShowBulkResetModal(false)} className="text-slate-400 hover:text-white transition-colors cursor-pointer"><Icons.Close /></button>
                                </div>
                                
                                <p className="text-xs text-slate-400 leading-relaxed font-semibold">
                                    This action will reset ALL 10 policy documents in this active workspace (SOPs, Handbook, Conduct, NDA, BCP, SLA, etc.) back to their latest system-defined compliance drafts.
                                </p>

                                <div className="p-3 bg-rose-500/10 border border-rose-500/20 rounded-lg text-rose-300 text-[11px] leading-relaxed font-semibold">
                                    ⚠️ Critical Warning: This operation applies to all policies simultaneously. To write these updates to the cloud, you must click "Save to Cloud" after resetting. This is ideal if you have older workspaces that you want to upgrade to our brand-new comprehensive templates.
                                </div>

                                <div className="pt-2 border-t border-brandNavy-800 flex justify-end gap-2">
                                    <button onClick={() => setShowBulkResetModal(false)} className="px-4 py-1.5 bg-brandNavy-900 hover:bg-brandNavy-850 text-xs font-bold uppercase rounded border border-brandNavy-800 text-slate-300">Cancel</button>
                                    <button onClick={handleBulkResetToDefault} className="px-4 py-1.5 bg-rose-600 hover:bg-rose-500 text-xs font-bold uppercase rounded text-white shadow-lg transition-all">Reset All to Templates</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
