  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #020613; }
    ::-webkit-scrollbar-thumb { background: #0F1A2C; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #14B8A6; }
    
    .luxury-gradient { 
      background: radial-gradient(circle at 50% -20%, #0F1A2C 0%, #020613 100%); 
    }
    
    @media print {
      body, #root, #root > div, .animate-fade-in, .print-card { 
        background: white !important; 
        color: #0f172a !important; 
        font-family: "Montserrat", sans-serif !important; 
        margin: 0 !important; 
        padding: 0 !important; 
        border: none !important; 
        border-radius: 0px !important; 
        box-shadow: none !important; 
        width: 100% !important; 
        max-width: 100% !important; 
        height: auto !important;
        overflow: visible !important;
      }
      .luxury-gradient { background: none !important; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      .print-card * { 
        color: #0f172a !important; 
        border-color: #cbd5e1 !important; 
        text-shadow: none !important; 
        box-shadow: none !important; 
      }
      .print-card-header { 
        border-bottom: 2px solid #0f766e !important; 
        padding-bottom: 1rem !important; 
        margin-bottom: 1.5rem !important; 
        margin-top: 0 !important; 
      }
      .print-pill { 
        background: #f8fafc !important; 
        border: 1px solid #e2e8f0 !important; 
        color: #0f766e !important; 
      }
      .print-accent { color: #0f766e !important; fill: #0f766e !important; }
      .print-divider { border-color: #cbd5e1 !important; }
      .print-section-hidden { display: none !important; }
      .print-module-card { min-height: auto !important; }
      .print-chaos-metric { background: #fff !important; border-left: 3px solid #0f766e !important; }
      .print-chaos-leak { border-left-color: #e11d48 !important; }
      .print-chaos-recovery { border-left-color: #059669 !important; }
      .print-page-footer {
        margin-top: 2rem;
        padding-top: 0.75rem;
        border-top: 1px solid #cbd5e1 !important;
        font-size: 8px !important;
        color: #64748b !important;
        display: flex !important;
        justify-content: space-between !important;
      }
      .print-avoid-break { break-inside: avoid; page-break-inside: avoid; }
      @page { size: auto; margin: 14mm 12mm; }
    }

    .print-only { display: none; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 1280px) {
      .planner-split-layout {
        height: 100%;
        min-height: 0;
        overflow: hidden;
        grid-template-rows: minmax(0, 1fr);
        align-items: stretch;
      }
      .planner-split-panel {
        min-height: 0;
        height: 100%;
        max-height: 100%;
        overflow-y: auto;
        overscroll-behavior: contain;
      }
    }

    @media (max-width: 1279px) {
      #app-main {
        overflow-y: auto;
      }
      .planner-split-layout,
      .planner-split-panel {
        height: auto;
        max-height: none;
        overflow: visible;
      }
    }

    html, body, #root {
      height: 100%;
    }

    body {
      overflow: hidden;
    }

    /* Packages tab — consulting on top, products below; scroll as one column */
    .packages-view {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      gap: 1.5rem;
    }
    .packages-view-header {
      flex-shrink: 0;
    }
    .packages-section {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .packages-section + .packages-section {
      padding-top: 1.25rem;
      border-top: 1px solid rgba(51, 65, 85, 0.45);
    }
    .packages-section-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .packages-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(51, 65, 85, 0.5), transparent);
    }
    .packages-grid {
      display: grid;
      gap: 0.625rem;
      align-content: start;
      align-items: stretch;
    }
    .packages-card {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .packages-card-body {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex: 1;
      min-height: 0;
    }
    @media (min-width: 1024px) {
      .packages-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        grid-auto-rows: auto;
      }
    }
    @media (min-width: 768px) and (max-width: 1023px) {
      .packages-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
    @media (max-width: 767px) {
      .packages-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .roadmap-gantt-row-grid {
      overflow: visible;
    }

    .roadmap-gantt-chart {
      overflow: visible;
    }

    .roadmap-gantt-grid {
      overflow-x: auto;
      overflow-y: visible;
      padding-bottom: 0.25rem;
    }

    .roadmap-gantt-bar {
      position: relative;
      display: flex;
      align-items: center;
      min-width: 0;
      overflow: visible;
      justify-content: flex-start;
      text-align: left;
    }

    .roadmap-gantt-bar-fill {
      position: absolute;
      inset: 0;
      border-radius: 0.25rem;
      z-index: 1;
      pointer-events: none;
    }

    .roadmap-gantt-bar-label {
      position: relative;
      z-index: 2;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
      min-width: 0;
    }

    html.kolthoff-embed .planner-main-header {
      display: block !important;
    }

    html.kolthoff-embed .planner-main-header nav[aria-label="Main Navigation"] {
      display: flex !important;
      visibility: visible !important;
    }

    /* Compact top chrome — more vertical room for planner / doc preview */
    .planner-main-header .planner-header-inner {
      min-height: 0;
      padding-top: 0.375rem;
      padding-bottom: 0.375rem;
    }

    .planner-workspace-toolbar {
      padding-top: 0.5rem;
      padding-bottom: 0.5rem;
    }

    .planner-workspace-toolbar .planner-toolbar-inner {
      gap: 0.5rem;
    }

    html.kolthoff-embed .planner-main-header .planner-header-inner {
      padding-top: 0.25rem;
      padding-bottom: 0.25rem;
    }

    html.kolthoff-embed .planner-main-header .planner-header-inner nav {
      width: 100%;
      justify-content: flex-start;
    }

    html.kolthoff-embed .planner-workspace-toolbar {
      padding-top: 0.375rem;
      padding-bottom: 0.375rem;
    }

    html.kolthoff-embed .planner-workspace-context h2 {
      font-size: 0.8125rem;
      line-height: 1.2;
    }

    html.kolthoff-embed .planner-workspace-context .planner-workspace-meta {
      display: none;
    }

    html.kolthoff-embed .planner-workspace-context .planner-workspace-label {
      display: none;
    }

    html.kolthoff-embed .planner-workspace-switcher {
      padding: 0.375rem;
    }

    html.kolthoff-embed .planner-workspace-actions {
      gap: 0.375rem;
    }

    /* Print overrides must come after screen layout rules so they win at print time. */
    @media print {
      @page { size: auto; margin: 14mm 12mm; }

      html {
        overflow: visible !important;
      }

      html, body, #root, #root > div, #app-main,
      .planner-split-layout, .planner-split-panel,
      #package-print-area, [id$="-print-area"] {
        height: auto !important;
        max-height: none !important;
        min-height: 0 !important;
        overflow: visible !important;
        background: white !important;
      }

      body, #root > div {
        overflow: visible !important;
      }

      ::-webkit-scrollbar {
        display: none !important;
        width: 0 !important;
        height: 0 !important;
      }

      .planner-split-layout {
        display: block !important;
      }

      #package-print-area,
      [id$="-print-area"] {
        width: 100% !important;
        max-width: none !important;
        grid-column: 1 / -1 !important;
      }

      #app-main {
        max-width: none !important;
        padding: 0 !important;
      }

      .print-section {
        padding: 0 !important;
        margin: 0 0 0 0 !important;
        border: none !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        background: white !important;
      }

      .print-section + .print-section {
        break-before: page;
        page-break-before: always;
      }

      #addendum-print-area .print-section + .print-section,
      #addendum-print-area section + section {
        break-before: auto;
        page-break-before: auto;
      }

      #addendum-print-area .print-card {
        break-inside: auto;
        page-break-inside: auto;
      }

      .planner-main-header,
      .planner-workspace-toolbar,
      html.kolthoff-embed .planner-main-header,
      html.kolthoff-embed .planner-main-header nav[aria-label="Main Navigation"],
      html.kolthoff-embed .planner-workspace-toolbar {
        display: none !important;
        visibility: hidden !important;
      }

      .print-quote-terms {
        break-inside: auto;
        page-break-inside: auto;
      }

      .print-quote-signatures {
        break-inside: avoid;
        page-break-inside: avoid;
        margin-top: 1.5rem;
        padding-top: 1rem;
      }

      [aria-label="Stage-gated payment gates"] {
        display: grid !important;
        width: 100% !important;
      }

      [aria-label="Stage-gated payment gates"] > article {
        break-inside: avoid;
        page-break-inside: avoid;
        min-width: 0;
      }

      .print-card table {
        width: 100% !important;
        table-layout: fixed;
        word-wrap: break-word;
      }

      .print-financial-summary {
        flex-direction: column !important;
      }

      .print-financial-summary > div:last-child {
        border-left: none !important;
        border-top: 1px solid #cbd5e1 !important;
        padding-left: 0 !important;
        padding-top: 1rem !important;
        min-width: 0 !important;
        text-align: left !important;
      }

      .roadmap-gantt-chart {
        display: block !important;
        break-inside: auto;
        page-break-inside: auto;
      }

      .roadmap-gantt-chart .roadmap-gantt-grid {
        min-width: 0 !important;
        width: 100% !important;
        overflow: visible !important;
      }

      .roadmap-gantt-chart .roadmap-gantt-bar,
      .roadmap-gantt-chart .roadmap-gantt-bar-label,
      .roadmap-gantt-chart .roadmap-gantt-label {
        font-size: 7px !important;
        line-height: 1.2 !important;
      }

      /* Agency Ops PDF template — neutral grey/black (demo UI keeps brand colors) */
      .starter-pdf-neutral .print-accent,
      html.agency-starter-light .starter-pdf-neutral .print-accent,
      html.agency-starter-dark .starter-pdf-neutral .print-accent {
        color: #0f172a !important;
        fill: #0f172a !important;
      }
      .starter-pdf-neutral .print-card-header,
      html.agency-starter-light .starter-pdf-neutral .print-card-header,
      html.agency-starter-dark .starter-pdf-neutral .print-card-header {
        border-bottom-color: #334155 !important;
      }
      .starter-pdf-neutral .print-pill,
      html.agency-starter-light .starter-pdf-neutral .print-pill,
      html.agency-starter-dark .starter-pdf-neutral .print-pill {
        color: #334155 !important;
      }
      .starter-pdf-neutral .print-chaos-metric,
      html.agency-starter-light .starter-pdf-neutral .print-chaos-metric,
      html.agency-starter-dark .starter-pdf-neutral .print-chaos-metric {
        border-left-color: #475569 !important;
      }
      .starter-pdf-neutral [class*="text-brandTeal"],
      .starter-pdf-neutral [class*="text-teal"],
      html.agency-starter-light .starter-pdf-neutral [class*="text-brandTeal"],
      html.agency-starter-light .starter-pdf-neutral [class*="text-teal"],
      html.agency-starter-dark .starter-pdf-neutral [class*="text-brandTeal"],
      html.agency-starter-dark .starter-pdf-neutral [class*="text-teal"] {
        color: #0f172a !important;
      }
      .starter-pdf-neutral [class*="border-brandTeal"],
      html.agency-starter-light .starter-pdf-neutral [class*="border-brandTeal"],
      html.agency-starter-dark .starter-pdf-neutral [class*="border-brandTeal"] {
        border-color: #cbd5e1 !important;
      }
      .starter-pdf-neutral [class*="bg-brandTeal"],
      html.agency-starter-light .starter-pdf-neutral [class*="bg-brandTeal"],
      html.agency-starter-dark .starter-pdf-neutral [class*="bg-brandTeal"] {
        background-color: #f8fafc !important;
      }
      .starter-pdf-neutral .roadmap-gantt-bar-fill[class*="brandTeal"],
      html.agency-starter-light .starter-pdf-neutral .roadmap-gantt-bar-fill[class*="brandTeal"],
      html.agency-starter-dark .starter-pdf-neutral .roadmap-gantt-bar-fill[class*="brandTeal"] {
        background-color: #f1f5f9 !important;
        border-color: #94a3b8 !important;
      }
    }

    /* Agency Ops document preview + PDF — grey/black accents in print template only */
    .starter-pdf-neutral .print-accent {
      color: #0f172a !important;
      fill: #0f172a !important;
    }
    .starter-pdf-neutral .print-card-header {
      border-bottom-color: #334155 !important;
    }
    .starter-pdf-neutral .print-pill {
      color: #334155 !important;
    }
    .starter-pdf-neutral .print-chaos-metric {
      border-left-color: #475569 !important;
    }
    .starter-pdf-neutral [class*="text-brandTeal"],
    .starter-pdf-neutral [class*="text-teal"] {
      color: #0f172a !important;
    }
    .starter-pdf-neutral [class*="border-brandTeal"] {
      border-color: #cbd5e1 !important;
    }
    .starter-pdf-neutral [class*="bg-brandTeal"] {

    .starter-pdf-neutral .roadmap-gantt-bar-fill[class*="brandTeal"] {
      background-color: #f1f5f9 !important;

    }
