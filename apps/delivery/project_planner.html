<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Planner | Kolthoff OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <script type="module" src="../../shared/firebase-init.js"></script>
  <script type="module" src="project_planner_helpers.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js" crossorigin></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:Montserrat,sans-serif;background:#020613;color:#e2e8f0}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [ready, setReady] = useState(false);
      const [profiles, setProfiles] = useState([]);
      const [activeId, setActiveId] = useState(null);
      const [profile, setProfile] = useState(null);
      const [saving, setSaving] = useState(false);
      const [adminOk, setAdminOk] = useState(false);
      const [code, setCode] = useState('');

      useEffect(() => {
        const t = setInterval(async () => {
          if (window.firebaseDb && window.bootstrapAuth) {
            clearInterval(t);
            await window.bootstrapAuth();
            setReady(true);
          }
        }, 50);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        if (!ready || !adminOk) return;
        return window.PlannerHelpers.subscribeProfiles(setProfiles, console.error);
      }, [ready, adminOk]);

      useEffect(() => {
        if (activeId) {
          const p = profiles.find(x => x.id === activeId);
          setProfile(p ? window.PlannerHelpers.normalizeProfile(p) : null);
        } else setProfile(null);
      }, [activeId, profiles]);

      const financials = profile ? window.PlannerHelpers.getFinancials(profile) : null;

      const handleAuth = async (e) => {
        e.preventDefault();
        try {
          const r = await window.verifyAdminPasscode(code);
          if (r.valid) setAdminOk(true);
          else alert('Invalid passcode');
        } catch (err) { alert('Auth failed: ' + err.message); }
      };

      const newProfile = () => {
        const id = window.PlannerHelpers.generateId();
        const p = window.PlannerHelpers.createEmptyProfile();
        window.PlannerHelpers.saveProfile(id, p).then(() => setActiveId(id));
      };

      const save = async () => {
        if (!activeId || !profile) return;
        setSaving(true);
        await window.PlannerHelpers.saveProfile(activeId, profile);
        setSaving(false);
      };

      const toggleTask = (taskId) => {
        setProfile(prev => ({
          ...prev,
          tasks: prev.tasks.map(t => t.id === taskId ? { ...t, selected: !t.selected } : t)
        }));
      };

      if (!ready) return <div className="p-8">Connecting...</div>;

      if (!adminOk) return (
        <div className="min-h-screen flex items-center justify-center">
          <form onSubmit={handleAuth} className="bg-slate-900 p-8 rounded-xl border border-slate-700 w-full max-w-sm">
            <h1 className="text-xl font-bold mb-4 text-teal-400">Project Planner</h1>
            <input value={code} onChange={e => setCode(e.target.value)} placeholder="Admin passcode" className="w-full p-3 rounded bg-slate-800 border border-slate-600 mb-4" />
            <button className="w-full py-2 bg-teal-600 rounded font-bold">Enter</button>
          </form>
        </div>
      );

      return (
        <div className="min-h-screen flex">
          <aside className="w-72 bg-slate-900 border-r border-slate-700 p-4">
            <div className="flex justify-between items-center mb-4">
              <h1 className="font-bold text-teal-400">SOW Planner</h1>
              <button onClick={newProfile} className="text-xs bg-teal-600 px-2 py-1 rounded">+ New</button>
            </div>
            {profiles.map(p => (
              <button key={p.id} onClick={() => setActiveId(p.id)}
                className={`block w-full text-left p-2 rounded mb-1 text-sm ${activeId === p.id ? 'bg-teal-600/30' : 'hover:bg-slate-800'}`}>
                {p.clientName || p.id}
              </button>
            ))}
            <a href="../../admin/legacy/index.html" className="text-xs text-slate-500 mt-6 block">← Suite Launcher</a>
          </aside>
          <main className="flex-1 p-6 overflow-auto">
            {!profile ? (
              <p className="text-slate-500">Select or create a workbook profile.</p>
            ) : (
              <div className="max-w-4xl">
                <div className="grid grid-cols-2 gap-4 mb-6">
                  <input value={profile.clientName} onChange={e => setProfile({...profile, clientName: e.target.value})}
                    className="p-2 rounded bg-slate-800 border border-slate-600" placeholder="Client name" />
                  <input value={profile.companyName || ''} onChange={e => setProfile({...profile, companyName: e.target.value})}
                    className="p-2 rounded bg-slate-800 border border-slate-600" placeholder="Company" />
                </div>
                <div className="grid grid-cols-4 gap-3 mb-6 text-sm">
                  <label>Buffer %<input type="number" value={profile.frictionBuffer} onChange={e => setProfile({...profile, frictionBuffer: +e.target.value})} className="w-full p-2 rounded bg-slate-800 mt-1" /></label>
                  <label>Discount %<input type="number" value={profile.discountPercent} onChange={e => setProfile({...profile, discountPercent: +e.target.value})} className="w-full p-2 rounded bg-slate-800 mt-1" /></label>
                  <label>Months<input type="number" value={profile.subscriptionMonths} onChange={e => setProfile({...profile, subscriptionMonths: +e.target.value})} className="w-full p-2 rounded bg-slate-800 mt-1" /></label>
                  <div className="flex flex-col gap-2 pt-5">
                    <label><input type="checkbox" checked={profile.includeTax} onChange={e => setProfile({...profile, includeTax: e.target.checked})} /> VAT 12%</label>
                    <label><input type="checkbox" checked={profile.applyCreditBack} onChange={e => setProfile({...profile, applyCreditBack: e.target.checked})} /> Credit-back</label>
                  </div>
                </div>
                <h2 className="font-bold mb-3">Task Catalog</h2>
                <div className="space-y-2 mb-6">
                  {profile.tasks.map(t => (
                    <label key={t.id} className="flex items-center gap-3 p-3 rounded bg-slate-800/50 border border-slate-700 cursor-pointer">
                      <input type="checkbox" checked={!!t.selected} onChange={() => toggleTask(t.id)} />
                      <span className="flex-1">{t.name}</span>
                      <span className="text-xs text-slate-400">{t.category}</span>
                      <input type="number" value={t.estHours} onChange={e => setProfile({...profile, tasks: profile.tasks.map(x => x.id === t.id ? {...x, estHours: +e.target.value} : x)})}
                        className="w-16 p-1 rounded bg-slate-900 text-center text-sm" />
                      <span className="text-xs w-16">{t.tier}</span>
                    </label>
                  ))}
                </div>
                {financials && (
                  <div className="p-4 rounded-xl bg-teal-900/30 border border-teal-700 mb-4">
                    <div className="text-2xl font-bold text-teal-300">{window.PlannerHelpers.formatCurrency(financials.total)}</div>
                    <div className="text-sm text-slate-400 mt-1">Subtotal: {window.PlannerHelpers.formatCurrency(financials.subtotal)} | Tax: {window.PlannerHelpers.formatCurrency(financials.tax)}</div>
                    {financials.isCreditBackEligible && <div className="text-xs text-amber-400 mt-1">Credit-back eligible: {window.PlannerHelpers.formatCurrency(financials.creditBackAmount)}</div>}
                  </div>
                )}
                <button onClick={save} disabled={saving} className="px-6 py-2 bg-teal-600 rounded font-bold">{saving ? 'Saving...' : 'Save to Firestore'}</button>
                <a href={`../../admin/legacy/contract_ledger.html`} className="ml-4 text-sm text-teal-400 underline">Open Contract Ledger →</a>
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script type="module">
    import * as PlannerHelpers from './project_planner_helpers.js';
    window.PlannerHelpers = PlannerHelpers;
  </script>
</body>
</html>
