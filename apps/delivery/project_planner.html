    // --- PHILIPPINE TIN FORMAT VALIDATOR & GENERATOR ---
    function validatePhilippineTIN(tinString) {
      const tinRegex = /^\d{3}-\d{3}-\d{3}-\d{3,5}$/;
      return tinRegex.test(tinString);
    }

    // Standard Philippine TIN Formatter
    function formatTINInput(value) {
      const numbers = value.replace(/\D/g, '');
      let formatted = '';
      for (let i = 0; i < numbers.length; i++) {
        if (i === 3 || i === 6 || i === 9) formatted += '-';
        formatted += numbers[i];
      }
      return formatted.substring(0, 17);
    }

    function formatCurrency(val) {
      return new Intl.NumberFormat('en-PH', { 
        style: 'currency', 
        currency: 'PHP', 
        maximumFractionDigits: 0

                        <div className="flex justify-between items-center border-b border-brandNavy-700/50 pb-3 text-left">
                          <div className="flex items-center gap-2 text-left font-sans font-semibold"><span className="w-1.5 h-1.5 rounded-full bg-brandTeal-500 animate-pulse text-left"></span><span className="text-xs font-mono tracking-wider text-slate-300 uppercase font-semibold text-left font-sans">Select Services Included in SOW</span></div>
                          <div className="flex gap-2 font-sans font-semibold"><button onClick={handleSelectAllPresets} className="px-3 py-1 text-[10px] font-bold rounded bg-brandTeal-500 text-white uppercase tracking-wider">Select All</button><button onClick={handleClearAllPresets} className="px-3 py-1 text-[10px] font-bold rounded bg-brandNavy-900 text-slate-400 border border-brandNavy-700 uppercase tracking-wider">Clear All</button></div>
                        </div>
                        <div className="flex flex-wrap gap-2 text-left font-sans">
                          {[{ name: 'mod1', label: 'MOD 1' }, { name: 'mod2', label: 'MOD 2' }, { name: 'mod3', label: 'MOD 3' }, { name: 'mod4', label: 'MOD 4' }].map(preset => {
                            const isActive = activePresets.includes(preset.name);
                            return (
                              <button key={preset.name} onClick={() => handleTogglePreset(preset.name)} className={`px-3 py-1.5 text-xs font-bold rounded transition-all flex items-center gap-1.5 font-sans font-bold ${isActive ? 'bg-brandTeal-500 text-white' : 'bg-brandNavy-900 text-slate-300 border-brandNavy-700'}`}>
                                {isActive ? <IconCheck className="w-3 h-3 text-white" /> : <span className="w-1.5 h-1.5 rounded-full bg-slate-500" />}{preset.label}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                      <div className="overflow-x-auto text-left font-sans font-semibold">
                        <table className="w-full text-left border-collapse text-xs table-fixed min-w-[1050px] font-sans">
                          <thead>
                            <tr className="bg-brandNavy-950/80 text-[10px] uppercase font-mono tracking-wider text-slate-400 border-b border-brandNavy-700 font-sans font-bold">
                              <th className="py-4 px-2 text-center w-[4%]" scope="col" aria-label="Reorder">Order</th>
                              <th className="py-4 px-5 text-center w-[6%]" scope="col">Incl</th>
                              <th className="py-3 px-3 w-[15%] text-left font-sans" scope="col">Category</th>
                              <th className="py-3 px-3 w-[34%] text-left font-sans font-bold" scope="col">Deliverable Details</th>
                              <th className="py-4 px-4 text-center w-[8%]" scope="col">Hours</th>
                              <th className="py-4 px-4 text-center w-[12%] text-left" scope="col">Expert</th>
                              <th className="py-4 px-4 text-center w-[8%]" scope="col">Rate</th>
                              <th className="py-4 px-5 text-right w-[12%] font-bold text-brandTeal-400 font-sans" scope="col">Base Price</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-brandNavy-700/50 font-medium font-sans">
                            {tasks.map((task, taskIndex) => {
                              const rate = getRateForTier(task.tier);
                              const isDragging = dragTaskId === task.id;
                              return (
                                <tr
                                  key={task.id}
                                  onDragOver={handleTaskDragOver}
                                  onDrop={() => handleTaskDrop(task.id)}
                                  className={`transition-all duration-150 ${task.selected ? 'bg-brandNavy-900/40' : 'bg-brandNavy-955/10 opacity-30 font-medium'} ${isDragging ? 'opacity-50 ring-1 ring-brandTeal-500/40' : ''}`}
                                >
                                  <td className="py-4 px-2 text-center align-middle">
                                    <div className="flex flex-col items-center gap-1">
                                      <span
                                        draggable
                                        onDragStart={(e) => { e.stopPropagation(); handleTaskDragStart(task.id); }}
                                        onDragEnd={() => setDragTaskId(null)}
                                        className="cursor-grab active:cursor-grabbing text-slate-500 hover:text-brandTeal-400"
                                        title="Drag to reorder"
                                        aria-label={`Drag to reorder ${task.deliverable}`}
                                      >
                                        <IconGripVertical />
                                      </span>
                                      <div className="flex flex-col gap-0.5">
                                        <button type="button" disabled={taskIndex === 0} onClick={() => moveTaskByOffset(task.id, -1)} className="text-[9px] leading-none px-1 py-0.5 rounded text-slate-400 hover:text-brandTeal-400 disabled:opacity-30 disabled:cursor-not-allowed" aria-label="Move up">▲</button>
                                        <button type="button" disabled={taskIndex === tasks.length - 1} onClick={() => moveTaskByOffset(task.id, 1)} className="text-[9px] leading-none px-1 py-0.5 rounded text-slate-400 hover:text-brandTeal-400 disabled:opacity-30 disabled:cursor-not-allowed" aria-label="Move down">▼</button>
                                      </div>
                                    </div>
                                  </td>
                                  <td className="py-4 px-5 text-center"><button type="button" onClick={() => toggleTask(task.id)} className="p-1 rounded text-slate-400 hover:text-brandTeal-500 inline-flex font-sans" aria-pressed={task.selected}>{task.selected ? <IconCheckSquare /> : <IconSquare />}</button>{task.id.startsWith('custom-') && <button type="button" onClick={() => removeTask(task.id)} className="p-1 text-rose-500 hover:text-rose-400 rounded" aria-label="Remove task"><IconTrash className="w-3.5 h-3.5" /></button>}</td>
                                  <td className="py-2 px-3 text-left align-top"><span className="text-[9px] font-mono bg-brandNavy-950 px-2 py-1 rounded border border-brandNavy-700/80 text-brandTeal-400 font-bold block text-center leading-snug uppercase">{task.category.replace('MOD ', 'M').replace(' - ', ' · ')}</span></td>
                                  <td className="py-2 px-3 text-left align-top space-y-1">
                                    <textarea
                                      rows={1}
                                      ref={(el) => { if (el) autoResizeField(el, 42); }}
                                      value={task.deliverable}
                                      onChange={(e) => updateTaskDeliverable(task.id, e.target.value)}
                                      onInput={(e) => autoResizeField(e.target, 42)}
                                      onFocus={(e) => autoResizeField(e.target, 42)}
                                      disabled={!task.selected}
                                      className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded px-2 py-1 text-[11px] font-semibold text-slate-100 leading-snug focus:outline-none focus:border-brandTeal-500 disabled:opacity-50 resize-none overflow-hidden min-h-[1.4rem] max-h-[2.75rem]"
                                      aria-label={`Deliverable name for ${task.category}`}
                                    />
                                    <textarea
                                      rows={1}
                                      ref={(el) => { if (el) autoResizeField(el, 68); }}
                                      value={task.description}
                                      onChange={(e) => updateTaskDescription(task.id, e.target.value)}
                                      onInput={(e) => autoResizeField(e.target, 68)}
                                      onFocus={(e) => autoResizeField(e.target, 68)}
                                      disabled={!task.selected}
                                      className="w-full bg-brandNavy-950/80 border border-brandNavy-800 rounded px-2 py-1 text-[10px] text-slate-400 leading-snug focus:outline-none focus:border-brandTeal-500/70 disabled:opacity-50 resize-none overflow-hidden min-h-[1.4rem] max-h-[4.25rem]"
                                      aria-label={`Deliverable description for ${task.deliverable}`}
                                    />
                                    {task.highRisk && <span className="text-rose-500 text-[9px] font-sans" title="High Risk Custom Build">⚠ High Risk Build</span>}
                                  </td>
                                  <td className="py-4 px-4 text-center"><input type="number" min="0" value={task.estHours} onChange={(e) => updateTaskHours(task.id, e.target.value)} className="w-16 bg-brandNavy-950 border border-brandNavy-700 rounded px-1.5 py-1 text-xs text-center font-mono font-bold text-slate-200 focus:outline-none focus:border-brandTeal-500" disabled={!task.selected} /></td>
                                  <td className="py-4 px-4 text-center"><select value={task.tier} onChange={(e) => updateTaskTier(task.id, e.target.value)} className="w-full bg-brandNavy-955 border border-brandNavy-700 rounded py-1 px-1.5 text-[11px] text-slate-200 focus:outline-none focus:border-brandTeal-500" disabled={!task.selected}><option value="associate">Specialist</option><option value="senior">Architect</option><option value="principal">Strategist</option><option value="partner">IT Partner</option></select></td>
                                  <td className="py-4 px-4 text-center font-mono text-xs text-slate-400 font-bold">₱{rate}</td>
                                  <td className="py-4 px-5 text-right font-mono text-xs text-slate-100 whitespace-nowrap">{formatCurrency(task.estHours * rate)}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>

                    {/* Custom Task Generator Form */}
                    <div className="bg-brandNavy-900 border border-brandNavy-700 rounded-xl p-5 shadow-2xl text-left font-sans font-semibold">
                      <h3 className="text-xs font-bold font-mono uppercase text-brandTeal-400 mb-4 flex items-center gap-2 text-left font-sans font-semibold"><IconPlus /> Add Bespoke SOW Task</h3>
                      <form onSubmit={addNewTask} className="grid grid-cols-1 md:grid-cols-12 gap-4 items-end text-left font-sans">
                        <div className="col-span-12 md:col-span-3 text-left">
                          <label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Target Phase</label>
                          <select value={newTaskCategory} onChange={e => setNewTaskCategory(e.target.value)} className="w-full bg-brandNavy-955 border border-brandNavy-700 rounded p-2.5 text-xs text-slate-200 focus:outline-none font-sans font-medium">
                            <option value="MOD 1 - Workflow Diagnosis">MOD 1 - Diagnosis</option>
                            <option value="MOD 2 - Organizing How You Work">MOD 2 - Organizing</option>
                            <option value="MOD 3 - Workspace Automation">MOD 3 - Automation</option>
                            <option value="MOD 4 - Ongoing Support">MOD 4 - Ongoing Care</option>
                          </select>
                        </div>
                        <div className="col-span-12 md:col-span-3 text-left font-sans font-medium">
                          <label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Custom Deliverable Name</label>
                          <input type="text" placeholder="e.g. Custom API Build" value={newTaskDeliv} onChange={e => setNewTaskDeliv(e.target.value)} className="w-full bg-brandNavy-955 border border-brandNavy-700 rounded p-2.5 text-xs text-slate-200 focus:outline-none" required />
                        </div>
                        <div className="col-span-12 md:col-span-2 text-left font-sans font-medium">
                          <label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Base Hours</label>
                          <input type="number" placeholder="0" value={newTaskHours} onChange={e => setNewTaskHours(e.target.value)} className="w-full bg-brandNavy-955 border border-brandNavy-700 rounded p-2.5 text-xs text-slate-200 focus:outline-none" required min="1" />
                        </div>
                        <div className="col-span-12 md:col-span-2 text-left font-sans">
                          <label className="text-[10px] font-mono text-slate-400 uppercase block mb-1">Friction / Complexity</label>
                          <select value={newTaskMultiplier} onChange={e => setNewTaskMultiplier(Number(e.target.value))} className="w-full bg-brandNavy-955 border border-brandNavy-700 rounded p-2.5 text-xs text-slate-200 focus:outline-none font-sans font-semibold">
                            <option value="0">Low (+0%)</option>
                            <option value="15">Medium (+15%)</option>
                            <option value="30">High (+30%)</option>
                          </select>
                        </div>
                        <div className="col-span-12 md:col-span-2 text-left font-sans">
                          <button type="submit" className="w-full p-2.5 bg-brandTeal-50 hover:bg-brandTeal-400 text-slate-950 font-bold rounded text-[11px] uppercase tracking-wider font-sans font-semibold">Add To Scope</button>
                        </div>
                      </form>
                    </div>
                  </section>
                </div>
              </div>
            ) : (
              <div className="grid grid-cols-1 xl:grid-cols-12 gap-8 items-start h-full min-h-0 planner-split-layout animate-fade-in font-sans text-left">
                {renderSettingsSidebar()}
                {renderDocumentPrintCanvas()}
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
