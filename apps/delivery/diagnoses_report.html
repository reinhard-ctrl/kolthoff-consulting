                    if (!evt.data || typeof evt.data !== 'string') return;

                    if (msg.event === 'configure') {
                        configuredRef.current = true;
                        postAction({ action: 'configure', config: presetData?.configure || {} });
                    }
                    if (msg.event === 'init') {
                        readyRef.current = true;
                        sendLoad(pendingXmlRef.current);

                    if (msg.event === 'autosave' && msg.xml && onXmlChange) onXmlChange(msg.xml);

        const SaaSAuditBuilder = ({ subSaaS, setSubSaaS }) => {

            const updateSaaS = (id, key, val) => setSubSaaS(subSaaS.map(s => s.id === id ? { ...s, [key]: val } : s));
            const totalMonthly = subSaaS.reduce((acc, curr) => acc + ((Number(curr.billing) || 0) * (Number(curr.users) || 0)), 0);

            return (
                <div className="space-y-8 animate-fade-in max-w-5xl mx-auto">
                    <div>

                        <p className="text-sm text-slate-400 max-w-3xl leading-relaxed">Inventory current subscriptions to identify unused seats, duplicate tools, and generate immediate cost-recovery recommendations.</p>
                    </div>
                    <div className="glass-panel rounded-2xl p-6 shadow-xl space-y-6 bg-brandNavy-900 border border-brandNavy-800">
                        <div className="flex justify-between items-center border-b border-brandNavy-700 pb-4">
                            <h3 className="text-sm font-bold uppercase tracking-widest text-white">Subscription Register</h3>
                            <div className="flex items-center gap-4">
                                <span className="text-xs font-mono text-slate-400">Total Waste Identified: <strong className="text-emerald-400 text-sm ml-1">{formatCurrency(totalMonthly)}/mo</strong></span>
                                <button onClick={addSaaS} className="px-3 py-1.5 bg-brandTeal-500 text-brandNavy-955 font-bold text-[10px] uppercase tracking-wider rounded hover:bg-brandTeal-400 transition-colors">+ Add Software</button>

                        <div className="space-y-3">
                            {subSaaS.map(item => (
                                <div key={item.id} className="flex flex-col md:flex-row gap-3 items-center bg-brandNavy-950 p-3 rounded-xl border border-brandNavy-800">
                                    <div className="w-full md:w-1/4">
                                        <label className="text-[10px] font-mono text-slate-400 uppercase font-bold block mb-1">Tool Name</label>
                                        <input type="text" value={item.tool} onChange={(e) => updateSaaS(item.id, 'tool', e.target.value)} className="w-full bg-brandNavy-900 border border-brandNavy-700 rounded p-2 text-xs text-white focus:outline-none focus:border-brandTeal-500 font-bold" />

                                    </div>

                                </div>
                            ))}

                    </div>
                </div>
            );
        };

        // --- INTERACTIVE COORDINATE MATRIX SVG CHART COMPONENT ---
        const InteractiveMatrixChart = ({ items, hoveredId, setHoveredId, selectedId, setSelectedId }) => {
            const width = 450;
            const height = 450;
            const margin = 40;

            const getCoords = (effort, impact) => {
                const x = margin + ((effort - 1) / 4) * (width - 2 * margin);
                const y = margin + ((5 - impact) / 4) * (height - 2 * margin);
                return { x, y };
            };

            const getQuadrantLabel = (effort, impact) => {
                if (effort < 3 && impact >= 3) return { name: 'Quick Win', color: 'text-emerald-400 bg-emerald-500/20 border-emerald-500/30' };
                if (effort >= 3 && impact >= 3) return { name: 'Major Project', color: 'text-blue-400 bg-blue-500/20 border-blue-500/30' };
                if (effort < 3 && impact < 3) return { name: 'Fill-in', color: 'text-slate-400 bg-slate-500/20 border-slate-500/30' };
                return { name: 'Money Pit', color: 'text-rose-400 bg-rose-50/20 border-rose-500/30' };
            };

            return (
                <div className="flex flex-col items-center bg-brandNavy-950 p-6 rounded-2xl border border-brandNavy-800 shadow-inner w-full">
                    <div className="relative w-full max-w-[450px] aspect-square">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full rounded-xl overflow-hidden bg-brandNavy-900 border border-brandNavy-800">
                            {/* Quadrant Background Shading */}
                            <rect x={margin} y={margin} width={(width-2*margin)/2} height={(height-2*margin)/2} fill="#052e16" fillOpacity="0.15" /> {/* Quick Wins */}
                            <rect x={margin + (width-2*margin)/2} y={margin} width={(width-2*margin)/2} height={(height-2*margin)/2} fill="#1e3a8a" fillOpacity="0.15" /> {/* Major Projects */}
                            <rect x={margin} y={margin + (height-2*margin)/2} width={(width-2*margin)/2} height={(height-2*margin)/2} fill="#1e293b" fillOpacity="0.2" /> {/* Fill-ins */}
                            <rect x={margin + (width-2*margin)/2} y={margin + (height-2*margin)/2} width={(width-2*margin)/2} height={(height-2*margin)/2} fill="#881337" fillOpacity="0.15" /> {/* Money Pits */}

                            {/* Quadrant Text Identifiers in Background */}
                            <text x={margin + 15} y={margin + 25} fill="#34d399" fontSize="11" fontWeight="800" fillOpacity="0.3" letterSpacing="1">⚡ QUICK WINS</text>
                            <text x={width - margin - 15} y={margin + 25} textAnchor="end" fill="#60a5fa" fontSize="11" fontWeight="800" fillOpacity="0.3" letterSpacing="1">🚀 MAJOR PROJECTS</text>
                            <text x={margin + 15} y={height - margin - 15} fill="#94a3b8" fontSize="11" fontWeight="800" fillOpacity="0.3" letterSpacing="1">⚙️ FILL-INS</text>
                            <text x={width - margin - 15} y={height - margin - 15} textAnchor="end" fill="#f87171" fontSize="11" fontWeight="800" fillOpacity="0.3" letterSpacing="1">🚨 MONEY PITS</text>

                            {/* Center Axes Lines */}
                            <line x1={width/2} y1={margin} x2={width/2} y2={height-margin} stroke="#334155" strokeWidth="2" strokeDasharray="4,4" />
                            <line x1={margin} y1={height/2} x2={width-margin} y2={height/2} stroke="#334155" strokeWidth="2" strokeDasharray="4,4" />

                            {/* Outer Axis Borders */}
                            <rect x={margin} y={margin} width={width-2*margin} height={height-2*margin} fill="none" stroke="#475569" strokeWidth="1.5" />

                            {/* Grid ticks for scale 1-5 */}
                            {[1, 2, 3, 4, 5].map((val) => {
                                const effortX = margin + ((val - 1) / 4) * (width - 2 * margin);
                                const impactY = margin + ((5 - val) / 4) * (height - 2 * margin);
                                return (
                                    <g key={val}>
                                        {/* Effort ticks */}
                                        <line x1={effortX} y1={height - margin} x2={effortX} y2={height - margin + 6} stroke="#64748b" strokeWidth="1.5" />
                                        <text x={effortX} y={height - margin + 20} fill="#94a3b8" fontSize="10" fontFamily="monospace" textAnchor="middle">{val}</text>
                                        
                                        {/* Impact ticks */}
                                        <line x1={margin - 6} y1={impactY} x2={margin} y2={impactY} stroke="#64748b" strokeWidth="1.5" />
                                        <text x={margin - 14} y={impactY + 3} fill="#94a3b8" fontSize="10" fontFamily="monospace" textAnchor="end">{val}</text>
                                    </g>
                                );
                            })}

                            {/* Axis Titles */}
                            <text x={width/2} y={height - 8} fill="#14B8A6" fontSize="11" fontWeight="800" textAnchor="middle" letterSpacing="1.5">EXECUTION EFFORT (1-5) ➔</text>
                            <text x={10} y={height/2} fill="#14B8A6" fontSize="11" fontWeight="800" textAnchor="middle" letterSpacing="1.5" transform={`rotate(-90, 10, ${height/2})`}>BOTTOM-LINE IMPACT (1-5) ➔</text>

                            {/* Plotted Interactive Dots */}
                            {items.map((item, idx) => {
                                const { x, y } = getCoords(item.effort, item.impact);
                                const isSelected = selectedId === item.id;
                                const isHovered = hoveredId === item.id;
                                const qDetails = getQuadrantLabel(item.effort, item.impact);
                                
                                let dotColor = "#94a3b8"; // Fill-ins
                                if (qDetails.name === 'Quick Win') dotColor = "#10b981";
                                if (qDetails.name === 'Major Project') dotColor = "#3b82f6";
                                if (qDetails.name === 'Money Pit') dotColor = "#ef4444";

                                return (
                                    <g 
                                        key={item.id} 
                                        onMouseEnter={() => setHoveredId(item.id)} 
                                        onMouseLeave={() => setHoveredId(null)}
                                        onClick={() => setSelectedId(item.id)}
                                        className="cursor-pointer"
                                    >
                                        {/* Interaction Ring */}
                                        <circle 
                                            cx={x} 
                                            cy={y} 
                                            r={isSelected || isHovered ? 16 : 8} 
                                            fill={dotColor} 
                                            fillOpacity={isSelected ? "0.25" : isHovered ? "0.15" : "0"} 
                                            className="transition-all duration-200"
                                        />
                                        {/* Core Coordinate Circle */}
                                        <circle 
                                            cx={x} 
                                            cy={y} 
                                            r={isSelected ? 7 : 5.5} 
                                            fill={dotColor} 
                                            stroke="#ffffff" 
                                            strokeWidth={isSelected ? "2.5" : "1.5"}
                                            className="transition-all duration-200"
                                        />
                                        {/* Index marker text inside/near the circle for visual reference */}
                                        <text x={x} y={y - 10} fill="#ffffff" fontSize="9" fontWeight="bold" textAnchor="middle" stroke="#000000" strokeWidth="2" paintOrder="stroke" className="select-none font-mono">
                                            {idx + 1}
                                        </text>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        };

        const SynthesisBuilder = ({ synthesis, setSynthesis, annualChaosTax, projected3YearLoss, subSaaS }) => {
            const saasWasteMonthly = subSaaS.reduce((acc, curr) => acc + (curr.billing * curr.users), 0);
            const totalAnnualWaste = annualChaosTax + (saasWasteMonthly * 12);

            const [newItemText, setNewItemText] = useState('');
            const [selectedItemId, setSelectedItemId] = useState(null);

            const generatePitch = (modId) => {
                const pitches = {
                    'MOD 1': `To identify the root causes of the ${formatCurrency(totalAnnualWaste)} annual leakage, we recommend beginning with Module 1: Business Leak Scan. This will audit your software subscriptions and pinpoint exact bottlenecks before you invest in tools or training.`,
                    'MOD 2': `To recover the ${formatCurrency(totalAnnualWaste)} lost annually to manual delays, we recommend Module 2: How Your Business Runs — clear order playbooks, roles charts, and an employee handbook your team can follow.`,
                    'MOD 3': `With core processes defined, the next step is Module 3: Your Team Workspace. We launch your workspace, digitize approval forms, and train your team for daily use. See full blueprints at www.kolthoff-consulting.com.`,
                    'MOD 4': `To maintain operational integrity after go-live, we recommend Module 4: Care Plan — hosting, bi-weekly check-ins, and semi-annual health checks. Learn more at www.kolthoff-consulting.com.`
                };
                setSynthesis(prev => ({ ...prev, nextModuleId: modId, customPitch: pitches[modId] || '' }));
            };

            const updateScore = (key, val) => setSynthesis(prev => ({ ...prev, [key]: Number(val) }));
            const ScoreBarUI = ({ label, valKey, val }) => (
                <div>
                    <div className="flex justify-between items-center mb-1">

                    </div>
                    <input type="range" min="1" max="5" value={val} onChange={(e) => updateScore(valKey, e.target.value)} className="w-full accent-brandTeal-500 h-1 rounded cursor-pointer bg-brandNavy-800" aria-label={label} />
                </div>
            );

            // Matrix Operations
            const matrixItems = synthesis.matrix?.items || [];

            const addPriorityItem = () => {
                if (!newItemText || !newItemText.trim()) return;
                const newItem = { id: 'item-' + Date.now(), text: newItemText.trim(), effort: 3, impact: 3 };
                setSynthesis(prev => ({
                    ...prev,
                    matrix: {
                        ...prev.matrix,
                        items: [...(prev.matrix?.items || []), newItem]
                    }
                }));
                setNewItemText('');
            };

            const updateItemScore = (id, key, val) => {
                setSynthesis(prev => ({
                    ...prev,
                    matrix: {
                        ...prev.matrix,
                        items: (prev.matrix?.items || []).map(it => it.id === id ? { ...it, [key]: val } : it)
                    }
                }));
            };

            const deleteItem = (id) => {
                setSynthesis(prev => ({
                    ...prev,
                    matrix: {
                        ...prev.matrix,
                        items: (prev.matrix?.items || []).filter(it => it.id !== id)
                    }
                }));
            };

            const getQuadrantLabel = (effort, impact) => {
                if (effort < 3 && impact >= 3) return { name: 'Quick Win', color: 'text-emerald-400 bg-emerald-500/20 border-emerald-500/30' };
                if (effort >= 3 && impact >= 3) return { name: 'Major Project', color: 'text-blue-400 bg-blue-500/20 border-blue-500/30' };
                if (effort < 3 && impact < 3) return { name: 'Fill-in', color: 'text-slate-400 bg-slate-500/20 border-slate-500/30' };
                return { name: 'Money Pit', color: 'text-rose-400 bg-rose-50/20 border-rose-500/30' };
            };

            // Categorize dynamically for display count
            const categorization = useMemo(() => {
                const items = synthesis.matrix?.items || [];
                return {
                    quickWins: items.filter(it => Number(it.effort) < 3 && Number(it.impact) >= 3),
                    majorProjects: items.filter(it => Number(it.effort) >= 3 && Number(it.impact) >= 3),
                    fillIns: items.filter(it => Number(it.effort) < 3 && Number(it.impact) < 3),
                    moneyPits: items.filter(it => Number(it.effort) >= 3 && Number(it.impact) < 3)
                };
            }, [synthesis.matrix]);

            // Dynamically computed AI Audit insights based on live values
            const aiInsights = useMemo(() => {
                let bulletPoints = [];
                if (synthesis.communication <= 2) {
                    bulletPoints.push("Friction Point: Scattered communication models exist. Operational handovers run on unmonitored tracking logs (Viber/phone queries), triggering constant manual follow-ups.");
                } else {
                    bulletPoints.push("Advancement: Communication channels show initial stability, but still require formal SLA guardrails to prevent process leakage.");
                }

                if (synthesis.documentation <= 1) {
                    bulletPoints.push("Vulnerability: Tribal knowledge serves as the single source of truth. Your business is highly exposed to employee attrition and service execution variations.");
                } else if (synthesis.documentation <= 3) {
                    bulletPoints.push("Process Deficit: Standard operating documentation is incomplete, leading to high-variance cycles during peak campaign intervals.");
                }

                if (synthesis.accountability <= 2) {
                    bulletPoints.push("Governance Risk: Handoff boundaries are overlapping. Critical transitions between Sales, Creative Directors, and League Admins lack formal accountability boundaries.");
                }

                if (saasWasteMonthly > 2000) {
                    bulletPoints.push(`SaaS Optimization: An active license bill leakage of ${formatCurrency(saasWasteMonthly)}/month has been identified from idle seats and duplication across teams.`);
                }

                return bulletPoints;
            }, [synthesis, saasWasteMonthly]);

            return (
                <div className="space-y-8 animate-fade-in max-w-7xl mx-auto">

                        <p className="text-sm text-slate-400 max-w-3xl leading-relaxed">Map operational maturity, build current-vs-future architectures, and preview dynamic AI recommendations.</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="space-y-6">
                            <div className="glass-panel rounded-2xl p-6 shadow-xl space-y-6 bg-brandNavy-900 border border-brandNavy-800">
                                <h3 className="text-sm font-bold text-white uppercase tracking-wider border-b border-brandNavy-700 pb-2">1. Operational Maturity Scorecard</h3>
                                <div className="space-y-4">
                                    <ScoreBarUI label="Team Communication" valKey="communication" val={synthesis.communication} />
                                    <ScoreBarUI label="Process Documentation" valKey="documentation" val={synthesis.documentation} />
                                    <ScoreBarUI label="Handoff Accountability" valKey="accountability" val={synthesis.accountability} />
                                    <ScoreBarUI label="Software Utilization" valKey="software" val={synthesis.software} />
                                </div>
                            </div>

                            {/* DYNAMIC AI STRATEGIC AUDITOR PANEL */}
                            <div className="glass-panel rounded-2xl p-6 shadow-xl bg-brandNavy-900 border border-brandTeal-500/20 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-3 bg-brandTeal-500/10 rounded-bl-lg font-mono text-[9px] text-brandTeal-300 font-bold uppercase tracking-widest flex items-center gap-1.5"><Icons.Sparkles /> AI Insight Engine</div>
                                <h3 className="text-sm font-bold text-white uppercase tracking-wider border-b border-brandNavy-700 pb-2 flex items-center gap-2">
                                    Real-time Operational Auditing
                                </h3>
                                <div className="space-y-3 mt-4">
                                    {aiInsights.map((pt, i) => (
                                        <div key={i} className="text-xs text-slate-300 flex gap-2.5 items-start bg-brandNavy-950/40 p-2.5 rounded border border-brandNavy-800">
                                            <span className="text-brandTeal-400 font-bold font-mono">▸</span>
                                            <span className="leading-relaxed">{pt}</span>
                                        </div>
                                    ))}
                                    {aiInsights.length === 0 && (
                                        <div className="text-xs text-slate-400 italic">Adjust sliders or parameters above to generate dynamic process diagnostics.</div>

                                </div>
                            </div>

                        <div className="space-y-6">
                            <div className="glass-panel rounded-2xl p-6 shadow-xl space-y-4 bg-brandNavy-900 border border-brandNavy-800">
                                <h3 className="text-sm font-bold text-white uppercase tracking-wider border-b border-brandNavy-700 pb-2 flex justify-between items-center">
                                    2. Cost of Inaction (COI)
                                    <span className="text-[10px] text-rose-400 bg-rose-50/10 px-2 py-0.5 rounded border border-rose-500/20 font-mono">Loss Forecast</span>
                                </h3>
                                <div>
                                    <label className="text-xs font-bold text-slate-300 block mb-2">Expected New Hires (Next 3 Years)</label>
                                    <div className="flex items-center gap-4">
                                        <input type="number" min="0" value={synthesis.expectedGrowth} onChange={(e) => updateScore('expectedGrowth', e.target.value)} className="w-24 bg-brandNavy-950 border border-brandNavy-700 rounded p-2 text-center text-white font-mono font-bold outline-none focus:border-brandTeal-500" />
                                        <div className="text-xs text-slate-400 leading-tight">Increases the compounding multiplier on your current {formatCurrency(annualChaosTax)} annual leakage.</div>
                                    </div>
                                </div>

            useEffect(() => {

                            svgCache: orgChartSvg,
                            members: window.DiagramEditor?.parseRosterFromDrawioXml?.(orgChartXml) || [],
                            updatedAt: new Date().toISOString(),
                        },
                    }, { merge: true });
                    if (window.PortalSync?.syncProfileToPortalIfExists) {
                        try {
                            const profileSnap = await window.getDoc(profileRef);
                            const profileData = profileSnap.exists() ? { id: activeProfileId, ...profileSnap.data() } : { id: activeProfileId, subSaaS, chaosTax, annualOperationalLeakage: totalAnnualChaosTax };
                            await window.PortalSync.syncProfileToPortalIfExists(profileData, { syncIntakeAssets: true });
                        } catch (portalErr) {
                            console.warn('Portal sync skipped:', portalErr);
                        }
                    }
                    triggerToast("💾 Saved to Cloud!");
                } catch (e) { triggerToast("❌ Error saving."); }
                setIsSaving(false);
            };

            const profileLabel = (p) => window.EngagementConfig?.getClientDisplayName?.(p) || p.clientCompany || 'Untitled Company';

            const activeTab = tabs.find(t => t.id === activeTabId) || tabs[0] || { id: 'empty', name: 'No workflow', present: { ...EMPTY_CANVAS } };

            return (
                <div className="flex h-full min-h-0 overflow-hidden bg-brandNavy-955 font-sans">
                    {toastMessage && (<div role="alert" className="fixed bottom-6 right-6 z-[100] bg-brandTeal-600 text-white text-xs font-bold px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 animate-bounce"><span>✓</span>{toastMessage}</div>)}

                    <aside className={`w-[300px] bg-brandNavy-900 border-r border-brandNavy-800 flex flex-col shrink-0 no-print z-20 shadow-2xl ${activeNav === 'flowcharts' || activeNav === 'orgchart' ? 'hidden' : ''}`}>
                        <div className="p-6 border-b border-brandNavy-800 flex justify-between items-center group">
                            <div><h1 className="text-sm font-extrabold tracking-widest text-white uppercase leading-none mb-1">Kolthoff <span className="text-brandTeal-500">CONSULTING</span></h1><span className="text-[10px] text-brandTeal-500 font-bold uppercase tracking-widest">Mod1: Diagnoses Report</span></div>
                            <div className="relative">
                                <div className={`w-2 h-2 rounded-full cursor-help ${isAuthed ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : (authError ? 'bg-rose-500 shadow-[0_0_8px_#f43f5e]' : 'bg-amber-500 animate-pulse')}`}></div>
                                {authError && <div className="absolute right-0 top-full mt-2 w-48 bg-rose-950/90 border border-rose-500/50 p-2 rounded text-[9px] text-rose-200 hidden group-hover:block z-50">Sync Disabled (Offline)</div>}
                            </div>
                        </div>

                        <div className="p-4 border-b border-brandNavy-800 bg-brandNavy-950">
                            <label className="text-[10px] font-mono text-slate-400 uppercase tracking-widest font-bold mb-1.5 block">Active Workspace</label>
                            <select value={activeProfileId} onChange={(e) => setActiveProfileId(e.target.value)} className="w-full bg-brandNavy-900 border border-brandNavy-700 rounded p-2 text-xs font-semibold text-slate-200 outline-none focus:border-brandTeal-500" disabled={!!authError}>
                                {workbookProfiles.length === 0 && <option value="">{authError ? "Local Session Default" : "Loading..."}</option>}
                                {workbookProfiles.map(p => <option key={p.id} value={p.id}>{profileLabel(p)}</option>)}
                            </select>
                        </div>
                        
                        <nav className="p-4 flex-1 overflow-y-auto space-y-2">
                            <p className="text-[10px] font-mono text-slate-400 uppercase tracking-widest font-bold mb-3 px-1">Editors & Builders</p>
                            <button onClick={() => setActiveNav('flowcharts')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'flowcharts' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Layout /> 1. Workflow Builder</button>
                            <button onClick={() => setActiveNav('orgchart')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'orgchart' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Sitemap /> 2. Org Chart</button>
                            <button onClick={() => setActiveNav('raci')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'raci' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Users /> 3. RACI Architecture</button>
                            <button onClick={() => setActiveNav('saas')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'saas' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.CreditCard /> 4. SaaS Bill Audit</button>
                            <button onClick={() => setActiveNav('synthesis')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'synthesis' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.TrendingUp /> 5. Strategy & Priorities</button>
                            <div className="pt-6 mt-4 border-t border-brandNavy-800">
                                <button onClick={() => setActiveNav('report')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all border ${activeNav === 'report' ? 'bg-white text-slate-900 border-white' : 'bg-transparent text-slate-300 border-slate-600 hover:bg-slate-800'}`}><Icons.Print /> Preview Final Report</button>
                            </div>
                        </nav>

                        <div className="p-4 border-t border-brandNavy-800 bg-brandNavy-950">
                            <button onClick={handleSaveToCloud} disabled={isSaving || !!authError} className={`w-full flex justify-center items-center gap-2 py-3 rounded text-xs font-bold transition-all ${authError ? 'bg-brandNavy-850 text-slate-500 border border-brandNavy-700' : 'bg-brandNavy-800 hover:bg-brandNavy-700 text-slate-200'}`}>
                                {authError ? <Icons.AlertCircle /> : <Icons.Cloud />} {isSaving ? "Syncing..." : (authError ? "Offline Mode" : "Sync to Cloud")}
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-hidden relative z-10 flex flex-col min-w-0">
                        {activeNav !== 'flowcharts' && activeNav !== 'orgchart' && activeNav !== 'report' && (
                            <header data-app-chrome className="shrink-0 bg-brandNavy-955/80 backdrop-blur-md border-b border-brandNavy-800 px-8 py-4 flex justify-between items-center no-print">
                                <h2 className="text-sm font-bold text-brandTeal-400 font-mono tracking-widest uppercase">{activeNav === 'raci' ? '3. Accountability' : activeNav === 'saas' ? '4. Subscriptions' : '5. Strategy & Priorities'}</h2>
                                <div className="text-xs text-slate-400 font-semibold">{clientCompany || 'Local Session'}</div>
                            </header>
                        )}

                        <div className={`flex-1 overflow-y-auto ${activeNav === 'flowcharts' ? '' : activeNav === 'report' ? 'w-full' : 'p-8 max-w-[1600px] mx-auto pb-24 w-full'}`}>
                            {activeNav === 'flowcharts' && (
                                <WorkflowBuilderEmbedPanel
                                    activeNav={activeNav}
                                    activeProfileId={activeProfileId}
                                    setActiveProfileId={setActiveProfileId}
                                    setActiveNav={setActiveNav}
                                    onSave={handleSaveToCloud}
                                    isSaving={isSaving}
                                    authError={authError}
                                    workbookProfiles={workbookProfiles}
                                    profileLabel={profileLabel}
                                />
                            )}
                            {activeNav === 'orgchart' && (
                                <OrgChartBuilderPanel
                                    activeNav={activeNav}
                                    setActiveNav={setActiveNav}
                                    activeProfileId={activeProfileId}
                                    setActiveProfileId={setActiveProfileId}
                                    workbookProfiles={workbookProfiles}
                                    profileLabel={profileLabel}
                                    orgChartXml={orgChartXml}
                                    setOrgChartXml={setOrgChartXml}
                                    setOrgChartSvg={setOrgChartSvg}
                                    onSave={handleSaveToCloud}
                                    isSaving={isSaving}
                                    authError={authError}
                                />
                            )}
                            {activeNav === 'raci' && (
                                <RaciBuilder
                                    tabs={tabs}
                                    activeTabId={activeTabId}
                                    setActiveTabId={setActiveTabId}
                                    activeTab={activeTab}
                                    raciAssignments={raciAssignments}
                                    setRaciAssignments={setRaciAssignments}
                                />
                            )}
                            {activeNav === 'saas' && <SaaSAuditBuilder subSaaS={subSaaS} setSubSaaS={setSubSaaS} />}
                            {activeNav === 'synthesis' && <SynthesisBuilder synthesis={synthesis} setSynthesis={setSynthesis} annualChaosTax={totalAnnualChaosTax} projected3YearLoss={projected3YearLoss} subSaaS={subSaaS} />}
                            {activeNav === 'report' && (
                                <div className="w-full flex flex-col items-center animate-fade-in">
                                    <div className="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 flex flex-col sm:flex-row justify-between items-center no-print shadow-sm w-full shrink-0 gap-4">
                                        <div className="flex flex-wrap items-center gap-4 text-[10px] font-bold text-slate-600 uppercase tracking-widest pl-4">
                                            <span className="text-slate-900 border-r border-slate-300 pr-4">Print Sections:</span>
                                            <label className="flex items-center gap-1.5 cursor-pointer hover:text-brandTeal-600"><input type="checkbox" checked={printConfig.showFlowcharts} onChange={e => setPrintConfig({...printConfig, showFlowcharts: e.target.checked})} className="accent-brandTeal-500" /> 1. Diagnostics</label>
                                            <label className="flex items-center gap-1.5 cursor-pointer hover:text-brandTeal-600"><input type="checkbox" checked={printConfig.showRaci} onChange={e => setPrintConfig({...printConfig, showRaci: e.target.checked})} className="accent-brandTeal-500" /> 2. RACI</label>
                                            <label className="flex items-center gap-1.5 cursor-pointer hover:text-brandTeal-600"><input type="checkbox" checked={printConfig.showSaas} onChange={e => setPrintConfig({...printConfig, showSaas: e.target.checked})} className="accent-brandTeal-500" /> 3. Financial Leakage</label>
                                            <label className="flex items-center gap-1.5 cursor-pointer hover:text-brandTeal-600"><input type="checkbox" checked={printConfig.showSynthesis} onChange={e => setPrintConfig({...printConfig, showSynthesis: e.target.checked})} className="accent-brandTeal-500" /> 4. Synthesis</label>
                                            <label className="flex items-center gap-1.5 cursor-pointer hover:text-brandTeal-600 text-brandTeal-600"><input type="checkbox" checked={printConfig.showMatrix} onChange={e => setPrintConfig({...printConfig, showMatrix: e.target.checked})} className="accent-brandTeal-500" /> 5. Prioritization Matrix</label>
                                            <label className="flex items-center gap-1.5 cursor-pointer hover:text-brandTeal-600 text-brandTeal-600"><input type="checkbox" checked={printConfig.showAIReport} onChange={e => setPrintConfig({...printConfig, showAIReport: e.target.checked})} className="accent-brandTeal-500 animate-pulse" /> 6. AI strategic Audit</label>
                                        </div>
                                        <button onClick={() => window.print()} className="bg-brandTeal-600 hover:bg-brandTeal-700 text-white px-6 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wider flex items-center gap-2 shadow-lg mr-4 transition-colors"><Icons.Print /> Print Custom PDF</button>
                                    </div>
                                    <div className="w-full flex justify-center bg-slate-200 py-12 px-4 print:py-0 print:bg-transparent">
                                        <ExecutiveReport clientCompany={clientCompany} preparedBy={preparedBy} tabs={tabs} raciAssignments={raciAssignments} subSaaS={subSaaS} annualChaosTax={totalAnnualChaosTax} totalDailyWasteHours={totalDailyWasteHours} synthesis={synthesis} projected3YearLoss={projected3YearLoss} printConfig={printConfig} />
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
