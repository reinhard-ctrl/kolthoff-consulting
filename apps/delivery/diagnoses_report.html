        const DrawIoEmbed = ({ preset = 'bpmn', xml, onXmlChange, onSvgExport, height = 520, hideApplyButton = false, exportControllerRef }) => {
            const iframeRef = useRef(null);
            const readyRef = useRef(false);
            const configuredRef = useRef(false);
            const pendingXmlRef = useRef(xml);
            const exportWaitRef = useRef(null);
            const presetData = window.DiagramEditor?.getPreset(preset);
            const embedUrl = window.DiagramEditor?.getDrawioEmbedUrl({
                libs: presetData?.embedLibs || presetData?.configure?.defaultLibraries?.split(';')[0] || 'bpmn',
            }) || 'https://embed.diagrams.net/?embed=1&proto=json&configure=1&libraries=1';

            const postAction = (payload) => {
                iframeRef.current?.contentWindow?.postMessage(JSON.stringify(payload), '*');
            };

            const sendLoad = (diagramXml) => {
                const blank = preset === 'orgChart'
                    ? window.DiagramEditor?.BLANK_ORG_CHART_XML
                    : window.DiagramEditor?.BLANK_BPMN_XML;
                postAction({ action: 'load', xml: diagramXml || blank || '', autosave: 1 });
            };

            const maybeFinishExport = () => {
                const pending = exportWaitRef.current;
                if (!pending || !pending.gotXml || !pending.gotSvg) return;
                pending.resolve({ xml: pending.xml || '', svg: pending.svg || '' });
                exportWaitRef.current = null;
            };

            const applyDiagram = () => new Promise((resolve, reject) => {
                exportWaitRef.current = { resolve, reject, gotXml: false, gotSvg: false, xml: '', svg: '' };
                postAction({ action: 'export', format: 'xml', xml: true, spin: 'Saving…' });
                postAction({ action: 'export', format: 'xmlsvg', spin: 'Saving…' });
                setTimeout(() => {
                    if (!exportWaitRef.current) return;
                    exportWaitRef.current.reject(new Error('Diagram export timed out'));
                    exportWaitRef.current = null;
                }, 20000);
            });

            const exportXml = (diagramXml) => new Promise((resolve, reject) => {
                const blank = preset === 'orgChart'
                    ? window.DiagramEditor?.BLANK_ORG_CHART_XML
                    : window.DiagramEditor?.BLANK_BPMN_XML;
                exportWaitRef.current = {
                    resolve,
                    reject,
                    gotXml: false,
                    gotSvg: false,
                    xml: '',
                    svg: '',
                };
                sendLoad(diagramXml || blank || '');
                setTimeout(() => {
                    postAction({ action: 'export', format: 'xml', xml: true });
                    postAction({ action: 'export', format: 'xmlsvg' });
                }, 900);
                setTimeout(() => {
                    if (!exportWaitRef.current) return;
                    exportWaitRef.current.reject(new Error('Diagram export timed out'));
                    exportWaitRef.current = null;
                }, 25000);
            });

            useEffect(() => {
                if (exportControllerRef) exportControllerRef.current = { applyDiagram, exportXml };
            });

            useEffect(() => {
                pendingXmlRef.current = xml;
                if (readyRef.current && configuredRef.current) sendLoad(xml);
            }, [xml]);

            useEffect(() => {
                const handler = (evt) => {
                    if (!evt.data || typeof evt.data !== 'string') return;
                    let msg;
                    try { msg = JSON.parse(evt.data); } catch { return; }
                    if (msg.event === 'configure') {
                        configuredRef.current = true;
                        postAction({ action: 'configure', config: presetData?.configure || {} });
                    }
                    if (msg.event === 'init') {
                        readyRef.current = true;
                        sendLoad(pendingXmlRef.current);
                    }
                    if (msg.event === 'export') {
                        if (msg.format === 'xml' && msg.xml) {
                            if (onXmlChange) onXmlChange(msg.xml);
                            if (exportWaitRef.current) {
                                exportWaitRef.current.gotXml = true;
                                exportWaitRef.current.xml = msg.xml;
                            }
                        }
                        if ((msg.format === 'xmlsvg' || msg.format === 'svg') && msg.data) {
                            if (onSvgExport) onSvgExport(msg.data);
                            if (exportWaitRef.current) {
                                exportWaitRef.current.gotSvg = true;
                                exportWaitRef.current.svg = msg.data;
                            }
                        }
                        maybeFinishExport();
                    }
                    if (msg.event === 'autosave' && msg.xml && onXmlChange) onXmlChange(msg.xml);
                };
                window.addEventListener('message', handler);
                return () => window.removeEventListener('message', handler);
            }, [preset, onXmlChange, onSvgExport]);

            return (
                <div className="flex flex-col gap-3 h-full min-h-0">
                    {!hideApplyButton && (
                        <div className="flex flex-wrap gap-2 no-print shrink-0">
                            <button
                                type="button"

                                className="text-[10px] font-bold uppercase bg-brandTeal-500 hover:bg-brandTeal-600 text-brandNavy-955 px-3 py-1.5 rounded-lg transition-colors"
                            >

                        </div>
                    )}

                </div>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) return (
                    <div className="p-10 text-rose-500 font-mono bg-brandNavy-955 min-h-screen">
                        <h1 className="text-2xl font-bold mb-4">React Compilation Error</h1>
                        <p className="bg-rose-950 p-4 rounded border border-rose-500/30 whitespace-pre-wrap">{this.state.error.toString()}</p>
                    </div>
                );
                return this.props.children;
            }
        }

        const requestWorkflowEmbedSave = (iframe, { applyDiagram = true, exportAllTabs = false } = {}) => new Promise((resolve, reject) => {
            if (!iframe?.contentWindow) {
                reject(new Error('Workflow builder not ready'));
                return;
            }
            const requestId = `save-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
            const timeout = setTimeout(() => {
                window.removeEventListener('message', handler);
                reject(new Error('Workflow save timed out'));
            }, 25000);
            const handler = (evt) => {
                if (!evt.data || typeof evt.data !== 'string') return;
                let msg;
                try { msg = JSON.parse(evt.data); } catch { return; }
                if (msg?.type !== 'kolthoff-workflow-save-result' || msg.requestId !== requestId) return;
                clearTimeout(timeout);
                window.removeEventListener('message', handler);
                if (msg.ok) resolve(msg);
                else reject(new Error(msg.error || 'Workflow save failed'));

        // --- INTERACTIVE COORDINATE MATRIX SVG CHART COMPONENT ---
        const InteractiveMatrixChart = ({ items, hoveredId, setHoveredId, selectedId, setSelectedId }) => {
            const width = 450;
            const height = 450;
            const margin = 40;

            const getCoords = (effort, impact) => {
                const x = margin + ((effort - 1) / 4) * (width - 2 * margin);
                const y = margin + ((5 - impact) / 4) * (height - 2 * margin);
                return { x, y };
            };

            const getQuadrantLabel = (effort, impact) => {
                if (effort < 3 && impact >= 3) return { name: 'Quick Win', color: 'text-emerald-400 bg-emerald-500/20 border-emerald-500/30' };
                if (effort >= 3 && impact >= 3) return { name: 'Major Project', color: 'text-blue-400 bg-blue-500/20 border-blue-500/30' };
                if (effort < 3 && impact < 3) return { name: 'Fill-in', color: 'text-slate-400 bg-slate-500/20 border-slate-500/30' };
                return { name: 'Low ROI — defer', color: 'text-rose-400 bg-rose-50/20 border-rose-500/30' };
            };

            return (
                <div className="flex flex-col items-center bg-brandNavy-950 p-6 rounded-2xl border border-brandNavy-800 shadow-inner w-full">
                    <div className="relative w-full max-w-[450px] aspect-square">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full rounded-xl overflow-hidden bg-brandNavy-900 border border-brandNavy-800">
                            {/* Quadrant Background Shading */}
                            <rect x={margin} y={margin} width={(width-2*margin)/2} height={(height-2*margin)/2} fill="#052e16" fillOpacity="0.15" /> {/* Quick Wins */}
                            <rect x={margin + (width-2*margin)/2} y={margin} width={(width-2*margin)/2} height={(height-2*margin)/2} fill="#1e3a8a" fillOpacity="0.15" /> {/* Major Projects */}
                            <rect x={margin} y={margin + (height-2*margin)/2} width={(width-2*margin)/2} height={(height-2*margin)/2} fill="#1e293b" fillOpacity="0.2" /> {/* Fill-ins */}
                            <rect x={margin + (width-2*margin)/2} y={margin + (height-2*margin)/2} width={(width-2*margin)/2} height={(height-2*margin)/2} fill="#881337" fillOpacity="0.15" /> {/* Deprioritize */}

                            {/* Quadrant Text Identifiers in Background */}
                            <text x={margin + 15} y={margin + 25} fill="#34d399" fontSize="11" fontWeight="800" fillOpacity="0.3" letterSpacing="1">⚡ QUICK WINS</text>
                            <text x={width - margin - 15} y={margin + 25} textAnchor="end" fill="#60a5fa" fontSize="11" fontWeight="800" fillOpacity="0.3" letterSpacing="1">🚀 MAJOR PROJECTS</text>
                            <text x={margin + 15} y={height - margin - 15} fill="#94a3b8" fontSize="11" fontWeight="800" fillOpacity="0.3" letterSpacing="1">⚙️ FILL-INS</text>
                            <text x={width - margin - 15} y={height - margin - 15} textAnchor="end" fill="#f87171" fontSize="11" fontWeight="800" fillOpacity="0.3" letterSpacing="1">⏸ LOW ROI</text>

                            {/* Center Axes Lines */}
                            <line x1={width/2} y1={margin} x2={width/2} y2={height-margin} stroke="#334155" strokeWidth="2" strokeDasharray="4,4" />
                            <line x1={margin} y1={height/2} x2={width-margin} y2={height/2} stroke="#334155" strokeWidth="2" strokeDasharray="4,4" />

                            {/* Outer Axis Borders */}
                            <rect x={margin} y={margin} width={width-2*margin} height={height-2*margin} fill="none" stroke="#475569" strokeWidth="1.5" />

                            {/* Grid ticks for scale 1-5 */}
                            {[1, 2, 3, 4, 5].map((val) => {
                                const effortX = margin + ((val - 1) / 4) * (width - 2 * margin);
                                const impactY = margin + ((5 - val) / 4) * (height - 2 * margin);
                                return (
                                    <g key={val}>
                                        {/* Effort ticks */}
                                        <line x1={effortX} y1={height - margin} x2={effortX} y2={height - margin + 6} stroke="#64748b" strokeWidth="1.5" />
                                        <text x={effortX} y={height - margin + 20} fill="#94a3b8" fontSize="10" fontFamily="monospace" textAnchor="middle">{val}</text>
                                        
                                        {/* Impact ticks */}
                                        <line x1={margin - 6} y1={impactY} x2={margin} y2={impactY} stroke="#64748b" strokeWidth="1.5" />
                                        <text x={margin - 14} y={impactY + 3} fill="#94a3b8" fontSize="10" fontFamily="monospace" textAnchor="end">{val}</text>
                                    </g>
                                );
                            })}

                            {/* Axis Titles */}
                            <text x={width/2} y={height - 8} fill="#14B8A6" fontSize="11" fontWeight="800" textAnchor="middle" letterSpacing="1.5">EXECUTION EFFORT (1-5) ➔</text>
                            <text x={10} y={height/2} fill="#14B8A6" fontSize="11" fontWeight="800" textAnchor="middle" letterSpacing="1.5" transform={`rotate(-90, 10, ${height/2})`}>BOTTOM-LINE IMPACT (1-5) ➔</text>

                            {/* Plotted Interactive Dots */}
                            {items.map((item, idx) => {
                                const { x, y } = getCoords(item.effort, item.impact);
                                const isSelected = selectedId === item.id;
                                const isHovered = hoveredId === item.id;
                                const qDetails = getQuadrantLabel(item.effort, item.impact);
                                
                                let dotColor = "#94a3b8"; // Fill-ins
                                if (qDetails.name === 'Quick Win') dotColor = "#10b981";
                                if (qDetails.name === 'Major Project') dotColor = "#3b82f6";
                                if (qDetails.name === 'Low ROI — defer') dotColor = "#ef4444";

                                return (
                                    <g 
                                        key={item.id} 
                                        onMouseEnter={() => setHoveredId(item.id)} 
                                        onMouseLeave={() => setHoveredId(null)}
                                        onClick={() => setSelectedId(item.id)}
                                        className="cursor-pointer"
                                    >
                                        {/* Interaction Ring */}
                                        <circle 
                                            cx={x} 
                                            cy={y} 
                                            r={isSelected || isHovered ? 16 : 8} 
                                            fill={dotColor} 
                                            fillOpacity={isSelected ? "0.25" : isHovered ? "0.15" : "0"} 
                                            className="transition-all duration-200"
                                        />
                                        {/* Core Coordinate Circle */}
                                        <circle 
                                            cx={x} 
                                            cy={y} 
                                            r={isSelected ? 7 : 5.5} 
                                            fill={dotColor} 
                                            stroke="#ffffff" 
                                            strokeWidth={isSelected ? "2.5" : "1.5"}
                                            className="transition-all duration-200"
                                        />
                                        {/* Index marker text inside/near the circle for visual reference */}
                                        <text x={x} y={y - 10} fill="#ffffff" fontSize="9" fontWeight="bold" textAnchor="middle" stroke="#000000" strokeWidth="2" paintOrder="stroke" className="select-none font-mono">
                                            {idx + 1}
                                        </text>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        };

                    <div className="px-4 pb-4 space-y-4 border-t border-brandNavy-800/50 max-h-[70vh] overflow-y-auto">
                        {m102InScope && (
                            <div className="glass-panel rounded-xl p-4 space-y-4 bg-brandNavy-950/40 border border-brandNavy-800 pt-4">
                                <h3 className="text-[10px] font-bold text-white uppercase tracking-wider border-b border-brandNavy-700 pb-2">Anonymous Feedback Channel (m1-02)</h3>
                                <p className="text-[10px] text-slate-400">Deploy the staff survey — preview the template, share the form link or QR, then import themes (no names) below.</p>
                                <FeedbackFormTemplateLauncher clientCompany={clientCompany} />
                                <div>
                                    <label className="text-[10px] font-bold uppercase text-slate-400 tracking-wider block mb-1">Live Google Form URL (your copy)</label>
                                    <input type="url" value={synthesis.feedbackFormUrl || ''} onChange={(e) => setSynthesis(prev => ({ ...prev, feedbackFormUrl: e.target.value }))} placeholder="https://docs.google.com/forms/d/…/viewform" className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-brandTeal-500" />
                                </div>

                                    <label className="text-[10px] font-bold uppercase text-slate-400 tracking-wider block mb-1">Launch guide (share with client HR)</label>
                                    <textarea rows="5" value={synthesis.feedbackLaunchGuide || ''} onChange={(e) => setSynthesis(prev => ({ ...prev, feedbackLaunchGuide: e.target.value }))} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded-lg px-3 py-2 text-xs text-slate-200 leading-relaxed focus:outline-none focus:border-brandTeal-500 resize-none" />

                                {synthesis.feedbackFormUrl?.trim() && (
                                    <div className="flex flex-wrap items-start gap-4 pt-2 border-t border-brandNavy-800">
                                        <img src={DRH().buildFeedbackFormQrUrl?.(synthesis.feedbackFormUrl)} alt="Feedback form QR code" className="w-[120px] h-[120px] border border-brandNavy-700 rounded-lg bg-white p-2" />
                                        <div className="flex flex-col gap-2 text-[10px]">
                                            <a href={synthesis.feedbackFormUrl} target="_blank" rel="noreferrer" className="font-bold uppercase text-brandTeal-400 hover:text-brandTeal-300">Open form ↗</a>
                                            <button type="button" onClick={() => { navigator.clipboard?.writeText(synthesis.feedbackFormUrl); }} className="font-bold uppercase text-slate-400 hover:text-white text-left">Copy form link</button>
                                            <p className="text-slate-500 max-w-xs leading-relaxed">Print or post the QR in staff areas. Sync to cloud pushes the form link to the client portal vault.</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        <div className="glass-panel rounded-xl p-4 space-y-3 bg-brandNavy-950/40 border border-brandNavy-800">
                            <h3 className="text-[10px] font-bold text-white uppercase tracking-wider border-b border-brandNavy-700 pb-2">Staff Feedback Themes</h3>
                            <p className="text-[10px] text-slate-400">Anonymous feedback themes from Mod 1 staff survey (no names). These appear in the client report and feed the 90-Day Recovery Plan.</p>
                            {(synthesis.staffFeedbackThemes || ['']).map((theme, idx) => (
                                <div key={idx} className="flex gap-2">
                                    <input type="text" value={theme} onChange={(e) => updateFeedbackTheme(idx, e.target.value)} placeholder="e.g. Approvals take too long on busy days" className="flex-1 bg-brandNavy-950 border border-brandNavy-700 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-brandTeal-500" />
                                    {(synthesis.staffFeedbackThemes || []).length > 1 && (
                                        <button type="button" onClick={() => removeFeedbackTheme(idx)} className="text-slate-500 hover:text-rose-400 px-2"><Icons.Close /></button>
                                    )}
                                </div>
                            ))}
                            <button type="button" onClick={addFeedbackTheme} className="text-[10px] font-bold uppercase text-brandTeal-400 hover:text-brandTeal-300">+ Add theme</button>
                            <div className="pt-3 border-t border-brandNavy-800 space-y-2">
                                <label className="text-[10px] font-bold uppercase text-slate-400 tracking-wider">Import from survey (one theme per line)</label>
                                <textarea rows="3" value={feedbackPaste} onChange={(e) => setFeedbackPaste(e.target.value)} placeholder="Paste anonymous feedback themes here…" className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-brandTeal-500 resize-none" />
                                <button type="button" onClick={importFeedbackLines} className="text-[10px] font-bold uppercase text-brandTeal-400 hover:text-brandTeal-300">Import lines</button>
                            </div>
                        </div>

                        <div className="glass-panel rounded-xl p-4 space-y-3 bg-brandNavy-950/40 border border-brandNavy-800">
                            <h3 className="text-[10px] font-bold text-white uppercase tracking-wider border-b border-brandNavy-700 pb-2">Privacy Ground Rules (Mod 1)</h3>
                            <p className="text-[10px] text-slate-400">One-page summary printed with the org chart section. Not legal advice.</p>
                            <textarea rows="4" value={synthesis.privacyGroundRules || ''} onChange={(e) => setSynthesis(prev => ({ ...prev, privacyGroundRules: e.target.value }))} className="w-full bg-brandNavy-950 border border-brandNavy-700 rounded-lg px-3 py-2 text-xs text-slate-200 leading-relaxed focus:outline-none focus:border-brandTeal-500 resize-none" />
                        </div>
                    </div>
                </details>
            );
        };

        const StrategyAccordionSection = ({ title, subtitle, badge, defaultOpen = false, children }) => (
            <details open={defaultOpen || undefined} className="glass-panel rounded-2xl shadow-xl bg-brandNavy-900 border border-brandNavy-800 group">
                <summary className="cursor-pointer list-none p-5 flex flex-wrap justify-between items-start gap-3 border-b border-brandNavy-800 group-open:border-brandNavy-700">
                    <div className="min-w-0">
                        <div className="flex items-center gap-2">
                            <span className="text-slate-500 group-open:rotate-90 transition-transform inline-block shrink-0">▸</span>
                            <h3 className="text-sm font-bold text-white uppercase tracking-wider">{title}</h3>
                            {badge && <span className="text-[9px] font-mono text-brandTeal-400 bg-brandTeal-500/10 px-2 py-0.5 rounded border border-brandTeal-500/20">{badge}</span>}
                        </div>
                        {subtitle && <p className="text-[10px] text-slate-400 mt-1 ml-5 leading-relaxed">{subtitle}</p>}
                    </div>
                </summary>
                <div className="p-5 pt-4 space-y-4">{children}</div>
            </details>
        );

        const getMatrixQuadrantUi = (effort, impact) => {
            if (effort < 3 && impact >= 3) return { name: 'Quick Win', color: 'text-emerald-400 bg-emerald-500/20 border-emerald-500/30' };
            if (effort >= 3 && impact >= 3) return { name: 'Major Project', color: 'text-blue-400 bg-blue-500/20 border-blue-500/30' };
            if (effort < 3 && impact < 3) return { name: 'Fill-in', color: 'text-slate-400 bg-slate-500/20 border-slate-500/30' };
            return { name: 'Low ROI — defer', color: 'text-rose-400 bg-rose-50/20 border-rose-500/30' };
        };

        const SynthesisBuilder = ({
            synthesis, setSynthesis, annualChaosTax, projected3YearLoss, subSaaS, tabs,
            raciAssignments, orgChartMembers, clientCompany, saasAnnualForCoi,
            reportValidation, mod1Handoff, activeProfile, workflowUpdatedAt, reportDataUpdatedAt,
            onGoToReport,
        }) => {
            const processAnnual = annualChaosTax;
            const saasWasteMonthly = subSaaS.reduce((acc, curr) => acc + (curr.billing * curr.users), 0);
            const totalAnnualWaste = processAnnual + (saasWasteMonthly * 12);
            const maturityIndex = DRH().computeMaturityIndex?.(synthesis) ?? 3;
            const coiBreakdown = useMemo(() => DRH().buildCoiBreakdown?.(
                processAnnual, saasAnnualForCoi, synthesis.expectedGrowth, formatCurrency,
            ) || {}, [processAnnual, saasAnnualForCoi, synthesis.expectedGrowth]);

            const [newItemText, setNewItemText] = useState('');
            const [selectedItemId, setSelectedItemId] = useState(null);
            const [generateModalOpen, setGenerateModalOpen] = useState(false);
            const [generateMode, setGenerateMode] = useState('append');

            const resolvedDiagnosisTabs = useMemo(() => {
                const resolved = resolveDiagnosisTabsFromProfile(activeProfile, tabs);
                return resolved.tabs.length ? resolved.tabs : tabs;
            }, [activeProfile, tabs, workflowUpdatedAt]);

            const genOptions = useMemo(() => ({
                raciAssignments,
                staffFeedbackThemes: synthesis.staffFeedbackThemes,
                synthesis,
            }), [raciAssignments, synthesis]);

            const generatePreview = useMemo(() => DRH().previewMatrixGeneration?.(
                resolvedDiagnosisTabs, subSaaS, synthesis.matrix?.items || [], window.DiagramEditor, genOptions,
            ) || { counts: { total: 0 }, replaceCount: 0 }, [resolvedDiagnosisTabs, subSaaS, synthesis.matrix, genOptions]);

            const workflowStale = workflowUpdatedAt && reportDataUpdatedAt && workflowUpdatedAt > reportDataUpdatedAt;
            const ownerSuggestions = useMemo(() => DRH().buildOwnerSuggestions?.(
                orgChartMembers, resolvedDiagnosisTabs, raciAssignments, window.DiagramEditor,
            ) || [], [orgChartMembers, resolvedDiagnosisTabs, raciAssignments]);

            const generatePitch = (modId) => {
                const pitch = DRH().buildModulePitch?.(modId, totalAnnualWaste, formatCurrency, EC_MODULES()) || '';
                setSynthesis(prev => ({ ...prev, nextModuleId: modId, customPitch: pitch }));
            };

            const applyGeneratedMatrix = (mode) => {
                const items = DRH().generateMatrixFromDiagnosis?.(
                    resolvedDiagnosisTabs, subSaaS,
                    mode === 'replace' ? [] : (synthesis.matrix?.items || []),
                    window.DiagramEditor,
                    { ...genOptions, replace: mode === 'replace' },
                ) || [];
                setSynthesis(prev => ({ ...prev, matrix: { ...(prev.matrix || {}), items } }));
                setGenerateModalOpen(false);
            };

            const addInsightToPlan = (insightText, idx) => {
                const newItem = DRH().buildInsightMatrixItem?.(insightText, idx);
                if (!newItem) return;
                setSynthesis(prev => ({
                    ...prev,
                    matrix: { ...prev.matrix, items: [...(prev.matrix?.items || []), newItem] },
                }));
            };

            const appendInsightToLetter = (insightText) => {
                const snippet = String(insightText || '').trim();
                if (!snippet) return;
                setSynthesis(prev => ({
                    ...prev,
                    executiveLetter: [prev.executiveLetter?.trim(), snippet].filter(Boolean).join(' '),
                }));
            };

            const insightCtx = useMemo(() => ({
                synthesis, subSaaS, tabs: resolvedDiagnosisTabs, raciAssignments, orgChartMembers,
                staffFeedbackThemes: synthesis.staffFeedbackThemes,
                formatCurrency, DiagramEditor: window.DiagramEditor,
            }), [synthesis, subSaaS, resolvedDiagnosisTabs, raciAssignments, orgChartMembers]);

            const aiInsights = useMemo(() => DRH().buildOperationalInsights?.(insightCtx) || [], [insightCtx]);
            const matrixItems = synthesis.matrix?.items || [];
            const top5Preview = useMemo(() => DRH().getTop5Fixes?.(matrixItems) || [], [matrixItems]);
            const top5Validation = useMemo(() => DRH().validateTop5Readiness?.({
                synthesis, tasks: activeProfile?.tasks || [],
            }) || { ready: true, errors: [], warnings: [], top5: top5Preview }, [synthesis, top5Preview, activeProfile?.tasks]);
            const nextPhaseHint = useMemo(() => DRH().buildNextPhaseHint?.(matrixItems, EC_MODULES()), [matrixItems]);
            const weekOptions = DRH().TARGET_WEEK_OPTIONS || ['Week 1–2', 'Week 3–4', 'Week 5–6', 'Week 7–8', 'Week 9–10', 'Week 11–12'];
            const maturityRubric = DRH().MATURITY_RUBRIC || {};
            const top5Ids = useMemo(() => new Set(top5Preview.map((i) => i.id)), [top5Preview]);

            const readinessItems = useMemo(() => {
                const items = [];
                const push = (label, ok, hint) => items.push({ label, status: ok ? 'ok' : (hint?.startsWith('block') ? 'error' : 'warn'), hint: hint || '' });
                push('Top 5 have owner + target week', top5Validation.ready && top5Validation.errors.length === 0, top5Validation.errors[0]);
                push('≥3 recovery plan items', matrixItems.length >= 3, matrixItems.length >= 3 ? '' : 'warn:Add more initiatives or generate from diagnosis');
                push('Maturity calibrated', !DRH().isDefaultMaturity?.(synthesis), 'warn:Scores still default 3/5 — adjust from field observations');
                push('Workflow synced to report', !workflowStale, workflowStale ? 'warn:Workflow saved after last sync — Sync to Cloud in sidebar' : '');
                push('Handoff links (Drive + Loom)', !!(synthesis.clientDeliverableUrl?.trim() && synthesis.loomWalkthroughUrl?.trim()), 'block:Add Drive PDF and Loom URLs in Report Narrative below');
                return items;
            }, [top5Validation, matrixItems.length, synthesis, workflowStale]);

            const updateScore = (key, val) => setSynthesis(prev => ({ ...prev, [key]: Number(val) }));
            const ScoreBarUI = ({ label, valKey, val }) => {
                const rubric = maturityRubric[valKey];
                return (
                    <div title={rubric ? `1–2: ${rubric.low}\n4–5: ${rubric.high}` : undefined}>
                        <div className="flex justify-between items-center mb-1">
                            <label className="text-xs font-bold text-slate-300">{label}</label>
                            <span className="text-xs font-mono text-brandTeal-400">{val}/5</span>
                        </div>
                        <input type="range" min="1" max="5" value={val} onChange={(e) => updateScore(valKey, e.target.value)} className="w-full accent-brandTeal-500 h-1 rounded cursor-pointer bg-brandNavy-800" aria-label={label} />
                        {rubric && (
                            <div className="text-[9px] text-slate-500 mt-1 leading-relaxed">
                                <span className="text-rose-400/80">1–2:</span> {rubric.low} · <span className="text-emerald-400/80">4–5:</span> {rubric.high}
                            </div>
                        )}
                    </div>
                );
            };

            const addPriorityItem = () => {
                if (!newItemText?.trim()) return;
                const newItem = { id: 'item-' + Date.now(), text: newItemText.trim(), effort: 3, impact: 3, owner: '', targetWeek: '', expectedSavings: 0 };
                setSynthesis(prev => ({ ...prev, matrix: { ...prev.matrix, items: [...(prev.matrix?.items || []), newItem] } }));
                setNewItemText('');
            };

            const updateItemScore = (id, key, val) => {
                setSynthesis(prev => ({
                    ...prev,
                    matrix: { ...prev.matrix, items: (prev.matrix?.items || []).map(it => it.id === id ? { ...it, [key]: val } : it) },
                }));
            };

            const deleteItem = (id) => {
                setSynthesis(prev => ({
                    ...prev,
                    matrix: { ...prev.matrix, items: (prev.matrix?.items || []).filter(it => it.id !== id) },
                }));
                if (selectedItemId === id) setSelectedItemId(null);
            };

            const applyQuickWinWeeks = () => {
                setSynthesis(prev => ({
                    ...prev,
                    matrix: {
                        ...prev.matrix,
                        items: (prev.matrix?.items || []).map((it) => {
                            const e = Number(it.effort) || 3;
                            const i = Number(it.impact) || 3;
                            if (e < 3 && i >= 3) return { ...it, targetWeek: it.targetWeek || 'Week 1–2' };
                            return it;
                        }),
                    },
                }));
            };

            const sortByImpactEffort = () => {
                setSynthesis((prev) => {
                    const sorted = DRH().sortMatrixByImpactEffort?.(prev.matrix?.items) || [];
                    return { ...prev, matrix: { ...(prev.matrix || {}), items: sorted } };
                });
            };

            const selectedItem = matrixItems.find((it) => it.id === selectedItemId) || null;
            const growthPresets = [
                { label: 'Flat', value: 0 },
                { label: '+2 hires', value: 2 },
                { label: '+5 hires', value: 5 },
            ];

            useEffect(() => {
                if (!synthesis.customPitch?.trim() && synthesis.nextModuleId === 'MOD 2') {
                    generatePitch('MOD 2');
                }
            }, []);

            return (
                <div className="space-y-6 animate-fade-in max-w-7xl mx-auto">
                    {/* Readiness strip */}
                    <div className={`sticky top-0 z-20 glass-panel rounded-xl p-4 border shadow-lg ${mod1Handoff?.errors?.length ? 'border-rose-500/40 bg-brandNavy-900' : top5Validation.ready ? 'border-brandTeal-500/30 bg-brandNavy-900' : 'border-amber-500/40 bg-brandNavy-900'}`}>
                        <div className="flex flex-wrap justify-between items-start gap-3 mb-3">
                            <div>
                                <div className="text-[10px] font-mono uppercase tracking-widest text-brandTeal-400 font-bold">Strategy readiness</div>
                                <p className="text-[10px] text-slate-400 mt-0.5">Complete before printing the Leak Scan Report</p>
                            </div>
                            <div className="flex gap-2">
                                {onGoToReport && (
                                    <button type="button" onClick={onGoToReport} className="px-3 py-1.5 bg-brandTeal-500/20 hover:bg-brandTeal-500/30 border border-brandTeal-500/40 text-brandTeal-300 rounded-lg text-[10px] font-bold uppercase tracking-wider">Preview report ↗</button>
                                )}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                            {readinessItems.map((item, i) => (
                                <div key={i} className={`text-[10px] rounded-lg px-2.5 py-1.5 border flex items-start gap-2 ${item.status === 'ok' ? 'border-emerald-500/30 bg-emerald-500/10 text-emerald-300' : item.status === 'error' ? 'border-rose-500/30 bg-rose-500/10 text-rose-300' : 'border-amber-500/30 bg-amber-500/10 text-amber-200'}`}>
                                    <span className="font-bold shrink-0">{item.status === 'ok' ? '✓' : item.status === 'error' ? '✕' : '!'}</span>
                                    <span><span className="font-semibold">{item.label}</span>{item.hint && !item.hint.startsWith('warn:') && !item.hint.startsWith('block:') ? `: ${item.hint}` : ''}{(item.hint?.startsWith('warn:') || item.hint?.startsWith('block:')) ? ` — ${item.hint.replace(/^(warn|block):/, '')}` : ''}</span>
                                </div>
                            ))}
                        </div>
                        {(reportValidation?.warnings || []).slice(0, 2).map((w, i) => (
                            <p key={i} className="text-[9px] text-slate-500 mt-2 font-mono">· {w}</p>
                        ))}
                    </div>

                    {/* B: 90-Day Recovery Plan — first */}
                    <StrategyAccordionSection title="90-Day Recovery Plan" subtitle="Top 5 by impact ÷ effort appear on report page 1. Assign owner and target week on each priority." badge="Priority" defaultOpen>
                        <div className="flex flex-wrap justify-between items-center gap-3">
                            <p className="text-[10px] text-slate-400">Build the prioritized recovery plan for the Leak Scan Report.</p>
                            <button type="button" onClick={() => setGenerateModalOpen(true)} className="px-4 py-2 bg-brandTeal-500/20 hover:bg-brandTeal-500/30 border border-brandTeal-500/40 text-brandTeal-300 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-colors">
                                Generate from Diagnosis
                            </button>
                        </div>

                        {generateModalOpen && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60" onClick={() => setGenerateModalOpen(false)}>
                                <div className="bg-brandNavy-900 border border-brandNavy-700 rounded-2xl p-6 max-w-md w-full shadow-2xl space-y-4" onClick={(e) => e.stopPropagation()}>
                                    <h4 className="text-sm font-bold text-white uppercase tracking-wider">Generate recovery plan</h4>
                                    {workflowStale && (
                                        <div className="text-[10px] text-amber-300 bg-amber-500/10 border border-amber-500/30 rounded-lg p-3">Workflow was saved after your last report sync. Sync to Cloud first for accurate leakage numbers.</div>
                                    )}
                                    <div className="text-xs text-slate-300 space-y-1">
                                        <p className="font-bold text-brandTeal-400 uppercase text-[10px] tracking-wider">Will add (append mode)</p>
                                        <ul className="list-disc list-inside text-[11px] text-slate-400">
                                            <li>{generatePreview.counts?.workflow || 0} from workflow delays</li>
                                            <li>{generatePreview.counts?.saas || 0} from SaaS audit</li>
                                            <li>{generatePreview.counts?.feedback || 0} from staff feedback themes</li>
                                            <li>{generatePreview.counts?.raci || 0} from RACI gaps</li>
                                        </ul>
                                        <p className="text-[10px] text-slate-500 pt-1">Replace mode generates {generatePreview.replaceCount || 0} fresh items (discards current list).</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <label className="flex-1 flex items-center gap-2 text-[10px] text-slate-300 cursor-pointer border border-brandNavy-700 rounded-lg px-3 py-2">
                                            <input type="radio" name="genMode" checked={generateMode === 'append'} onChange={() => setGenerateMode('append')} className="accent-brandTeal-500" />
                                            Append new items
                                        </label>
                                        <label className="flex-1 flex items-center gap-2 text-[10px] text-slate-300 cursor-pointer border border-brandNavy-700 rounded-lg px-3 py-2">
                                            <input type="radio" name="genMode" checked={generateMode === 'replace'} onChange={() => setGenerateMode('replace')} className="accent-brandTeal-500" />
                                            Replace all
                                        </label>
                                    </div>
                                    <div className="flex gap-2 justify-end pt-2">
                                        <button type="button" onClick={() => setGenerateModalOpen(false)} className="px-3 py-2 text-[10px] font-bold uppercase text-slate-400 hover:text-white">Cancel</button>
                                        <button type="button" onClick={() => applyGeneratedMatrix(generateMode)} className="px-4 py-2 bg-brandTeal-500 hover:bg-brandTeal-400 text-brandNavy-955 rounded-lg text-[10px] font-bold uppercase">Generate</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {top5Preview.length > 0 && (
                            <div className={`bg-brandNavy-950/60 border rounded-xl p-4 ${top5Validation.ready && top5Validation.errors.length === 0 ? 'border-brandTeal-500/20' : 'border-amber-500/40'}`}>
                                <div className="flex justify-between items-center mb-2">
                                    <div className="text-[10px] font-mono text-brandTeal-400 uppercase tracking-widest">Top 5 preview (report page 1)</div>
                                    {top5Validation.errors.length > 0 && <span className="text-[9px] font-bold uppercase text-amber-400">Needs owner + target week</span>}
                                </div>
                                <ol className="space-y-2 list-decimal list-inside text-xs text-slate-300">
                                    {top5Preview.map((item) => {
                                        const missingOwner = !String(item.owner || '').trim();
                                        const missingWeek = !String(item.targetWeek || '').trim();
                                        const missingSavings = !(Number(item.expectedSavings) > 0);
                                        return (
                                            <li key={item.id} className="leading-relaxed">
                                                <span className="font-semibold text-white">{item.text}</span>
                                                {(missingOwner || missingWeek || missingSavings) && (
                                                    <span className="block text-[9px] text-amber-400 mt-0.5 font-mono uppercase">
                                                        {missingOwner && 'Missing owner · '}{missingWeek && 'Missing week · '}{missingSavings && 'Missing savings'}
                                                    </span>
                                                )}
                                                {item.source && <span className="block text-[9px] text-slate-500 mt-0.5">{DRH().formatMatrixEvidence?.(item, formatCurrency)}</span>}
                                            </li>
                                        );
                                    })}
                                </ol>
                            </div>
                        )}

                        <div className="flex flex-wrap gap-2">
                            <button type="button" onClick={applyQuickWinWeeks} className="text-[9px] font-bold uppercase text-brandTeal-400 hover:text-brandTeal-300 border border-brandNavy-700 px-2 py-1 rounded">Apply Week 1–2 to Quick Wins</button>
                            <button type="button" onClick={sortByImpactEffort} className="text-[9px] font-bold uppercase text-slate-400 hover:text-white border border-brandNavy-700 px-2 py-1 rounded">Sort by impact ÷ effort</button>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                            <div className="lg:col-span-7 flex flex-col gap-3">
                                <div className="flex gap-2 bg-brandNavy-950 p-3 rounded-xl border border-brandNavy-800">
                                    <input type="text" placeholder="Add initiative…" value={newItemText} onChange={e => setNewItemText(e.target.value)} onKeyDown={e => e.key === 'Enter' && addPriorityItem()} className="flex-1 bg-brandNavy-900 border border-brandNavy-700 rounded-lg px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-brandTeal-500" />
                                    <button onClick={addPriorityItem} className="px-4 py-2 bg-brandTeal-500 hover:bg-brandTeal-400 text-brandNavy-955 rounded-lg text-xs font-bold flex items-center gap-1 shrink-0"><Icons.Plus /> Add</button>
                                </div>
                                <div className="space-y-1.5 max-h-[320px] overflow-y-auto pr-1 border border-brandNavy-800 rounded-xl p-2 bg-brandNavy-950/50">
                                    {matrixItems.length === 0 && <div className="text-xs text-slate-400 text-center py-8 italic">No initiatives yet — generate from diagnosis or add manually.</div>}
                                    {matrixItems.map((item, idx) => {
                                        const quad = getMatrixQuadrantUi(Number(item.effort), Number(item.impact));
                                        const isSelected = selectedItemId === item.id;
                                        const inTop5 = top5Ids.has(item.id);
                                        const missingMeta = inTop5 && (!String(item.owner || '').trim() || !String(item.targetWeek || '').trim());
                                        return (
                                            <button key={item.id} type="button" onClick={() => setSelectedItemId(item.id)} className={`w-full text-left p-2.5 rounded-lg border transition-all flex items-center gap-2 ${isSelected ? 'bg-brandNavy-955 border-brandTeal-500' : missingMeta ? 'bg-brandNavy-950/40 border-amber-500/40 hover:border-amber-500/60' : 'bg-brandNavy-950/40 border-brandNavy-800 hover:border-brandNavy-700'}`}>
                                                <span className="font-mono text-[10px] font-bold text-brandTeal-400 w-5 shrink-0">{idx + 1}</span>
                                                <span className="text-xs text-slate-200 truncate flex-1">{item.text}</span>
                                                <span className={`text-[8px] font-mono uppercase px-1.5 py-0.5 rounded border shrink-0 ${quad.color}`}>{quad.name}</span>
                                                {inTop5 && <span className="text-[8px] font-bold text-brandTeal-400 shrink-0">TOP 5</span>}
                                            </button>
                                        );
                                    })}
                                </div>
                                {selectedItem && (
                                    <div className="border border-brandTeal-500/30 rounded-xl p-4 bg-brandNavy-950/80 space-y-3">

            const plotW = width - margin * 2;
            const plotH = height - margin * 2;
            const midX = margin + plotW / 2;
            const midY = margin + plotH / 2;

            const getCoords = (effort, impact) => ({
                x: margin + ((Number(effort) - 1) / 4) * plotW,
                y: margin + ((5 - Number(impact)) / 4) * plotH,
            });

            return (
                <div className="report-matrix-chart__frame page-break-inside-avoid">
                    <svg viewBox={`0 0 ${width} ${height}`} className="report-matrix-chart" role="img" aria-label="Full prioritization matrix">
                        <rect x={margin} y={margin} width={plotW / 2} height={plotH / 2} fill="#ecfdf5" />
                        <rect x={midX} y={margin} width={plotW / 2} height={plotH / 2} fill="#eff6ff" />
                        <rect x={margin} y={midY} width={plotW / 2} height={plotH / 2} fill="#f8fafc" />
                        <rect x={midX} y={midY} width={plotW / 2} height={plotH / 2} fill="#fff1f2" />

                        <text x={width - margin - 12} y={margin + 18} textAnchor="end" fill="#1d4ed8" fontSize="10" fontWeight="800" opacity="0.55">MAJOR PROJECTS</text>
                        <text x={margin + 12} y={height - margin - 10} fill="#64748b" fontSize="10" fontWeight="800" opacity="0.55">FILL-INS</text>
                        <text x={width - margin - 12} y={height - margin - 10} textAnchor="end" fill="#be123c" fontSize="10" fontWeight="800" opacity="0.55">LOW ROI — DEFER</text>

                        <line x1={midX} y1={margin} x2={midX} y2={height - margin} stroke="#cbd5e1" strokeWidth="1.5" strokeDasharray="4,4" />
                        <line x1={margin} y1={midY} x2={width - margin} y2={midY} stroke="#cbd5e1" strokeWidth="1.5" strokeDasharray="4,4" />
                        <rect x={margin} y={margin} width={plotW} height={plotH} fill="none" stroke="#64748b" strokeWidth="1.5" />

                        {[1, 2, 3, 4, 5].map((val) => {
                            const effortX = margin + ((val - 1) / 4) * plotW;
                            const impactY = margin + ((5 - val) / 4) * plotH;
                            return (
                                <g key={val}>
                                    <line x1={effortX} y1={height - margin} x2={effortX} y2={height - margin + 6} stroke="#64748b" strokeWidth="1.5" />
                                    <text x={effortX} y={height - margin + 20} fill="#64748b" fontSize="10" fontFamily="Montserrat, sans-serif" textAnchor="middle">{val}</text>
                                    <line x1={margin - 6} y1={impactY} x2={margin} y2={impactY} stroke="#64748b" strokeWidth="1.5" />
                                    <text x={margin - 12} y={impactY + 3} fill="#64748b" fontSize="10" fontFamily="Montserrat, sans-serif" textAnchor="end">{val}</text>
                                </g>
                            );
                        })}

                        <text x={width / 2} y={height - 8} fill="#0f766e" fontSize="10" fontWeight="800" textAnchor="middle" letterSpacing="1.2">EXECUTION EFFORT (1 = easy, 5 = hard)</text>
                        <text x={12} y={height / 2} fill="#0f766e" fontSize="10" fontWeight="800" textAnchor="middle" letterSpacing="1.2" transform={`rotate(-90, 12, ${height / 2})`}>BOTTOM-LINE IMPACT (1 = low, 5 = high)</text>

                        {items.map((item, idx) => {
                            const { x, y } = getCoords(item.effort, item.impact);
                            const meta = DRH().getMatrixQuadrantMeta?.(item.effort, item.impact) || { color: '#64748b' };

                            return (

                                    <text x={x} y={y + 3.5} fill="#ffffff" fontSize="8" fontWeight="800" textAnchor="middle">{idx + 1}</text>
                                    {label && (
                                        <text x={x} y={labelY} fill="#334155" fontSize="7.5" fontWeight="600" textAnchor="middle" fontFamily="Montserrat, sans-serif">
                                            {label}
                                        </text>
                                    )}
                                </g>
                            );
                        })}
                    </svg>
                </div>
            );
        };

            const autoSaveTimerRef = useRef(null);
            const profileHydratedIdRef = useRef(null);
            const lastSyncedWorkflowAtRef = useRef(0);

            // 1) Auth Setup
            useEffect(() => {
                let checkInterval = setInterval(() => {
                    if (window.firebaseAuth && window.signInAnonymously) {
                        clearInterval(checkInterval);
                        const initAuth = async () => {
                            try {
                                if (window.initialAuthToken) await window.signInWithCustomToken(window.firebaseAuth, window.initialAuthToken); 
                                else await window.kolthoffStaffReady 
                            } catch (e) { setAuthError(e.message || "Referrer restricted"); }
                        };
                        initAuth();
                        const unsubscribe = window.onAuthStateChanged(window.firebaseAuth, (currentUser) => {
                            setUser(currentUser);
                            if (currentUser) { setIsAuthed(true); setAuthError(null); } else setIsAuthed(false);
                        });
                        return () => unsubscribe();
                    }
                }, 50);
                return () => clearInterval(checkInterval);
            }, []);

            // 2) Data Fetching
            useEffect(() => {
                if (!user) return;
                const profilesRef = window.collection(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'workbook_profiles');
                const unsubscribe = window.onSnapshot(profilesRef, (snapshot) => {
                    const fetchedProfiles = [];
                    snapshot.forEach((snapDoc) => { fetchedProfiles.push({ id: snapDoc.id, ...snapDoc.data() }); });
                    setWorkbookProfiles(fetchedProfiles);
                    setActiveProfileId(current => {
                        if (!fetchedProfiles.find(p => p.id === current) && fetchedProfiles.length > 0) return fetchedProfiles[0].id;
                        return current;
                    });
                }, (err) => console.error("Firestore Snapshot Sync Error:", err));
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                autoSaveReadyRef.current = false;
                profileHydratedIdRef.current = null;
                lastSyncedWorkflowAtRef.current = 0;
            }, [activeProfileId]);

            // Refresh workflow tabs when the iframe builder saves — without re-hydrating synthesis.
            useEffect(() => {
                const profile = workbookProfiles.find((p) => p.id === activeProfileId);

                if (!wfUpdatedAt || wfUpdatedAt === lastSyncedWorkflowAtRef.current) return;
                lastSyncedWorkflowAtRef.current = wfUpdatedAt;

                if (!resolved.tabs.length) return;
                setTabs(hydrateDiagnosisTabsForPrint(resolved.tabs));
                if (resolved.activeTabId) setActiveTabId(resolved.activeTabId);
                setWorkflowUpdatedAt(wfUpdatedAt);

            useEffect(() => {
                const profile = workbookProfiles.find(p => p.id === activeProfileId);
                const EC = window.EngagementConfig || {};
                const WT = window.WorkflowTabs;
                if (!profile) return;
                if (profileHydratedIdRef.current === activeProfileId) return;
                profileHydratedIdRef.current = activeProfileId;
                setClientCompany(EC.getClientDisplayName ? EC.getClientDisplayName(profile) : (profile.clientCompany || 'Untitled Company'));
                    setPreparedBy(profile.preparedBy || 'Reinhard Ludwig A. Kolthoff');
                    const diagnosisData = WT?.getDiagnosisTabs?.(profile) || { tabs: [], activeTabId: null };
                    const reportTabs = diagnosisData.tabs || [];
                    if (reportTabs.length) {
                        const hydrated = WT.hydrateTabs(reportTabs).map((tab) => ({
                            ...tab,
                            present: tab.present
                                ? { ...tab.present, svgCache: printReadyWorkflowSvg(tab.present.svgCache || '') }
                                : tab.present,
                        }));
                        setTabs(hydrated);
                        setActiveTabId(diagnosisData.activeTabId || reportTabs[0].id);

                        const id = `tab-${Date.now()}`;
                        setTabs([createEmptyTab(id, 'Diagram 1')]);
                        setActiveTabId(id);
                    }
                    setSubSaaS(Array.isArray(profile.subSaaS) ? profile.subSaaS : []);
