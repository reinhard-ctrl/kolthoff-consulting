                    const resolvedOrgXml = window.DiagramEditor?.resolveWorkspaceOrgChartXml?.(profile) || '';
                    setOrgChartXml(resolvedOrgXml);
                    setOrgChartSvg(printReadyOrgChartSvg(profile.orgChart?.svgCache || ''));
                    const storedMembers = Array.isArray(profile.orgChart?.members) ? profile.orgChart.members : [];
                    const storedRoster = Array.isArray(profile.orgChart?.roster) ? profile.orgChart.roster : [];
                    const hydratedMembers =
                        window.DiagramEditor?.resolveOrgChartMembers?.(
                            resolvedOrgXml,
                            storedMembers.length ? storedMembers : storedRoster
                        ) || storedMembers;
                    setOrgChartMembers(hydratedMembers);
                    setWorkflowUpdatedAt(profile.diagnosisWorkflow?.updatedAt || 0);
                    lastSyncedWorkflowAtRef.current = profile.diagnosisWorkflow?.updatedAt || 0;
                    setReportDataUpdatedAt(profile.diagnosisReportUpdatedAt || 0);
                    setMod1DeliveredAt(profile.mod1DeliveredAt || null);

                    if (profile.synthesis) {
                        const loadedSynthesis = { ...profile.synthesis };
                        if (!Array.isArray(loadedSynthesis.staffFeedbackThemes) || loadedSynthesis.staffFeedbackThemes.length === 0) {
                            loadedSynthesis.staffFeedbackThemes = [''];
                        }
                        if (!loadedSynthesis.privacyGroundRules) {
                            loadedSynthesis.privacyGroundRules = createDefaultSynthesis().privacyGroundRules;
                        }
                        if (!loadedSynthesis.feedbackLaunchGuide) {
                            loadedSynthesis.feedbackLaunchGuide = DRH().DEFAULT_FEEDBACK_LAUNCH_GUIDE || '';
                        }

                        if (loadedSynthesis.matrix && !Array.isArray(loadedSynthesis.matrix.items)) {
                            const oldMatrix = loadedSynthesis.matrix;
                            const migratedItems = [];

                            if (Array.isArray(oldMatrix.quickWins)) {
                                oldMatrix.quickWins.forEach((text, i) => migratedItems.push({ id: `mig-qw-${i}-${Date.now()}`, text, effort: 1.5, impact: 4.5 }));
                            }
                            if (Array.isArray(oldMatrix.majorProjects)) {
                                oldMatrix.majorProjects.forEach((text, i) => migratedItems.push({ id: `mig-mp-${i}-${Date.now()}`, text, effort: 4, impact: 4.5 }));
                            }
                            if (Array.isArray(oldMatrix.fillIns)) {
                                oldMatrix.fillIns.forEach((text, i) => migratedItems.push({ id: `mig-fi-${i}-${Date.now()}`, text, effort: 1.5, impact: 1.5 }));
                            }
                            if (Array.isArray(oldMatrix.moneyPits)) {
                                oldMatrix.moneyPits.forEach((text, i) => migratedItems.push({ id: `mig-pit-${i}-${Date.now()}`, text, effort: 4, impact: 1.5 }));
                            }

                            loadedSynthesis.matrix = { items: migratedItems };
                        }

                        if (!loadedSynthesis.matrix || !Array.isArray(loadedSynthesis.matrix.items)) {
                            loadedSynthesis.matrix = { items: [] };
                        }
                        if (!loadedSynthesis.nextModuleId || loadedSynthesis.nextModuleId === 'MOD 1') {
                            loadedSynthesis.nextModuleId = 'MOD 2';
                        }
                        setSynthesis(loadedSynthesis);
                        if (Array.isArray(loadedSynthesis.reportSectionOrder)) {
                            setPrintConfig((prev) => DRH().mergePrintConfigWithSectionOrder?.(prev, loadedSynthesis.reportSectionOrder) || prev);
                        }
                    } else {
                        setSynthesis(createDefaultSynthesis());
                    }
                    autoSaveReadyRef.current = false;
                    setTimeout(() => { autoSaveReadyRef.current = true; }, 1200);
            }, [activeProfileId, workbookProfiles]);

            const triggerToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 3000); };

            // Math Engine
            let totalAnnualChaosTax = 0;
            let totalDailyWasteHours = 0;
            tabs.forEach(tab => {
                const vm = window.DiagramEditor?.getWorkflowViewModel(tab.present) || { tasks: [] };
                const tax = window.DiagramEditor?.computeTabChaosTax?.(vm.tasks) || { annual: 0, dailyHours: 0 };
                totalAnnualChaosTax += tax.annual;
                totalDailyWasteHours += tax.dailyHours;
            });
            const saasAnnualForCoi = subSaaS.reduce((acc, curr) => acc + ((Number(curr.billing) || 0) * (Number(curr.users) || 0)), 0) * 12;
            const projected3YearLoss = DRH().computeCoiForecast?.(totalAnnualChaosTax, saasAnnualForCoi, synthesis.expectedGrowth) ?? Math.round(totalAnnualChaosTax * 3);

            const reportValidation = useMemo(() => DRH().validateReportReadiness?.({
                tabs, subSaaS, synthesis, orgChartSvg, raciAssignments, DiagramEditor: window.DiagramEditor,
                workflowUpdatedAt, reportDataUpdatedAt,
            }) || { ready: true, warnings: [], errors: [] }, [tabs, subSaaS, synthesis, orgChartSvg, raciAssignments, workflowUpdatedAt, reportDataUpdatedAt]);

            const activeProfile = useMemo(
                () => workbookProfiles.find((p) => p.id === activeProfileId) || null,
                [workbookProfiles, activeProfileId],
            );

            const diagnosisTabsForReport = useMemo(() => {
                const resolved = resolveDiagnosisTabsFromProfile(activeProfile, tabs);
                const raw = resolved.tabs.length ? resolved.tabs : tabs;
                return hydrateDiagnosisTabsForPrint(raw);
            }, [activeProfile, tabs, workflowUpdatedAt]);

            const mod1Handoff = useMemo(() => DRH().validateMod1Handoff?.({
                tabs: diagnosisTabsForReport, subSaaS, synthesis, orgChartSvg, raciAssignments, DiagramEditor: window.DiagramEditor,
                workflowUpdatedAt, reportDataUpdatedAt,
                tasks: activeProfile?.tasks || [],
                orgChartMembers,
            }) || reportValidation, [diagnosisTabsForReport, subSaaS, synthesis, orgChartSvg, raciAssignments, workflowUpdatedAt, reportDataUpdatedAt, activeProfile, reportValidation, orgChartMembers]);

            const mod1Deliverables = useMemo(() => DRH().buildMod1DeliverableStatus?.({
                tasks: activeProfile?.tasks || [],
                orgChartSvg,
                orgChartMembers,
                tabs,
                subSaaS,
                synthesis,
                DiagramEditor: window.DiagramEditor,
            }) || [], [activeProfile, orgChartSvg, orgChartMembers, tabs, subSaaS, synthesis]);

            const handlePrintStaffDirectory = () => {
                const rows = DRH().normalizeStaffDirectoryRows?.(orgChartMembers) || [];
                if (!rows.length) {
                    triggerToast('❌ Add staff in the org chart first');
                    return;
                }
                document.body.classList.add('printing-staff-directory');
                window.print();
            };

            useEffect(() => {
                const clearPrintMode = () => {
                    document.body.classList.remove('printing-staff-directory', 'printing-report');
                };
                const onBeforePrint = () => {
                    if (activeNav === 'report') document.body.classList.add('printing-report');
                };
                window.addEventListener('afterprint', clearPrintMode);
                window.addEventListener('beforeprint', onBeforePrint);
                return () => {
                    window.removeEventListener('afterprint', clearPrintMode);
                    window.removeEventListener('beforeprint', onBeforePrint);
                };
            }, [activeNav]);

            const reportDate = useMemo(() => new Date().toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' }), []);

            const executiveReportProps = useMemo(() => ({
                clientCompany,
                preparedBy,
                tabs: diagnosisTabsForReport,
                raciAssignments,
                subSaaS,
                annualChaosTax: totalAnnualChaosTax,
                totalDailyWasteHours,
                synthesis,
                projected3YearLoss,
                printConfig,
                orgChartSvg,
                orgChartMembers,
                reportDate,
                profileTasks: activeProfile?.tasks || [],
                workflowSvgOverrides,
            }), [clientCompany, preparedBy, diagnosisTabsForReport, raciAssignments, subSaaS, totalAnnualChaosTax, totalDailyWasteHours, synthesis, projected3YearLoss, printConfig, orgChartSvg, orgChartMembers, reportDate, activeProfile?.tasks, workflowSvgOverrides]);

            const applyPrintPreset = (preset) => {
                const cfg = DRH().PRINT_PRESETS?.[preset];
                if (cfg) {
                    setPrintPreset(preset);
                    setPrintConfig((prev) => DRH().mergePrintConfigWithSectionOrder?.(cfg, prev.sectionOrder) || { ...cfg });
                }
            };

            const moveReportSection = (sectionId, direction) => {
                setPrintPreset('custom');
                setPrintConfig((prev) => {
                    const sectionOrder = DRH().moveReportSectionOrder?.(prev.sectionOrder, sectionId, direction) || prev.sectionOrder;
                    setSynthesis((syn) => ({ ...syn, reportSectionOrder: sectionOrder }));
                    return { ...prev, sectionOrder };
                });
            };

            const autoPitchedRef = useRef(null);
            useEffect(() => { autoPitchedRef.current = null; }, [activeProfileId]);
            useEffect(() => {
                if (!activeProfileId || autoPitchedRef.current === activeProfileId) return;
                if (synthesis.customPitch?.trim()) {
                    autoPitchedRef.current = activeProfileId;
                    return;
                }
                const modId = synthesis.nextModuleId || 'MOD 2';
                const totalWaste = totalAnnualChaosTax + saasAnnualForCoi;
                const pitch = DRH().buildModulePitch?.(modId, totalWaste, formatCurrency, EC_MODULES());
                if (pitch) {
                    setSynthesis(prev => ({ ...prev, customPitch: pitch }));
                    autoPitchedRef.current = activeProfileId;
                }
            }, [activeProfileId, totalAnnualChaosTax, saasAnnualForCoi, synthesis.customPitch, synthesis.nextModuleId]);

            const handlePrintReport = async () => {
                const errors = reportValidation.errors || [];
                const warnings = reportValidation.warnings || [];
                if (errors.length > 0) {
                    const msg = errors.map((l) => `• ${l}`).join('\n');
                    window.alert(`Cannot print — complete required fields first:\n\n${msg}`);
                    return;
                }
                if (warnings.length > 0) {
                    const msg = warnings.map((l) => `• ${l}`).join('\n');
                    const proceed = window.confirm(`Report may be incomplete:\n\n${msg}\n\nPrint anyway?`);
                    if (!proceed) return;
                }
                setIsPreparingPrint(true);
                try {
                    let tabsForExport = diagnosisTabsForReport;
                    if (isAuthed && activeProfileId && window.getDoc && window.firestoreDoc) {
                        const profileRef = window.firestoreDoc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'workbook_profiles', activeProfileId);
                        const profileSnap = await window.getDoc(profileRef);
                        if (profileSnap.exists()) {
                            const freshProfile = { id: activeProfileId, ...profileSnap.data() };
                            const resolved = resolveDiagnosisTabsFromProfile(freshProfile, tabs);
                            tabsForExport = hydrateDiagnosisTabsForPrint(resolved.tabs.length ? resolved.tabs : tabs);
                            ReactDOM.flushSync(() => {
                                if (resolved.tabs.length) setTabs(hydrateDiagnosisTabsForPrint(resolved.tabs));
                                if (resolved.activeTabId) setActiveTabId(resolved.activeTabId);
                                if (freshProfile.diagnosisWorkflow?.updatedAt) {
                                    setWorkflowUpdatedAt(freshProfile.diagnosisWorkflow.updatedAt);
                                    lastSyncedWorkflowAtRef.current = freshProfile.diagnosisWorkflow.updatedAt;
                                }
                            });
                        }
                    }
                    const missingSvgTabs = tabsForExport.filter((tab) => DRH().tabNeedsWorkflowSvgExport?.(tab));
                    if (missingSvgTabs.length && workflowSvgExportRef.current?.exportXml) {
                        const overrides = {};
                        for (const tab of missingSvgTabs) {
                            try {
                                const norm = window.DiagramEditor?.normalizeWorkflowPresent(tab.present) || {};
                                const exported = await workflowSvgExportRef.current.exportXml(norm.drawioXml);
                                const svg = printReadyWorkflowSvg(exported?.svg || '');
                                if (svg) overrides[tab.id] = svg;
                            } catch (exportErr) {
                                console.warn('Report print: workflow SVG export failed for', tab.name, exportErr);
                            }
                        }
                        if (Object.keys(overrides).length) {
                            ReactDOM.flushSync(() => {
                                setWorkflowSvgOverrides((prev) => ({ ...prev, ...overrides }));
                                setTabs((prev) => prev.map((t) => (overrides[t.id]
                                    ? { ...t, present: { ...t.present, svgCache: overrides[t.id] } }
                                    : t)));
                            });
                        }
                    }
                    document.body.classList.add('printing-report');
                    window.print();
                } catch (printSyncErr) {
                    console.warn('Report print: could not prepare workflows', printSyncErr);
                    document.body.classList.add('printing-report');
                    window.print();
                } finally {
                    setIsPreparingPrint(false);
                }
            };

            const handleSaveToCloud = async ({ silent = false, skipWorkflowTabs = false, orgOverride = null } = {}) => {
                if (authError) {
                    if (!silent) triggerToast("❌ Sync Disabled (GCP Key Issue)");
                    return false;
                }
                if (!isAuthed || !activeProfileId) return false;
                setIsSaving(true);
                try {
                    const EC = window.EngagementConfig || {};
                    const WT = window.WorkflowTabs;
                    const profileRef = window.firestoreDoc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'workbook_profiles', activeProfileId);
                    const profileSnap = await window.getDoc(profileRef);
                    const existing = profileSnap.exists() ? profileSnap.data() : {};
                    const tabsPayload = skipWorkflowTabs ? {} : (WT?.buildWorkflowTabsPayload?.('diagnosis', tabs, activeTabId, existing) || {});
                    const savedOrgXml = orgOverride?.xml ?? orgChartXml;
                    const savedOrgSvg = orgOverride?.svg ?? orgChartSvg;
                    // [] is truthy — never use `parsed || fallback` or empty parse wipes the directory.
                    const savedOrgMembers =
                        window.DiagramEditor?.resolveOrgChartMembers?.(savedOrgXml, orgChartMembers) ||
                        orgChartMembers;
                    const chaosTax = EC.buildChaosTaxPayload
                        ? EC.buildChaosTaxPayload('diagnosis', totalAnnualChaosTax, {})
                        : { source: 'diagnosis', value: totalAnnualChaosTax, inputs: {} };
                    const customAssets = window.PortalSync?.upsertMod1DeliverableAssets?.({
                        synthesis,
                        customAssets: activeProfile?.customAssets,
                    }) ?? activeProfile?.customAssets ?? [];
                    const savePayload = {
                        ...tabsPayload,
                        subSaaS,
                        raciAssignments,
                        preparedBy,
                        customAssets,
                        synthesis: {
                            ...synthesis,
                            reportSectionOrder: DRH().normalizeReportSectionOrder?.(printConfig.sectionOrder) || [],
                        },
                        diagnosisReportUpdatedAt: Date.now(),
                        orgChart: {
                            drawioXml: savedOrgXml,
                            svgCache: savedOrgSvg,
                            members: savedOrgMembers,
                            updatedAt: new Date().toISOString(),
                        },
                    };
                    if (!skipWorkflowTabs) {
                        savePayload.annualOperationalLeakage = totalAnnualChaosTax;
                        savePayload.chaosTax = chaosTax;
                    }
                    await window.firestoreSetDoc(profileRef, savePayload, { merge: true });
                    if (orgOverride?.xml) setOrgChartXml(orgOverride.xml);
                    if (orgOverride?.svg) setOrgChartSvg(orgOverride.svg);
                    setOrgChartMembers(savedOrgMembers);
                    setReportDataUpdatedAt(Date.now());
                    if (tabsPayload.diagnosisWorkflow?.updatedAt) setWorkflowUpdatedAt(tabsPayload.diagnosisWorkflow.updatedAt);
                    if (window.PortalSync?.syncProfileToPortalIfExists) {
                        try {
                            const freshSnap = await window.getDoc(profileRef);
                            const profileData = freshSnap.exists() ? { id: activeProfileId, ...freshSnap.data() } : { id: activeProfileId, subSaaS, chaosTax, annualOperationalLeakage: totalAnnualChaosTax };
                            await window.PortalSync.syncProfileToPortalIfExists(profileData, { syncIntakeAssets: true });
                        } catch (portalErr) {
                            console.warn('Portal sync skipped:', portalErr);
                        }
                    }
                    if (!silent) triggerToast("💾 Saved to Cloud!");
                    return true;
                } catch (e) {
                    if (!silent) triggerToast("❌ Error saving.");
                    return false;
                } finally {
                    setIsSaving(false);
                }
            };

            const handleSectionSave = async ({ silent = false } = {}) => {
                if (authError || !isAuthed || !activeProfileId) return false;
                setIsSaving(true);
                try {
                    let orgOverride = null;
                    if (activeNav === 'orgchart') {
                        const exported = await orgChartExportRef.current?.applyDiagram?.();
                        if (exported?.xml) {
                            orgOverride = {
                                xml: exported.xml,
                                svg: printReadyOrgChartSvg(exported.svg || ''),
                            };
                        }
                    } else if (activeNav === 'flowcharts') {
                        await requestWorkflowEmbedSave(workflowIframeRef.current, { applyDiagram: true, exportAllTabs: false });
                        return await handleSaveToCloud({ silent, skipWorkflowTabs: true });
                    }
                    return await handleSaveToCloud({ silent, orgOverride });
                } catch (e) {
                    if (!silent) triggerToast(`❌ ${e.message || 'Save failed'}`);
                    setIsSaving(false);
                    return false;
                }
            };

            // Keep Staff Directory / Print Directory in sync while the org chart is edited.
            useEffect(() => {
                if (!orgChartXml) return;
                const parsed = window.DiagramEditor?.parseRosterFromDrawioXml?.(orgChartXml) || [];
                if (!parsed.length) return;
                setOrgChartMembers((prev) => {
                    const prevKey = JSON.stringify(prev || []);
                    const nextKey = JSON.stringify(parsed);
                    return prevKey === nextKey ? prev : parsed;
                });
            }, [orgChartXml]);

            useEffect(() => {
                if (!autoSaveReadyRef.current || authError || !isAuthed || !activeProfileId || isSaving) return;
                if (activeNav === 'report' || activeNav === 'flowcharts') return;

                clearTimeout(autoSaveTimerRef.current);
                const delayMs = activeNav === 'orgchart' ? 5000 : 3000;
                autoSaveTimerRef.current = setTimeout(() => {
                    handleSectionSave({ silent: true }).catch(() => {});
                }, delayMs);

                return () => clearTimeout(autoSaveTimerRef.current);
            }, [
                activeNav,
                orgChartXml,
                orgChartSvg,
                tabs,
                activeTabId,
                raciAssignments,
                subSaaS,
                synthesis,
                preparedBy,
                authError,
                isAuthed,
                activeProfileId,
            ]);

            const handleMarkMod1Complete = async () => {
                if (authError || !isAuthed || !activeProfileId) return;
                if (!mod1Handoff.ready) {
                    const lines = [...(mod1Handoff.errors || []), ...(mod1Handoff.warnings || [])];
                    triggerToast(`❌ ${lines[0] || 'Complete required sections before marking Mod 1 done'}`);
                    return;
                }
                if ((mod1Handoff.warnings || []).length > 0) {
                    const msg = mod1Handoff.warnings.map((l) => `• ${l}`).join('\n');
                    const proceed = window.confirm(`Mod 1 handoff warnings:\n\n${msg}\n\nMark Mod 1 complete anyway?`);
                    if (!proceed) return;
                }
                const ok = window.confirm('Mark Module 1 (Business Leak Scan) as delivered?\n\nThis will push the report to the client portal vault and advance the portal to MOD 2.');
                if (!ok) return;
                setIsSaving(true);
                try {
                    await handleSaveToCloud();
                    const deliveredAt = new Date().toISOString();
                    const profileRef = window.firestoreDoc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'workbook_profiles', activeProfileId);
                    const profileSnap = await window.getDoc(profileRef);
                    const profileData = profileSnap.exists() ? { id: activeProfileId, ...profileSnap.data() } : { id: activeProfileId, synthesis, tasks: activeProfile?.tasks };
                    const customAssets = window.PortalSync?.upsertMod1DeliverableAssets?.({ ...profileData, synthesis }) ?? profileData.customAssets ?? [];
                    const stampedTasks = window.PortalSync?.stampMod1TasksDelivered?.(profileData.tasks, deliveredAt) ?? profileData.tasks;
                    await window.firestoreSetDoc(profileRef, {
                        mod1Status: 'complete',
                        mod1DeliveredAt: deliveredAt,
                        customAssets,
                        tasks: stampedTasks,
                    }, { merge: true });
                    setMod1DeliveredAt(deliveredAt);
                    const finalSnap = await window.getDoc(profileRef);
                    const finalProfile = finalSnap.exists() ? { id: activeProfileId, ...finalSnap.data() } : { id: activeProfileId, synthesis, customAssets, tasks: stampedTasks };
                    const portalCode = await window.PortalSync?.syncMod1CompleteToPortal?.(finalProfile);
                    triggerToast(portalCode ? `✓ Mod 1 complete — portal advanced (${portalCode})` : '✓ Mod 1 marked complete (no linked portal)');
                } catch (e) {
                    triggerToast('❌ Could not mark Mod 1 complete');
                }
                setIsSaving(false);
            };

            const profileLabel = (p) => window.EngagementConfig?.getClientDisplayName?.(p) || p.clientCompany || 'Untitled Company';

            const activeTab = tabs.find(t => t.id === activeTabId) || tabs[0] || { id: 'empty', name: 'No workflow', present: { ...EMPTY_CANVAS } };

            return (
                <div className="flex h-full min-h-0 overflow-hidden bg-brandNavy-955 font-sans print:bg-white">
                    {toastMessage && (<div role="alert" className="fixed bottom-6 right-6 z-[100] bg-brandTeal-600 text-white text-xs font-bold px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 animate-bounce no-print"><span>✓</span>{toastMessage}</div>)}

                    <aside className="w-[300px] bg-brandNavy-900 border-r border-brandNavy-800 flex flex-col shrink-0 no-print z-20 shadow-2xl">
                        <div className="p-6 border-b border-brandNavy-800 flex justify-between items-center group">
                            <div><h1 className="text-sm font-extrabold tracking-widest text-white uppercase leading-none mb-1">Kolthoff <span className="text-brandTeal-500">CONSULTING</span></h1><span className="text-[10px] text-brandTeal-500 font-bold uppercase tracking-widest block">Business Leak Scan</span><span className="text-[9px] text-slate-400 font-semibold uppercase tracking-wider mt-0.5 block">Leak Scan Report · delivery hub</span></div>
                            <div className="relative">
                                <div className={`w-2 h-2 rounded-full cursor-help ${isAuthed ? 'bg-emerald-500 shadow-[0_0_8px_#10b981]' : (authError ? 'bg-rose-500 shadow-[0_0_8px_#f43f5e]' : 'bg-amber-500 animate-pulse')}`}></div>
                                {authError && <div className="absolute right-0 top-full mt-2 w-48 bg-rose-950/90 border border-rose-500/50 p-2 rounded text-[9px] text-rose-200 hidden group-hover:block z-50">Sync Disabled (Offline)</div>}
                            </div>
                        </div>

                        <div className="p-4 border-b border-brandNavy-800 bg-brandNavy-950">
                            <label className="text-[10px] font-mono text-slate-400 uppercase tracking-widest font-bold mb-1.5 block">Active Workspace</label>
                            <select value={activeProfileId} onChange={(e) => setActiveProfileId(e.target.value)} className="w-full bg-brandNavy-900 border border-brandNavy-700 rounded p-2 text-xs font-semibold text-slate-200 outline-none focus:border-brandTeal-500" disabled={!!authError}>
                                {workbookProfiles.length === 0 && <option value="">{authError ? "Local Session Default" : "Loading..."}</option>}
                                {workbookProfiles.map(p => <option key={p.id} value={p.id}>{profileLabel(p)}</option>)}
                            </select>
                        </div>
                        
                        <nav className="p-4 flex-1 overflow-y-auto space-y-2">
                            <p className="text-[10px] font-mono text-slate-400 uppercase tracking-widest font-bold mb-3 px-1">Editors & Builders</p>
                            <Mod1DeliverableStrip items={mod1Deliverables} />
                            <button onClick={() => setActiveNav('orgchart')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'orgchart' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Sitemap /> 1. Org Chart</button>
                            <button onClick={() => setActiveNav('flowcharts')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'flowcharts' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Layout /> 2. Workflow</button>
                            <button onClick={() => setActiveNav('raci')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'raci' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.Users /> 3. RACI Matrix</button>
                            <button onClick={() => setActiveNav('saas')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'saas' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.CreditCard /> 4. SaaS Bill Audit</button>
                            <button onClick={() => setActiveNav('synthesis')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all ${activeNav === 'synthesis' ? 'bg-brandTeal-500 text-brandNavy-955' : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'}`}><Icons.TrendingUp /> 5. Strategy & Priorities</button>
                            <div className="pt-6 mt-4 border-t border-brandNavy-800">
                                <button onClick={() => setActiveNav('report')} className={`w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide transition-all border ${activeNav === 'report' ? 'bg-white text-slate-900 border-white' : 'bg-transparent text-slate-300 border-slate-600 hover:bg-slate-800'}`}><Icons.Print /> Preview Leak Scan Report</button>
                            </div>
                        </nav>

                        <div className="p-4 border-t border-brandNavy-800 bg-brandNavy-950 space-y-3">
                            <DiagnosisSidebarActions
                                activeNav={activeNav}
                                activeProfileId={activeProfileId}
                                isSaving={isSaving}
                                authError={authError}
                                onSave={() => handleSectionSave()}
                                onPrintStaffDirectory={handlePrintStaffDirectory}
                                hasStaffRows={(DRH().normalizeStaffDirectoryRows?.(orgChartMembers) || []).length > 0}
                            />
                            <div className="flex items-center gap-2 text-[10px] font-mono uppercase tracking-wider pt-1 border-t border-brandNavy-800">
                                <span className={`w-2 h-2 rounded-full shrink-0 ${authError ? 'bg-rose-500' : isSaving ? 'bg-amber-400 animate-pulse' : isAuthed ? 'bg-emerald-500' : 'bg-slate-600'}`} />
                                <span className="text-slate-400">
                                    {authError ? 'Offline — edits stay local' : isSaving ? 'Saving…' : activeNav === 'report' ? 'Preview mode' : 'Auto-save on'}
                                </span>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-hidden relative z-10 flex flex-col min-w-0 min-h-0">
                        {activeNav !== 'report' && (
                            <DiagnosisSectionChrome
                                sectionId={activeNav}
                                clientCompany={clientCompany}
                            />
                        )}

                        <div className={`flex-1 min-h-0 ${activeNav === 'flowcharts' || activeNav === 'orgchart' ? 'overflow-hidden' : activeNav === 'report' ? 'overflow-hidden w-full flex flex-col min-h-0' : 'overflow-y-auto p-8 max-w-[1600px] mx-auto pb-24 w-full'}`}>
                            {activeNav === 'flowcharts' && (
                                <WorkflowBuilderEmbedPanel activeProfileId={activeProfileId} iframeRef={workflowIframeRef} />
                            )}
                            {activeNav === 'orgchart' && (
                                <div className="flex flex-col h-full min-h-0">
                                    <div className="flex-1 min-h-0">
                                        <OrgChartBuilderPanel
                                            orgChartXml={orgChartXml}
                                            setOrgChartXml={setOrgChartXml}
                                            setOrgChartSvg={setOrgChartSvg}
                                            exportControllerRef={orgChartExportRef}
                                        />
                                    </div>
                                    <StaffDirectoryPanel
                                        orgChartMembers={orgChartMembers}
                                        synthesis={synthesis}
                                        setSynthesis={setSynthesis}
                                    />
                                    <Mod1StaffInputPanel
                                        synthesis={synthesis}
                                        setSynthesis={setSynthesis}
                                        clientCompany={clientCompany}
                                        tasks={activeProfile?.tasks}
                                    />
                                </div>
                            )}
                            {activeNav === 'raci' && (
                                <RaciBuilder
                                    tabs={tabs}
                                    activeTabId={activeTabId}
                                    setActiveTabId={setActiveTabId}
                                    activeTab={activeTab}
                                    raciAssignments={raciAssignments}
                                    setRaciAssignments={setRaciAssignments}
                                />
                            )}
                            {activeNav === 'saas' && <SaaSAuditBuilder subSaaS={subSaaS} setSubSaaS={setSubSaaS} />}
                            {activeNav === 'synthesis' && (
                                <SynthesisBuilder
                                    synthesis={synthesis}
                                    setSynthesis={setSynthesis}
                                    annualChaosTax={totalAnnualChaosTax}
                                    projected3YearLoss={projected3YearLoss}
                                    saasAnnualForCoi={saasAnnualForCoi}
                                    subSaaS={subSaaS}
                                    tabs={tabs}
                                    raciAssignments={raciAssignments}
                                    orgChartMembers={orgChartMembers}
                                    clientCompany={clientCompany}
                                    reportValidation={reportValidation}
                                    mod1Handoff={mod1Handoff}
                                    activeProfile={activeProfile}
                                    workflowUpdatedAt={workflowUpdatedAt}
                                    reportDataUpdatedAt={reportDataUpdatedAt}
                                    onGoToReport={() => setActiveNav('report')}
                                />
                            )}
                            {activeNav === 'report' && (
                                <div className="w-full h-full min-h-0 flex flex-col print:h-auto print:min-h-0 print:block">
                                    <div className="bg-white border-b border-slate-200 px-3 py-2 sticky top-0 z-50 no-print shadow-sm w-full shrink-0">
                                        <div className="flex flex-wrap items-center justify-between gap-2">
                                            <div className="min-w-0">
                                                <h2 className="text-[11px] font-black text-slate-900 uppercase tracking-wider truncate">Leak Scan Report</h2>
                                                <p className="text-[9px] text-slate-500 truncate">{clientCompany} · {reportDate}</p>
                                            </div>
                                            <div className="flex items-center gap-1.5 flex-wrap justify-end">
                                                {mod1DeliveredAt && (
                                                    <span className="text-[9px] font-bold uppercase text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded">Delivered {new Date(mod1DeliveredAt).toLocaleDateString()}</span>
                                                )}
                                                {(mod1Handoff.errors?.length > 0 || mod1Handoff.warnings.length > 0) && (
                                                    <span className={`text-[9px] font-bold uppercase px-2 py-0.5 rounded border ${mod1Handoff.errors?.length ? 'text-rose-800 bg-rose-50 border-rose-200' : 'text-amber-800 bg-amber-50 border-amber-200'}`}>
                                                        {mod1Handoff.errors?.length ? `${mod1Handoff.errors.length} blocker${mod1Handoff.errors.length > 1 ? 's' : ''}` : `${mod1Handoff.warnings.length} warning${mod1Handoff.warnings.length > 1 ? 's' : ''}`}
                                                    </span>
                                                )}
                                                <button type="button" onClick={() => applyPrintPreset('briefing')} className={`px-2.5 py-1 rounded text-[9px] font-bold uppercase border transition-colors ${printPreset === 'briefing' ? 'bg-brandTeal-600 text-white border-brandTeal-600' : 'bg-white text-slate-600 border-slate-300 hover:border-brandTeal-400'}`}>Briefing</button>
                                                <button type="button" onClick={() => applyPrintPreset('full')} className={`px-2.5 py-1 rounded text-[9px] font-bold uppercase border transition-colors ${printPreset === 'full' ? 'bg-brandTeal-600 text-white border-brandTeal-600' : 'bg-white text-slate-600 border-slate-300 hover:border-brandTeal-400'}`}>Full</button>
                                                {!mod1DeliveredAt && (
                                                    <button type="button" onClick={handleMarkMod1Complete} disabled={isSaving || !!authError || !mod1Handoff.ready} title={!mod1Handoff.ready ? 'Complete report sections and deliverable links first' : ''} className="bg-slate-800 hover:bg-slate-900 text-white px-2.5 py-1 rounded text-[9px] font-bold uppercase border border-slate-700 disabled:opacity-50">Mark Mod 1</button>
                                                )}
                                                <button type="button" onClick={handlePrintReport} disabled={isPreparingPrint} className="bg-brandTeal-600 hover:bg-brandTeal-700 disabled:opacity-60 disabled:cursor-wait text-white px-3 py-1 rounded text-[9px] font-bold uppercase flex items-center gap-1.5 shadow-sm"><Icons.Print /> {isPreparingPrint ? 'Preparing…' : 'Print PDF'}</button>
                                            </div>
                                        </div>
                                        <details className="mt-1.5 group">
                                            <summary className="cursor-pointer list-none text-[9px] font-bold uppercase tracking-wider text-slate-500 hover:text-brandTeal-700 flex items-center gap-1">
                                                <span className="group-open:rotate-90 transition-transform inline-block">▸</span>
                                                Options, handoff &amp; sections
                                            </summary>
                                            <div className="pt-2 pb-1 space-y-3 border-t border-slate-100 mt-1.5">
                                                <div className="flex flex-wrap items-end gap-3">
                                                    <div className="min-w-[180px] flex-1">
                                                        <label className="text-[9px] font-bold uppercase text-slate-500 tracking-wider block mb-1">Prepared by</label>
                                                        <input type="text" value={preparedBy} onChange={(e) => setPreparedBy(e.target.value)} className="w-full border border-slate-200 rounded-lg px-2.5 py-1 text-xs text-slate-800 focus:outline-none focus:border-brandTeal-500" />
                                                    </div>
                                                    <button type="button" onClick={() => setActiveNav('synthesis')} className="px-2.5 py-1 bg-white hover:bg-slate-50 text-slate-800 border border-slate-300 rounded text-[9px] font-bold uppercase shrink-0">Edit letter in Strategy</button>
                                                </div>
                                                <div className="p-3 rounded-lg border border-brandTeal-200 bg-teal-50/40 space-y-2">
                                                    <div className="text-[9px] font-bold uppercase tracking-wider text-brandTeal-900">Client handoff (syncs to portal)</div>
                                                    <p className="text-[9px] text-slate-500">Primary editing in <button type="button" onClick={() => setActiveNav('synthesis')} className="text-brandTeal-700 font-bold underline">Strategy &amp; Priorities → Report Narrative</button>.</p>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                                        <div>
                                                            <label className="text-[9px] font-bold uppercase text-slate-500 tracking-wider block mb-1">Drive PDF (m1-05)</label>
                                                            <input type="url" value={synthesis.clientDeliverableUrl || ''} onChange={(e) => setSynthesis(prev => ({ ...prev, clientDeliverableUrl: e.target.value }))} placeholder="https://drive.google.com/file/d/…" className="w-full border border-slate-200 rounded-lg px-2.5 py-1 text-xs text-slate-800 focus:outline-none focus:border-brandTeal-500" />
                                                        </div>
                                                        <div>
                                                            <label className="text-[9px] font-bold uppercase text-slate-500 tracking-wider block mb-1">Loom URL (m1-05)</label>
                                                            <input type="url" value={synthesis.loomWalkthroughUrl || ''} onChange={(e) => setSynthesis(prev => ({ ...prev, loomWalkthroughUrl: e.target.value }))} placeholder="https://www.loom.com/share/…" className="w-full border border-slate-200 rounded-lg px-2.5 py-1 text-xs text-slate-800 focus:outline-none focus:border-brandTeal-500" />
                                                        </div>
                                                        {DRH().isMod1TaskInScope?.(activeProfile?.tasks, 'm1-02') && (
                                                            <div className="md:col-span-2">
                                                                <label className="text-[9px] font-bold uppercase text-slate-500 tracking-wider block mb-1">Feedback form (m1-02)</label>
                                                                <input type="url" value={synthesis.feedbackFormUrl || ''} onChange={(e) => setSynthesis(prev => ({ ...prev, feedbackFormUrl: e.target.value }))} placeholder="https://docs.google.com/forms/d/…/viewform" className="w-full border border-slate-200 rounded-lg px-2.5 py-1 text-xs text-slate-800 focus:outline-none focus:border-brandTeal-500" />
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="flex flex-wrap gap-x-3 gap-y-1.5 text-[9px] font-bold text-slate-500 uppercase tracking-wider">
                                                    {[
                                                        ['showExecutiveSummary', 'Summary'],
                                                        ['showExecutiveLetter', 'Letter'],
                                                        ['showFixOrder', 'Gantt'],
                                                        ['showLeakageRanking', 'Rankings'],
                                                        ['showOrgChart', 'Org Chart'],
                                                        ['showFlowcharts', 'Workflows'],
                                                        ['showRaci', 'RACI'],
                                                        ['showSaas', 'Financials'],
                                                        ['showSynthesis', 'Maturity'],
                                                        ['showMatrix', 'Matrix'],
                                                        ['showFindings', 'Risks'],
                                                        ['showNextSteps', 'Next Steps'],
                                                        ['showFeedbackAppendix', 'Feedback QR'],
                                                        ['showAppendix', 'Methodology'],
                                                    ].map(([key, label]) => (
                                                        <label key={key} className="flex items-center gap-1 cursor-pointer hover:text-brandTeal-600">
                                                            <input type="checkbox" checked={!!printConfig[key]} onChange={e => { setPrintPreset('custom'); setPrintConfig({ ...printConfig, [key]: e.target.checked }); }} className="accent-brandTeal-500" />
                                                            {label}
                                                        </label>
                                                    ))}
                                                </div>
                                                <div className="rounded-lg border border-slate-200 bg-white p-3 space-y-2">
                                                    <div className="text-[9px] font-bold uppercase tracking-wider text-slate-600">PDF section order</div>
                                                    <p className="text-[9px] text-slate-500 normal-case tracking-normal">Cover page stays first. Use arrows to reorder body sections — preview updates live.</p>
                                                    <ol className="space-y-1">
                                                        {(DRH().normalizeReportSectionOrder?.(printConfig.sectionOrder) || []).map((sectionId, idx, list) => {
                                                            const meta = DRH().REPORT_SECTION_CATALOG?.[sectionId];
                                                            if (!meta) return null;
                                                            const enabled = !!printConfig[meta.configKey];
                                                            return (
                                                                <li key={sectionId} className={`flex items-center gap-2 text-[10px] normal-case tracking-normal rounded px-2 py-1.5 ${enabled ? 'bg-slate-50 text-slate-800' : 'bg-slate-100/60 text-slate-400'}`}>
                                                                    <span className="font-mono text-slate-400 w-4 shrink-0">{idx + 1}</span>
                                                                    <div className="flex flex-col shrink-0">
                                                                        <button type="button" aria-label={`Move ${meta.label} up`} disabled={idx === 0} onClick={() => moveReportSection(sectionId, -1)} className="p-0.5 text-slate-500 hover:text-brandTeal-600 disabled:opacity-25 disabled:cursor-not-allowed">▲</button>
                                                                        <button type="button" aria-label={`Move ${meta.label} down`} disabled={idx === list.length - 1} onClick={() => moveReportSection(sectionId, 1)} className="p-0.5 text-slate-500 hover:text-brandTeal-600 disabled:opacity-25 disabled:cursor-not-allowed">▼</button>
                                                                    </div>
                                                                    <span className="flex-1 font-semibold">{meta.label}</span>
                                                                    {!enabled && <span className="text-[9px] uppercase text-slate-400 shrink-0">Hidden</span>}
                                                                </li>
                                                            );
                                                        })}
                                                    </ol>
                                                </div>
                                                {(mod1Handoff.errors?.length > 0 || mod1Handoff.warnings.length > 0) && (
                                                    <div className={`p-2.5 rounded-lg border ${mod1Handoff.errors?.length ? 'bg-rose-50 border-rose-200' : 'bg-amber-50 border-amber-200'}`}>
                                                        <div className={`text-[9px] font-bold uppercase mb-1 ${mod1Handoff.errors?.length ? 'text-rose-800' : 'text-amber-800'}`}>{mod1Handoff.errors?.length ? 'Before Mod 1 handoff' : 'Before you print'}</div>
                                                        <ul className={`text-[9px] space-y-0.5 list-disc list-inside ${mod1Handoff.errors?.length ? 'text-rose-900' : 'text-amber-900'}`}>
                                                            {(mod1Handoff.errors || []).map((w, i) => <li key={`e-${i}`}>{w}</li>)}
                                                            {mod1Handoff.warnings.map((w, i) => <li key={`w-${i}`}>{w}</li>)}
                                                        </ul>
                                                    </div>
                                                )}
                                            </div>
                                        </details>
                                    </div>
                                    <div className="flex-1 min-h-0 overflow-y-auto w-full flex justify-center report-print-surface py-4 px-3 print:flex-none print:block print:h-auto print:min-h-0 print:overflow-visible print:py-0 print:px-0 print:bg-transparent">
                                        <ExecutiveReport {...executiveReportProps} />
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                    <StaffDirectoryPrintDoc
                        clientCompany={clientCompany}
                        preparedBy={preparedBy}
                        orgChartMembers={orgChartMembers}
                        privacyGroundRules={synthesis.privacyGroundRules}
                        reportDate={reportDate}
                    />
                    <div className="report-print-root bg-white text-slate-900">
                        <ExecutiveReport {...executiveReportProps} />
                    </div>
                    <div aria-hidden="true" className="no-print" style={{ position: 'fixed', left: -10000, top: 0, width: 800, height: 600, overflow: 'hidden', opacity: 0, pointerEvents: 'none' }}>
                        <DrawIoEmbed
                            preset="bpmn"
                            xml={window.DiagramEditor?.BLANK_BPMN_XML || ''}
                            hideApplyButton
                            exportControllerRef={workflowSvgExportRef}
                            height={480}
                        />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
