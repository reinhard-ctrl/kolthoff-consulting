<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | Kolthoff Consulting</title>
    
    <!-- Custom Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 12 C72 16 84 22 84 22 V54 C84 72 70 85 50 90 C30 85 16 72 16 54 V22 C16 22 28 16 50 12 Z' fill='%2314B8A6' fill-opacity='0.08' stroke='%2314B8A6' stroke-width='4.5' stroke-linejoin='round' /><path d='M36 50 L46 60 L66 36' stroke='%2314B8A6' stroke-width='7.5' stroke-linecap='round' stroke-linejoin='round' /></svg>">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

        <script type="module" src="../../shared/firebase-init.js?v=20250702-firebase-v2"></script>
    <!-- React and ReactDOM CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js" crossorigin></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandNavy: {
                            955: '#02050e', 950: '#020613', 900: '#09111F', 850: '#0C1626', 800: '#0F1A2C', 750: '#15233A', 700: '#1B2C46', 600: '#2E4567'
                        },
                        brandTeal: {
                            50: '#F0FDFA', 100: '#CCFBF1', 200: '#99F6E4', 300: '#5EEAD4', 400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488', 700: '#0F766E', 855: '#115E59', 950: '#042F2E'
                        },
                        brandAmber: { 400: '#FBBF24', 500: '#F59E0B', 600: '#D97706' }
                    },
                    fontFamily: {
                        sans: ['"Montserrat"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020613; }
        ::-webkit-scrollbar-thumb { background: #0F1A2C; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #14B8A6; }
        
        body {
            background-color: #02050e;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(20, 184, 166, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(46, 69, 103, 0.1) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: rgba(9, 17, 31, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(46, 69, 103, 0.4);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-200 antialiased min-h-screen font-sans selection:bg-brandTeal-600 selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icons = {
            Dashboard: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>,
            MapMap: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>,
            Vault: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Database: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
            CheckCircle: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            AlertCircle: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            Upload: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
            Download: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            ExternalLink: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>,
            FileText: () => <svg className="w-4 h-4 text-brandTeal-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
            TrendingUp: () => <svg className="w-5 h-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>,
            Users: () => <svg className="w-5 h-5 mr-1.5 text-brandTeal-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
            Monitor: () => <svg className="w-5 h-5 mr-1.5 text-brandTeal-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>,
            Settings: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
            Lock: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        };

        const formatCurrency = (val) => new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 0 }).format(val || 0);

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [uploadSimulating, setUploadSimulating] = useState(false);
            
            // --- AUTHENTICATION STATE ---
            const [accessCode, setAccessCode] = useState('');
            const [authError, setAuthError] = useState('');
            const [activeClientData, setActiveClientData] = useState(null);
            const [authenticatedCode, setAuthenticatedCode] = useState('');
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [uploadError, setUploadError] = useState('');
            const [uploadSuccess, setUploadSuccess] = useState('');

            useEffect(() => {
                let checkInterval = setInterval(() => {
                    if (window.firebaseAuth && window.firebaseDb && window.exchangePortalToken) {
                        clearInterval(checkInterval);
                        setFirebaseReady(true);
                    }
                }, 50);

                return () => clearInterval(checkInterval);
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                if (!firebaseReady) {
                    setAuthError('Establishing secure connection... Please wait.');
                    return;
                }

                const cleanCode = accessCode.trim().toUpperCase();
                if (!cleanCode) {
                    setAuthError('Enter your SOW tracking code.');
                    return;
                }

                setIsLoggingIn(true);
                setAuthError('');

                try {
                    const { token, client } = await window.exchangePortalToken(cleanCode);
                    await window.signInWithCustomToken(window.firebaseAuth, token);
                    setActiveClientData(client);
                    setAuthenticatedCode(cleanCode);
                    setAuthError('');

                    const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'clients', cleanCode);
                    window.liveListener = window.onSnapshot(docRef, (snap) => {
                        if (snap.exists()) {
                            setActiveClientData(snap.data());
                        } else {
                            handleLogout();
                        }
                    }, (err) => console.error(err));
                } catch (e) {
                    console.error('Portal login error:', e);
                    const code = e?.code || '';
                    if (code.includes('not-found') || String(e?.message || '').includes('Invalid access code')) {
                        setAuthError('Invalid Access Code. Please check your SOW documentation.');
                    } else {
                        setAuthError('Error accessing the secure vault. Please try again.');
                    }
                } finally {
                    setIsLoggingIn(false);
                }
            };

            const handleLogout = async () => {
                if (window.liveListener) window.liveListener();
                try {
                    await window.signOut(window.firebaseAuth);
                } catch (e) {
                    console.warn('Sign out failed:', e);
                }
                setActiveClientData(null);
                setAuthenticatedCode('');
                setAccessCode('');
                setActiveTab('dashboard');
                setUploadError('');
                setUploadSuccess('');
            };

            const handleRealUpload = async (actionId, file) => {
                if (!file || !activeClientData) return;
                setUploadSimulating(actionId);
                setUploadError('');
                setUploadSuccess('');
                try {
                    const clientKey = authenticatedCode || accessCode.trim().toUpperCase();
                    const path = `artifacts/${window.appId}/files/${clientKey}/${Date.now()}_${file.name}`;
                    const storageRef = window.storageRef(window.firebaseStorage, path);
                    await window.uploadBytes(storageRef, file);
                    await window.getDownloadURL(storageRef);
                    if (window.logAudit) await window.logAudit('portal_upload', { clientId: clientKey, filename: file.name });
                    setUploadSuccess(`File uploaded securely: ${file.name}`);
                } catch (err) {
                    console.error(err);
                    setUploadError('Upload failed: ' + (err.message || 'Storage unavailable'));
                } finally {
                    setUploadSimulating(false);
                }
            };

            const handleSimulateUpload = (id) => {
                const input = document.createElement('input');
                input.type = 'file';
                input.onchange = (e) => {
                    const file = e.target.files?.[0];
                    if (file) handleRealUpload(id, file);
                };
                input.click();
            };

            // --- LOGIN SCREEN RENDER ---
            if (!activeClientData) {
                return (
                    <div className="flex h-screen items-center justify-center relative overflow-hidden">
                        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-brandTeal-500/10 blur-[100px] rounded-full pointer-events-none"></div>
                        
                        <div className="glass-panel p-10 rounded-2xl w-full max-w-md border border-brandNavy-700 relative z-10 shadow-2xl fade-in text-center">
                            <div className="w-16 h-16 rounded-2xl bg-brandTeal-500/10 border border-brandTeal-500/30 flex items-center justify-center text-brandTeal-400 shadow-[0_0_15px_rgba(20,184,166,0.15)] mx-auto mb-6">
                                <svg className="w-8 h-8 stroke-current text-brandTeal-500" viewBox="0 0 100 100" fill="none" strokeWidth="6" strokeLinejoin="round">
                                    <path d="M50 12 C72 16 84 22 84 22 V54 C84 72 70 85 50 90 C30 85 16 72 16 54 V22 C16 22 28 16 50 12 Z"/>
                                    <path d="M36 50 L46 60 L66 36" strokeWidth="8" strokeLinecap="round"/>
                                </svg>
                            </div>
                            
                            <h1 className="text-2xl font-serif font-bold text-white mb-2">Client Access Portal</h1>
                            <p className="text-xs text-slate-400 mb-8 font-mono">Enter your SOW tracking code to authenticate.</p>

                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <input 
                                        type="text" 
                                        value={accessCode}
                                        onChange={(e) => setAccessCode(e.target.value)}
                                        placeholder="e.g. APARRI-2026"
                                        className="w-full bg-brandNavy-955 border border-brandNavy-700 rounded-lg px-4 py-3 text-sm text-white font-mono font-bold text-center tracking-widest focus:outline-none focus:border-brandTeal-500 transition-colors uppercase"
                                    />
                                </div>
                                {authError && <p className="text-xs text-rose-400 font-bold bg-rose-500/10 p-2 rounded">{authError}</p>}
                                <button type="submit" disabled={isLoggingIn || !firebaseReady} className="w-full bg-brandTeal-500 hover:bg-brandTeal-400 disabled:opacity-50 disabled:cursor-not-allowed text-brandNavy-955 font-bold rounded-lg px-4 py-3 text-sm transition-all flex justify-center items-center gap-2">
                                    <Icons.Lock /> {isLoggingIn ? 'Authenticating...' : 'Authenticate Session'}
                                </button>
                            </form>
                            
                            <p className="text-[10px] text-slate-500 mt-8 italic">Protected by Kolthoff Consulting Enterprise Security</p>
                        </div>
                    </div>
                );
            }

            const renderTabContent = () => {
                switch (activeTab) {
                    case 'dashboard':
                        return <DashboardTab data={activeClientData} handleSimulateUpload={handleSimulateUpload} uploadSimulating={uploadSimulating} uploadError={uploadError} uploadSuccess={uploadSuccess} />;
                    case 'roadmap':
                        return <RoadmapTab data={activeClientData} />;
                    case 'intake':
                        return <IntakeTab data={activeClientData} />;
                    case 'vault':
                        return <VaultTab data={activeClientData} />;
                    case 'billing':
                        return <BillingTab data={activeClientData} />;
                    default:
                        return <DashboardTab data={activeClientData} />;
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* SIDEBAR */}
                    <aside className="w-64 bg-brandNavy-955 border-r border-brandNavy-800 flex flex-col shrink-0 relative z-20">
                        <div className="p-6 border-b border-brandNavy-800">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-brandTeal-500/10 border border-brandTeal-500/30 flex items-center justify-center text-brandTeal-400 shadow-[0_0_15px_rgba(20,184,166,0.15)]">
                                    <svg className="w-6 h-6 stroke-current text-brandTeal-500" viewBox="0 0 100 100" fill="none" strokeWidth="6" strokeLinejoin="round">
                                        <path d="M50 12 C72 16 84 22 84 22 V54 C84 72 70 85 50 90 C30 85 16 72 16 54 V22 C16 22 28 16 50 12 Z"/>
                                        <path d="M36 50 L46 60 L66 36" strokeWidth="8" strokeLinecap="round"/>
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-[11px] font-extrabold tracking-widest text-white uppercase leading-none">KOLTHOFF</h1>
                                    <span className="text-[9px] text-brandTeal-500 font-bold uppercase tracking-widest">Consulting</span>
                                </div>
                            </div>
                        </div>

                        <div className="p-6">
                            <p className="text-[10px] font-mono text-slate-500 uppercase tracking-widest mb-3 font-bold">Client Portal</p>
                            <div className="bg-brandNavy-900 border border-brandNavy-700 rounded-lg p-3 mb-6">
                                <p className="text-xs font-bold text-white truncate" title={activeClientData.companyName || 'Company'}>{activeClientData.companyName || 'Company'}</p>
                                <p className="text-[10px] text-slate-400 font-mono mt-1">SOW: {activeClientData.sowReference}</p>
                            </div>

                            <nav className="space-y-2">
                                <NavItem id="dashboard" icon={<Icons.Dashboard />} label="Executive Dashboard" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <NavItem id="roadmap" icon={<Icons.MapMap />} label="Strategic Roadmap" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <NavItem id="intake" icon={<Icons.Database />} label="Intake & Company Data" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <NavItem id="vault" icon={<Icons.Vault />} label="Secure Asset Vault" activeTab={activeTab} setActiveTab={setActiveTab} />
                                <NavItem id="billing" icon={<Icons.FileText />} label="Contracts & Billing" activeTab={activeTab} setActiveTab={setActiveTab} />
                            </nav>
                        </div>

                        <div className="mt-auto p-6 border-t border-brandNavy-800">
                            <button onClick={handleLogout} className="flex items-center gap-2 text-xs text-rose-400 hover:text-rose-300 transition-colors w-full">
                                <Icons.Lock /> Disconnect Session
                            </button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 overflow-y-auto relative z-10 scroll-smooth">
                        <header className="sticky top-0 z-30 bg-brandNavy-955/80 backdrop-blur-md border-b border-brandNavy-800 px-8 py-4 flex justify-between items-center">
                            <h2 className="text-lg font-bold text-white font-serif tracking-wide capitalize">
                                {activeTab === 'dashboard' ? 'Executive Overview' : activeTab === 'intake' ? 'Company Data & Intake Records' : activeTab.replace('-', ' ')}
                            </h2>
                            <div className="flex items-center gap-3">
                                <span className="text-[10px] font-mono text-brandTeal-400 bg-brandTeal-500/10 border border-brandTeal-500/20 px-2.5 py-1 rounded font-bold uppercase tracking-wider">
                                    Status: Active
                                </span>
                                <div className="w-8 h-8 rounded-full bg-brandNavy-800 border border-brandNavy-700 flex items-center justify-center text-xs font-bold text-white uppercase">
                                    {(activeClientData.repName || 'U').charAt(0)}
                                </div>
                            </div>
                        </header>

                        <div className="p-8 max-w-6xl mx-auto pb-24">
                            {renderTabContent()}
                        </div>
                    </main>
                </div>
            );
        }

        const NavItem = ({ id, icon, label, activeTab, setActiveTab }) => {
            const isActive = activeTab === id;
            return (
                <button
                    onClick={() => setActiveTab(id)}
                    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-xs font-bold tracking-wide transition-all duration-200 ${
                        isActive 
                        ? 'bg-brandTeal-500 text-brandNavy-955 shadow-[0_4px_15px_rgba(20,184,166,0.2)]' 
                        : 'text-slate-400 hover:bg-brandNavy-800 hover:text-slate-200'
                    }`}
                >
                    {icon}
                    {label}
                </button>
            );
        }

        // --- DASHBOARD TAB ---
        const DashboardTab = ({ data, handleSimulateUpload, uploadSimulating, uploadError, uploadSuccess }) => {
            const pendingActions = (data.actionItems || []).filter(a => a.status === 'pending');
            const safeMetrics = data.metrics || { annualLeakageIdentified: 0, chaosTaxEliminated: 0, saasSavingsIdentified: 0 };
            const workspaceUrl = data.workspaceUrl || '';

            return (
                <div className="space-y-8 fade-in">
                    {uploadError && <p className="text-sm text-rose-400 bg-rose-500/10 border border-rose-500/30 rounded-lg p-3">{uploadError}</p>}
                    {uploadSuccess && <p className="text-sm text-emerald-400 bg-emerald-500/10 border border-emerald-500/30 rounded-lg p-3">{uploadSuccess}</p>}
                    {workspaceUrl && (
                        <div className="glass-panel rounded-2xl p-6 border border-brandTeal-500/30 bg-brandTeal-500/5">
                            <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                                <div>
                                    <p className="text-[10px] font-mono text-brandTeal-400 uppercase tracking-widest font-bold mb-2">Core Workspace Ready</p>
                                    <h3 className="text-lg font-serif font-bold text-white mb-2">Your team portal is live</h3>
                                    <p className="text-sm text-slate-400 max-w-2xl">
                                        Open Core Workspace to collaborate on messenger, approvals, and policies. Use your organizational email and choose first-time setup if you have not set a password yet.
                                    </p>
                                </div>
                                <a
                                    href={workspaceUrl}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="inline-flex items-center justify-center gap-2 px-5 py-3 bg-brandTeal-500 hover:bg-brandTeal-400 text-brandNavy-955 font-bold rounded-xl text-sm shrink-0"
                                >
                                    <Icons.Monitor /> Open Core Workspace
                                </a>
                            </div>
                        </div>
                    )}

                    {/* Greeting & Progress */}
                    <div className="glass-panel rounded-2xl p-8 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-brandTeal-500/5 blur-[80px] rounded-full pointer-events-none"></div>
                        <h2 className="text-2xl font-serif font-bold text-white mb-2">Welcome back, {(data.repName || 'Client').split(' ')[0]}</h2>
                        <p className="text-sm text-slate-400 mb-8 max-w-2xl leading-relaxed">
                            Your operational upgrade is currently in progress. Review pending action items below to ensure we maintain our target execution timeline.
                        </p>

                        <div className="bg-brandNavy-955 border border-brandNavy-800 rounded-xl p-5">
                            <div className="flex justify-between items-end mb-3">
                                <div>
                                    <p className="text-[10px] font-mono text-slate-500 uppercase tracking-widest font-bold mb-1">Current Active Phase</p>
                                    <p className="text-brandTeal-400 font-bold text-sm">{data.currentPhase || 'Initializing'}</p>
                                </div>
                                <div className="text-right">
                                    <span className="text-2xl font-bold text-white font-mono">{data.progressPercentage || 0}%</span>
                                    <span className="text-[10px] text-slate-500 ml-1 uppercase font-bold tracking-wider">Complete</span>
                                </div>
                            </div>
                            <div className="w-full bg-brandNavy-900 rounded-full h-2.5 border border-brandNavy-800 overflow-hidden">
                                <div className="bg-gradient-to-r from-brandTeal-600 to-brandTeal-400 h-2.5 rounded-full transition-all duration-1000" style={{ width: `${data.progressPercentage || 0}%` }}></div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Action Items (Intake Engine) */}
                        <div className="lg:col-span-2 space-y-4">
                            <h3 className="text-sm font-bold uppercase tracking-widest text-slate-300 font-mono flex items-center gap-2">
                                {pendingActions.length > 0 && <span className="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>}
                                Required Action Items ({pendingActions.length})
                            </h3>
                            <div className="space-y-3">
                                {pendingActions.map(action => (
                                    <div key={action.id} className="glass-panel rounded-xl p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-l-4 border-l-rose-500">
                                        <div>
                                            <h4 className="font-bold text-white text-sm flex items-center gap-2">
                                                {action.title}
                                            </h4>
                                            <p className="text-xs text-slate-400 mt-1 leading-relaxed">{action.desc}</p>
                                        </div>
                                        <div className="shrink-0">
                                            {action.type === 'upload' && (
                                                <button 
                                                    onClick={() => handleSimulateUpload(action.id)}
                                                    disabled={uploadSimulating === action.id}
                                                    className="px-4 py-2 bg-brandNavy-800 hover:bg-brandNavy-700 border border-brandNavy-600 text-white text-xs font-bold rounded-lg transition-all flex items-center w-full sm:w-auto justify-center"
                                                >
                                                    {uploadSimulating === action.id ? 'Encrypting...' : <span className="flex items-center gap-1.5"><Icons.Upload /> Secure Upload</span>}
                                                </button>
                                            )}
                                            {action.type === 'review' && (
                                                <button className="px-4 py-2 bg-brandTeal-500 hover:bg-brandTeal-400 text-brandNavy-955 text-xs font-bold rounded-lg transition-all flex items-center w-full sm:w-auto justify-center">
                                                    <span className="flex items-center gap-1.5"><Icons.ExternalLink /> Open Review Link</span>
                                                </button>
                                            )}
                                            {action.type === 'link' && action.link && (
                                                <a
                                                    href={action.link}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="px-4 py-2 bg-brandTeal-500 hover:bg-brandTeal-400 text-brandNavy-955 text-xs font-bold rounded-lg transition-all flex items-center w-full sm:w-auto justify-center"
                                                >
                                                    <span className="flex items-center gap-1.5"><Icons.ExternalLink /> Open Link</span>
                                                </a>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                {pendingActions.length === 0 && (
                                    <div className="glass-panel rounded-xl p-8 text-center border border-brandNavy-800">
                                        <Icons.CheckCircle className="w-8 h-8 text-emerald-500 mx-auto mb-2" />
                                        <p className="text-sm font-bold text-slate-300">You're all caught up!</p>
                                        <p className="text-xs text-slate-500 mt-1">Kolthoff Consulting is processing the next deliverables.</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Chaos Tax & ROI Dashboard */}
                        <div className="space-y-4">
                            <h3 className="text-sm font-bold uppercase tracking-widest text-slate-300 font-mono">Value & ROI Tracker</h3>
                            <div className="glass-panel rounded-xl p-5 space-y-5">
                                <div>
                                    <p className="text-[10px] font-mono text-slate-500 uppercase tracking-widest font-bold mb-1 flex items-center gap-1">
                                        <Icons.AlertCircle /> Annual "Chaos Tax" Risk
                                    </p>
                                    <p className="text-xl font-bold text-rose-400 font-mono">{formatCurrency(safeMetrics.annualLeakageIdentified)}</p>
                                </div>
                                <div className="pt-4 border-t border-brandNavy-800">
                                    <p className="text-[10px] font-mono text-brandTeal-500 uppercase tracking-widest font-bold mb-1 flex items-center gap-1">
                                        <Icons.TrendingUp /> Operational Leakage Eliminated
                                    </p>
                                    <p className="text-2xl font-bold text-emerald-400 font-mono">{formatCurrency(safeMetrics.chaosTaxEliminated)}</p>
                                    <p className="text-[10px] text-slate-500 mt-1">Verified via MOD 2 standardizations.</p>
                                </div>
                                <div className="pt-4 border-t border-brandNavy-800">
                                    <p className="text-[10px] font-mono text-slate-500 uppercase tracking-widest font-bold mb-1">Identified SaaS Savings</p>
                                    <p className="text-lg font-bold text-white font-mono">{formatCurrency(safeMetrics.saasSavingsIdentified)} / yr</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- ROADMAP TAB ---
        const RoadmapTab = ({ data }) => {
            const roadmapItems = data.roadmap || [];

            return (
                <div className="space-y-8 fade-in">
                    <div>
                        <h2 className="text-2xl font-serif font-bold text-white mb-2">Strategic Implementation Roadmap</h2>
                        <p className="text-sm text-slate-400 max-w-3xl leading-relaxed">
                            A live, transparent view of our execution timeline. This ensures complete alignment between our consulting team and your operations.
                        </p>
                    </div>

                    <div className="glass-panel rounded-2xl p-6 relative before:absolute before:inset-0 before:ml-[31px] before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-brandNavy-700 before:to-transparent">
                        
                        <div className="space-y-8 relative">
                            {roadmapItems.length === 0 && <p className="text-center text-sm text-slate-500">No roadmap items added yet.</p>}
                            {roadmapItems.map((item, idx) => {
                                let statusColor, statusBg, dotColor;
                                if (item.status === 'completed') {
                                    statusColor = 'text-emerald-400'; statusBg = 'bg-emerald-500/10 border-emerald-500/30'; dotColor = 'bg-emerald-500 shadow-[0_0_10px_#10b981]';
                                } else if (item.status === 'active') {
                                    statusColor = 'text-brandTeal-400'; statusBg = 'bg-brandTeal-500/10 border-brandTeal-500/30'; dotColor = 'bg-brandTeal-500 shadow-[0_0_15px_#14b8a6] animate-pulse';
                                } else {
                                    statusColor = 'text-slate-500'; statusBg = 'bg-brandNavy-800 border-brandNavy-700'; dotColor = 'bg-brandNavy-700';
                                }

                                return (
                                    <div key={item.id || idx} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                                        <div className="flex items-center justify-center w-8 h-8 rounded-full border-4 border-[#02050e] bg-brandNavy-900 shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 shadow-sm z-10">
                                            <span className={`w-3 h-3 rounded-full ${dotColor}`}></span>
                                        </div>
                                        
                                        <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] glass-panel border border-brandNavy-800 rounded-xl p-5 shadow-lg transition-all hover:border-brandNavy-600">
                                            <div className="flex justify-between items-start mb-1">
                                                <span className={`text-[10px] font-bold uppercase tracking-wider font-mono px-2 py-0.5 rounded border ${statusBg} ${statusColor}`}>
                                                    {item.status}
                                                </span>
                                                <span className="text-[10px] font-mono text-slate-500 font-bold">{item.date}</span>
                                            </div>
                                            <h4 className={`font-bold text-sm mt-2 ${item.status === 'pending' ? 'text-slate-400' : 'text-white'}`}>{item.title}</h4>
                                            <p className="text-xs text-slate-400 mt-2 leading-relaxed">{item.details}</p>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // --- NEW INTAKE & COMPANY DATA TAB ---
        const IntakeTab = ({ data }) => {
            const saasData = data.subSaaS || [];
            const rolesData = data.roles || [];
            const customData = data.customAssets || [];

            return (
                <div className="space-y-8 fade-in">
                    <div>
                        <h2 className="text-2xl font-serif font-bold text-white mb-2">Company Data & Intake Records</h2>
                        <p className="text-sm text-slate-400 max-w-3xl leading-relaxed">
                            A live repository of all operational parameters, rosters, and inventories synchronized directly from your submitted intake forms.
                        </p>
                    </div>

                    {/* SaaS Section */}
                    <div className="glass-panel rounded-2xl overflow-hidden border border-brandNavy-800">
                        <div className="p-4 bg-brandNavy-955/50 border-b border-brandNavy-800 flex justify-between items-center">
                            <h3 className="text-xs font-bold uppercase tracking-widest text-slate-300 font-mono flex items-center gap-2">
                                <Icons.Monitor /> Software & SaaS Inventory
                            </h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-brandNavy-900/30 text-slate-400 uppercase text-[9px] tracking-wider font-extrabold border-b border-brandNavy-800 font-mono">
                                    <tr>
                                        <th className="p-4 w-[25%]">Software / Tool</th>
                                        <th className="p-4 w-[20%]">Monthly Cost</th>
                                        <th className="p-4 w-[15%] text-center">Active Users</th>
                                        <th className="p-4 w-[40%]">Primary Use Case</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-brandNavy-800/50 text-sm">
                                    {saasData.length === 0 && (
                                        <tr><td colSpan="4" className="p-6 text-center text-slate-500 text-sm italic">No SaaS inventory data synced yet.</td></tr>
                                    )}
                                    {saasData.map((item, i) => (
                                        <tr key={i} className="hover:bg-brandNavy-900/40 transition-colors group">
                                            <td className="p-4 font-bold text-slate-200">{item.tool || 'N/A'}</td>
                                            <td className="p-4 font-mono text-brandTeal-400">{formatCurrency(item.billing)}</td>
                                            <td className="p-4 text-center font-mono text-slate-300">{item.users || '0'}</td>
                                            <td className="p-4 text-xs text-slate-400 leading-relaxed">{item.reason || 'N/A'}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Roles Section */}
                    <div className="glass-panel rounded-2xl overflow-hidden border border-brandNavy-800">
                        <div className="p-4 bg-brandNavy-955/50 border-b border-brandNavy-800 flex justify-between items-center">
                            <h3 className="text-xs font-bold uppercase tracking-widest text-slate-300 font-mono flex items-center gap-2">
                                <Icons.Users /> Employee Roster & Roles
                            </h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-brandNavy-900/30 text-slate-400 uppercase text-[9px] tracking-wider font-extrabold border-b border-brandNavy-800 font-mono">
                                    <tr>
                                        <th className="p-4 w-[50%]">Employee Name</th>
                                        <th className="p-4 w-[50%]">Job Title / Position</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-brandNavy-800/50 text-sm">
                                    {rolesData.length === 0 && (
                                        <tr><td colSpan="2" className="p-6 text-center text-slate-500 text-sm italic">No team roster data synced yet.</td></tr>
                                    )}
                                    {rolesData.map((item, i) => (
                                        <tr key={i} className="hover:bg-brandNavy-900/40 transition-colors group">
                                            <td className="p-4 font-bold text-slate-200">{item.owner || 'N/A'}</td>
                                            <td className="p-4 text-xs text-brandTeal-400 uppercase tracking-wider font-bold">{item.role || 'N/A'}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Custom Assets Section (Dynamically renders columns based on first item keys) */}
                    {customData.length > 0 && (
                        <div className="glass-panel rounded-2xl overflow-hidden border border-brandNavy-800">
                            <div className="p-4 bg-brandNavy-955/50 border-b border-brandNavy-800 flex justify-between items-center">
                                <h3 className="text-xs font-bold uppercase tracking-widest text-slate-300 font-mono flex items-center gap-2">
                                    <Icons.Database /> Custom Process Records
                                </h3>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-brandNavy-900/30 text-slate-400 uppercase text-[9px] tracking-wider font-extrabold border-b border-brandNavy-800 font-mono">
                                        <tr>
                                            {Object.keys(customData[0] || {}).filter(k => k !== 'id').map(key => (
                                                <th key={key} className="p-4">{key.replace(/_/g, ' ')}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-brandNavy-800/50 text-sm">
                                        {customData.map((item, i) => (
                                            <tr key={i} className="hover:bg-brandNavy-900/40 transition-colors group">
                                                {Object.keys(item).filter(k => k !== 'id').map(key => (
                                                    <td key={key} className="p-4 text-slate-300 text-xs">{item[key]}</td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- ASSET VAULT TAB ---
        const VaultTab = ({ data }) => {
            const vaultAssets = data.assets || [];

            return (
                <div className="space-y-8 fade-in">
                    <div>
                        <h2 className="text-2xl font-serif font-bold text-white mb-2">Secure Asset Vault</h2>
                        <p className="text-sm text-slate-400 max-w-3xl leading-relaxed">
                            Access all finalized deliverables, blueprints, and policy documents here. 
                            <span className="block mt-1 text-brandTeal-500/80 font-semibold italic text-xs">
                                Note: To guarantee absolute data sovereignty, zero downtime, and bank-grade encryption, Kolthoff Consulting utilizes a dedicated enterprise Google Drive backend. These links provide direct, authenticated access to your isolated master files.
                            </span>
                        </p>
                    </div>

                    <div className="glass-panel rounded-2xl overflow-hidden border border-brandNavy-800">
                        <div className="p-4 bg-brandNavy-955/50 border-b border-brandNavy-800 flex justify-between items-center">
                            <h3 className="text-xs font-bold uppercase tracking-widest text-slate-300 font-mono">Finalized Project Deliverables</h3>
                            <span className="text-[10px] text-slate-500 bg-brandNavy-900 px-2 py-1 rounded border border-brandNavy-700 font-mono">Encrypted via Google Workspace Backend</span>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-brandNavy-900/30 text-slate-400 uppercase text-[9px] tracking-wider font-extrabold border-b border-brandNavy-800 font-mono">
                                        <th className="p-4 w-[15%]">SOW Category</th>
                                        <th className="p-4 w-[45%]">Document Title</th>
                                        <th className="p-4 w-[20%]">Date Finalized</th>
                                        <th className="p-4 w-[20%] text-right">Secure Action</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-brandNavy-800/50 text-sm">
                                    {vaultAssets.length === 0 && (
                                        <tr><td colSpan="4" className="p-4 text-center text-slate-500 text-sm">No vault files available yet.</td></tr>
                                    )}
                                    {vaultAssets.map((asset, idx) => (
                                        <tr key={asset.id || idx} className="hover:bg-brandNavy-900/40 transition-colors group">
                                            <td className="p-4">
                                                <span className="text-[9px] bg-brandNavy-800 text-slate-300 px-2 py-1 rounded font-bold font-mono border border-brandNavy-700">{asset.category}</span>
                                            </td>
                                            <td className="p-4 font-bold text-slate-200 group-hover:text-brandTeal-400 transition-colors flex items-center gap-2">
                                                <Icons.FileText /> {asset.title}
                                            </td>
                                            <td className="p-4 text-xs text-slate-500 font-mono">{asset.date}</td>
                                            <td className="p-4 text-right">
                                                <a 
                                                    href={asset.gDriveLink} 
                                                    target="_blank" 
                                                    className="inline-flex items-center gap-1.5 px-3 py-1.5 bg-brandNavy-800 hover:bg-brandTeal-500/10 border border-brandNavy-600 hover:border-brandTeal-500/40 text-slate-300 hover:text-brandTeal-400 text-[10px] font-bold uppercase tracking-wider rounded transition-all"
                                                    title="Opens authenticated Google Drive backend link"
                                                >
                                                    <Icons.Download /> Access File
                                                </a>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- BILLING & CONTRACTS TAB ---
        const BillingTab = ({ data }) => {
            const contracts = data.contracts || [];

            return (
                <div className="space-y-8 fade-in">
                    <div>
                        <h2 className="text-2xl font-serif font-bold text-white mb-2">Contracts & Billing</h2>
                        <p className="text-sm text-slate-400 max-w-3xl leading-relaxed">
                            Review your active service agreements, master proposals, and EOPT-compliant VAT Sales Invoices.
                        </p>
                    </div>

                    <div className="glass-panel rounded-2xl overflow-hidden border border-brandNavy-800">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-brandNavy-900/30 text-slate-400 uppercase text-[9px] tracking-wider font-extrabold border-b border-brandNavy-800 font-mono">
                                    <th className="p-4 w-[50%]">Document Outline</th>
                                    <th className="p-4 w-[20%]">Date Issued</th>
                                    <th className="p-4 w-[15%]">Status</th>
                                    <th className="p-4 w-[15%] text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-brandNavy-800/50 text-sm">
                                {contracts.length === 0 && (
                                    <tr><td colSpan="4" className="p-4 text-center text-slate-500 text-sm">No billing or contract files available yet.</td></tr>
                                )}
                                {contracts.map((doc, idx) => (
                                    <tr key={doc.id || idx} className="hover:bg-brandNavy-900/40 transition-colors">
                                        <td className="p-4 font-bold text-slate-200">
                                            {doc.title}
                                        </td>
                                        <td className="p-4 text-xs text-slate-500 font-mono">{doc.date}</td>
                                        <td className="p-4">
                                            <span className={`text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border ${
                                                doc.status === 'Paid' || doc.status === 'Active' ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-slate-800 text-slate-400 border-slate-700'
                                            }`}>
                                                {doc.status}
                                            </span>
                                        </td>
                                        <td className="p-4 text-right">
                                            {doc.link ? (
                                                <a 
                                                    href={doc.link}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="inline-flex items-center gap-1 text-slate-400 hover:text-white text-xs font-bold transition-colors"
                                                >
                                                    <Icons.ExternalLink /> View
                                                </a>
                                            ) : (
                                                <span className="text-xs text-slate-600 italic">No link</span>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
