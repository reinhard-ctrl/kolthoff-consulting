<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Signing | Kolthoff Consulting</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 12 C72 16 84 22 84 22 V54 C84 72 70 85 50 90 C30 85 16 72 16 54 V22 C16 22 28 16 50 12 Z' fill='%2314B8A6' fill-opacity='0.08' stroke='%2314B8A6' stroke-width='4.5' stroke-linejoin='round' /><path d='M36 50 L46 60 L66 36' stroke='%2314B8A6' stroke-width='7.5' stroke-linecap='round' stroke-linejoin='round' /></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <script type="module" src="../../shared/firebase-init.js?v=20250702-firebase-v2"></script>

    <script type="module">
        import * as Financials from '../../shared/financials.js';
        window.Financials = Financials;
    </script>
    <script src="../../shared/engagement-config.js?v=20250701-phase3-v1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>

            theme: {

                        brandTeal: { 50: '#F0FDFA', 100: '#CCFBF1', 200: '#99F6E4', 300: '#5EEAD4', 400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488', 700: '#0F766E', 855: '#115E59', 950: '#042F2E' },
                        brandAmber: { 400: '#FBBF24', 500: '#F59E0B', 600: '#D97706' }

                    }
                }
            }
        }
    </script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #020613; }

            body, html, #root { background: white !important; color: #0f172a !important; height: auto !important; min-height: auto !important; }

            aside, header { display: none !important; }

                overflow: visible !important; 
                height: auto !important; 
                min-height: auto !important; 
                padding: 0 !important; 
            }

                background: white !important; 
                box-shadow: none !important; 
                border-color: #cbd5e1 !important; 
            }
            * { color: #0f172a !important; text-shadow: none !important; }
            .text-brandTeal-400, .text-brandTeal-700, .text-emerald-400, .text-emerald-600 { color: #0f766e !important; }
            .text-white, .text-slate-100, .text-slate-200, .text-slate-300, .text-slate-400 { color: #0f172a !important; }
            .border-brandNavy-800, .border-brandNavy-700, .border-slate-200 { border-color: #cbd5e1 !important; }
            .max-w-4xl { max-width: 100% !important; margin: 0 !important; border: none !important; padding: 0 !important;}
            .print-force-break { page-break-inside: avoid; break-inside: avoid; }
            @page { margin: 15mm; }

    </style>
</head>
<body class="luxury-gradient text-slate-100 antialiased min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            FileSignature: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>,
            Link: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
            Eye: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
            CheckCircle: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            ShieldCheck: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>,
            Reset: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></svg>,
            Printer: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
            Lock: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            ArrowLeft: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            CloudDownload: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path d="M8 17l4 4 4-4"/><path d="M12 12v9"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><path d="M16 16l-4-4-4 4"/></svg>
        };

        const formatCurrency = (val) => window.Financials?.formatCurrency(val) || val;
        const getFinancials = (profile) => window.Financials?.getFinancials(profile) || { total: 0, subtotal: 0 };
        const getBillingSchedule = (profile) => window.Financials?.getBillingSchedule(profile) || { milestones: [], milestoneSplit: 'auto', retainerMonthly: 0, retainerMonths: 6, retainerTotal: 0, includeTax: false, finalProjectCostPart: 0 };
        const getModuleInvestmentSummaries = (profile) => window.Financials?.computeModuleInvestmentSummaries(profile) || [];
        const getModDisplayName = (modNum) => window.Financials?.getModDisplayName(modNum) || `MOD ${modNum}`;
        const contractProfile = (profile) => profile;
        const PREPARED_BY = 'Reinhard Ludwig A. Kolthoff';

        function App() {
            const [isAuthed, setIsAuthed] = useState(false);
            const [isStaffUser, setIsStaffUser] = useState(false);
            const [activeView, setActiveView] = useState('ledger'); 
            
            // Admin Protocol States
            const [adminCode, setAdminCode] = useState('');
            const [isAdminAuthed, setIsAdminAuthed] = useState(new URLSearchParams(window.location.search).get('embedded') === '1');
            const [authError, setAuthError] = useState('');

            const [profiles, setProfiles] = useState([]); 
            const [contracts, setContracts] = useState([]); 
            
            const [activeContractId, setActiveContractId] = useState(null);
            const [toast, setToast] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isPulling, setIsPulling] = useState(false);
            const [hasRouted, setHasRouted] = useState(false);
            const [clientLoadState, setClientLoadState] = useState('loading');

            const [signatureName, setSignatureName] = useState("");
            const [hasAcceptedTerms, setHasAcceptedTerms] = useState(false);
            const [contractToReset, setContractToReset] = useState(null);

            const isClientMode = new URLSearchParams(window.location.search).has('contract');

            const isStaffPreview = new URLSearchParams(window.location.search).get('staff') === '1';

            if (!isClientMode) {
                window.location.replace('/admin/contracts');
                return null;
            }
            useEffect(() => {
                let checkInterval = setInterval(() => {
                    if (window.firebaseAuth && window.firebaseDb) {
                        clearInterval(checkInterval);
                        const initAuth = async () => {
                            try {
                                const result = await window.kolthoffStaffReady;
                                setIsAuthed(true);
                                const user = result?.user ?? window.firebaseAuth?.currentUser;
                                if (user && window.hasStaffAccess && await window.hasStaffAccess(user)) {
                                    setIsStaffUser(true);
                                } else if (isStaffPreview) {
                                    setIsStaffUser(true);
                                }
                            } catch (e) {
                                console.error("Firebase Auth Error:", e);
                                if (isClientMode) {
                                    setClientLoadState('error');
                                    setHasRouted(true);
                                }
                            }
                        };
                        initAuth();
                    }
                }, 50);
                return () => clearInterval(checkInterval);
            }, []);

            // 2. Client Data Fetching (Only fires if accessed via secure link)
            useEffect(() => {
                if (!isAuthed || !isClientMode) return;
                
                const db = window.firebaseDb;
                const appId = window.appId;
                const urlParams = new URLSearchParams(window.location.search);
                const contractParam = urlParams.get('contract');

                if (contractParam) {
                    let profileReady = false;
                    let contractReady = false;
                    const markClientLoad = (state) => {
                        setClientLoadState(state);
                    };
                    const maybeDone = () => {
                        if (profileReady && contractReady) {
                            setHasRouted(true);
                        }
                    };

                    const profileRef = window.doc(db, 'artifacts', appId, 'public', 'data', 'workbook_profiles', contractParam);
                    const unsubProfile = window.onSnapshot(profileRef, (docSnap) => {
                        profileReady = true;
                        if (docSnap.exists()) {
                            setProfiles([{ id: docSnap.id, ...docSnap.data() }]);
                        } else {
                            setProfiles([]);
                        }
                        maybeDone();
                    }, (err) => {
                        console.error(err);
                        profileReady = true;
                        markClientLoad('error');
                        maybeDone();
                    });

                    const contractRef = window.doc(db, 'artifacts', appId, 'public', 'data', 'contracts_ledger', `contract-${contractParam}`);
                    const unsubContract = window.onSnapshot(contractRef, (docSnap) => {
                        contractReady = true;
                        if (docSnap.exists()) {
                            setContracts([{ id: docSnap.id, ...docSnap.data() }]);
                        } else {
                            setContracts([]);
                        }
                        maybeDone();
                    }, (err) => {
                        console.error(err);
                        contractReady = true;
                        markClientLoad('error');
                        maybeDone();
                    });

                    return () => { unsubProfile(); unsubContract(); };
                }
            }, [isAuthed, isClientMode]);

            // 3. Admin Data Fetching (Only fires if admin passcode is verified)
            useEffect(() => {
                if (!isAuthed || !isAdminAuthed || isClientMode) return;
                
                const db = window.firebaseDb;
                const appId = window.appId;

                const unsubProfiles = window.onSnapshot(window.collection(db, 'artifacts', appId, 'public', 'data', 'workbook_profiles'), (snap) => {
                    const fetchedProfiles = [];
                    snap.forEach(doc => fetchedProfiles.push({ id: doc.id, ...doc.data() }));
                    setProfiles(fetchedProfiles);
                }, console.error);

                const unsubContracts = window.onSnapshot(window.collection(db, 'artifacts', appId, 'public', 'data', 'contracts_ledger'), (snap) => {
                    const fetchedContracts = [];
                    snap.forEach(doc => fetchedContracts.push({ id: doc.id, ...doc.data() }));
                    setContracts(fetchedContracts);
                }, console.error);

                return () => { unsubProfiles(); unsubContracts(); };
            }, [isAuthed, isAdminAuthed, isClientMode]);

            const profileDisplayName = (profile) =>
                window.EngagementConfig?.getClientDisplayName?.(profile) || profile?.clientCompany || 'Unknown Client';

            const ledgerData = useMemo(() => {
                return profiles.map(profile => {
                    const contract = contracts.find(c => c.profileId === profile.id);
                    return {
                        profileId: profile.id,
                        clientCompany: profileDisplayName(profile),
                        quoteId: profile.quoteId || 'N/A',
                        contractStatus: contract ? contract.status : 'draft',
                        signedAt: contract?.signedAt || null,
                        contractId: contract?.id || null,
                        tasks: profile.tasks || [],
                        contractData: contract || null
                    };
                }).sort((a, b) => {
                    const statusWeight = { 'signed': 1, 'sent': 2, 'draft': 3 };
                    return statusWeight[a.contractStatus] - statusWeight[b.contractStatus];
                });
            }, [profiles, contracts]);

            useEffect(() => {
                if (!hasRouted || !isClientMode) return;

                const urlParams = new URLSearchParams(window.location.search);
                const contractParam = urlParams.get('contract');
                if (!contractParam) return;

                const item = ledgerData.find(d => d.profileId === contractParam);
                if (item && profiles.some(p => p.id === contractParam)) {
                    setActiveContractId(contractParam);
                    const viewParam = urlParams.get('view');
                    if (viewParam === 'audit' || item.contractStatus === 'signed') setActiveView('audit_trail');
                    else if (item.contractStatus === 'sent') setActiveView('client_sign');
                    else setClientLoadState('unavailable');
                    if (item.contractStatus === 'sent' || item.contractStatus === 'signed') setClientLoadState('ready');
                } else {
                    setClientLoadState((prev) => (prev === 'error' ? 'error' : 'not_found'));
                }
            }, [ledgerData, hasRouted, isClientMode, profiles]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const canPullFromCloud = isAuthed && (isStaffUser || (!isClientMode && isAdminAuthed));

            const handlePullFromCloud = async () => {
                if (!canPullFromCloud) return;

                setIsPulling(true);
                try {
                    const db = window.firebaseDb;
                    const appId = window.appId;

                    if (isClientMode) {
                        const contractParam = new URLSearchParams(window.location.search).get('contract');
                        if (!contractParam) {
                            showToast("No contract reference to pull.");
                            return;
                        }
                        const [profileSnap, contractSnap] = await Promise.all([
                            window.getDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'workbook_profiles', contractParam)),
                            window.getDoc(window.doc(db, 'artifacts', appId, 'public', 'data', 'contracts_ledger', `contract-${contractParam}`))
                        ]);
                        if (profileSnap.exists()) {
                            setProfiles([{ id: profileSnap.id, ...profileSnap.data() }]);
                        }
                        if (contractSnap.exists()) {
                            setContracts([{ id: contractSnap.id, ...contractSnap.data() }]);
                        }
                        showToast(profileSnap.exists() ? "Contract pulled from cloud." : "Profile not found in cloud.");
                    } else {
                        const [profilesSnap, contractsSnap] = await Promise.all([
                            window.getDocs(window.collection(db, 'artifacts', appId, 'public', 'data', 'workbook_profiles')),
                            window.getDocs(window.collection(db, 'artifacts', appId, 'public', 'data', 'contracts_ledger'))
                        ]);
                        const fetchedProfiles = [];
                        profilesSnap.forEach(d => fetchedProfiles.push({ id: d.id, ...d.data() }));
                        const fetchedContracts = [];
                        contractsSnap.forEach(d => fetchedContracts.push({ id: d.id, ...d.data() }));
                        setProfiles(fetchedProfiles);
                        setContracts(fetchedContracts);
                        showToast(`Pulled ${fetchedProfiles.length} SOW profile(s) from cloud.`);
                    }
                } catch (e) {
                    console.error("Pull from cloud failed:", e);
                    showToast("Pull failed — check connection.");
                } finally {
                    setIsPulling(false);
                }
            };

            const PullCloudButton = ({ className = '' }) => (
                <button
                    onClick={handlePullFromCloud}
                    disabled={isPulling || !canPullFromCloud}
                    title="Reload latest SOW profiles and contract records from Firebase"
                    className={`inline-flex items-center px-3 py-2 bg-brandNavy-800 hover:bg-brandNavy-750 text-brandTeal-300 border border-brandTeal-500/40 font-bold rounded-lg text-[10px] uppercase tracking-wider transition-colors disabled:opacity-50 no-print ${className}`}
                >
                    <Icons.CloudDownload /> {isPulling ? 'Pulling...' : 'Pull from Cloud'}
                </button>
            );

            const handleAdminLogin = async (e) => {
                e.preventDefault();
                const cleanCode = adminCode.trim().toUpperCase();
                if (!cleanCode) return;

                setIsProcessing(true);
                try {
                    const result = await window.verifyAdminPasscode(cleanCode);
                    if (result.valid) {
                        setIsAdminAuthed(true);
                        setAuthError('');
                        showToast("Ledger Vault Unlocked");
                    } else {
                        setAuthError("Unauthorized token entry. Please check configuration credentials.");
                    }
                } catch (err) {
                    console.error("Vault entry failure:", err);
                    setAuthError("Authentication failed. Deploy Cloud Functions if unavailable.");
                } finally {
                    setIsProcessing(false);
                }
            };

            const activeLedgerItem = useMemo(() => ledgerData.find(item => item.profileId === activeContractId), [ledgerData, activeContractId]);
            const activeProfileObj = useMemo(() => profiles.find(p => p.id === activeContractId), [profiles, activeContractId]);

            const copyLink = (profileId) => {
                const baseUrl = window.location.href.split('?')[0];
                const link = `${baseUrl}?contract=${profileId}`;
                const el = document.createElement('textarea');
                el.value = link;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("Secure Client Link Copied!");
            };

            const generateSigningLink = async (profileId) => {
                setIsProcessing(true);
                try {
                    const contractId = `contract-${profileId}`;
                    const docRef = window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'contracts_ledger', contractId);
                    
                    await window.setDoc(docRef, {
                        id: contractId,
                        profileId: profileId,
                        status: 'sent',
                        generatedAt: new Date().toISOString(),
                        auditTrail: [{ action: 'Document Generated & Link Sent', timestamp: new Date().toISOString() }]
                    });

                    copyLink(profileId);
                } catch (e) {
                    console.error("Error generating link:", e);
                }
                setIsProcessing(false);
            };

            const executeResetContract = async (contractId) => {
                setIsProcessing(true);
                try {
                    await window.deleteDoc(window.doc(window.firebaseDb, 'artifacts', window.appId, 'public', 'data', 'contracts_ledger', contractId));
                    showToast("Contract reset to Draft. Link revoked.");
                } catch (e) {
                    console.error("Error resetting contract:", e);
                }
                setContractToReset(null);
                setIsProcessing(false);
            };

            const handleClientSign = async () => {
                if (!signatureName.trim() || !hasAcceptedTerms || !activeLedgerItem || !activeLedgerItem.contractData) return;
                
                setIsProcessing(true);
                try {
                    const contractId = activeLedgerItem.contractData.id;
                    const db = window.firebaseDb;
                    const contractRef = window.doc(db, 'artifacts', window.appId, 'public', 'data', 'contracts_ledger', contractId);
                    const timestamp = new Date().toISOString();

                    let cleanIp = "Fallback Audit Address";
                    try {
                        const ipResponse = await fetch('https://api.ipify.org?format=json');
                        const ipData = await ipResponse.json();
                        cleanIp = ipData.ip;
                    } catch (ipErr) {
                        console.warn("Public IP fetch query timed out.", ipErr);
                    }

                    const newAuditTrail = [
                        ...(activeLedgerItem.contractData.auditTrail || []),
                        { action: 'Document Viewed securely by Client', timestamp: new Date(Date.now() - 60000).toISOString() },
                        { action: `E-Signed by ${signatureName} (Verified Network IP: ${cleanIp})`, timestamp: timestamp }
                    ];

                    await window.setDoc(contractRef, {
                        status: 'signed',
                        signedAt: timestamp,
                        signedBy: signatureName,
                        ipAddress: cleanIp,
                        auditTrail: newAuditTrail
                    }, { merge: true });

                    showToast("Contract Successfully Executed!");
                    setActiveView('audit_trail');
                } catch (e) {
                    console.error("Signing Error:", e);
                    showToast("Error processing signature.");
                }
                setIsProcessing(false);
            };

            // Unified Contract Body Component used across client sign and audit trail views
            const renderContractDetails = (profileObj, financials, selectedTasks, activePMO, activeGov) => {
                const profileWithoutCreditBack = contractProfile(profileObj);
                const schedule = getBillingSchedule(profileWithoutCreditBack);
                const moduleSummaries = getModuleInvestmentSummaries(profileWithoutCreditBack);
                const milestoneSplit = profileObj.milestoneSplit || 'auto';
                const frictionBuffer = profileObj.frictionBuffer || 0;
                const quoteBaseAmount = financials.finalProjectCostBase + financials.retainerCostTotalBase;
                const quoteVatAmount = financials.includeTax ? Math.round(quoteBaseAmount * 0.12) : 0;

                return (
                <>
                    <div className="border-b-2 border-brandTeal-500 pb-6 mb-8 print:border-slate-300">
                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Prepared For</p>
                        <h2 className="text-2xl font-bold text-slate-900">{profileObj.clientCompany}</h2>
                        <p className="text-sm text-slate-600 mt-1">Attention: {profileObj.clientRep}</p>
                        {profileObj.clientAddress && (
                            <p className="text-xs text-slate-500 mt-1">{profileObj.clientAddress}</p>
                        )}
                        <div className="flex flex-wrap gap-4 mt-3 text-[10px] font-mono text-slate-500 uppercase">
                            {profileObj.quoteValidity && <span>Valid Until: {profileObj.quoteValidity}</span>}
                            {profileObj.targetStartDate && <span>Target Kickoff: {profileObj.targetStartDate}</span>}
                            <span>{financials.includeTax ? 'VAT Sales Invoice Basis' : 'Non-VAT / Exempt Basis'}</span>
                        </div>
                    </div>

                    <div className="space-y-4">
                        <h3 className="text-sm font-bold uppercase tracking-widest text-slate-800 border-b border-slate-200 pb-2">1. Included Deliverables</h3>
                        <p className="text-xs text-slate-600 italic leading-relaxed">
                            We are pleased to submit our formal flat-rate pricing proposal to fix operational leaks, document how your business runs, and launch your team workspace:
                        </p>
                        <div className="border border-slate-200 rounded-lg overflow-hidden">
                            <table className="w-full text-left border-collapse text-xs">
                                <thead>

                                </div>

                                {/* Complete Executed PDF Content Body */}
                                <div className="bg-white border border-slate-200 rounded-xl shadow-2xl overflow-hidden relative print:shadow-none print:border-none print:w-full print:rounded-none">
                                    
                                    <div className="bg-brandNavy-955 p-6 md:p-10 text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-200 print:bg-white print:text-slate-900 print:border-b-2 print:border-brandTeal-500 print:pb-6 print:px-0">
                                        {renderContractIssuerHeader()}
                                        <div className="text-left md:text-right">
                                            <p className="text-xs text-slate-400 font-mono print:text-slate-600">Ref: {activeProfileObj.quoteId}</p>
                                            <p className="text-xs text-emerald-400 font-mono mt-0.5 font-bold print:text-slate-600">Status: Executed on {new Date(contract.signedAt).toLocaleDateString()}</p>
                                        </div>
                                    </div>

                                    <div className="p-8 md:p-12 print:p-0 print:pt-8">
                                        
                                        {renderContractDetails(activeProfileObj, financials, selectedTasks, activePMO, activeGov)}

                                        <div className="mt-12 border-t border-slate-200 pt-8 print-force-break">
                                            <h3 className="text-sm font-bold uppercase tracking-widest text-slate-800 mb-6 flex items-center gap-2">
                                                <Icons.ShieldCheck /> Final Execution & E-Signature Audit
                                            </h3>
                                            
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 space-y-4 print:bg-white print:border-slate-300">
                                                    <h4 className="text-xs font-bold uppercase tracking-widest text-slate-500 border-b border-slate-200 pb-2">Signatory Parameters</h4>
                                                    <div>
                                                        <p className="text-[10px] font-mono text-slate-500 uppercase">Entity</p>
                                                        <p className="font-bold text-slate-900 text-lg">{activeLedgerItem.clientCompany}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-[10px] font-mono text-slate-500 uppercase">Authorized Signer</p>
                                                        <p className="font-bold text-slate-900 text-lg">{contract.signedBy}</p>
                                                    </div>
                                                    <div className="h-20 bg-white border border-slate-300 rounded-lg flex items-center justify-center overflow-hidden">
                                                        <span className="font-signature text-4xl text-slate-800">{contract.signedBy}</span>
                                                    </div>
                                                </div>

                                                <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 space-y-4 print:bg-white print:border-slate-300">
                                                    <h4 className="text-xs font-bold uppercase tracking-widest text-slate-500 border-b border-slate-200 pb-2">Network Audit Log</h4>
                                                    <div className="space-y-4">
                                                        {contract.auditTrail.map((event, i) => (
                                                            <div key={i} className="flex gap-4 relative">
                                                                {i !== contract.auditTrail.length - 1 && <div className="absolute left-2 top-6 w-0.5 h-full bg-slate-300"></div>}
                                                                <div className="w-4 h-4 rounded-full bg-white border-2 border-brandTeal-500 mt-1 shrink-0 z-10"></div>
                                                                <div>
                                                                    <p className="text-xs font-bold text-slate-800">{event.action}</p>
                                                                    <p className="text-[10px] font-mono text-slate-500">{new Date(event.timestamp).toLocaleString()}</p>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                            <p className="text-[9px] text-slate-500 text-center mt-6 uppercase tracking-wider font-mono">
                                                Document uniquely verified & securely hashed by Kolthoff Consulting Server.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            // --- 2. Admin Security Lock Gate ---
            if (!isClientMode && !isAdminAuthed) {
                return (
                    <div className="flex h-screen items-center justify-center relative overflow-hidden font-sans bg-[#02050e]">
                        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-brandTeal-500/10 blur-[100px] rounded-full pointer-events-none"></div>

                        <div className="glass-panel p-10 rounded-2xl w-full max-w-md border border-brandNavy-700 relative z-10 shadow-2xl text-center">
                            <div className="w-16 h-16 rounded-2xl bg-brandTeal-500/10 border border-brandTeal-500/30 flex items-center justify-center text-brandTeal-400 shadow-[0_0_15px_rgba(20,184,166,0.15)] mx-auto mb-6">
                                <svg className="w-8 h-8 stroke-current text-brandTeal-500" viewBox="0 0 100 100" fill="none" strokeWidth="6" strokeLinejoin="round">
                                    <path d="M50 12 C72 16 84 22 84 22 V54 C84 72 70 85 50 90 C30 85 16 72 16 54 V22 C16 22 28 16 50 12 Z"/>
                                    <path d="M36 50 L46 60 L66 36" strokeWidth="8" strokeLinecap="round"/>
                                </svg>
                            </div>

                            <h1 className="text-2xl font-serif font-bold text-white mb-2">Ledger Vault</h1>
                            <p className="text-xs text-slate-400 mb-8 font-mono">Enter administrative passphrase verification sequence.</p>

                            <form onSubmit={handleAdminLogin} className="space-y-4">
                                <div>
                                    <input
                                        type="password"
                                        value={adminCode}
                                        onChange={(e) => setAdminCode(e.target.value)}
                                        placeholder="••••••••••••"
                                        className="w-full bg-brandNavy-955 border border-brandNavy-700 rounded-lg px-4 py-3 text-sm text-white font-mono font-bold text-center tracking-widest focus:outline-none focus:border-brandTeal-500 transition-colors uppercase"
                                    />
                                </div>
                                {authError && <p className="text-xs text-rose-400 font-bold bg-rose-500/10 p-2 rounded">{authError}</p>}
                                <button type="submit" disabled={isProcessing} className="w-full bg-brandTeal-500 hover:bg-brandTeal-400 text-brandNavy-955 font-bold rounded-lg px-4 py-3 text-sm transition-all flex justify-center items-center gap-2 disabled:opacity-50">
                                    <Icons.Lock /> {isProcessing ? "Validating Sequence..." : "Unlock Ledger"}
                                </button>
                            </form>

                            <p className="text-[10px] text-slate-500 mt-8 italic">Protected by Kolthoff Consulting Secure Protocol</p>
                        </div>
                    </div>
                );
            }

            // --- 3. Master Admin Dashboard Render ---
            if (isClientMode) {
                return renderClientGate();
            }

            return (
                <div className="flex h-screen overflow-hidden font-sans">
                    {toast && (
                        <div className="fixed top-6 right-6 z-50 bg-brandTeal-600 text-white px-4 py-3 rounded-lg shadow-2xl flex items-center gap-2 font-bold text-xs">
                            <Icons.CheckCircle /> {toast}
                        </div>
                    )}

                    {contractToReset && (
                        <div className="fixed inset-0 bg-brandNavy-955/80 z-[1000] backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-brandNavy-900 border border-rose-900/40 p-6 rounded-xl max-w-md w-full text-center shadow-2xl">
                                <h4 className="font-extrabold text-slate-200 text-sm uppercase tracking-wider mb-2">Confirm Action Revocation?</h4>
                                <p className="text-[11px] text-slate-400 mb-4">This will delete the temporary execution document for <strong className="text-white">{contractToReset.clientCompany}</strong> and clear structural memory logs.</p>
                                <div className="flex justify-center gap-3">
                                    <button onClick={() => executeResetContract(contractToReset.contractId)} className="px-4 py-2 bg-rose-600 text-white text-xs font-bold rounded-lg uppercase">Reset to Draft</button>
                                    <button onClick={() => setContractToReset(null)} className="px-4 py-2 bg-brandNavy-955 text-slate-300 border border-brandNavy-700 text-xs font-bold rounded-lg uppercase">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <aside className="w-72 bg-brandNavy-955 border-r border-brandNavy-800 flex flex-col shrink-0 z-20">
                        <div className="p-6 border-b border-brandNavy-800">
                            <div className="flex items-center gap-3">
                                <div className="text-brandTeal-400 font-bold text-lg">K</div>
                                <div>
                                    <span className="font-extrabold tracking-wider text-sm uppercase block text-white leading-none">KOLTHOFF</span>
                                    <span className="text-[8px] text-brandTeal-400 font-mono tracking-widest uppercase block mt-1 font-bold">Admin Console</span>
                                </div>
                            </div>
                        </div>
                        <div className="p-4 flex-1">
                            <p className="text-[9px] font-mono text-slate-500 uppercase tracking-widest font-bold mb-3 px-2">Operations</p>
                            <button onClick={() => setActiveView('ledger')} className="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-xs font-bold tracking-wide bg-brandTeal-500 text-brandNavy-955 shadow-lg">
                                <Icons.FileSignature /> Master Contract List
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto bg-brandNavy-900/40">
                        <header className="sticky top-0 bg-brandNavy-955/80 backdrop-blur-md border-b border-brandNavy-800 px-8 py-4 flex justify-between items-center z-10">
                            <div>
                                <h2 className="text-lg font-bold text-white font-serif tracking-wide">Secure E-Signature Ledger</h2>
                                <p className="text-[10px] text-slate-400 font-mono mt-0.5">Tracking generated SOW parameters and manual verification files.</p>
                            </div>
                            <PullCloudButton />
                        </header>

                        <div className="p-8 max-w-6xl mx-auto">
                            <div className="glass-panel rounded-2xl overflow-hidden shadow-xl">
                                <table className="w-full text-left border-collapse text-xs">
                                    <thead className="bg-brandNavy-950">
                                        <tr className="text-slate-400 uppercase font-mono text-[9px] tracking-wider border-b border-brandNavy-800">
                                            <th className="p-4 w-[25%]">Client Entity</th>
                                            <th className="p-4 w-[20%]">SOW Reference</th>
                                            <th className="p-4 w-[15%] text-center">Value (Est)</th>
                                            <th className="p-4 text-center">Status</th>
                                            <th className="p-4 text-right">Ledger Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-brandNavy-800/50">
                                        {ledgerData.map(item => {
                                            let statusBadge = "";
                                            if (item.contractStatus === 'draft') statusBadge = <span className="bg-slate-800 text-slate-400 border border-slate-700 px-2 py-1 rounded text-[9px] font-bold">Draft / Internal</span>;
                                            else if (item.contractStatus === 'sent') statusBadge = <span className="bg-brandAmber-500/10 text-brandAmber-400 border border-brandAmber-500/30 px-2 py-1 rounded text-[9px] font-bold">Sent (Awaiting)</span>;
                                            else if (item.contractStatus === 'signed') statusBadge = <span className="bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 px-2 py-1 rounded text-[9px] font-bold flex items-center justify-center gap-1 w-max mx-auto"><Icons.CheckCircle /> Executed</span>;

                                            const profileData = profiles.find(p => p.id === item.profileId);
                                            const estValue = getFinancials(contractProfile(profileData)).total;

                                            return (
                                                <tr key={item.profileId} className="hover:bg-brandNavy-800/30 transition-colors">
                                                    <td className="p-4 font-bold text-slate-200">{item.clientCompany}</td>
                                                    <td className="p-4 text-[10px] font-mono text-slate-400">{item.quoteId}</td>
                                                    <td className="p-4 text-center font-mono font-bold text-brandTeal-400">{formatCurrency(estValue)}</td>
                                                    <td className="p-4 text-center">{statusBadge}</td>
                                                    <td className="p-4 text-right space-x-2">
                                                        {item.contractStatus === 'draft' && (
                                                            <button onClick={() => generateSigningLink(item.profileId)} className="px-3 py-1.5 bg-brandTeal-500 hover:bg-brandTeal-400 text-brandNavy-955 rounded text-[10px] font-bold inline-flex items-center">
                                                                <Icons.Link /> Generate E-Sign Link
                                                            </button>
                                                        )}
                                                        {item.contractStatus === 'sent' && (
                                                            <>
                                                                <button onClick={() => { setActiveContractId(item.profileId); setActiveView('client_sign'); }} className="px-3 py-1.5 bg-brandNavy-800 hover:bg-brandTeal-500 text-white border border-brandNavy-600 rounded text-[10px] font-bold inline-flex items-center">
                                                                    <Icons.Eye /> Test Client View
                                                                </button>
                                                                <button onClick={() => copyLink(item.profileId)} className="p-1.5 text-slate-400 hover:text-white inline-flex align-middle">
                                                                    <Icons.Link />
                                                                </button>
                                                                <button onClick={() => setContractToReset(item)} className="p-1.5 text-rose-500 hover:text-rose-400 inline-flex align-middle">
                                                                    <Icons.Reset />
                                                                </button>
                                                            </>
                                                        )}
                                                        {item.contractStatus === 'signed' && (
                                                            <>
                                                                <button onClick={() => { setActiveContractId(item.profileId); setActiveView('audit_trail'); }} className="px-3 py-1.5 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 rounded text-[10px] font-bold">
                                                                    View Audit Trail →
                                                                </button>
                                                                <button onClick={() => setContractToReset(item)} className="p-1.5 text-rose-500 hover:text-rose-400 inline-flex align-middle">
                                                                    <Icons.Reset />
                                                                </button>
                                                            </>
                                                        )}
                                                    </td>
                                                </tr>
                                            )
                                        })}
                                        {ledgerData.length === 0 && (
                                            <tr><td colSpan="5" className="p-8 text-center text-slate-500 italic">No generated profiles found.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render((<App />));
    </script>
</body>
</html>
